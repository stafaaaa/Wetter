<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foto Slideshow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* SLIDESHOW */
.slideshow {
    position: fixed;
    inset: 0;
    z-index: 1;
}

.slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
}

.slide.active { opacity: 1; }

/* DUNKLER GRADIENT FÜR LESBARKEIT */
.gradient-overlay {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: 
        linear-gradient(135deg, rgba(0,0,0,0.6) 0%, transparent 35%),
        linear-gradient(315deg, rgba(0,0,0,0.6) 0%, transparent 35%);
    pointer-events: none;
}

/* GLAS-EFFEKT */
.glass {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

/* UHRZEIT - OBEN LINKS */
.time-widget {
    position: fixed;
    top: 4vh;
    left: 4vh;
    z-index: 10;
    padding: 3vh 4vh;
}

.time {
    font-size: clamp(48px, 8vw, 120px);
    font-weight: 700;
    line-height: 1;
    text-shadow: 0 4px 20px rgba(0,0,0,0.6);
    letter-spacing: -0.02em;
}

.date {
    font-size: clamp(18px, 2vw, 28px);
    margin-top: 1vh;
    opacity: 0.95;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
}

/* WETTER - UNTEN RECHTS */
.weather-widget {
    position: fixed;
    bottom: 4vh;
    right: 4vh;
    z-index: 10;
    padding: 2.5vh 3vh;
    display: flex;
    gap: 2vh;
    align-items: center;
}

.weather-day {
    text-align: center;
    min-width: clamp(70px, 8vw, 110px);
}

.weather-day .day-name {
    font-size: clamp(14px, 1.4vw, 20px);
    font-weight: 600;
    margin-bottom: 0.5vh;
    opacity: 0.9;
}

.weather-day .icon {
    font-size: clamp(32px, 4vw, 56px);
    margin: 0.5vh 0;
}

.weather-day .temp {
    font-size: clamp(18px, 2vw, 28px);
    font-weight: 700;
}

/* PAUSE INDICATOR */
.pause-indicator {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    font-size: clamp(60px, 10vw, 140px);
    opacity: 0;
    transition: opacity 0.3s;
    text-shadow: 0 4px 30px rgba(0,0,0,0.8);
    pointer-events: none;
}

.pause-indicator.show { opacity: 0.9; }

/* SETTINGS MENU */
.settings {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    z-index: 100;
    display: none;
    justify-content: center;
    align-items: center;
    padding: 4vh;
}

.settings.active { display: flex; }

.settings-panel {
    background: rgba(30, 30, 35, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 28px;
    padding: clamp(24px, 4vw, 48px);
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
}

.settings h2 {
    font-size: clamp(24px, 3vw, 36px);
    margin-bottom: 3vh;
}

.settings label {
    display: block;
    font-size: clamp(14px, 1.4vw, 18px);
    margin-bottom: 1vh;
    margin-top: 2vh;
    font-weight: 600;
    opacity: 0.9;
}

.settings input,
.settings textarea,
.settings select {
    width: 100%;
    padding: 1.5vh 2vh;
    background: rgba(255, 255, 255, 0.08);
    border: 2px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    color: #fff;
    font-size: clamp(14px, 1.4vw, 18px);
    font-family: inherit;
    outline: none;
}

/* FIRE TV FOKUS - WICHTIG! */
.settings input:focus,
.settings textarea:focus,
.settings select:focus,
.settings button:focus,
.focused {
    border-color: #4a9eff !important;
    box-shadow: 0 0 0 4px rgba(74, 158, 255, 0.4) !important;
    outline: none;
}

.settings textarea {
    min-height: 12vh;
    resize: vertical;
}

.btn-row {
    display: flex;
    gap: 2vh;
    margin-top: 4vh;
}

.settings button {
    flex: 1;
    padding: 2vh;
    border: 2px solid transparent;
    border-radius: 12px;
    font-size: clamp(16px, 1.6vw, 20px);
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
}

.btn-save { background: #4a9eff; color: white; }
.btn-save:hover { background: #3a8eef; }

.btn-cancel { background: rgba(255,255,255,0.1); color: white; }
.btn-cancel:hover { background: rgba(255,255,255,0.2); }

/* HILFE-OVERLAY (FERNBEDIENUNG) */
.help-overlay {
    position: fixed;
    bottom: 4vh;
    left: 4vh;
    z-index: 10;
    padding: 1.5vh 2vh;
    font-size: clamp(12px, 1.2vw, 16px);
    opacity: 0;
    transition: opacity 0.5s;
}

.help-overlay.show { opacity: 0.7; }

.help-overlay div { margin: 0.3vh 0; }

/* PORTRAIT MODE */
@media (orientation: portrait) {
    .weather-widget {
        bottom: 4vh;
        left: 4vh;
        right: 4vh;
        justify-content: space-around;
    }
    .weather-day {
        min-width: 0;
        flex: 1;
    }
}
</style>
</head>
<body>

<!-- SLIDESHOW -->
<div class="slideshow" id="slideshow"></div>
<div class="gradient-overlay"></div>

<!-- UHRZEIT -->
<div class="time-widget glass">
    <div class="time" id="time">00:00</div>
    <div class="date" id="date">Datum</div>
</div>

<!-- WETTER -->
<div class="weather-widget glass" id="weather"></div>

<!-- PAUSE INDIKATOR -->
<div class="pause-indicator" id="pauseIndicator">⏸</div>

<!-- HILFE -->
<div class="help-overlay glass" id="help">
    <div>OK = Pause</div>
    <div>← → = Bilder</div>
    <div>Menü = Einstellungen</div>
</div>

<!-- SETTINGS -->
<div class="settings" id="settings">
    <div class="settings-panel">
        <h2>⚙️ Einstellungen</h2>
        
        <label>Stadt für Wetter</label>
        <input type="text" id="settingCity" placeholder="z.B. Düsseldorf">

        <label>Bild-URLs (eine pro Zeile)</label>
        <textarea id="settingImages" placeholder="https://example.com/photo1.jpg"></textarea>

        <label>Slideshow-Intervall (Sekunden)</label>
        <input type="number" id="settingInterval" min="3" max="300" value="10">

        <div class="btn-row">
            <button class="btn-cancel" id="btnCancel">Abbrechen</button>
            <button class="btn-save" id="btnSave">Speichern</button>
        </div>
    </div>
</div>

<script>
// ===== KONFIGURATION =====
const CONFIG = {
    city: 'Düsseldorf',
    interval: 10000,
    images: [
        'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=2000',
        'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=2000',
        'https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=2000',
        'https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=2000',
        'https://images.unsplash.com/photo-1426604966848-d7adac402bff?w=2000'
    ]
};

// ===== STATE =====
let currentSlide = 0;
let isPaused = false;
let slideTimer = null;
let slides = [];
let focusIndex = 0;
let focusableElements = [];

// ===== STORAGE =====
function loadConfig() {
    try {
        const saved = localStorage.getItem('slideshow_v1');
        if (saved) {
            const cfg = JSON.parse(saved);
            if (cfg.city) CONFIG.city = cfg.city;
            if (cfg.interval) CONFIG.interval = cfg.interval;
            if (cfg.images && cfg.images.length) CONFIG.images = cfg.images;
        }
    } catch (e) { console.error(e); }
}

function saveConfig() {
    try {
        localStorage.setItem('slideshow_v1', JSON.stringify(CONFIG));
    } catch (e) { console.error(e); }
}

// ===== SLIDESHOW =====
function buildSlides() {
    const container = document.getElementById('slideshow');
    container.innerHTML = '';
    slides = [];

    CONFIG.images.forEach((url, i) => {
        const slide = document.createElement('div');
        slide.className = 'slide';
        slide.style.backgroundImage = `url('${url}')`;
        if (i === 0) slide.classList.add('active');
        container.appendChild(slide);
        slides.push(slide);
    });
    currentSlide = 0;
}

function showSlide(index) {
    if (!slides.length) return;
    slides.forEach(s => s.classList.remove('active'));
    currentSlide = (index + slides.length) % slides.length;
    slides[currentSlide].classList.add('active');
}

function nextSlide() { showSlide(currentSlide + 1); }
function prevSlide() { showSlide(currentSlide - 1); }

function startSlideshow() {
    stopSlideshow();
    if (isPaused) return;
    slideTimer = setInterval(nextSlide, CONFIG.interval);
}

function stopSlideshow() {
    if (slideTimer) {
        clearInterval(slideTimer);
        slideTimer = null;
    }
}

function togglePause() {
    isPaused = !isPaused;
    const indicator = document.getElementById('pauseIndicator');
    if (isPaused) {
        stopSlideshow();
        indicator.textContent = '⏸';
        indicator.classList.add('show');
    } else {
        indicator.textContent = '▶';
        indicator.classList.add('show');
        setTimeout(() => indicator.classList.remove('show'), 1000);
        startSlideshow();
    }
}

// ===== UHRZEIT =====
function updateClock() {
    const now = new Date();
    document.getElementById('time').textContent = 
        now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('date').textContent = 
        now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
}

// ===== WETTER =====
const weatherIcons = {
    Clear: '☀️', Clouds: '☁️', Rain: '🌧️', Drizzle: '🌦️',
    Thunderstorm: '⛈️', Snow: '❄️', Mist: '🌫️', Fog: '🌫️', Haze: '🌫️'
};

async function loadWeather() {
    try {
        const apiKey = '769c5861cd255a3982bafb1680abf194';
        const url = `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(CONFIG.city)}&appid=${apiKey}&units=metric&lang=de`;
        const res = await fetch(url);
        const data = await res.json();
        
        if (data.cod !== "200") {
            document.getElementById('weather').innerHTML = '<div class="weather-day"><div class="day-name">Offline</div></div>';
            return;
        }

        const days = data.list
            .filter(item => item.dt_txt.includes('12:00:00'))
            .slice(0, 4);

        document.getElementById('weather').innerHTML = days.map(day => {
            const date = new Date(day.dt * 1000);
            const dayName = date.toLocaleDateString('de-DE', { weekday: 'short' });
            const icon = weatherIcons[day.weather[0].main] || '☁️';
            const temp = Math.round(day.main.temp);
            return `
                <div class="weather-day">
                    <div class="day-name">${dayName}</div>
                    <div class="icon">${icon}</div>
                    <div class="temp">${temp}°</div>
                </div>
            `;
        }).join('');
    } catch (e) {
        console.error('Weather load failed:', e);
        document.getElementById('weather').innerHTML = '<div class="weather-day"><div class="day-name">Offline</div></div>';
    }
}

// ===== SETTINGS =====
function openSettings() {
    document.getElementById('settingCity').value = CONFIG.city;
    document.getElementById('settingImages').value = CONFIG.images.join('\n');
    document.getElementById('settingInterval').value = CONFIG.interval / 1000;
    
    document.getElementById('settings').classList.add('active');
    stopSlideshow();
    
    // FOKUS-MANAGEMENT FÜR FIRE TV
    focusableElements = Array.from(
        document.querySelectorAll('.settings input, .settings textarea, .settings button')
    );
    focusIndex = 0;
    updateFocus();
}

function closeSettings() {
    document.getElementById('settings').classList.remove('active');
    if (!isPaused) startSlideshow();
}

function saveSettings() {
    CONFIG.city = document.getElementById('settingCity').value || 'Düsseldorf';
    CONFIG.interval = (parseInt(document.getElementById('settingInterval').value) || 10) * 1000;
    
    const imgText = document.getElementById('settingImages').value.trim();
    if (imgText) {
        CONFIG.images = imgText.split('\n').map(s => s.trim()).filter(s => s);
    }
    
    saveConfig();
    buildSlides();
    loadWeather();
    closeSettings();
}

function updateFocus() {
    focusableElements.forEach((el, i) => {
        if (i === focusIndex) {
            el.classList.add('focused');
            el.focus();
        } else {
            el.classList.remove('focused');
        }
    });
}

// ===== D-PAD / FERNBEDIENUNG =====
function handleKeyDown(e) {
    const settingsOpen = document.getElementById('settings').classList.contains('active');
    
    // SETTINGS OFFEN: D-Pad Navigation im Menü
    if (settingsOpen) {
        switch (e.keyCode) {
            case 38: // Pfeil hoch
                e.preventDefault();
                focusIndex = Math.max(0, focusIndex - 1);
                updateFocus();
                break;
            case 40: // Pfeil runter
                e.preventDefault();
                focusIndex = Math.min(focusableElements.length - 1, focusIndex + 1);
                updateFocus();
                break;
            case 13: // OK / Enter
                e.preventDefault();
                const el = focusableElements[focusIndex];
                if (el && el.tagName === 'BUTTON') {
                    el.click();
                }
                break;
            case 27: // Escape / Back
            case 8:  // Backspace (Fire TV Back)
            case 461: // Fire TV Back
                e.preventDefault();
                closeSettings();
                break;
        }
        return;
    }
    
    // SLIDESHOW MODUS
    switch (e.keyCode) {
        case 13: // OK / Enter
        case 32: // Space
            e.preventDefault();
            togglePause();
            break;
        case 39: // Pfeil rechts
            e.preventDefault();
            nextSlide();
            if (!isPaused) startSlideshow();
            break;
        case 37: // Pfeil links
            e.preventDefault();
            prevSlide();
            if (!isPaused) startSlideshow();
            break;
        case 82: // R = Menu (PC Test)
        case 77: // M = Menu (PC Test)
        case 27: // Escape
        case 82143: // Fire TV Menu
            e.preventDefault();
            openSettings();
            break;
    }
}

// HILFE EINBLENDEN BEI START
function showHelp() {
    const help = document.getElementById('help');
    help.classList.add('show');
    setTimeout(() => help.classList.remove('show'), 5000);
}

// ===== INIT =====
function init() {
    loadConfig();
    buildSlides();
    updateClock();
    loadWeather();
    startSlideshow();
    showHelp();
    
    // Uhrzeit jede Sekunde
    setInterval(updateClock, 1000);
    
    // Wetter alle 30 Minuten
    setInterval(loadWeather, 30 * 60 * 1000);
    
    // D-Pad / Tastatur
    document.addEventListener('keydown', handleKeyDown);
    
    // Touch / Maus für Settings
    document.getElementById('btnSave').addEventListener('click', saveSettings);
    document.getElementById('btnCancel').addEventListener('click', closeSettings);
    
    // Lange auf Bildschirm halten = Settings (Touch Fallback)
    let touchTimer = null;
    document.addEventListener('touchstart', () => {
        touchTimer = setTimeout(openSettings, 1500);
    });
    document.addEventListener('touchend', () => {
        if (touchTimer) clearTimeout(touchTimer);
    });
    
    // Doppelklick = Settings (Maus Fallback)
    document.addEventListener('dblclick', (e) => {
        if (!document.getElementById('settings').classList.contains('active')) {
            openSettings();
        }
    });
}

init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DAKboard · Responsiv für Tablets</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Inter', 'Helvetica', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* DASHBOARD GRID – Standard (Desktop / Landscape Tablet) */
        .dashboard {
            display: grid;
            grid-template-columns: 35% 65%;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Linke Spalte: flexible Höhe, Scroll nur bei Bedarf */
        .left-panel {
            display: flex;
            flex-direction: column;
            background: #000;
            height: 100vh;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        /* Uhr & Datum mit clamp */
        .time-date {
            margin: clamp(1rem, 5vh, 2rem) 0 0 clamp(1rem, 4%, 2rem);
        }
        .clock {
            font-size: clamp(2.2rem, 8vw, 5.2rem);
            font-weight: 300;
            letter-spacing: 2px;
            line-height: 1.1;
        }
        .date {
            font-size: clamp(1rem, 3vw, 1.6rem);
            opacity: 0.85;
        }

        /* Slideshow – adaptive Höhe, bleibt zentral */
        .slideshow-container {
            flex: 1;
            min-height: 140px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
            background: #0a0a0a;
        }
        .slideshow-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.55s;
            display: block;
        }

        /* WEATHER WIDGET – responsiv */
        .weather-enhanced {
            margin: 0.5rem clamp(0.8rem, 3vw, 1.8rem) 2rem clamp(0.8rem, 3vw, 2rem);
            background: rgba(10,10,15,0.6);
            border-radius: 28px;
            padding: clamp(0.8rem, 2vw, 1.2rem) clamp(0.8rem, 2vw, 1rem);
            backdrop-filter: blur(4px);
        }
        .current-weather {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .temp-big {
            font-size: clamp(2rem, 7vw, 3.4rem);
            font-weight: 300;
            letter-spacing: -1px;
        }
        .temp-unit {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
        }
        .current-icon {
            font-size: clamp(1.6rem, 5vw, 2.4rem);
        }
        .weather-details {
            display: flex;
            gap: clamp(0.8rem, 3vw, 1.2rem);
            font-size: clamp(0.65rem, 2vw, 0.75rem);
            flex-wrap: wrap;
        }
        .hourly-title {
            font-size: clamp(0.6rem, 2vw, 0.7rem);
            margin: 0.6rem 0 0.4rem;
        }
        .hourly-forecast {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            scrollbar-width: thin;
            padding-bottom: 0.3rem;
        }
        .hour-card {
            min-width: clamp(55px, 12vw, 70px);
            text-align: center;
            font-size: clamp(0.6rem, 2vw, 0.7rem);
        }
        .hour-temp {
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
        }
        .hour-icon {
            font-size: clamp(1rem, 3vw, 1.2rem);
        }
        .hour-bar-container {
            height: 3px;
            margin: 4px 0;
        }

        /* RECHTE SPALTE (Kalender) */
        .right-panel {
            background: #000;
            overflow-y: auto;
            padding: clamp(0.8rem, 3vh, 1.5rem) clamp(0.8rem, 3vw, 2rem) 2rem clamp(0.8rem, 2vw, 1rem);
        }
        .view-toggle {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 1rem;
        }
        .view-btn {
            background: #1e1e1e;
            padding: clamp(4px, 1.5vh, 6px) clamp(10px, 3vw, 14px);
            font-size: clamp(0.7rem, 2vw, 0.8rem);
            border-radius: 40px;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 0.8rem;
            padding-bottom: 0.4rem;
        }
        .weekday {
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: clamp(0.2rem, 1vw, 0.75rem) clamp(0.2rem, 1vw, 0.5rem);
        }
        .cal-cell {
            padding: clamp(0.2rem, 1vh, 0.4rem) 0.1rem 0.2rem 0.2rem;
            min-height: clamp(70px, 12vh, 95px);
        }
        .day-number {
            font-size: clamp(1.2rem, 4vw, 1.9rem);
            line-height: 1;
            margin-bottom: 0.2rem;
        }
        .today .day-number {
            border-width: 2px;
            padding: 0.05rem 0.45rem;
        }
        .event-badge {
            font-size: clamp(0.55rem, 1.8vw, 0.68rem);
            padding: 2px 5px;
            white-space: normal;
            word-break: break-word;
            line-height: 1.2;
        }

        /* ---------- MEDIA QUERIES: TABLET HOCHKANT (Portrait) ---------- */
        @media (max-width: 950px) and (orientation: portrait) {
            .dashboard {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto;
                height: auto;
                overflow-y: auto;
            }
            .left-panel, .right-panel {
                height: auto;
                overflow-y: visible;
            }
            .left-panel {
                max-height: none;
            }
            .right-panel {
                padding-top: 0.5rem;
            }
            .slideshow-container {
                min-height: 200px;
                max-height: 35vh;
            }
            .weather-enhanced {
                margin-bottom: 1rem;
            }
            .calendar-grid {
                gap: 0.3rem;
            }
            .cal-cell {
                min-height: 75px;
            }
        }

        /* Für sehr schmale Geräte (max. 600px, Handys im Querformat oder kleine Tablets) */
        @media (max-width: 600px) {
            .dashboard {
                grid-template-columns: 1fr;
                overflow-y: auto;
                height: auto;
            }
            .left-panel, .right-panel {
                height: auto;
                overflow: visible;
            }
            .slideshow-container {
                min-height: 160px;
            }
            .hour-card {
                min-width: 60px;
            }
            .cal-cell {
                min-height: 65px;
            }
            .event-badge {
                white-space: normal;
                font-size: 0.6rem;
            }
        }

        /* Für Tablets im Querformat und kleine Desktops: bleibt zweispaltig, aber kompakter */
        @media (min-width: 951px) and (max-width: 1280px) {
            .dashboard {
                grid-template-columns: 38% 62%;
            }
            .clock {
                font-size: 3.5rem;
            }
            .temp-big {
                font-size: 2.6rem;
            }
            .cal-cell {
                min-height: 85px;
            }
            .day-number {
                font-size: 1.5rem;
            }
        }

        /* Große Desktops (alles bleibt, nur etwas mehr Platz) */
        @media (min-width: 1600px) {
            .clock {
                font-size: 6rem;
            }
            .temp-big {
                font-size: 4rem;
            }
            .weather-details {
                font-size: 0.9rem;
            }
            .cal-cell {
                min-height: 110px;
            }
        }

        /* Standard Animation-Klassen (bleiben bestehen) */
        .anim-fade { animation: fadeEffect 0.8s ease; }
        .anim-slide-left { animation: slideLeft 0.6s ease-out; }
        .anim-slide-right { animation: slideRight 0.6s ease-out; }
        .anim-slide-up { animation: slideUp 0.6s ease-out; }
        .anim-slide-down { animation: slideDown 0.6s ease-out; }
        .anim-zoom { animation: zoomEffect 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .anim-rotate { animation: rotateEffect 0.6s ease; }
        .anim-flip { animation: flipEffect 0.7s ease; }
        .anim-blur { animation: blurEffect 0.5s ease; }
        .anim-glitch { animation: glitchEffect 0.4s ease; }
        @keyframes fadeEffect { from { opacity: 0.4; } to { opacity: 1; } }
        @keyframes slideLeft { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideRight { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes zoomEffect { from { transform: scale(1.05); opacity: 0.7; } to { transform: scale(1); opacity: 1; } }
        @keyframes rotateEffect { from { transform: rotate(3deg) scale(0.98); opacity: 0; } to { transform: rotate(0deg) scale(1); opacity: 1; } }
        @keyframes flipEffect { from { transform: perspective(400px) rotateY(10deg); opacity: 0; } to { transform: perspective(400px) rotateY(0); opacity: 1; } }
        @keyframes blurEffect { from { filter: blur(6px); opacity: 0.5; } to { filter: blur(0); opacity: 1; } }
        @keyframes glitchEffect { 0% { transform: skew(2deg); opacity: 0.7; } 100% { transform: skew(0); opacity: 1; } }

        /* Einstellungen-Overlay (bleibt unverändert, aber scrollfähig) */
        .settings-gear { position: fixed; top: 20px; right: 20px; z-index: 200; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); width: 44px; height: 44px; border-radius: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.5rem; border: 1px solid rgba(255,255,255,0.2); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .settings-modal { background: #0e0e0e; width: 90%; max-width: 680px; max-height: 85vh; border-radius: 32px; padding: 1.5rem; overflow-y: auto; border: 1px solid #2c2c2c; }
        .setting-group { margin-bottom: 1.5rem; border-bottom: 1px solid #222; padding-bottom: 1rem; }
        .setting-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; opacity: 0.7; }
        input, select, button { background: #1e1e1e; border: 1px solid #333; color: white; padding: 8px 12px; border-radius: 40px; font-family: inherit; }
        button { cursor: pointer; transition: 0.2s; }
        button.primary { background: #3a6ea5; }
        .color-flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .color-item { display: flex; align-items: center; gap: 8px; background: #1a1a1a; padding: 5px 12px; border-radius: 40px; }
        .ical-status { font-size: 0.75rem; margin-top: 6px; color: #aaa; }
        .events-hidden .events { display: none; }
        hr { border-color: #222; margin: 12px 0; }
        #imageListContainer { max-height: 100px; overflow-y: auto; margin-bottom: 8px; }
        .removeImgBtn { background: #a13e3e; border: none; padding: 2px 8px; border-radius: 20px; }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="left-panel">
        <div class="time-date"><div class="clock" id="liveClock">--:--:--</div><div class="date" id="liveDate"></div></div>
        <div class="slideshow-container" id="slideshowContainer"><img id="slideshowImage" class="slideshow-img" alt="slideshow"></div>
        <div class="weather-enhanced" id="weatherEnhanced">
            <div class="current-weather">
                <div><span class="temp-big" id="currentTemp">--</span><span class="temp-unit">°C</span></div>
                <div><i class="fas fa-sun current-icon" id="currentWeatherIcon" style="color: #FFD966;"></i></div>
            </div>
            <div class="weather-details" id="weatherDetails">
                <span><i class="fas fa-tint"></i> <span id="precip">--</span>%</span>
                <span><i class="fas fa-water"></i> <span id="humidity">--</span>%</span>
                <span><i class="fas fa-wind"></i> <span id="windSpeed">--</span> km/h</span>
            </div>
            <div class="hourly-title"><i class="fas fa-chart-line"></i> Stündliche Vorhersage (3h Intervalle)</div>
            <div class="hourly-forecast" id="hourlyForecast"></div>
        </div>
    </div>
    <div class="right-panel">
        <div class="view-toggle"><button id="monthViewBtn" class="view-btn active">📅 Monat</button><button id="weekViewBtn" class="view-btn">📆 Woche</button></div>
        <div class="calendar"><div class="weekdays" id="weekdaysRow"></div><div class="calendar-grid" id="calendarGrid"></div></div>
    </div>
</div>
<div class="settings-gear" id="settingsGear"><i class="fas fa-cog"></i></div>
<div class="modal-overlay" id="settingsModal">
    <div class="settings-modal">
        <h2><i class="fas fa-sliders-h"></i> Dashboard Einstellungen</h2>
        <div class="setting-group"><label>🖼️ Slideshow Bilder</label><div id="imageListContainer"></div><div style="display:flex; gap:6px; flex-wrap:wrap;"><input type="file" id="uploadImages" multiple accept="image/*"><input type="text" id="imageUrlInput" placeholder="Bild-URL" style="flex:1;"><button id="addUrlBtn">+</button></div><button id="clearImagesBtn" style="margin-top:6px;">Alle zurücksetzen</button></div>
        <div class="setting-group"><label>🎞️ Animation</label><select id="animationSelect"><option value="anim-fade">Fade</option><option value="anim-slide-left">Slide Left</option><option value="anim-slide-right">Slide Right</option><option value="anim-slide-up">Slide Up</option><option value="anim-slide-down">Slide Down</option><option value="anim-zoom">Zoom</option><option value="anim-rotate">Rotate</option><option value="anim-flip">Flip</option><option value="anim-blur">Blur</option><option value="anim-glitch">Glitch</option></select></div>
        <div class="setting-group"><label>🌍 Wetter-Stadt</label><input type="text" id="weatherCity" placeholder="z.B. Berlin"><button id="refreshWeatherBtn" style="margin-top:6px;">Aktualisieren</button></div>
        <div class="setting-group"><label>📅 iCal / Google Calendar Sync</label><input type="text" id="icalUrl" placeholder="https://.../calendar.ics"><div style="margin-top:6px;"><label><input type="checkbox" id="icalEnabled"> iCal aktivieren (ersetzt Demo-Termine)</label><button id="syncIcalNowBtn" class="primary" style="margin-left:8px;">Jetzt sync</button></div><div class="ical-status" id="icalStatus">Keine iCal-URL</div><label style="margin-top:8px;">🔄 Aktualisierungsintervall (Minuten)</label><input type="number" id="icalInterval" min="5" max="240" value="30" style="width:100px;"></div>
        <div class="setting-group"><label>🎨 Farben Termin-Balken</label><div class="color-flex"><div class="color-item">🔵 Blau <input type="color" id="colorBlue" value="#2c7da0"></div><div class="color-item">🔴 Rot <input type="color" id="colorRed" value="#c44536"></div><div class="color-item">🟢 Grün <input type="color" id="colorGreen" value="#2e9b6e"></div><div class="color-item">🟠 Orange <input type="color" id="colorOrange" value="#e67e22"></div><div class="color-item">🟣 Lila <input type="color" id="colorPurple" value="#8e44ad"></div></div><label><input type="checkbox" id="toggleEventsVisibility"> Ereignis-Balken anzeigen</label></div>
        <div class="setting-group"><label>⏱️ Uhr</label><label><input type="checkbox" id="toggleSeconds" checked> Sekunden anzeigen</label></div>
        <div class="close-modal"><button id="saveSettingsBtn" class="primary">Speichern & Übernehmen</button><button id="closeModalBtn">Schließen</button></div>
    </div>
</div>
<script>
    // -----------------------------  GLOBALS  ----------------------------------
    let slideshowImages = [];
    let currentAnimation = "anim-fade";
    let eventsVisible = true;
    let showSeconds = true;
    let customColors = { blue:"#2c7da0", red:"#c44536", green:"#2e9b6e", orange:"#e67e22", purple:"#8e44ad" };
    let weatherCity = "Berlin";
    let icalUrl = "";
    let icalEnabled = false;
    let icalEvents = [];
    let syncInterval = null;
    let currentView = "month";
    let currentDate = new Date();

    const DEMO_EVENTS = [
        { day: 3, title: "Design Review", colorClass: "blue-badge" }, { day: 5, title: "Meeting Team", colorClass: "green-badge" },
        { day: 8, title: "Zahnarzt", colorClass: "red-badge" }, { day: 12, title: "Workshop", colorClass: "purple-badge" },
        { day: 15, title: "Projekt-Deadline", colorClass: "orange-badge" }, { day: 17, title: "Yoga", colorClass: "green-badge" },
        { day: 20, title: "Geburtstag", colorClass: "red-badge" }, { day: 22, title: "Kundenmeeting", colorClass: "blue-badge" },
        { day: 25, title: "Abgabetermin", colorClass: "orange-badge" }, { day: 28, title: "Reflexion", colorClass: "purple-badge" },
        { day: 30, title: "Brunch", colorClass: "green-badge" }
    ];

    const clockEl = document.getElementById('liveClock');
    const dateEl = document.getElementById('liveDate');
    const calendarGrid = document.getElementById('calendarGrid');
    const weekdaysRow = document.getElementById('weekdaysRow');
    const slideshowImg = document.getElementById('slideshowImage');
    const icalStatusSpan = document.getElementById('icalStatus');

    function getWeatherIconAndColor(weatherCode) {
        let iconClass = "fa-sun";
        let color = "#FFD966";
        if (weatherCode === 0) { iconClass = "fa-sun"; color = "#FFD966"; }
        else if (weatherCode === 1 || weatherCode === 2) { iconClass = "fa-cloud-sun"; color = "#DDDDDD"; }
        else if (weatherCode === 3) { iconClass = "fa-cloud"; color = "#AAAAAA"; }
        else if ((weatherCode >= 51 && weatherCode <= 67) || (weatherCode >= 80 && weatherCode <= 82)) { iconClass = "fa-cloud-rain"; color = "#4a90e2"; }
        else if (weatherCode >= 71 && weatherCode <= 77) { iconClass = "fa-snowflake"; color = "#7ec8e0"; }
        else if (weatherCode >= 95 && weatherCode <= 99) { iconClass = "fa-bolt"; color = "#b980ea"; }
        else if (weatherCode >= 45 && weatherCode <= 49) { iconClass = "fa-smog"; color = "#AAAAAA"; }
        else { iconClass = "fa-cloud-sun"; color = "#DDDDDD"; }
        return { iconClass, color };
    }

    async function fetchEnhancedWeather(city) {
        try {
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&format=json`);
            const geo = await geoRes.json();
            if (!geo.results) throw new Error("Stadt nicht gefunden");
            const { latitude, longitude } = geo.results[0];
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&hourly=temperature_2m,relativehumidity_2m,precipitation_probability,windspeed_10m,weathercode&timezone=auto&forecast_days=2`;
            const res = await fetch(url);
            const data = await res.json();
            const current = data.current_weather;
            const hourly = data.hourly;
            const now = new Date();
            const currentHour = now.getHours();
            document.getElementById('currentTemp').innerText = Math.round(current.temperature);
            const currentCode = current.weathercode;
            const { iconClass, color } = getWeatherIconAndColor(currentCode);
            const currentIconElem = document.getElementById('currentWeatherIcon');
            currentIconElem.className = `fas ${iconClass} current-icon`;
            currentIconElem.style.color = color;
            let currentPrecip = 0, currentHumidity = 0, currentWind = Math.round(current.windspeed);
            for (let i=0; i<hourly.time.length; i++) {
                const t = new Date(hourly.time[i]);
                if (t.getHours() === currentHour && t.getDate() === now.getDate()) {
                    currentPrecip = hourly.precipitation_probability[i] || 0;
                    currentHumidity = hourly.relativehumidity_2m[i] || 0;
                    currentWind = Math.round(hourly.windspeed_10m[i]);
                    break;
                }
            }
            document.getElementById('precip').innerText = currentPrecip;
            document.getElementById('humidity').innerText = currentHumidity;
            document.getElementById('windSpeed').innerText = currentWind;
            const hourlyItems = [];
            for (let i=0; i<hourly.time.length; i++) {
                const dt = new Date(hourly.time[i]);
                if (dt >= now) {
                    const temp = Math.round(hourly.temperature_2m[i]);
                    const precipProb = hourly.precipitation_probability[i] || 0;
                    const wCode = hourly.weathercode[i];
                    const { iconClass: ic, color: col } = getWeatherIconAndColor(wCode);
                    const hourLabel = dt.getHours() + ":00";
                    const daySuffix = dt.toLocaleDateString('de-DE', { weekday:'short' });
                    hourlyItems.push({ hour: hourLabel, day: daySuffix, temp, precip: precipProb, iconClass: ic, iconColor: col });
                    if (hourlyItems.length >= 12) break;
                }
            }
            const container = document.getElementById('hourlyForecast');
            container.innerHTML = hourlyItems.map(h => `
                <div class="hour-card">
                    <div class="hour-time">${h.day} ${h.hour}</div>
                    <i class="fas ${h.iconClass} hour-icon" style="color: ${h.iconColor};"></i>
                    <div class="hour-temp">${h.temp}°</div>
                    <div class="hour-bar-container"><div class="hour-bar" style="width: ${Math.min(h.precip,100)}%; background: #4aa3ff;"></div></div>
                    <div class="hour-precip">${h.precip}%</div>
                </div>
            `).join('');
        } catch (err) {
            console.error(err);
            document.getElementById('weatherEnhanced').innerHTML += `<div style="color:#ff8866; margin-top:8px;">Wetterfehler: ${err.message}</div>`;
        }
    }

    function parseICal(icalData) { /* gleiche wie bisher, platzsparend */ let events=[]; const lines=icalData.split(/\r?\n/); let curr=null; for(let line of lines){ line=line.trim(); if(line==="BEGIN:VEVENT") curr={}; else if(line==="END:VEVENT"){ if(curr&&curr.summary&&curr.dtstart_value){ let start=null; let val=curr.dtstart_value; if(val&&val.length===8){ let y=parseInt(val.slice(0,4)),m=parseInt(val.slice(4,6))-1,d=parseInt(val.slice(6,8)); start=new Date(y,m,d); }else if(val&&val.length>=15){ let y=parseInt(val.slice(0,4)),m=parseInt(val.slice(4,6))-1,d=parseInt(val.slice(6,8)),h=parseInt(val.slice(9,11)),min=parseInt(val.slice(11,13)); start=new Date(y,m,d,h,min); } if(start) events.push({start,title:curr.summary,colorClass:getRandomColorClass()}); } curr=null; }else if(curr){ if(line.startsWith("SUMMARY:")) curr.summary=line.substring(8).replace(/\\,/g,','); else if(line.startsWith("DTSTART")) curr.dtstart_value=line.split(":")[1]; else if(line.includes("DTSTART;")&&line.includes("VALUE=DATE")){ let parts=line.split(":"); if(parts[1]) curr.dtstart_value=parts[1]; } } } return events; }
    async function fetchICalEvents(url){ if(!url) return []; const proxy="https://api.allorigins.win/raw?url="; try{ const resp=await fetch(proxy+encodeURIComponent(url)); if(!resp.ok) throw new Error(`HTTP ${resp.status}`); const text=await resp.text(); const parsed=parseICal(text); icalStatusSpan.innerText=`✅ ${parsed.length} Termine geladen`; return parsed; }catch(err){ icalStatusSpan.innerText=`❌ Fehler: ${err.message}`; return []; } }
    async function refreshICal(){ if(!icalEnabled||!icalUrl) return []; icalStatusSpan.innerText="🔄 Lade iCal ..."; const events=await fetchICalEvents(icalUrl); icalEvents=events; renderCalendarByView(); return events; }
    function getRandomColorClass(){ const cols=["blue-badge","red-badge","green-badge","orange-badge","purple-badge"]; return cols[Math.floor(Math.random()*cols.length)]; }
    function getEventsForDate(date,eventsArray){ if(!eventsArray.length) return []; const start=new Date(date.getFullYear(),date.getMonth(),date.getDate()); const end=new Date(date.getFullYear(),date.getMonth(),date.getDate(),23,59,59); return eventsArray.filter(ev=>ev.start&&ev.start>=start&&ev.start<=end); }
    function renderMonthCalendar(year,month,eventsList){ const firstDay=new Date(year,month,1).getDay(); const daysInMonth=new Date(year,month+1,0).getDate(); const today=new Date(); let html=''; for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell empty-cell"><div class="day-number"></div><div class="events"></div></div>`; for(let d=1;d<=daysInMonth;d++){ const cellDate=new Date(year,month,d); const isToday=(year===today.getFullYear()&&month===today.getMonth()&&d===today.getDate()); const dayEvents=getEventsForDate(cellDate,eventsList); let evHtml=''; if(dayEvents.length){ evHtml=`<div class="events">`; dayEvents.slice(0,2).forEach(ev=>evHtml+=`<div class="event-badge ${ev.colorClass||'blue-badge'}">${ev.title.substring(0,18)}</div>`); if(dayEvents.length>2) evHtml+=`<div class="event-badge">+${dayEvents.length-2}</div>`; evHtml+=`</div>`; } html+=`<div class="cal-cell ${isToday?'today':''}"><div class="day-number">${d}</div>${evHtml}</div>`; } let total=firstDay+daysInMonth; for(let i=total;i<42;i++) html+=`<div class="cal-cell empty-cell"><div class="day-number"></div><div class="events"></div></div>`; calendarGrid.innerHTML=html; }
    function renderWeekCalendar(refDate,eventsList){ const startOfWeek=new Date(refDate); const dow=refDate.getDay(); const diffToMonday=(dow===0?-6:1-dow); startOfWeek.setDate(refDate.getDate()+diffToMonday); const weekDays=[]; for(let i=0;i<7;i++){ let d=new Date(startOfWeek); d.setDate(startOfWeek.getDate()+i); weekDays.push(d); } const today=new Date(); let html=''; weekDays.forEach(day=>{ const isToday=(day.toDateString()===today.toDateString()); const dayEvents=getEventsForDate(day,eventsList); let evHtml=''; if(dayEvents.length){ evHtml=`<div class="events">`; dayEvents.slice(0,2).forEach(ev=>evHtml+=`<div class="event-badge ${ev.colorClass||'blue-badge'}">${ev.title.substring(0,18)}</div>`); if(dayEvents.length>2) evHtml+=`<div class="event-badge">+${dayEvents.length-2}</div>`; evHtml+=`</div>`; } html+=`<div class="cal-cell ${isToday?'today':''}"><div class="day-number">${day.getDate()}</div>${evHtml}</div>`; }); calendarGrid.innerHTML=html; weekdaysRow.innerHTML=weekDays.map((d,i)=>`<div class="weekday">${["S","M","T","W","T","F","S"][i]} ${d.getDate()}.${d.getMonth()+1}</div>`).join(''); }
    function renderCalendarByView(){ if(!eventsVisible){ calendarGrid.innerHTML='<div style="color:#aaa;">Ereignisse ausgeblendet</div>'; return; } const eventsSource=(icalEnabled&&icalEvents.length)?icalEvents:DEMO_EVENTS.map(ev=>{const now=new Date(); return{start:new Date(now.getFullYear(),now.getMonth(),ev.day),title:ev.title,colorClass:ev.colorClass};}); if(currentView==="month"){ const now=new Date(); renderMonthCalendar(now.getFullYear(),now.getMonth(),eventsSource); weekdaysRow.innerHTML=`<div class="weekday">S</div><div class="weekday">M</div><div class="weekday">T</div><div class="weekday">W</div><div class="weekday">T</div><div class="weekday">F</div><div class="weekday">S</div>`; }else{ renderWeekCalendar(currentDate,eventsSource); } document.querySelector('.right-panel').classList.toggle('events-hidden',!eventsVisible); }
    function updateClock(){ const n=new Date(); clockEl.innerText=showSeconds?`${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}:${n.getSeconds().toString().padStart(2,'0')}`:`${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`; dateEl.innerText=n.toLocaleDateString('de-DE',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
    let slideInterval; function startSlideshow(){ if(slideInterval) clearInterval(slideInterval); if(!slideshowImages.length) slideshowImages=["https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&h=700"]; let idx=0; const upd=()=>{ slideshowImg.classList.remove(...slideshowImg.classList); slideshowImg.classList.add('slideshow-img',currentAnimation); slideshowImg.src=slideshowImages[idx]; idx=(idx+1)%slideshowImages.length; }; upd(); slideInterval=setInterval(upd,7000); }
    function renderImageListUI(){ const c=document.getElementById('imageListContainer'); if(!c)return; c.innerHTML=slideshowImages.map((url,i)=>`<div style="display:flex;justify-content:space-between;background:#1e1e1e;margin:4px 0;padding:4px 8px;border-radius:20px;"><span style="font-size:11px; overflow:hidden;">${url.substring(0,40)}...</span><button data-idx="${i}" class="removeImgBtn">🗑️</button></div>`).join(''); document.querySelectorAll('.removeImgBtn').forEach(btn=>{ btn.onclick=()=>{ const idx=parseInt(btn.dataset.idx); slideshowImages.splice(idx,1); if(!slideshowImages.length) slideshowImages=["https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&h=700"]; renderImageListUI(); startSlideshow(); saveAllSettings(); }; }); }
    function saveAllSettings(){ localStorage.setItem('dakboard_full',JSON.stringify({slideshowImages,currentAnimation,eventsVisible,showSeconds,customColors,weatherCity,icalUrl,icalEnabled,currentView})); }
    function loadSettings(){ const saved=localStorage.getItem('dakboard_full'); if(saved){ try{ const s=JSON.parse(saved); if(s.slideshowImages) slideshowImages=s.slideshowImages; if(s.currentAnimation) currentAnimation=s.currentAnimation; if(typeof s.eventsVisible==='boolean') eventsVisible=s.eventsVisible; if(typeof s.showSeconds==='boolean') showSeconds=s.showSeconds; if(s.customColors) customColors={...customColors,...s.customColors}; if(s.weatherCity) weatherCity=s.weatherCity; if(s.icalUrl) icalUrl=s.icalUrl; if(typeof s.icalEnabled==='boolean') icalEnabled=s.icalEnabled; if(s.currentView) currentView=s.currentView; }catch(e){} } if(!slideshowImages.length) slideshowImages=["https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&h=700","https://images.unsplash.com/photo-1470071459604-3b5ec3c7fe05?w=900&h=700"]; document.getElementById('animationSelect').value=currentAnimation; document.getElementById('toggleEventsVisibility').checked=eventsVisible; document.getElementById('toggleSeconds').checked=showSeconds; document.getElementById('weatherCity').value=weatherCity; document.getElementById('icalUrl').value=icalUrl; document.getElementById('icalEnabled').checked=icalEnabled; document.getElementById('colorBlue').value=customColors.blue; document.getElementById('colorRed').value=customColors.red; document.getElementById('colorGreen').value=customColors.green; document.getElementById('colorOrange').value=customColors.orange; document.getElementById('colorPurple').value=customColors.purple; if(icalEnabled && icalUrl) refreshICal(); applyEventColors(); }
    function applyEventColors(){ let style=document.getElementById('eventColors'); if(!style){ style=document.createElement('style'); style.id='eventColors'; document.head.appendChild(style); } style.innerHTML=`.event-badge.blue-badge{background:${customColors.blue}!important}.event-badge.red-badge{background:${customColors.red}!important}.event-badge.green-badge{background:${customColors.green}!important}.event-badge.orange-badge{background:${customColors.orange}!important}.event-badge.purple-badge{background:${customColors.purple}!important}`; }
    function applyAllAndRender(){ currentAnimation=document.getElementById('animationSelect').value; eventsVisible=document.getElementById('toggleEventsVisibility').checked; showSeconds=document.getElementById('toggleSeconds').checked; customColors={blue:document.getElementById('colorBlue').value, red:document.getElementById('colorRed').value, green:document.getElementById('colorGreen').value, orange:document.getElementById('colorOrange').value, purple:document.getElementById('colorPurple').value}; weatherCity=document.getElementById('weatherCity').value; icalUrl=document.getElementById('icalUrl').value; icalEnabled=document.getElementById('icalEnabled').checked; applyEventColors(); if(icalEnabled && icalUrl) refreshICal().then(()=>renderCalendarByView()); else { icalEvents=[]; renderCalendarByView(); } if(syncInterval) clearInterval(syncInterval); const intervalMin=parseInt(document.getElementById('icalInterval').value)||30; if(icalEnabled && icalUrl) syncInterval=setInterval(()=>{ if(icalEnabled && icalUrl) refreshICal(); }, intervalMin*60*1000); startSlideshow(); fetchEnhancedWeather(weatherCity); saveAllSettings(); }
    document.getElementById('settingsGear').onclick=()=>{ renderImageListUI(); document.getElementById('settingsModal').classList.add('active'); };
    document.getElementById('closeModalBtn').onclick=()=>document.getElementById('settingsModal').classList.remove('active');
    document.getElementById('saveSettingsBtn').onclick=()=>{ applyAllAndRender(); document.getElementById('settingsModal').classList.remove('active'); };
    document.getElementById('refreshWeatherBtn').onclick=()=>fetchEnhancedWeather(document.getElementById('weatherCity').value);
    document.getElementById('syncIcalNowBtn').onclick=async()=>{ icalEnabled=true; icalUrl=document.getElementById('icalUrl').value; await refreshICal(); renderCalendarByView(); saveAllSettings(); };
    document.getElementById('addUrlBtn').onclick=()=>{ const url=document.getElementById('imageUrlInput').value; if(url){ slideshowImages.push(url); renderImageListUI(); startSlideshow(); saveAllSettings(); } };
    document.getElementById('clearImagesBtn').onclick=()=>{ slideshowImages=["https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&h=700"]; renderImageListUI(); startSlideshow(); saveAllSettings(); };
    document.getElementById('uploadImages').onchange=(e)=>{ Array.from(e.target.files).forEach(f=>{ const reader=new FileReader(); reader.onload=ev=>{ slideshowImages.push(ev.target.result); renderImageListUI(); startSlideshow(); saveAllSettings(); }; reader.readAsDataURL(f); }); };
    document.getElementById('monthViewBtn').onclick=()=>{ currentView="month"; renderCalendarByView(); document.getElementById('monthViewBtn').classList.add('active'); document.getElementById('weekViewBtn').classList.remove('active'); saveAllSettings(); };
    document.getElementById('weekViewBtn').onclick=()=>{ currentView="week"; currentDate=new Date(); renderCalendarByView(); document.getElementById('weekViewBtn').classList.add('active'); document.getElementById('monthViewBtn').classList.remove('active'); saveAllSettings(); };
    setInterval(updateClock,200); updateClock(); loadSettings(); applyEventColors(); startSlideshow(); fetchEnhancedWeather(weatherCity); if(icalEnabled && icalUrl) refreshICal().then(()=>renderCalendarByView()); else renderCalendarByView(); const icalInt=parseInt(document.getElementById('icalInterval')?.value||30); if(icalEnabled && icalUrl) syncInterval=setInterval(()=>{ if(icalEnabled && icalUrl) refreshICal(); }, icalInt*60*1000);
</script>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kitchen Wall Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #E94545;
            --slide-duration: 1s;
            --gradient-position: 0.38;
            --gradient-width: 0.05;
            --gradient-opacity: 0.8;
            --tile-opacity: 0.85;
            --weather-height: 42vh;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh; overflow: hidden;
        }
        #dashboard { width:100%; height:100vh; position:relative; overflow:hidden; }
        #gradient-overlay {
            position: absolute;
            top:0;
            left: calc(var(--gradient-position) * 100% - var(--gradient-width) * 100%);
            width: calc(var(--gradient-width) * 100%);
            height:100%;
            background: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,var(--gradient-opacity)) 60%, rgba(0,0,0,1) 100%);
            z-index:5; pointer-events:none; transition: left 0.2s, width 0.2s;
        }
        .tile {
            position: absolute; background: rgba(0,0,0,var(--tile-opacity)); border:none;
            overflow: hidden; touch-action: none; display: flex; flex-direction: column;
            cursor: default;
        }
        .tile-content { flex:1; overflow-y:auto; cursor: default; }
        .resize-handle-edge, .resize-handle-corner { display: none; }
        #dashboard[data-settings-visible="true"] .resize-handle-edge,
        #dashboard[data-settings-visible="true"] .resize-handle-corner { display: block; }

        /* Wetter */
        #weather { z-index:10; height: var(--weather-height); }
        #weather .tile-content {
            padding:12px; text-shadow:0 1px 4px rgba(0,0,0,0.7);
            display:flex; flex-direction:column; justify-content:flex-end; align-items:flex-end; text-align:right;
        }
        .weather-now .temp { font-size: clamp(2rem, 5cqw, 4rem); font-weight:300; line-height:1; }
        .weather-now .details { font-size:0.8rem; opacity:0.9; }
        .forecast-row { display:flex; gap:6px; margin-top:8px; justify-content:flex-end; flex-wrap:wrap; }
        .forecast-day {
            background: rgba(255,255,255,0.15); border-radius:12px; padding:4px 6px;
            text-align:center; font-size:0.7rem; min-width:48px;
        }
        .forecast-day.active { background: var(--accent); color:white; }
        .location-bar {
            position:absolute; bottom:2px; left:12px; right:12px; display:flex; gap:4px;
            align-items:center; font-size:0.7rem; opacity:0.8;
        }
        .location-bar input {
            background: rgba(255,255,255,0.15); border:none; color:white; padding:2px 6px;
            border-radius:4px; width:100px; font-size:0.7rem;
        }
        .location-bar button { background: var(--accent); border:none; color:white; border-radius:4px; padding:2px 6px; cursor:pointer; font-size:0.7rem; }

        /* Kalender */
        #calendar { background:#000; }
        #calendar .tile-content { padding:8px 12px; display:flex; flex-direction:column; height:100%; }
        .view-switch {
            display: flex; gap: 4px; margin-bottom: 6px;
        }
        .view-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 4px 12px; border-radius: 6px; cursor: pointer;
            font-size: 0.75rem; font-weight: 600;
        }
        .view-btn.active { background: var(--accent); border-color: var(--accent); }
        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; text-align:center; flex:1; }
        .day-header { font-size:clamp(0.75rem, 1.3cqw, 1rem); font-weight:400; color:#fff; padding:2px 0; }
        .day {
            position:relative; padding:clamp(2px,0.8cqw,6px) 2px; font-weight:300; color:#fff;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            cursor: pointer;
        }
        .day .day-number { display:inline-flex; align-items:center; justify-content:center; width:1.4em; height:1.4em; border-radius:50%; font-weight:300; }
        .day.today .day-number { background: var(--accent); color:#fff; font-weight:400; }
        .event-line { position:absolute; bottom:2px; left:10%; width:80%; height:3px; border-radius:2px; }
        .month-slider-container { display:flex; align-items:center; gap:8px; margin-top:4px; }
        .month-slider-container input[type=range] { flex:1; background:rgba(255,255,255,0.2); height:4px; border-radius:2px; -webkit-appearance:none; }
        .month-slider-container input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; background:var(--accent); border-radius:50%; cursor:pointer; }
        .month-label { font-size:0.8rem; white-space:nowrap; }
        .week-container { display: none; flex: 1; flex-direction: column; gap: 4px; }
        .week-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; margin-bottom: 4px; }
        .week-days { display: flex; gap: 4px; flex: 1; }
        .week-day {
            flex: 1; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 6px 4px;
            text-align: center; cursor: pointer; display: flex; flex-direction: column; gap: 2px;
        }
        .week-day.today { border: 1px solid var(--accent); }
        .week-day-label { font-size: 0.7rem; }
        .week-day-date { font-size: 0.9rem; font-weight: 600; }
        .week-event { font-size: 0.65rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 2px 4px; border-radius: 3px; margin-top: 2px; }
        .event-details {
            background: rgba(0,0,0,0.9); color: white; padding: 8px; border-radius: 8px;
            font-size: 0.75rem; margin-top: 6px; max-height: 100px; overflow-y: auto; display: none;
        }
        .event-details.show { display: block; }

        /* Slideshow */
        #slideshow { background:#000; }
        #slideshow .tile-content { padding:0; }
        .slideshow-container { position:relative; width:100%; height:100%; background:#000; overflow:hidden; }
        .slide-img {
            position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover;
            opacity:0; transition: opacity var(--slide-duration) ease-out, transform var(--slide-duration) ease-out;
        }
        .slide-img.active { opacity:1; }
        [ … Animationen … ]  /* (identisch wie bisher) */
        .slideshow-controls {
            position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
            display:flex; gap:10px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:20px; z-index:10;
        }
        .slideshow-controls button { background:transparent; border:none; color:white; font-size:1.2rem; cursor:pointer; padding:4px 8px; }
        .panel-btn {
            position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); border-radius:50%;
            width:32px; height:32px; display:none; align-items:center; justify-content:center;
            cursor:pointer; color:white; z-index:15; font-size:0.9rem;
        }
        .gradient-btn { right:50px; } .cal-settings-btn { right:90px; } .tile-opacity-btn { right:130px; }
        .panel {
            position:absolute; background:rgba(20,20,30,0.95); backdrop-filter:blur(15px);
            border-radius:12px; padding:12px; z-index:100; color:white; display:none;
            font-size:0.8rem; box-shadow:0 8px 20px rgba(0,0,0,0.6);
        }
        .panel.open { display:block; }
        .panel label { display:block; margin-bottom:4px; font-weight:600; }
        .panel select, .panel input { width:100%; background:rgba(255,255,255,0.15); color:white; border:none; padding:4px; border-radius:4px; }
        .panel button { margin-top:4px; background:var(--accent); color:white; border:none; padding:4px 8px; cursor:pointer; border-radius:4px; }
        .upload-area {
            position:absolute; bottom:8px; right:8px; background:rgba(0,0,0,0.5); padding:4px 8px;
            border-radius:6px; z-index:5; display:flex; gap:8px; align-items:center;
        }
        .upload-btn { background:var(--accent); color:white; border:none; border-radius:12px; padding:4px 10px; cursor:pointer; font-size:0.8rem; }
        input[type=file] { display:none; }
        #weather-height-container {
            position:absolute; bottom:4px; left:4px; z-index:20; display:none; gap:4px; align-items:center;
        }
    </style>
</head>
<body>
<div id="dashboard"><div id="gradient-overlay"></div></div>

<!-- Einstellungs-Panels (wie gehabt) -->
<div class="panel" id="anim-panel" style="top:50px; right:10px; width:200px;">
    <label>Animation</label>
    <select id="anim-select">
        <option value="fade">Überblenden</option><option value="slide-left">Seitlich schieben</option>
        <option value="slide-up">Nach oben schieben</option><option value="zoom">Zoom</option>
        <option value="rotate">Drehen</option><option value="flip">Flip 3D</option>
        <option value="blur">Unschärfe</option><option value="ken-burns">Ken Burns</option>
        <option value="split">Vertikal teilen</option><option value="circle-reveal">Kreis öffnen</option>
        <option value="slide-diagonal">Diagonal schieben</option>
    </select>
</div>
<div class="panel" id="gradient-panel" style="top:50px; right:50px; width:240px;">
    <label>Verlauf Position <span id="gradient-pos-value">38%</span></label>
    <input type="range" id="gradient-position-slider" min="0" max="1" step="0.01" value="0.38">
    <label>Verlauf Breite</label>
    <input type="range" id="gradient-width-slider" min="0" max="0.3" step="0.01" value="0.05">
    <label>Verlauf Stärke</label>
    <input type="range" id="gradient-opacity-slider" min="0" max="1" step="0.1" value="0.8">
</div>
<div class="panel" id="tile-opacity-panel" style="top:50px; right:130px; width:200px;">
    <label>Kachel-Transparenz <span id="tile-opacity-value">85%</span></label>
    <input type="range" id="tile-opacity-slider" min="0" max="1" step="0.05" value="0.85">
</div>
<div class="panel" id="cal-panel" style="top:50px; right:90px; width:260px;">
    <label>iCal URL</label>
    <input type="text" id="ical-url" placeholder="https://calendar.google.com/.../basic.ics">
    <button id="load-ical">Kalender laden</button>
    <div id="ical-info" style="font-size:0.7rem; margin-top:4px; color:#a5f3fc;"></div>
    <div id="ical-error" style="color:#f88; font-size:0.7rem; margin-top:4px;"></div>
</div>
<div id="weather-height-container">
    <span style="color:white; font-size:0.7rem;">↕️</span>
    <input type="range" id="weather-height-slider" min="20" max="60" value="42" style="width:80px;">
</div>

<script>
(function() {
    const W = window.innerWidth, H = window.innerHeight;
    const layout = {
        slideshow: { x:0, y:0, w: W*0.38, h: H },
        calendar:  { x:W*0.38, y:0, w: W*0.62, h: H },
        weather:   { x:0, y: H*0.58, w: W*0.38, h: H*0.42 }
    };

    let settingsVisible = false;
    const dashboard = document.getElementById('dashboard');
    let currentView = 'month'; // 'month' oder 'week'

    function showSettings() { /* ... wie gehabt ... */ }
    function hideSettings() { /* ... wie gehabt ... */ }

    // ... (restliche Funktionen für Interact, Wetter, Slideshow etc. – identisch zur letzten Version) ...

    // --- KALENDER (erweitert) ---
    let calendarEvents = [];
    const palette = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63','#00bcd4','#ff5722'];
    function assignColor(i) { return palette[i % palette.length]; }
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    function renderCurrentView() {
        if (currentView === 'month') renderMonthCalendar();
        else renderWeekCalendar();
    }

    function renderMonthCalendar() {
        const grid = document.getElementById('calendar-grid');
        if(!grid) return;
        grid.innerHTML = '';
        ['So','Mo','Di','Mi','Do','Fr','Sa'].forEach(d => {
            const div = document.createElement('div');
            div.className = 'day-header'; div.textContent = d;
            grid.appendChild(div);
        });
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
        for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=daysInMonth; d++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day';
            const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const eventsOnDay = calendarEvents.filter(e => e.start.startsWith(dateStr));
            dayDiv.innerHTML = `<span class="day-number">${d}</span>`;
            eventsOnDay.slice(0,3).forEach((ev, idx) => {
                const line = document.createElement('div');
                line.className = 'event-line';
                line.style.backgroundColor = ev.color || assignColor(idx);
                line.style.bottom = (2 + idx*5) + 'px';
                dayDiv.appendChild(line);
            });
            const today = new Date();
            if(d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
                dayDiv.classList.add('today');
            }
            dayDiv.addEventListener('click', () => showDayDetails(dateStr, eventsOnDay));
            grid.appendChild(dayDiv);
        }
        document.getElementById('month-label').textContent = new Date(currentYear, currentMonth).toLocaleDateString('de-DE', {month:'long', year:'numeric'});
        document.getElementById('month-slider').value = currentMonth;
        document.getElementById('calendar-grid').style.display = 'grid';
        document.getElementById('month-slider-container').style.display = 'flex';
        document.getElementById('week-container').style.display = 'none';
    }

    function renderWeekCalendar() {
        const weekContainer = document.getElementById('week-container');
        if(!weekContainer) return;
        const today = new Date();
        const dayOfWeek = today.getDay(); // 0=So, 1=Mo, ...
        const monday = new Date(today);
        monday.setDate(today.getDate() - ((dayOfWeek + 6) % 7)); // zurück auf Montag
        const days = [];
        for (let i = 0; i < 7; i++) {
            const date = new Date(monday);
            date.setDate(monday.getDate() + i);
            days.push(date);
        }
        const weekLabel = `${monday.toLocaleDateString('de-DE', {day:'numeric', month:'short'})} – ${new Date(monday).setDate(monday.getDate()+6) ? new Date(monday.getTime()+6*86400000).toLocaleDateString('de-DE', {day:'numeric', month:'short'}) : ''}`;
        document.getElementById('week-label').textContent = weekLabel;

        const weekDaysDiv = document.getElementById('week-days');
        weekDaysDiv.innerHTML = '';
        days.forEach(date => {
            const dateStr = date.toISOString().substring(0,10);
            const eventsOnDay = calendarEvents.filter(e => e.start.startsWith(dateStr));
            const dayDiv = document.createElement('div');
            dayDiv.className = 'week-day';
            if (date.toDateString() === today.toDateString()) dayDiv.classList.add('today');
            dayDiv.innerHTML = `
                <div class="week-day-label">${date.toLocaleDateString('de-DE', {weekday:'short'})}</div>
                <div class="week-day-date">${date.getDate()}</div>
                <div class="week-events">${eventsOnDay.slice(0,3).map(e => `<div class="week-event" style="background:${e.color};color:white;">${e.summary}</div>`).join('')}</div>
            `;
            dayDiv.addEventListener('click', () => showDayDetails(dateStr, eventsOnDay));
            weekDaysDiv.appendChild(dayDiv);
        });

        document.getElementById('calendar-grid').style.display = 'none';
        document.getElementById('month-slider-container').style.display = 'none';
        document.getElementById('week-container').style.display = 'flex';
    }

    function showDayDetails(dateStr, events) {
        const details = document.getElementById('event-details');
        if (!details) return;
        if (events.length === 0) {
            details.innerHTML = '<em>Keine Termine</em>';
        } else {
            details.innerHTML = events.map(e => `<div style="margin-bottom:4px;"><span style="color:${e.color}; margin-right:4px;">●</span><strong>${e.summary}</strong><br><small>${e.start}</small></div>`).join('');
        }
        details.classList.add('show');
    }

    // Event-Listener für Ansichtsumschaltung
    document.addEventListener('click', function(e) {
        if (e.target.id === 'view-month') {
            currentView = 'month';
            document.getElementById('view-month').classList.add('active');
            document.getElementById('view-week').classList.remove('active');
            renderCurrentView();
        } else if (e.target.id === 'view-week') {
            currentView = 'week';
            document.getElementById('view-week').classList.add('active');
            document.getElementById('view-month').classList.remove('active');
            renderCurrentView();
        }
    });

    // Initialisierung der Kalender-Ansicht
    function initCalendar() {
        const calContent = document.querySelector('#calendar .tile-content');
        if (calContent) {
            calContent.innerHTML = `
                <div class="view-switch">
                    <button class="view-btn active" id="view-month">Monat</button>
                    <button class="view-btn" id="view-week">Woche</button>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
                <div class="month-slider-container" id="month-slider-container">
                    <span class="month-label" id="month-label"></span>
                    <input type="range" id="month-slider" min="0" max="11" value="${new Date().getMonth()}">
                </div>
                <div class="week-container" id="week-container">
                    <div class="week-header"><span id="week-label"></span></div>
                    <div class="week-days" id="week-days"></div>
                </div>
                <div class="event-details" id="event-details"></div>
            `;
        }
    }

    // ... (die übrigen Funktionen wie createTiles, fillTile etc. anpassen: in fillTile für calendar das neue HTML einfügen) ...

    // In createTiles/fillTile für den Kalender rufen wir initCalendar() auf, nachdem die Kachel erstellt wurde.
    function createTiles() {
        dashboard.querySelectorAll('.tile').forEach(t => t.remove());
        for (const [id, dim] of Object.entries(layout)) {
            const tile = document.createElement('div');
            tile.className = 'tile'; tile.id = id;
            tile.style.left = dim.x + 'px'; tile.style.top = dim.y + 'px';
            tile.style.width = dim.w + 'px'; tile.style.height = dim.h + 'px';
            tile.innerHTML = `<div class="tile-content"></div>`;
            if (id !== 'calendar') {
                // Ziehgriffe nur für Nicht-Kalender? Oder für alle, aber Kalender bekommt sie auch
            }
            dashboard.appendChild(tile);
            fillTile(id, tile);
        }
        initInteract();
        // Kalender-Ansicht initialisieren
        initCalendar();
        renderCurrentView();
    }

    // In loadCalendar nach dem Parsen auch renderCurrentView aufrufen
    async function loadCalendar(url) {
        // ... (Parsen wie zuvor) ...
        calendarEvents = vevents.map(...);
        renderCurrentView(); // Statt renderCalendar()
        // ...
    }

    // Monats-Schieberegler Event anpassen
    document.addEventListener('change', function(e) {
        if(e.target.id === 'month-slider' && currentView === 'month') {
            currentMonth = parseInt(e.target.value);
            renderMonthCalendar();
        }
    });

    // ... (restliche Listener und Initialisierung wie gehabt) ...
})();
</script>
</body>
</html>

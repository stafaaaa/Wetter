<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DAKboard · Große Slideshow + kompaktere Seiten</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; font-family: 'Inter', 'Helvetica', sans-serif; color: #fff; overflow: hidden; }
        .dashboard { display: grid; grid-template-columns: 35% 65%; width: 100vw; height: 100vh; overflow: hidden; }
        
        /* Linke Spalte: flex für bessere Verteilung */
        .left-panel { 
            display: flex; 
            flex-direction: column; 
            background: #000; 
            height: 100vh; 
            overflow-y: auto; 
            scrollbar-width: thin;
        }
        
        /* Uhr + Datum: kompakter (kleinerer Abstand, etwas kleinere Schrift) */
        .time-date {
            margin: 1rem 0 0 1.5rem;
        }
        .clock {
            font-size: clamp(1.8rem, 6vw, 4rem);
            font-weight: 300;
            letter-spacing: 1.5px;
            line-height: 1.1;
        }
        .date {
            font-size: clamp(0.9rem, 2.5vw, 1.3rem);
            opacity: 0.85;
        }
        
        /* Slideshow: deutlich größer (nimmt flexiblen Raum ein) */
        .slideshow-container {
            flex: 1;               /* nimmt verfügbaren Raum */
            min-height: 260px;     /* Mindesthöhe 260px */
            max-height: 50vh;      /* auf großen Screens nicht zu dominant */
            margin: 0.6rem 0 0.4rem;
            overflow: hidden;
            background: #0a0a0a;
            position: relative;
        }
        .slideshow-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        /* Wetter-Block: kompaktere Abstände, kleinere Icons */
        .weather-enhanced {
            margin: 0.2rem 1rem 1rem 1.5rem;
            background: rgba(10,10,15,0.6);
            border-radius: 24px;
            padding: 0.7rem 0.9rem;
            backdrop-filter: blur(4px);
        }
        .current-weather {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.3rem;
        }
        .temp-big {
            font-size: clamp(1.6rem, 5vw, 2.6rem);
            font-weight: 300;
        }
        .temp-unit {
            font-size: clamp(0.8rem, 2vw, 1rem);
        }
        .current-icon {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
        }
        .weather-details {
            display: flex;
            gap: 1rem;
            font-size: clamp(0.6rem, 1.8vw, 0.7rem);
            margin-bottom: 0.2rem;
        }
        .hourly-title {
            font-size: 0.65rem;
            margin: 0.4rem 0 0.2rem;
            opacity: 0.7;
        }
        .hourly-forecast {
            display: flex;
            gap: 0.4rem;
            overflow-x: auto;
            padding-bottom: 0.2rem;
        }
        .hour-card {
            min-width: 58px;
            text-align: center;
            font-size: 0.65rem;
        }
        .hour-temp {
            font-size: 0.8rem;
        }
        .hour-icon {
            font-size: 1rem;
        }
        .hour-bar-container {
            height: 2px;
            margin: 3px 0;
        }
        
        /* Rechte Spalte: unverändert, gut lesbar + scrollbar */
        .right-panel {
            background: #000;
            overflow-y: auto;
            padding: 1.2rem 1.5rem 1.5rem 1rem;
        }
        .view-toggle {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 1rem;
        }
        .view-btn {
            background: #1e1e1e;
            padding: 5px 12px;
            font-size: 0.75rem;
            border-radius: 40px;
            cursor: pointer;
            border: none;
            color: white;
        }
        .view-btn.active { background: #3a6ea5; }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7,1fr);
            margin-bottom: 0.6rem;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding-bottom: 0.4rem;
        }
        .weekday {
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            opacity: 0.7;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7,1fr);
            gap: 0.5rem 0.3rem;
        }
        .cal-cell {
            padding: 0.3rem 0.1rem 0.2rem 0.2rem;
            min-height: 85px;
        }
        .day-number {
            font-size: 1.5rem;
            font-weight: 350;
            line-height: 1;
            margin-bottom: 0.2rem;
            display: inline-block;
        }
        .today .day-number {
            border: 2px solid #ff3b3b;
            border-radius: 50%;
            padding: 0.05rem 0.45rem;
            margin-left: -0.1rem;
        }
        .event-badge {
            font-size: 0.62rem;
            padding: 2px 4px;
            border-radius: 20px;
            white-space: nowrap;
            overflow-x: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            background-color: rgba(70,70,100,0.8);
        }
        .empty-cell .day-number { opacity: 0.3; }
        .empty-cell .events { visibility: hidden; }
        
        /* Animationen */
        .anim-fade { animation: fadeEffect 0.7s ease; }
        .anim-slide-left { animation: slideLeft 0.6s ease-out; }
        .anim-slide-right { animation: slideRight 0.6s ease-out; }
        .anim-slide-up { animation: slideUp 0.6s ease-out; }
        .anim-slide-down { animation: slideDown 0.6s ease-out; }
        .anim-zoom { animation: zoomEffect 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .anim-rotate { animation: rotateEffect 0.6s ease; }
        .anim-flip { animation: flipEffect 0.7s ease; }
        .anim-blur { animation: blurEffect 0.5s ease; }
        .anim-glitch { animation: glitchEffect 0.4s ease; }
        @keyframes fadeEffect { from { opacity: 0.2; } to { opacity: 1; } }
        @keyframes slideLeft { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideRight { from { transform: translateX(-40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes zoomEffect { from { transform: scale(1.08); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes rotateEffect { from { transform: rotate(3deg) scale(0.96); opacity: 0; } to { transform: rotate(0deg) scale(1); opacity: 1; } }
        @keyframes flipEffect { from { transform: perspective(400px) rotateY(12deg); opacity: 0; } to { transform: perspective(400px) rotateY(0); opacity: 1; } }
        @keyframes blurEffect { from { filter: blur(8px); opacity: 0; } to { filter: blur(0); opacity: 1; } }
        @keyframes glitchEffect { 0% { transform: skew(3deg); opacity: 0.5; } 100% { transform: skew(0); opacity: 1; } }
        
        /* Einstellungen Overlay (unverändert) */
        .settings-gear { position: fixed; top: 20px; right: 20px; z-index: 200; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); width: 44px; height: 44px; border-radius: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.5rem; border: 1px solid rgba(255,255,255,0.2); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .settings-modal { background: #0e0e0e; width: 90%; max-width: 680px; max-height: 85vh; border-radius: 32px; padding: 1.5rem; overflow-y: auto; border: 1px solid #2c2c2c; }
        .setting-group { margin-bottom: 1.2rem; border-bottom: 1px solid #222; padding-bottom: 0.8rem; }
        .setting-group label { font-size: 0.8rem; margin-bottom: 5px; opacity: 0.8; display: block; }
        input, select, button { background: #1e1e1e; border: 1px solid #333; color: white; padding: 6px 10px; border-radius: 40px; font-family: inherit; font-size: 0.8rem; }
        button { cursor: pointer; }
        .color-flex { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
        .ical-status { font-size: 0.7rem; margin-top: 5px; color: #aaa; }
        .events-hidden .events { display: none; }
        
        /* Responsive Querformat / Tablet */
        @media (max-width: 950px) and (orientation: portrait) {
            .dashboard { grid-template-columns: 1fr; overflow-y: auto; height: auto; }
            .left-panel, .right-panel { height: auto; overflow-y: visible; }
            .right-panel { padding: 1rem; }
            .slideshow-container { min-height: 280px; max-height: 35vh; }
        }
        @media (max-width: 600px) {
            .calendar-grid { gap: 0.2rem; }
            .cal-cell { min-height: 70px; }
            .day-number { font-size: 1.2rem; }
            .event-badge { font-size: 0.55rem; white-space: normal; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="left-panel">
        <div class="time-date"><div class="clock" id="liveClock">--:--:--</div><div class="date" id="liveDate"></div></div>
        <div class="slideshow-container"><img id="slideshowImage" class="slideshow-img" alt="slideshow"></div>
        <div class="weather-enhanced" id="weatherEnhanced">
            <div class="current-weather"><div><span class="temp-big" id="currentTemp">--</span><span class="temp-unit">°C</span></div><div><i class="fas fa-sun current-icon" id="currentWeatherIcon" style="color: #FFD966;"></i></div></div>
            <div class="weather-details"><span><i class="fas fa-tint"></i> <span id="precip">--</span>%</span><span><i class="fas fa-water"></i> <span id="humidity">--</span>%</span><span><i class="fas fa-wind"></i> <span id="windSpeed">--</span> km/h</span></div>
            <div class="hourly-title"><i class="fas fa-chart-line"></i> 3h-Vorhersage</div>
            <div class="hourly-forecast" id="hourlyForecast"></div>
        </div>
    </div>
    <div class="right-panel">
        <div class="view-toggle"><button id="monthViewBtn" class="view-btn active">📅 Monat</button><button id="weekViewBtn" class="view-btn">📆 Woche</button></div>
        <div class="calendar"><div class="weekdays" id="weekdaysRow"></div><div class="calendar-grid" id="calendarGrid"></div></div>
    </div>
</div>
<div class="settings-gear" id="settingsGear"><i class="fas fa-cog"></i></div>
<div class="modal-overlay" id="settingsModal"><div class="settings-modal"><h2>Einstellungen</h2><div class="setting-group"><label>🖼️ Slideshow Bilder</label><div id="imageListContainer"></div><div style="display:flex; gap:6px;"><input type="file" id="uploadImages" multiple accept="image/*"><input type="text" id="imageUrlInput" placeholder="Bild-URL"><button id="addUrlBtn">+</button></div><button id="clearImagesBtn" style="margin-top:5px;">Reset</button></div><div class="setting-group"><label>🎞️ Animation</label><select id="animationSelect"><option value="anim-fade">Fade</option><option value="anim-slide-left">Slide Links</option><option value="anim-slide-right">Slide Rechts</option><option value="anim-slide-up">Slide Hoch</option><option value="anim-slide-down">Slide Runter</option><option value="anim-zoom">Zoom</option><option value="anim-rotate">Rotate</option><option value="anim-flip">Flip</option><option value="anim-blur">Blur</option><option value="anim-glitch">Glitch</option></select></div><div class="setting-group"><label>🌍 Wetter-Stadt</label><input type="text" id="weatherCity" placeholder="Berlin"><button id="refreshWeatherBtn">Aktualisieren</button></div><div class="setting-group"><label>📅 iCal URL</label><input type="text" id="icalUrl" placeholder="https://.../calendar.ics"><label><input type="checkbox" id="icalEnabled"> iCal aktivieren</label><button id="syncIcalNowBtn" class="primary">Sync</button><div class="ical-status" id="icalStatus"></div><label>🔄 Intervall (Minuten)</label><input type="number" id="icalInterval" min="5" max="240" value="30" style="width:90px;"></div><div class="setting-group"><label>🎨 Terminfarben</label><div class="color-flex"><div class="color-item">🔵 <input type="color" id="colorBlue" value="#2c7da0"></div><div class="color-item">🔴 <input type="color" id="colorRed" value="#c44536"></div><div class="color-item">🟢 <input type="color" id="colorGreen" value="#2e9b6e"></div><div class="color-item">🟠 <input type="color" id="colorOrange" value="#e67e22"></div><div class="color-item">🟣 <input type="color" id="colorPurple" value="#8e44ad"></div></div><label><input type="checkbox" id="toggleEventsVisibility"> Ereignisbalken anzeigen</label></div><div class="setting-group"><label><input type="checkbox" id="toggleSeconds" checked> Sekunden in Uhr</label></div><div><button id="saveSettingsBtn" class="primary">Speichern</button><button id="closeModalBtn">Schließen</button></div></div></div>
<script>
    // ---------- GLOBALS ----------
    let slideshowImages = [];
    let currentAnimation = "anim-fade";
    let eventsVisible = true, showSeconds = true;
    let customColors = { blue:"#2c7da0", red:"#c44536", green:"#2e9b6e", orange:"#e67e22", purple:"#8e44ad" };
    let weatherCity = "Berlin";
    let icalUrl = "", icalEnabled = false, icalEvents = [];
    let syncInterval = null, currentView = "month", currentDate = new Date();
    const DEMO_EVENTS = [{ day: 3, title: "Design Review", colorClass: "blue-badge" },{ day: 5, title: "Meeting Team", colorClass: "green-badge" },{ day: 8, title: "Zahnarzt", colorClass: "red-badge" },{ day: 12, title: "Workshop", colorClass: "purple-badge" },{ day: 15, title: "Deadline", colorClass: "orange-badge" },{ day: 20, title: "Geburtstag", colorClass: "red-badge" },{ day: 25, title: "Abgabe", colorClass: "orange-badge" }];
    const clockEl = document.getElementById('liveClock'), dateEl = document.getElementById('liveDate'), calendarGrid = document.getElementById('calendarGrid'), weekdaysRow = document.getElementById('weekdaysRow'), slideshowImg = document.getElementById('slideshowImage'), icalStatusSpan = document.getElementById('icalStatus');
    
    // ---------- SLIDESHOW FLÜSSIG (mit Preloading + animationend) ----------
    let slideInterval = null;
    let currentIndex = 0;
    let isAnimating = false;
    let nextImagePreload = new Image();

    function preloadImage(url) { nextImagePreload = new Image(); nextImagePreload.src = url; }
    function changeImageSmooth(newUrl, animClass) {
        if (isAnimating) return;
        isAnimating = true;
        slideshowImg.classList.remove(...slideshowImg.classList);
        slideshowImg.classList.add('slideshow-img', animClass);
        slideshowImg.src = newUrl;
        const onAnimEnd = () => {
            slideshowImg.classList.remove(animClass);
            slideshowImg.removeEventListener('animationend', onAnimEnd);
            isAnimating = false;
        };
        slideshowImg.addEventListener('animationend', onAnimEnd, { once: true });
        setTimeout(() => { if (isAnimating) { slideshowImg.classList.remove(animClass); isAnimating = false; } }, 800);
    }
    function nextSlide() {
        if (!slideshowImages.length) return;
        const nextIdx = (currentIndex + 1) % slideshowImages.length;
        const overNext = (nextIdx + 1) % slideshowImages.length;
        preloadImage(slideshowImages[overNext]);
        changeImageSmooth(slideshowImages[nextIdx], currentAnimation);
        currentIndex = nextIdx;
    }
    function startSlideshow() {
        if (slideInterval) clearInterval(slideInterval);
        if (!slideshowImages.length) return;
        currentIndex = 0;
        slideshowImg.classList.remove(...slideshowImg.classList);
        slideshowImg.classList.add('slideshow-img');
        slideshowImg.src = slideshowImages[0];
        if (slideshowImages[1]) preloadImage(slideshowImages[1]);
        slideInterval = setInterval(() => nextSlide(), 7000);
    }
    
    // ---------- WETTER (kompakt, mit Iconfarben) ----------
    function getWeatherIconAndColor(code) { if(code===0) return {icon:"fa-sun", color:"#FFD966"}; if(code<=2) return {icon:"fa-cloud-sun", color:"#DDDDDD"}; if(code<=49) return {icon:"fa-cloud-rain", color:"#4a90e2"}; if(code<=77) return {icon:"fa-snowflake", color:"#7ec8e0"}; if(code<=99) return {icon:"fa-bolt", color:"#b980ea"}; return {icon:"fa-cloud", color:"#aaa"}; }
    async function fetchEnhancedWeather(city) { try { const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&format=json`); const geoJson=await geo.json(); if(!geoJson.results) throw new Error(); const {latitude,longitude}=geoJson.results[0]; const url=`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&hourly=temperature_2m,relativehumidity_2m,precipitation_probability,windspeed_10m,weathercode&timezone=auto&forecast_days=2`; const res=await fetch(url); const data=await res.json(); const cur=data.current_weather; document.getElementById('currentTemp').innerText=Math.round(cur.temperature); const {icon,color}=getWeatherIconAndColor(cur.weathercode); const currIcon=document.getElementById('currentWeatherIcon'); currIcon.className=`fas ${icon} current-icon`; currIcon.style.color=color; const hourly=data.hourly; const now=new Date(); let precip=0,hum=0,wind=Math.round(cur.windspeed); for(let i=0;i<hourly.time.length;i++){ const t=new Date(hourly.time[i]); if(t.getHours()===now.getHours() && t.getDate()===now.getDate()){ precip=hourly.precipitation_probability[i]||0; hum=hourly.relativehumidity_2m[i]||0; wind=Math.round(hourly.windspeed_10m[i]); break; } } document.getElementById('precip').innerText=precip; document.getElementById('humidity').innerText=hum; document.getElementById('windSpeed').innerText=wind; let items=[]; for(let i=0;i<hourly.time.length;i++){ const dt=new Date(hourly.time[i]); if(dt>=now && items.length<10){ const {icon:ic,color:col}=getWeatherIconAndColor(hourly.weathercode[i]); items.push({day:dt.toLocaleDateString('de-DE',{weekday:'short'}), hour:dt.getHours()+":00", temp:Math.round(hourly.temperature_2m[i]), precip:hourly.precipitation_probability[i]||0, icon:ic, color:col }); } } const container=document.getElementById('hourlyForecast'); container.innerHTML=items.map(h=>`<div class="hour-card"><div class="hour-time">${h.day} ${h.hour}</div><i class="fas ${h.icon} hour-icon" style="color:${h.color};"></i><div class="hour-temp">${h.temp}°</div><div class="hour-bar-container"><div class="hour-bar" style="width:${Math.min(h.precip,100)}%; background:#4aa3ff;"></div></div><div class="hour-precip">${h.precip}%</div></div>`).join(''); } catch(e){ console.error(e); } }
    
    // ---------- KALENDER (iCal + Demo) ----------
    function parseICal(icalData){ let ev=[]; let curr=null; const lines=icalData.split(/\r?\n/); for(let l of lines){ l=l.trim(); if(l==="BEGIN:VEVENT") curr={}; else if(l==="END:VEVENT"){ if(curr&&curr.summary&&curr.dtstart_value){ let start=null; let val=curr.dtstart_value; if(val&&val.length===8){ let y=parseInt(val.slice(0,4)),m=parseInt(val.slice(4,6))-1,d=parseInt(val.slice(6,8)); start=new Date(y,m,d); }else if(val&&val.length>=15){ let y=parseInt(val.slice(0,4)),m=parseInt(val.slice(4,6))-1,d=parseInt(val.slice(6,8)),h=parseInt(val.slice(9,11)),min=parseInt(val.slice(11,13)); start=new Date(y,m,d,h,min); } if(start) ev.push({start,title:curr.summary,colorClass:"blue-badge"}); } curr=null; }else if(curr){ if(l.startsWith("SUMMARY:")) curr.summary=l.substring(8).replace(/\\,/g,','); else if(l.startsWith("DTSTART")) curr.dtstart_value=l.split(":")[1]; else if(l.includes("DTSTART;")&&l.includes("VALUE=DATE")){ let parts=l.split(":"); if(parts[1]) curr.dtstart_value=parts[1]; } } } return ev; }
    async function fetchICalEvents(url){ if(!url) return []; const proxy="https://api.allorigins.win/raw?url="; try{ const resp=await fetch(proxy+encodeURIComponent(url)); if(!resp.ok) throw new Error(); const text=await resp.text(); const parsed=parseICal(text); icalStatusSpan.innerText=`✅ ${parsed.length} Termine`; return parsed; }catch(err){ icalStatusSpan.innerText=`❌ Fehler`; return []; } }
    async function refreshICal(){ if(!icalEnabled||!icalUrl) return []; icalStatusSpan.innerText="🔄 ..."; const events=await fetchICalEvents(icalUrl); icalEvents=events; renderCalendarByView(); return events; }
    function getEventsForDate(date,events){ const start=new Date(date.getFullYear(),date.getMonth(),date.getDate()); const end=new Date(date.getFullYear(),date.getMonth(),date.getDate(),23,59,59); return events.filter(ev=>ev.start>=start&&ev.start<=end); }
    function renderMonthCalendar(year,month,events){ const firstDay=new Date(year,month,1).getDay(); const daysInMonth=new Date(year,month+1,0).getDate(); const today=new Date(); let html=''; for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell empty-cell"><div class="day-number"></div><div class="events"></div></div>`; for(let d=1;d<=daysInMonth;d++){ const cellDate=new Date(year,month,d); const isToday=(year===today.getFullYear()&&month===today.getMonth()&&d===today.getDate()); const dayEvents=getEventsForDate(cellDate,events); let evHtml=''; if(dayEvents.length){ evHtml=`<div class="events">`; dayEvents.slice(0,2).forEach(ev=>evHtml+=`<div class="event-badge ${ev.colorClass||'blue-badge'}">${ev.title.substring(0,16)}</div>`); if(dayEvents.length>2) evHtml+=`<div class="event-badge">+${dayEvents.length-2}</div>`; evHtml+=`</div>`; } html+=`<div class="cal-cell ${isToday?'today':''}"><div class="day-number">${d}</div>${evHtml}</div>`; } let total=firstDay+daysInMonth; for(let i=total;i<42;i++) html+=`<div class="cal-cell empty-cell"><div class="day-number"></div><div class="events"></div></div>`; calendarGrid.innerHTML=html; }
    function renderWeekCalendar(refDate,events){ const startOfWeek=new Date(refDate); const dow=refDate.getDay(); const diffToMonday=(dow===0?-6:1-dow); startOfWeek.setDate(refDate.getDate()+diffToMonday); const weekDays=[]; for(let i=0;i<7;i++){ let d=new Date(startOfWeek); d.setDate(startOfWeek.getDate()+i); weekDays.push(d); } const today=new Date(); let html=''; weekDays.forEach(day=>{ const isToday=(day.toDateString()===today.toDateString()); const dayEvents=getEventsForDate(day,events); let evHtml=''; if(dayEvents.length){ evHtml=`<div class="events">`; dayEvents.slice(0,2).forEach(ev=>evHtml+=`<div class="event-badge ${ev.colorClass||'blue-badge'}">${ev.title.substring(0,16)}</div>`); if(dayEvents.length>2) evHtml+=`<div class="event-badge">+${dayEvents.length-2}</div>`; evHtml+=`</div>`; } html+=`<div class="cal-cell ${isToday?'today':''}"><div class="day-number">${day.getDate()}</div>${evHtml}</div>`; }); calendarGrid.innerHTML=html; weekdaysRow.innerHTML=weekDays.map((d,i)=>`<div class="weekday">${["S","M","T","W","T","F","S"][i]} ${d.getDate()}.${d.getMonth()+1}</div>`).join(''); }
    function renderCalendarByView(){ if(!eventsVisible){ calendarGrid.innerHTML='<div style="color:#aaa;">Ereignisse ausgeblendet</div>'; return; } const eventsSource=(icalEnabled&&icalEvents.length)?icalEvents:DEMO_EVENTS.map(ev=>{const now=new Date(); return{start:new Date(now.getFullYear(),now.getMonth(),ev.day),title:ev.title,colorClass:ev.colorClass};}); if(currentView==="month"){ const now=new Date(); renderMonthCalendar(now.getFullYear(),now.getMonth(),eventsSource); weekdaysRow.innerHTML=`<div class="weekday">S</div><div class="weekday">M</div><div class="weekday">T</div><div class="weekday">W</div><div class="weekday">T</div><div class="weekday">F</div><div class="weekday">S</div>`; }else{ renderWeekCalendar(currentDate,eventsSource); } document.querySelector('.right-panel').classList.toggle('events-hidden',!eventsVisible); }
    
    // ---------- UHR, SPEICHERN, EINSTELLUNGEN ----------
    function updateClock(){ const n=new Date(); clockEl.innerText=showSeconds?`${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}:${n.getSeconds().toString().padStart(2,'0')}`:`${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`; dateEl.innerText=n.toLocaleDateString('de-DE',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
    function applyEventColors(){ let style=document.getElementById('eventColors'); if(!style){ style=document.createElement('style'); style.id='eventColors'; document.head.appendChild(style); } style.innerHTML=`.event-badge.blue-badge{background:${customColors.blue}!important}.event-badge.red-badge{background:${customColors.red}!important}.event-badge.green-badge{background:${customColors.green}!important}.event-badge.orange-badge{background:${customColors.orange}!important}.event-badge.purple-badge{background:${customColors.purple}!important}`; }
    function saveAllSettings(){ localStorage.setItem('dakboard_full',JSON.stringify({slideshowImages,currentAnimation,eventsVisible,showSeconds,customColors,weatherCity,icalUrl,icalEnabled,currentView})); }
    function loadSettings(){ const saved=localStorage.getItem('dakboard_full'); if(saved){ const s=JSON.parse(saved); if(s.slideshowImages) slideshowImages=s.slideshowImages; if(s.currentAnimation) currentAnimation=s.currentAnimation; if(typeof s.eventsVisible==='boolean') eventsVisible=s.eventsVisible; if(typeof s.showSeconds==='boolean') showSeconds=s.showSeconds; if(s.customColors) customColors={...customColors,...s.customColors}; if(s.weatherCity) weatherCity=s.weatherCity; if(s.icalUrl) icalUrl=s.icalUrl; if(typeof s.icalEnabled==='boolean') icalEnabled=s.icalEnabled; if(s.currentView) currentView=s.currentView; } if(!slideshowImages.length) slideshowImages=["https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&h=700","https://images.unsplash.com/photo-1470071459604-3b5ec3c7fe05?w=900&h=700"]; document.getElementById('animationSelect').value=currentAnimation; document.getElementById('toggleEventsVisibility').checked=eventsVisible; document.getElementById('toggleSeconds').checked=showSeconds; document.getElementById('weatherCity').value=weatherCity; document.getElementById('icalUrl').value=icalUrl; document.getElementById('icalEnabled').checked=icalEnabled; document.getElementById('colorBlue').value=customColors.blue; document.getElementById('colorRed').value=customColors.red; document.getElementById('colorGreen').value=customColors.green; document.getElementById('colorOrange').value=customColors.orange; document.getElementById('colorPurple').value=customColors.purple; applyEventColors(); if(icalEnabled && icalUrl) refreshICal(); }
    function renderImageListUI(){ const c=document.getElementById('imageListContainer'); if(!c)return; c.innerHTML=slideshowImages.map((url,i)=>`<div style="display:flex;justify-content:space-between;margin:4px 0;background:#1e1e1e;padding:3px 8px;border-radius:20px;"><span style="font-size:11px;">${url.substring(0,40)}...</span><button data-idx="${i}" class="removeImgBtn">🗑️</button></div>`).join(''); document.querySelectorAll('.removeImgBtn').forEach(btn=>{ btn.onclick=()=>{ const idx=parseInt(btn.dataset.idx); slideshowImages.splice(idx,1); if(!slideshowImages.length) slideshowImages=["https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&h=700"]; renderImageListUI(); startSlideshow(); saveAllSettings(); }; }); }
    function applyAllAndRender(){ currentAnimation=document.getElementById('animationSelect').value; eventsVisible=document.getElementById('toggleEventsVisibility').checked; showSeconds=document.getElementById('toggleSeconds').checked; customColors={blue:document.getElementById('colorBlue').value, red:document.getElementById('colorRed').value, green:document.getElementById('colorGreen').value, orange:document.getElementById('colorOrange').value, purple:document.getElementById('colorPurple').value}; weatherCity=document.getElementById('weatherCity').value; icalUrl=document.getElementById('icalUrl').value; icalEnabled=document.getElementById('icalEnabled').checked; applyEventColors(); if(icalEnabled && icalUrl) refreshICal().then(()=>renderCalendarByView()); else { icalEvents=[]; renderCalendarByView(); } if(syncInterval) clearInterval(syncInterval); const intervalMin=parseInt(document.getElementById('icalInterval')?.value||30); if(icalEnabled && icalUrl) syncInterval=setInterval(()=>{ if(icalEnabled && icalUrl) refreshICal(); }, intervalMin*60*1000); startSlideshow(); fetchEnhancedWeather(weatherCity); saveAllSettings(); }
    
    // EVENT LISTENER
    document.getElementById('settingsGear').onclick=()=>{ renderImageListUI(); document.getElementById('settingsModal').classList.add('active'); };
    document.getElementById('closeModalBtn').onclick=()=>document.getElementById('settingsModal').classList.remove('active');
    document.getElementById('saveSettingsBtn').onclick=()=>{ applyAllAndRender(); document.getElementById('settingsModal').classList.remove('active'); };
    document.getElementById('refreshWeatherBtn').onclick=()=>fetchEnhancedWeather(document.getElementById('weatherCity').value);
    document.getElementById('syncIcalNowBtn').onclick=async()=>{ icalEnabled=true; icalUrl=document.getElementById('icalUrl').value; await refreshICal(); renderCalendarByView(); saveAllSettings(); };
    document.getElementById('addUrlBtn').onclick=()=>{ const url=document.getElementById('imageUrlInput').value; if(url){ slideshowImages.push(url); renderImageListUI(); startSlideshow(); saveAllSettings(); } };
    document.getElementById('clearImagesBtn').onclick=()=>{ slideshowImages=["https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&h=700"]; renderImageListUI(); startSlideshow(); saveAllSettings(); };
    document.getElementById('uploadImages').onchange=(e)=>{ Array.from(e.target.files).forEach(f=>{ const reader=new FileReader(); reader.onload=ev=>{ slideshowImages.push(ev.target.result); renderImageListUI(); startSlideshow(); saveAllSettings(); }; reader.readAsDataURL(f); }); };
    document.getElementById('monthViewBtn').onclick=()=>{ currentView="month"; renderCalendarByView(); document.getElementById('monthViewBtn').classList.add('active'); document.getElementById('weekViewBtn').classList.remove('active'); saveAllSettings(); };
    document.getElementById('weekViewBtn').onclick=()=>{ currentView="week"; currentDate=new Date(); renderCalendarByView(); document.getElementById('weekViewBtn').classList.add('active'); document.getElementById('monthViewBtn').classList.remove('active'); saveAllSettings(); };
    document.getElementById('animationSelect').onchange = () => { currentAnimation = document.getElementById('animationSelect').value; };
    
    setInterval(updateClock,200); updateClock();
    loadSettings();
    startSlideshow();
    fetchEnhancedWeather(weatherCity);
    if(icalEnabled && icalUrl) refreshICal().then(()=>renderCalendarByView()); else renderCalendarByView();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SmartHub Ultimate Pro - Multi-Folder System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        /* 1. THEMEN-SYSTEM (16 THEMES) */
        :root { --bg: #000; --panel: #111; --text: #fff; --accent: #ef4444; --glass: rgba(255,255,255,0.1); --anim-speed: 1.5s; --split: 65vw; }
        [data-theme="oled"] { --bg: #000; --panel: #000; --accent: #3b82f6; }
        [data-theme="glass"] { --bg: #1a1c2c; --panel: rgba(255,255,255,0.12); --glass: rgba(255,255,255,0.15); --accent: #00d2ff; }
        [data-theme="cyber"] { --bg: #050505; --panel: #000; --accent: #f0f; --text: #0ff; }
        [data-theme="neon"] { --bg: #000; --panel: #0a0a0a; --accent: #39ff14; }
        [data-theme="candy"] { --bg: #2b0b3b; --panel: #4a148c; --accent: #ff4081; }
        [data-theme="tropical"] { --bg: #004d40; --panel: #00695c; --accent: #ffeb3b; }
        [data-theme="golden"] { --bg: #3e2723; --panel: #4e342e; --accent: #ffc107; }
        [data-theme="violet"] { --bg: #1a0033; --panel: #310062; --accent: #e040fb; }
        [data-theme="cherry"] { --bg: #33000d; --panel: #4d0014; --accent: #ff5252; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; transition: 0.5s ease; }

        .app-container { display: grid; grid-template-columns: var(--split) 1fr; height: 100dvh; gap: 15px; padding: 15px; }
        @media (max-width: 1100px) { .app-container { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; } }

        .panel { border-radius: 28px; overflow: hidden; position: relative; background: var(--panel); border: 1px solid var(--glass); }

        /* 2. SLIDESHOW & 10 ANIMATIONEN */
        .slideshow { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
        .media-item { position: absolute; inset: 0; opacity: 0; transition: all var(--anim-speed) cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; }
        .media-item.active { opacity: 1; }
        .media-content { width: 100%; height: 100%; object-fit: contain; }

        /* Animation Styles */
        .anim-fade.active { opacity: 1; }
        .anim-zoom-in { transform: scale(1.4); } .anim-zoom-in.active { transform: scale(1); }
        .anim-zoom-out { transform: scale(0.6); } .anim-zoom-out.active { transform: scale(1); }
        .anim-slide-left { transform: translateX(100%); } .anim-slide-left.active { transform: translateX(0); }
        .anim-slide-right { transform: translateX(-100%); } .anim-slide-right.active { transform: translateX(0); }
        .anim-blur-in { filter: blur(25px); } .anim-blur-in.active { filter: blur(0); }
        .anim-rotate { transform: rotate(15deg) scale(1.3); } .anim-rotate.active { transform: rotate(0) scale(1); }
        .anim-flip { transform: rotateY(90deg); opacity: 0; } .anim-flip.active { transform: rotateY(0); opacity: 1; }
        .anim-bounce { transform: translateY(-100%); } .anim-bounce.active { transform: translateY(0); }
        .anim-ken-burns { transform: scale(1); } .anim-ken-burns.active { animation: kb 20s infinite alternate; }
        @keyframes kb { to { transform: scale(1.2) translate(-2%, -2%); } }

        /* OVERLAYS & KONTRAST */
        .vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 35%, transparent 65%, rgba(0,0,0,0.8) 100%); z-index: 1; pointer-events: none; }
        .overlay-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; pointer-events: none; }
        .time { font-family: "JetBrains Mono", monospace; font-size: clamp(50px, 7vw, 110px); font-weight: 700; text-shadow: 0 4px 20px #000; pointer-events: auto; }
        .date { font-size: clamp(22px, 2.5vw, 34px); font-weight: 700; color: var(--accent); text-shadow: 0 2px 10px #000; }

        /* WETTER PANORAMA */
        .weather-hub { pointer-events: auto; background: var(--glass); padding: 25px 40px; border-radius: 24px; backdrop-filter: blur(25px); border: 1px solid var(--glass); display: flex; align-items: center; justify-content: space-between; width: 100%; margin-top: auto; box-shadow: 0 15px 45px rgba(0,0,0,0.6); }
        .weather-main { display: flex; align-items: center; gap: 30px; border-right: 2px solid var(--glass); padding-right: 40px; }
        .weather-icon-large { width: 100px; height: 100px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .forecast-panorama { display: flex; flex: 1; justify-content: space-around; padding-left: 30px; }
        .fc-item { text-align: center; font-size: 16px; font-weight: 700; }
        .fc-icon { width: 50px; height: 50px; margin: 8px 0; }

        /* KALENDER LESBARKEIT & ANTI-VERZERRUNGS-SCHUTZ */
        .cal-container { display: flex; flex-direction: column; height: 100%; padding: 20px; }
        .month-label { font-size: clamp(28px, 3.5vw, 42px); font-weight: 700; text-align: center; }
        .grid-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; padding-bottom: 12px; font-weight: 700; font-size: 18px; color: var(--accent); text-transform: uppercase; }
        .grid-body { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; gap: 6px; background: var(--glass); border-radius: 20px; padding: 8px; }
        
        .day-cell { background: var(--panel); padding: 12px; cursor: pointer; min-height: 0; min-width: 0; display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; }
        .day-num { font-size: 26px; font-weight: 700; }
        .day-cell.today { border: 3px solid var(--accent); background: rgba(239, 68, 68, 0.15); }
        .day-cell.other { opacity: 0.2; }
        
        .ev-bar { 
            font-size: 12px; padding: 5px 8px; border-radius: 8px; margin-top: 4px; 
            color: white; font-weight: 700; background: var(--accent); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            display: block; width: 100%; 
        }

        /* SETTINGS & MODALS */
        .settings-pane { position: fixed; right: 0; top: 0; width: 420px; height: 100%; background: #000; z-index: 100; transform: translateX(100%); transition: 0.4s ease; padding: 30px; border-left: 1px solid var(--glass); overflow-y: auto; }
        .settings-pane.active { transform: translateX(0); }
        .input-field { width: 100%; background: #111; border: 1px solid var(--glass); color: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; outline: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; place-items: center; }
        .modal.active { display: grid; }
        .modal-box { background: var(--panel); padding: 40px; border-radius: 32px; border: 1px solid var(--glass); width: 90%; max-width: 550px; }
    </style>
</head>
<body data-theme="oled">

<div class="app-container">
    <div class="panel left">
        <button id="btnSet" style="position:absolute; top:25px; left:25px; z-index:10; border:none; background:var(--glass); color:white; width:55px; height:55px; border-radius:50%; cursor:pointer; pointer-events:auto; font-size:24px;">⚙️</button>
        <div class="slideshow" id="mediaHub"></div>
        <div class="vignette"></div>
        <div class="overlay-content">
            <div class="time-box">
                <div id="clock" class="time">00:00</div>
                <div id="date" class="date">Datum...</div>
            </div>
            <div class="weather-hub">
                <div class="weather-main">
                    <div id="wIcon" class="weather-icon-large"></div>
                    <div>
                        <div id="mainTemp" style="font-size:55px; font-weight:700; font-family:'JetBrains Mono';">--°</div>
                        <div id="wCity" style="font-weight:700; font-size:22px; opacity:0.9;">Standort...</div>
                    </div>
                </div>
                <div class="forecast-panorama" id="forecastStrip"></div>
            </div>
        </div>
    </div>

    <div class="panel right">
        <div class="cal-container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <button class="nav-btn" style="background:var(--glass); border:none; color:white; padding:10px 15px; border-radius:10px;" onclick="changeMonth(-1)">❮</button>
                <h2 id="monthTitle" class="month-label">Monat</h2>
                <button class="nav-btn" style="background:var(--glass); border:none; color:white; padding:10px 15px; border-radius:10px;" onclick="changeMonth(1)">❯</button>
            </div>
            <div id="monthView" style="height:100%; display:flex; flex-direction:column;">
                <div class="grid-header"><div>So</div><div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div></div>
                <div class="grid-body" id="calGrid"></div>
            </div>
            <div id="weekView" style="display:none; flex-direction:column; gap:12px; overflow-y:auto; flex:1;"></div>
        </div>
    </div>
</div>

<div class="settings-pane" id="sidebar">
    <h3 style="margin-bottom:20px; font-size:24px;">System-Setup</h3>
    <label>Slideshow-Fokus (%)</label>
    <input type="range" id="inSplit" min="30" max="85" value="65" class="input-field" style="padding:0;">
    <label>Animation (10 Effekte)</label>
    <select class="input-field" id="inAnim">
        <option value="fade">Klassisch Fade</option>
        <option value="zoom-in">Zoom In</option>
        <option value="zoom-out">Zoom Out</option>
        <option value="slide-left">Slide Links</option>
        <option value="slide-right">Slide Rechts</option>
        <option value="blur-in">Blur Effekt</option>
        <option value="rotate">Rotation</option>
        <option value="flip">3D Flip</option>
        <option value="ken-burns">Ken Burns</option>
        <option value="bounce">Bounce</option>
    </select>
    <label>Wetter Stadt</label><input type="text" class="input-field" id="inCity">
    <label>Thema</label>
    <select class="input-field" id="inTheme">
        <option value="oled">OLED Black</option><option value="glass">Glass</option><option value="cyber">Cyber</option>
        <option value="neon">Neon</option><option value="candy">Candy</option><option value="tropical">Tropical</option>
        <option value="golden">Golden</option><option value="violet">Violet</option><option value="cherry">Cherry</option>
    </select>
    <label>ICS Kalender URL</label><input type="text" class="input-field" id="inCal">
    <label>Medien-Links (Bilder & Videos)</label><textarea class="input-field" id="inMedia" rows="3"></textarea>
    
    <label style="color: var(--accent);">Ordner nacheinander wählen (oder reinziehen)</label>
    <input type="file" id="inLocal" class="input-field" multiple webkitdirectory directory>
    
    <button class="input-field" style="background:var(--accent); font-weight:700; color:white; border:none;" id="btnSave">SPEICHERN</button>
    <button class="input-field" id="btnClose">Abbrechen</button>
</div>

<div class="modal" id="eventModal">
    <div class="modal-box">
        <h2 id="mTitle" style="font-size:32px; margin-bottom:15px; border-bottom:3px solid var(--accent); padding-bottom:10px;">Termin</h2>
        <p id="mDate" style="color:var(--accent); font-weight:700; font-size:22px; margin-bottom:15px;"></p>
        <div id="mDesc" style="font-size:18px; line-height:1.7; opacity:0.8; max-height:300px; overflow-y:auto;"></div>
        <button class="input-field" style="margin-top:30px; background:var(--accent); color:white; border:none;" onclick="document.getElementById('eventModal').classList.remove('active')">Schließen</button>
    </div>
</div>

<script>
/** 1. STATE & STORAGE **/
let state = {
    theme: 'oled', city: 'Düsseldorf', calUrl: '', anim: 'fade', split: 65,
    media: ['https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1500'],
    localMedia: [], events: [], date: new Date(), view: 'month'
};

const weatherIcons = {
    Clear: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="#ffd700" stroke="#ffae00" stroke-width="1"/><path d="M12 2v3m0 14v3M4 4l2 2m12 12 2 2M2 12h3m14 0h3M4 20l2-2m12-12 2 2" stroke="#ffae00" stroke-width="2" stroke-linecap="round"/></svg>',
    Clouds: '<svg viewBox="0 0 24 24"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-4-4.5-.8-3.7-4-6.5-7.5-6.5C7.2 3.5 4.5 6 4.1 9.1 1.8 9.6 0 11.6 0 14c0 2.8 2.2 5 5 5h12.5z" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1"/></svg>',
    Rain: '<svg viewBox="0 0 24 24"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-4-4.5-.8-3.7-4-6.5-7.5-6.5C7.2 3.5 4.5 6 4.1 9.1 1.8 9.6 0 11.6 0 14c0 2.8 2.2 5 5 5h12.5z" fill="#b0bec5"/><path d="M9 20l-1 2M12 21l-1 2M15 20l-1 2" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/></svg>',
    Thunderstorm: '<svg viewBox="0 0 24 24"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-4-4.5-.8-3.7-4-6.5-7.5-6.5C7.2 3.5 4.5 6 4.1 9.1 1.8 9.6 0 11.6 0 14c0 2.8 2.2 5 5 5h12.5z" fill="#78909c"/><path d="M13 16l-2 4h4l-2 4" fill="#ffd700"/></svg>'
};

/** 2. NAVIGATION & KALENDER **/
function changeMonth(delta) { state.date.setMonth(state.date.getMonth() + delta); renderCal(); }
function setView(v) { state.view = v; renderCal(); }

async function loadCal() {
    if(!state.calUrl) return;
    try {
        const proxy = "https://corsproxy.io/?" + encodeURIComponent(state.calUrl);
        const res = await fetch(proxy);
        const text = await res.text();
        const evs = []; const lines = text.split('\n'); let cur = null;
        lines.forEach(l => {
            if(l.startsWith('BEGIN:VEVENT')) cur = {};
            if(l.startsWith('SUMMARY:')) cur.title = l.slice(8).trim();
            if(l.startsWith('DESCRIPTION:')) cur.desc = l.slice(12).trim().replace(/\\n/g, '<br>');
            if(l.startsWith('DTSTART')) {
                const m = l.match(/\d{8}/);
                if(m) cur.date = `${m[0].slice(0,4)}-${m[0].slice(4,6)}-${m[0].slice(6,8)}`;
            }
            if(l.startsWith('END:VEVENT') && cur?.date) { evs.push(cur); cur = null; }
        });
        state.events = evs; renderCal();
    } catch(e) {}
}

function renderCal() {
    const grid = document.getElementById('calGrid');
    document.getElementById('monthTitle').textContent = state.date.toLocaleDateString('de-DE', {month:'long', year:'numeric'});
    grid.innerHTML = '';
    const first = new Date(state.date.getFullYear(), state.date.getMonth(), 1).getDay();
    const days = new Date(state.date.getFullYear(), state.date.getMonth() + 1, 0).getDate();
    for(let i=0; i<first; i++) grid.appendChild(Object.assign(document.createElement('div'), {className:'day-cell other'}));
    for(let d=1; d<=days; d++) {
        const cell = document.createElement('div'); cell.className = 'day-cell';
        const dStr = `${state.date.getFullYear()}-${String(state.date.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if(new Date().toISOString().split('T')[0] === dStr) cell.classList.add('today');
        cell.innerHTML = `<div class="day-num">${d}</div>`;
        state.events.filter(e => e.date === dStr).slice(0,2).forEach(e => {
            const bar = document.createElement('div'); bar.className = 'ev-bar'; bar.textContent = e.title;
            bar.title = e.title; 
            bar.onclick = (ev) => {
                ev.stopPropagation();
                document.getElementById('mTitle').textContent = e.title;
                document.getElementById('mDate').textContent = new Date(e.date).toLocaleDateString('de-DE', {weekday:'long', day:'numeric', month:'long'});
                document.getElementById('mDesc').innerHTML = e.desc || "-";
                document.getElementById('eventModal').classList.add('active');
            };
            cell.appendChild(bar);
        });
        grid.appendChild(cell);
    }
}

/** 3. WETTER & SLIDESHOW MIT VIDEO-SUPPORT **/
async function updateWeather() {
    try {
        const apiKey = '769c5861cd255a3982bafb1680abf194';
        const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${state.city}&appid=${apiKey}&units=metric&lang=de`);
        const data = await res.json();
        if(data.cod !== "200") return;
        document.getElementById('mainTemp').textContent = Math.round(data.list[0].main.temp) + '°';
        document.getElementById('wCity').textContent = data.city.name;
        document.getElementById('wIcon').innerHTML = weatherIcons[data.list[0].weather[0].main] || weatherIcons.Clouds;
        const strip = document.getElementById('forecastStrip'); strip.innerHTML = '';
        data.list.filter(i => i.dt_txt.includes("12:00:00")).slice(0,5).forEach(day => {
            const d = new Date(day.dt * 1000);
            strip.innerHTML += `<div class="fc-item"><div>${d.toLocaleDateString('de-DE',{weekday:'short'})}</div><div class="fc-icon">${weatherIcons[day.weather[0].main]||weatherIcons.Clouds}</div><div>${Math.round(day.main.temp)}°</div></div>`;
        });
    } catch(e) {}
}

let mIdx = 0;
let slideTimer;

function playMedia() {
    clearTimeout(slideTimer); 
    
    const hub = document.getElementById('mediaHub');
    const pool = [...state.media, ...state.localMedia];
    
    if(!pool.length) {
        slideTimer = setTimeout(playMedia, 15000);
        return;
    }
    
    const src = pool[mIdx % pool.length];
    const isVideo = src.includes('#video') || src.match(/\.(mp4|webm|ogg|mov)$/i);
    
    const wrap = document.createElement('div');
    wrap.className = `media-item anim-${state.anim}`; 
    
    let mediaEl;
    if (isVideo) {
        mediaEl = document.createElement('video');
        mediaEl.src = src.replace('#video', ''); 
        mediaEl.autoplay = true;
        mediaEl.playsInline = true;
        mediaEl.onended = () => { playMedia(); };
        mediaEl.onerror = () => { slideTimer = setTimeout(playMedia, 5000); };
    } else {
        mediaEl = document.createElement('img');
        mediaEl.src = src;
        slideTimer = setTimeout(playMedia, 15000);
    }
    
    mediaEl.className = 'media-content';
    wrap.appendChild(mediaEl);
    hub.appendChild(wrap);
    
    setTimeout(() => { 
        wrap.classList.add('active');
        if(hub.children.length > 2) hub.removeChild(hub.children[0]);
    }, 100);
    
    mIdx++;
}

/** 4. INIT & PERSISTENCE FIX **/
function init() {
    const saved = localStorage.getItem('hub_master_v16_audio');
    if(saved) {
        const p = JSON.parse(saved);
        state = {...state, ...p, date: new Date()};
    }
    
    document.documentElement.style.setProperty('--split', state.split + 'vw');
    document.getElementById('inSplit').value = state.split;
    document.getElementById('inCity').value = state.city;
    document.getElementById('inAnim').value = state.anim;
    document.getElementById('inTheme').value = state.theme;
    document.getElementById('inCal').value = state.calUrl;
    document.getElementById('inMedia').value = state.media.join('\n');

    document.getElementById('btnSet').onclick = () => document.getElementById('sidebar').classList.add('active');
    document.getElementById('btnClose').onclick = () => document.getElementById('sidebar').classList.remove('active');
    
    document.getElementById('btnSave').onclick = () => {
        state.split = document.getElementById('inSplit').value;
        state.city = document.getElementById('inCity').value;
        state.calUrl = document.getElementById('inCal').value;
        state.theme = document.getElementById('inTheme').value;
        state.anim = document.getElementById('inAnim').value;
        state.media = document.getElementById('inMedia').value.split('\n').filter(u=>u.trim());
        
        localStorage.setItem('hub_master_v16_audio', JSON.stringify({
            split: state.split, city: state.city, calUrl: state.calUrl, 
            theme: state.theme, anim: state.anim, media: state.media
        }));
        
        document.documentElement.style.setProperty('--split', state.split + 'vw');
        document.body.dataset.theme = state.theme;
        updateWeather();
        loadCal();
        document.getElementById('sidebar').classList.remove('active');
    };

    // Ordner nacheinander hinzufügen
    document.getElementById('inLocal').onchange = (e) => {
        const newFiles = Array.from(e.target.files)
            .filter(f => f.type.startsWith('image/') || f.type.startsWith('video/'))
            .map(f => {
                const isVid = f.type.startsWith('video/');
                return URL.createObjectURL(f) + (isVid ? '#video' : '');
            });
            
        // Neue Dateien an die Liste anhängen
        state.localMedia = [...state.localMedia, ...newFiles];
        
        mIdx = 0; 
        playMedia(); 
    };

    document.body.dataset.theme = state.theme;
    renderCal(); loadCal(); updateWeather();
    
    playMedia();
    
    setInterval(() => {
        const n = new Date();
        document.getElementById('clock').textContent = n.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
        document.getElementById('date').textContent = n.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    }, 1000);
}
init();
</script>
</body>
</html>

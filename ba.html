
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Kitchen Wall</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
    <style>
        :root {
            --bg-image: none;
            --bg-gradient: #000000;
            --tile-bg: rgba(0,0,0,0.85);
            --tile-opacity: 1;
            --tile-border-width: 0px;
            --tile-border-radius: 0px;
            --tile-shadow: none;
            --text-color: #ffffff;
            --accent: #E94545;
            --font-family: 'Segoe UI', system-ui, sans-serif;
            --backdrop: blur(0px);
            --tile-transform: none;
            --text-shadow: none;
            --icon-transform: none;
            --slide-anim: fade;
            --slide-duration: 1s;
            --slide-fit: cover;
            --tile-transform: none;
            --text-shadow: none;
            --icon-transform: none;
            --effect-strength: 2;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            transition: background-image 0.4s ease-out;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        * { -webkit-tap-highlight-color: transparent; }

        #dashboard { width: 100%; height: 100vh; position: relative; overflow: hidden; }

        .tile {
            position: absolute;
            touch-action: none;
            will-change: transform;
            background: var(--tile-bg);
            opacity: var(--tile-opacity);
            backdrop-filter: var(--backdrop);
            -webkit-backdrop-filter: var(--backdrop);
            border: var(--tile-border-width) solid rgba(255,255,255,0.1);
            border-radius: var(--tile-border-radius);
            box-shadow: var(--tile-shadow);
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.2s ease-out;
            transform: var(--tile-transform);
            min-width: 80px;
            min-height: 80px;
            z-index: 1;
            overflow: hidden;
        }

        .tile.dragging, .tile.resizing {
            box-shadow: 0 20px 50px rgba(0,0,0,0.4) !important;
            z-index: 100;
        }

        .tile-header {
            padding: 8px 14px;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: var(--text-shadow);
        }

        .tile-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            overflow-x: hidden;
            container-type: inline-size;
        }

        .resize-handle-edge {
            position: absolute;
            touch-action: none;
            z-index: 5;
        }
        .resize-handle-edge.top { top: 0; left: 20px; right: 20px; height: 8px; cursor: ns-resize; }
        .resize-handle-edge.bottom { bottom: 0; left: 20px; right: 20px; height: 8px; cursor: ns-resize; }
        .resize-handle-edge.left { left: 0; top: 20px; bottom: 20px; width: 8px; cursor: ew-resize; }
        .resize-handle-edge.right { right: 0; top: 20px; bottom: 20px; width: 8px; cursor: ew-resize; }
        .resize-handle-corner {
            position: absolute;
            width: 20px; height: 20px;
            touch-action: none;
            z-index: 6;
        }
        .resize-handle-corner.tl { top: 0; left: 0; cursor: nwse-resize; }
        .resize-handle-corner.tr { top: 0; right: 0; cursor: nesw-resize; }
        .resize-handle-corner.bl { bottom: 0; left: 0; cursor: nesw-resize; }
        .resize-handle-corner.br {
            bottom: 0; right: 0;
            cursor: nwse-resize;
            background: linear-gradient(135deg, transparent 60%, rgba(255,255,255,0.1) 60%);
            border-radius: 0 0 var(--tile-border-radius) 0;
            width: 32px; height: 32px;
        }

        /* Wetter im Kitchen‑Stil */
        body[data-theme="kitchen"] #weather {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            z-index: 10 !important;
        }
        body[data-theme="kitchen"] #weather .tile-header { display: none; }
        body[data-theme="kitchen"] #weather .tile-content {
            padding: 12px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            text-align: right;
        }
        body[data-theme="kitchen"] #weather .temp {
            font-size: clamp(2rem, 5cqw, 4rem);
            font-weight: 300;
            line-height: 1;
        }
        body[data-theme="kitchen"] #weather .details {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        /* Kalender im Kitchen‑Stil */
        body[data-theme="kitchen"] #calendar {
            background: #000 !important;
            border: none !important;
            box-shadow: none !important;
        }
        body[data-theme="kitchen"] #calendar .tile-header { display: none; }
        body[data-theme="kitchen"] #calendar .tile-content {
            padding: 12px 16px;
        }
        /* Kalender‑Navigation wird ausgeblendet (entspricht dem Bild) */
        body[data-theme="kitchen"] #calendar .calendar-nav { display: none; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
            font-size: clamp(0.8rem, 1.6cqw, 1.1rem);
        }
        .day-header {
            font-size: clamp(0.85rem, 1.5cqw, 1.2rem);
            font-weight: 400;
            opacity: 1;
            color: #fff;
            padding: 4px 0;
            letter-spacing: 0.05em;
        }
        .day {
            padding: clamp(6px, 1.5cqw, 12px) 6px;
            min-height: clamp(50px, 7cqw, 90px);
            text-align: center;
            font-size: clamp(1.2rem, 2.2cqw, 2rem);
            font-weight: 300;
            color: #fff;
            border: none;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 2px;
            cursor: default;
        }
        .day .day-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.4em;
            height: 1.4em;
            border-radius: 50%;
            font-weight: 300;
        }
        .day.today .day-number {
            background: #E94545;
            color: #fff;
            font-weight: 400;
        }
        .day.other-month { opacity: 0.3; }
        .event-line { display: none; }
        .day-events {
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100%;
            margin-top: 2px;
        }
        .day-event {
            font-size: clamp(0.55rem, 0.8cqw, 0.75rem);
            font-weight: 400;
            padding: 1px 4px;
            border-radius: 2px;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
            line-height: 1.3;
        }
        .day-event.bullet {
            background: transparent;
            padding-left: 8px;
            position: relative;
        }
        .day-event.bullet::before {
            content: '●';
            position: absolute;
            left: 0;
            font-size: 0.7em;
        }

        /* Slideshow im Kitchen‑Stil */
        body[data-theme="kitchen"] #slideshow {
            background: #000 !important;
            border: none !important;
            box-shadow: none !important;
        }
        body[data-theme="kitchen"] #slideshow .tile-header { display: none; }
        body[data-theme="kitchen"] #slideshow .tile-content { padding: 0; }
        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 0;
            border-radius: 0;
        }
        .slide-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            will-change: transform, opacity;
            transition: opacity var(--slide-duration) ease-out, transform var(--slide-duration) ease-out;
        }
        .slide-img.active { opacity: 1; }

        .slideshow-controls {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 10;
        }
        .slideshow-controls button {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
        }
        .upload-area {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 6px;
            z-index: 5;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .upload-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        input[type="file"] { display: none; }

        .event-details {
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body data-theme="kitchen">

<div id="dashboard"></div>

<script>
    (function() {
        // Nur die drei Kacheln: slideshow, calendar, weather – exakt wie im Bild
        const layout = [
            { id: 'slideshow', x: 0, y: 0, w: window.innerWidth * 0.38, h: window.innerHeight },
            { id: 'calendar',  x: window.innerWidth * 0.38, y: 0, w: window.innerWidth * 0.62, h: window.innerHeight },
            { id: 'weather',   x: 0, y: window.innerHeight * 0.78, w: window.innerWidth * 0.38, h: window.innerHeight * 0.22 }
        ];

        function createTiles() {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            layout.forEach(item => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = item.id;
                tile.style.left = item.x + 'px';
                tile.style.top = item.y + 'px';
                tile.style.width = item.w + 'px';
                tile.style.height = item.h + 'px';
                if (item.id === 'weather' || item.id === 'calendar' || item.id === 'slideshow') {
                    tile.innerHTML = `<div class="tile-header"></div><div class="tile-content"></div>`;
                }
                container.appendChild(tile);
                fillTileContent(item.id, tile);
            });
            initInteract();
        }

        function fillTileContent(id, tile) {
            const content = tile.querySelector('.tile-content');
            switch(id) {
                case 'weather':
                    content.innerHTML = `
                        <div class="weather-now">
                            <div class="temp" id="current-temp">--°</div>
                            <div class="details" id="current-details"></div>
                            <div id="current-icon" style="font-size:2rem;"></div>
                        </div>`;
                    break;
                case 'calendar':
                    content.innerHTML = `
                        <div class="calendar-nav" style="display:none;">
                            <button id="cal-prev" class="cal-nav-btn"><i class="fas fa-chevron-left"></i></button>
                            <span id="cal-title">Monat</span>
                            <button id="cal-today" class="cal-today-btn">Heute</button>
                            <button id="cal-next" class="cal-nav-btn"><i class="fas fa-chevron-right"></i></button>
                        </div>
                        <div class="calendar-grid" id="calendar-grid"></div>
                        <div class="event-details" id="event-details"></div>`;
                    break;
                case 'slideshow':
                    content.innerHTML = `
                        <div class="slideshow-container slide-anim-fade" id="slideshow-container">
                            <div class="slideshow-controls">
                                <button id="prev-slide"><i class="fas fa-chevron-left"></i></button>
                                <button id="play-pause"><i class="fas fa-pause"></i></button>
                                <button id="next-slide"><i class="fas fa-chevron-right"></i></button>
                                <button id="delete-slide"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="upload-area">
                            <label for="file-upload" class="upload-btn"><i class="fas fa-upload"></i> Hochladen</label>
                            <input type="file" id="file-upload" multiple accept="image/*">
                            <span id="image-count">0 Bilder</span>
                        </div>`;
                    break;
            }
        }

        // Interaktivität (Verschieben / Vergrößern)
        function initInteract() {
            interact('.tile').draggable({
                allowFrom: '.tile-header',
                ignoreFrom: '.resize-handle',
                inertia: false,
                modifiers: [interact.modifiers.restrict({ restriction: 'parent', endOnly: true })],
                listeners: {
                    start(event) { event.target.classList.add('dragging'); },
                    move(event) {
                        const target = event.target;
                        const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                        const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);
                    },
                    end(event) {
                        const target = event.target;
                        target.classList.remove('dragging');
                        const x = parseFloat(target.getAttribute('data-x')) || 0;
                        const y = parseFloat(target.getAttribute('data-y')) || 0;
                        target.style.transform = '';
                        target.style.left = (parseFloat(target.style.left) + x) + 'px';
                        target.style.top = (parseFloat(target.style.top) + y) + 'px';
                        target.setAttribute('data-x', 0);
                        target.setAttribute('data-y', 0);
                    }
                }
            }).resizable({
                edges: { top: true, bottom: true, left: true, right: true },
                inertia: false,
                modifiers: [
                    interact.modifiers.restrict({ restriction: 'parent', endOnly: true }),
                    interact.modifiers.restrictSize({ min: { width: 80, height: 80 } })
                ],
                listeners: {
                    start(event) { event.target.classList.add('resizing'); },
                    move(event) {
                        const target = event.target;
                        let x = (parseFloat(target.getAttribute('data-x')) || 0);
                        let y = (parseFloat(target.getAttribute('data-y')) || 0);
                        target.style.width = event.rect.width + 'px';
                        target.style.height = event.rect.height + 'px';
                        x += event.deltaRect.left;
                        y += event.deltaRect.top;
                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);
                    },
                    end(event) {
                        event.target.classList.remove('resizing');
                        const target = event.target;
                        const x = parseFloat(target.getAttribute('data-x')) || 0;
                        const y = parseFloat(target.getAttribute('data-y')) || 0;
                        target.style.transform = '';
                        target.style.left = (parseFloat(target.style.left) + x) + 'px';
                        target.style.top = (parseFloat(target.style.top) + y) + 'px';
                        target.setAttribute('data-x', 0);
                        target.setAttribute('data-y', 0);
                    }
                }
            });
        }

        // ---------- Wetter ----------
        async function fetchWeather(lat = 51.2277, lon = 6.7735) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=weather_code,temperature_2m,relative_humidity_2m,wind_speed_10m&hourly=weather_code,temperature_2m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`);
                return await res.json();
            } catch(e) { console.error(e); return null; }
        }

        function weatherEmoji(code) {
            if(code === 0) return '☀️';
            if(code === 1) return '🌤️';
            if(code === 2) return '⛅';
            if(code === 3) return '☁️';
            if(code === 45 || code === 48) return '🌫️';
            if(code >= 51 && code <= 57) return '🌦️';
            if(code >= 61 && code <= 67) return '🌧️';
            if(code >= 71 && code <= 77) return '🌨️';
            if(code >= 80 && code <= 82) return '🌧️';
            if(code >= 85 && code <= 86) return '🌨️';
            if(code >= 95) return '⛈️';
            return '🌥️';
        }

        function weatherDesc(code) {
            if(code === 0) return 'Sonnig';
            if(code === 1) return 'Überwiegend sonnig';
            if(code === 2) return 'Teilweise bewölkt';
            if(code === 3) return 'Bedeckt';
            if(code === 45 || code === 48) return 'Nebel';
            if(code >= 51 && code <= 57) return 'Nieselregen';
            if(code >= 61 && code <= 67) return 'Regen';
            if(code >= 71 && code <= 77) return 'Schnee';
            if(code >= 80 && code <= 82) return 'Regenschauer';
            if(code >= 85 && code <= 86) return 'Schneeschauer';
            if(code >= 95) return 'Gewitter';
            return 'Bewölkt';
        }

        async function updateWeather() {
            const data = await fetchWeather();
            if(!data) return;
            document.getElementById('current-temp').textContent = Math.round(data.current.temperature_2m) + '°';
            document.getElementById('current-details').innerHTML = `${weatherDesc(data.current.weather_code)}<br>💧 ${data.current.relative_humidity_2m}% · 💨 ${Math.round(data.current.wind_speed_10m)} km/h`;
            document.getElementById('current-icon').textContent = weatherEmoji(data.current.weather_code);
        }

        // ---------- Kalender (Monatsansicht ohne Navigation) ----------
        let calendarEvents = [];
        function assignEventColor(index) {
            const palette = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63','#00bcd4','#ff5722'];
            return palette[index % palette.length];
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            if(!grid) return;
            grid.innerHTML = '';
            ['So','Mo','Di','Mi','Do','Fr','Sa'].forEach(d => {
                const div = document.createElement('div');
                div.className = 'day-header';
                div.textContent = d;
                grid.appendChild(div);
            });

            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month+1, 0).getDate();
            const offset = firstDay; // Sonntag = 0
            for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));

            for(let d=1; d<=daysInMonth; d++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const eventsOnDay = calendarEvents.filter(e => e.start.startsWith(dateStr));
                dayDiv.innerHTML = '';
                const numSpan = document.createElement('span');
                numSpan.className = 'day-number';
                numSpan.textContent = d;
                dayDiv.appendChild(numSpan);

                if(eventsOnDay.length > 0) {
                    const eventsContainer = document.createElement('div');
                    eventsContainer.className = 'day-events';
                    eventsOnDay.slice(0, 4).forEach((ev, idx) => {
                        const evDiv = document.createElement('div');
                        evDiv.className = 'day-event bullet';
                        evDiv.style.color = ev.color || assignEventColor(idx);
                        evDiv.textContent = ev.summary;
                        evDiv.title = ev.summary;
                        eventsContainer.appendChild(evDiv);
                    });
                    dayDiv.appendChild(eventsContainer);
                }

                if(d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                    dayDiv.classList.add('today');
                }
                grid.appendChild(dayDiv);
            }
        }

        // ---------- Slideshow ----------
        let slides = [];
        let currentSlide = 0;
        let slideInterval = 10;
        let slideAnimDuration = 1;
        let slideshowPaused = false;
        let slideshowTimer;

        function loadSlides() {
            try {
                const saved = localStorage.getItem('slideshowImages');
                if (saved) {
                    slides = JSON.parse(saved);
                    currentSlide = parseInt(localStorage.getItem('slideshowIndex')) || 0;
                    if (currentSlide >= slides.length) currentSlide = 0;
                    updateSlideDisplay();
                    document.getElementById('image-count').textContent = slides.length + ' Bilder';
                }
            } catch(e) {}
        }

        function updateSlideDisplay() {
            const container = document.getElementById('slideshow-container');
            if(!container) return;
            const existingImgs = container.querySelectorAll('.slide-img');
            existingImgs.forEach(img => img.remove());
            if (slides.length > 0 && slides[currentSlide]) {
                const newImg = document.createElement('img');
                newImg.className = 'slide-img active';
                newImg.src = slides[currentSlide];
                container.insertBefore(newImg, container.firstChild);
            }
        }

        function nextSlide() {
            if(slides.length === 0) return;
            currentSlide = (currentSlide + 1) % slides.length;
            updateSlideDisplay();
            localStorage.setItem('slideshowIndex', currentSlide);
        }

        function prevSlide() {
            if(slides.length === 0) return;
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            updateSlideDisplay();
            localStorage.setItem('slideshowIndex', currentSlide);
        }

        function startSlideshow() {
            clearInterval(slideshowTimer);
            if(slides.length === 0 || slideshowPaused) return;
            slideshowTimer = setInterval(nextSlide, slideInterval * 1000);
        }

        document.addEventListener('change', function(e) {
            if(e.target.id === 'file-upload') {
                Array.from(e.target.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = ev => {
                        slides.push(ev.target.result);
                        if(slides.length === 1) currentSlide = 0;
                        updateSlideDisplay();
                        document.getElementById('image-count').textContent = slides.length + ' Bilder';
                        localStorage.setItem('slideshowImages', JSON.stringify(slides));
                        startSlideshow();
                    };
                    reader.readAsDataURL(file);
                });
                e.target.value = '';
            }
        });

        document.addEventListener('click', function(e) {
            if(e.target.closest('#next-slide')) { nextSlide(); startSlideshow(); }
            else if(e.target.closest('#prev-slide')) { prevSlide(); startSlideshow(); }
            else if(e.target.closest('#play-pause')) {
                slideshowPaused = !slideshowPaused;
                const btn = e.target.closest('#play-pause');
                btn.innerHTML = slideshowPaused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
                if (slideshowPaused) clearInterval(slideshowTimer);
                else startSlideshow();
            }
            else if(e.target.closest('#delete-slide')) {
                if(!slides.length) return;
                slides.splice(currentSlide, 1);
                if(currentSlide >= slides.length) currentSlide = Math.max(0, slides.length-1);
                updateSlideDisplay();
                document.getElementById('image-count').textContent = slides.length + ' Bilder';
                localStorage.setItem('slideshowImages', JSON.stringify(slides));
                startSlideshow();
            }

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kitchen Wall Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #E94545;
            --slide-duration: 1s;
            --gradient-position: 0.38;
            --gradient-width: 0.05;
            --gradient-opacity: 0.8;
            --tile-opacity: 0.85;
            --weather-height: 42vh;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh; overflow: hidden;
        }
        #dashboard { width:100%; height:100vh; position:relative; overflow:hidden; }
        #gradient-overlay {
            position: absolute;
            top:0;
            left: calc(var(--gradient-position) * 100% - var(--gradient-width) * 100%);
            width: calc(var(--gradient-width) * 100%);
            height:100%;
            background: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,var(--gradient-opacity)) 60%, rgba(0,0,0,1) 100%);
            z-index:5; pointer-events:none;
            transition: left 0.2s, width 0.2s;
        }
        .tile {
            position: absolute;
            background: rgba(0,0,0,var(--tile-opacity));
            border:none; overflow:hidden;
            touch-action: none; display: flex; flex-direction: column;
        }
        .tile-content { flex:1; overflow-y:auto; }
        #weather { z-index:10; height: var(--weather-height); }
        #weather .tile-content {
            padding:12px; text-shadow:0 1px 4px rgba(0,0,0,0.7);
            display:flex; flex-direction:column; justify-content:flex-end; align-items:flex-end; text-align:right;
        }
        .weather-now .temp { font-size: clamp(2rem, 5cqw, 4rem); font-weight:300; line-height:1; }
        .weather-now .details { font-size:0.8rem; opacity:0.9; }
        .forecast-row { display:flex; gap:6px; margin-top:8px; justify-content:flex-end; flex-wrap:wrap; }
        .forecast-day {
            background: rgba(255,255,255,0.15); border-radius:12px; padding:4px 6px;
            text-align:center; font-size:0.7rem; min-width:48px;
        }
        .forecast-day.active { background: var(--accent); color:white; }
        .location-bar {
            position:absolute; bottom:2px; left:12px; right:12px; display:flex; gap:4px;
            align-items:center; font-size:0.7rem; opacity:0.8;
        }
        .location-bar input {
            background: rgba(255,255,255,0.15); border:none; color:white; padding:2px 6px;
            border-radius:4px; width:100px; font-size:0.7rem;
        }
        .location-bar button { background: var(--accent); border:none; color:white; border-radius:4px; padding:2px 6px; cursor:pointer; font-size:0.7rem; }
        #calendar { background:#000; }
        #calendar .tile-content { padding:12px 16px 8px; display:flex; flex-direction:column; height:100%; }
        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; text-align:center; flex:1; }
        .day-header { font-size:clamp(0.85rem, 1.5cqw, 1.2rem); font-weight:400; color:#fff; padding:4px 0; letter-spacing:0.05em; }
        .day {
            position:relative; padding:clamp(4px,1cqw,10px) 4px; font-weight:300; color:#fff;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
        }
        .day .day-number { display:inline-flex; align-items:center; justify-content:center; width:1.4em; height:1.4em; border-radius:50%; font-weight:300; }
        .day.today .day-number { background: var(--accent); color:#fff; font-weight:400; }
        .event-line { position:absolute; bottom:2px; left:10%; width:80%; height:3px; border-radius:2px; }
        .month-slider-container { display:flex; align-items:center; gap:8px; margin-top:4px; padding:0 16px; }
        .month-slider-container input[type=range] { flex:1; background:rgba(255,255,255,0.2); height:4px; border-radius:2px; -webkit-appearance:none; }
        .month-slider-container input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; background:var(--accent); border-radius:50%; cursor:pointer; }
        .month-label { font-size:0.8rem; white-space:nowrap; }
        #slideshow { background:#000; }
        #slideshow .tile-content { padding:0; }
        .slideshow-container { position:relative; width:100%; height:100%; background:#000; overflow:hidden; }
        .slide-img {
            position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover;
            opacity:0; transition: opacity var(--slide-duration) ease-out, transform var(--slide-duration) ease-out;
        }
        .slide-img.active { opacity:1; }
        .slide-anim-fade .slide-img { transform:none; }
        .slide-anim-slide-left .slide-img { transform:translateX(100%); opacity:1; }
        .slide-anim-slide-left .slide-img.active { transform:translateX(0); }
        .slide-anim-slide-up .slide-img { transform:translateY(100%); opacity:1; }
        .slide-anim-slide-up .slide-img.active { transform:translateY(0); }
        .slide-anim-zoom .slide-img { transform:scale(0.7); opacity:0; }
        .slide-anim-zoom .slide-img.active { transform:scale(1); opacity:1; }
        .slide-anim-rotate .slide-img { transform:rotate(-15deg) scale(0.8); opacity:0; }
        .slide-anim-rotate .slide-img.active { transform:rotate(0) scale(1); opacity:1; }
        .slide-anim-flip .slide-img { transform:perspective(800px) rotateY(90deg); opacity:0; }
        .slide-anim-flip .slide-img.active { transform:perspective(800px) rotateY(0); opacity:1; }
        .slide-anim-blur .slide-img { filter:blur(20px); opacity:0; }
        .slide-anim-blur .slide-img.active { filter:blur(0); opacity:1; }
        .slide-anim-ken-burns .slide-img.active { animation: kenBurns 8s infinite alternate; }
        @keyframes kenBurns { from { transform:scale(1); } to { transform:scale(1.1); } }
        .slide-anim-split .slide-img { clip-path:inset(50% 0 50% 0); opacity:0; }
        .slide-anim-split .slide-img.active { clip-path:inset(0 0 0 0); opacity:1; }
        .slide-anim-circle-reveal .slide-img { clip-path:circle(0% at 50% 50%); opacity:0; }
        .slide-anim-circle-reveal .slide-img.active { clip-path:circle(100% at 50% 50%); opacity:1; }
        .slide-anim-slide-diagonal .slide-img { transform:translate(100%,100%) rotate(10deg); opacity:0; }
        .slide-anim-slide-diagonal .slide-img.active { transform:translate(0,0) rotate(0); opacity:1; }
        .slideshow-controls {
            position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
            display:flex; gap:10px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:20px; z-index:10;
        }
        .slideshow-controls button { background:transparent; border:none; color:white; font-size:1.2rem; cursor:pointer; padding:4px 8px; }
        #settings-toggle {
            position: fixed;
            top: 10px; right: 10px; z-index: 200;
            background: rgba(0,0,0,0.7); color: white;
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.2rem;
            backdrop-filter: blur(4px); box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2); user-select: none;
        }
        #settings-toggle:hover { background: rgba(255,255,255,0.2); }
        .panel-btn {
            position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); border-radius:50%;
            width:32px; height:32px; display:none; align-items:center; justify-content:center;
            cursor:pointer; color:white; z-index:15; font-size:0.9rem;
        }
        .gradient-btn { right:50px; } .cal-settings-btn { right:90px; } .tile-opacity-btn { right:130px; }
        .panel {
            position:absolute; background:rgba(20,20,30,0.95); backdrop-filter:blur(15px);
            border-radius:12px; padding:12px; z-index:100; color:white; display:none;
            font-size:0.8rem; box-shadow:0 8px 20px rgba(0,0,0,0.6);
        }
        .panel.open { display:block; }
        .panel label { display:block; margin-bottom:4px; font-weight:600; }
        .panel select, .panel input { width:100%; background:rgba(255,255,255,0.15); color:white; border:none; padding:4px; border-radius:4px; }
        .panel button { margin-top:4px; background:var(--accent); color:white; border:none; padding:4px 8px; cursor:pointer; border-radius:4px; }
        .upload-area {
            position:absolute; bottom:8px; right:8px; background:rgba(0,0,0,0.5); padding:4px 8px;
            border-radius:6px; z-index:5; display:flex; gap:8px; align-items:center;
        }
        .upload-btn { background:var(--accent); color:white; border:none; border-radius:12px; padding:4px 10px; cursor:pointer; font-size:0.8rem; }
        input[type=file] { display:none; }
        #weather-height-container {
            position:absolute; bottom:4px; left:4px; z-index:20; display:none; gap:4px; align-items:center;
        }
    </style>
</head>
<body>
<div id="dashboard"><div id="gradient-overlay"></div></div>
<div id="settings-toggle">⚙️</div>

<!-- Panels -->
<div class="panel" id="anim-panel" style="top:50px; right:10px; width:200px;">
    <label>Animation</label>
    <select id="anim-select">
        <option value="fade">Überblenden</option><option value="slide-left">Seitlich schieben</option>
        <option value="slide-up">Nach oben schieben</option><option value="zoom">Zoom</option>
        <option value="rotate">Drehen</option><option value="flip">Flip 3D</option>
        <option value="blur">Unschärfe</option><option value="ken-burns">Ken Burns</option>
        <option value="split">Vertikal teilen</option><option value="circle-reveal">Kreis öffnen</option>
        <option value="slide-diagonal">Diagonal schieben</option>
    </select>
</div>
<div class="panel" id="gradient-panel" style="top:50px; right:50px; width:240px;">
    <label>Verlauf Position <span id="gradient-pos-value">38%</span></label>
    <input type="range" id="gradient-position-slider" min="0" max="1" step="0.01" value="0.38">
    <label>Verlauf Breite</label>
    <input type="range" id="gradient-width-slider" min="0" max="0.3" step="0.01" value="0.05">
    <label>Verlauf Stärke</label>
    <input type="range" id="gradient-opacity-slider" min="0" max="1" step="0.1" value="0.8">
</div>
<div class="panel" id="tile-opacity-panel" style="top:50px; right:130px; width:200px;">
    <label>Kachel-Transparenz <span id="tile-opacity-value">85%</span></label>
    <input type="range" id="tile-opacity-slider" min="0" max="1" step="0.05" value="0.85">
</div>
<div class="panel" id="cal-panel" style="top:50px; right:90px; width:260px;">
    <label>iCal URL</label>
    <input type="text" id="ical-url" placeholder="https://calendar.google.com/.../basic.ics">
    <button id="load-ical">Kalender laden</button>
    <div id="ical-info" style="font-size:0.7rem; margin-top:4px; color:#a5f3fc;"></div>
    <div id="ical-error" style="color:#f88; font-size:0.7rem; margin-top:4px;"></div>
</div>
<div id="weather-height-container">
    <span style="color:white; font-size:0.7rem;">↕️</span>
    <input type="range" id="weather-height-slider" min="20" max="60" value="42" style="width:80px;">
</div>

<script>
(function() {
    const W = window.innerWidth, H = window.innerHeight;
    const layout = {
        slideshow: { x:0, y:0, w: W*0.38, h: H },
        calendar:  { x:W*0.38, y:0, w: W*0.62, h: H },
        weather:   { x:0, y: H*0.58, w: W*0.38, h: H*0.42 }
    };

    let settingsVisible = false;
    const toggleBtn = document.getElementById('settings-toggle');

    function showSettings() {
        settingsVisible = true;
        toggleBtn.innerHTML = '✕';
        document.querySelectorAll('.panel-btn').forEach(b => b.style.display = 'flex');
        document.getElementById('weather-height-container').style.display = 'flex';
    }
    function hideSettings() {
        settingsVisible = false;
        toggleBtn.innerHTML = '⚙️';
        document.querySelectorAll('.panel-btn').forEach(b => b.style.display = 'none');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
        document.getElementById('weather-height-container').style.display = 'none';
    }

    toggleBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        settingsVisible ? hideSettings() : showSettings();
    });

    document.addEventListener('click', function(e) {
        if (!settingsVisible) return;
        if (!e.target.closest('#settings-toggle') && !e.target.closest('.panel') && !e.target.closest('.panel-btn') && !e.target.closest('#weather-height-container')) {
            hideSettings();
        }
    });

    function createTiles() {
        const dash = document.getElementById('dashboard');
        dash.querySelectorAll('.tile').forEach(t => t.remove());
        for (const [id, dim] of Object.entries(layout)) {
            const tile = document.createElement('div');
            tile.className = 'tile'; tile.id = id;
            tile.style.left = dim.x + 'px'; tile.style.top = dim.y + 'px';
            tile.style.width = dim.w + 'px'; tile.style.height = dim.h + 'px';
            tile.innerHTML = `<div class="tile-content"></div>`;
            dash.appendChild(tile);
            fillTile(id, tile);
        }
        initInteract();
    }

    function fillTile(id, tile) {
        const content = tile.querySelector('.tile-content');
        if (id === 'weather') {
            content.innerHTML = `
                <div class="weather-now">
                    <div class="temp" id="current-temp">--°</div>
                    <div class="details" id="current-details">Wetter wird geladen…</div>
                    <div id="current-icon" style="font-size:2rem;">🌥️</div>
                </div>
                <div class="forecast-row" id="forecast-container">
                    <div class="forecast-day">Mo<br>--°</div>
                </div>
                <div class="location-bar">
                    <input type="text" id="location-search" placeholder="Stadt">
                    <button id="location-search-btn">🔍</button>
                    <button id="gps-btn">📍</button>
                    <span id="current-location-name">Düsseldorf</span>
                </div>`;
        } else if (id === 'calendar') {
            content.innerHTML = `
                <div class="calendar-grid" id="calendar-grid"></div>
                <div class="month-slider-container">
                    <span class="month-label" id="month-label"></span>
                    <input type="range" id="month-slider" min="0" max="11" value="${new Date().getMonth()}">
                </div>`;
        } else if (id === 'slideshow') {
            content.innerHTML = `
                <div class="slideshow-container slide-anim-fade" id="slideshow-container">
                    <div class="panel-btn anim-btn" id="anim-btn"><i class="fas fa-film"></i></div>
                    <div class="panel-btn gradient-btn" id="gradient-btn"><i class="fas fa-adjust"></i></div>
                    <div class="panel-btn cal-settings-btn" id="cal-settings-btn"><i class="fas fa-cog"></i></div>
                    <div class="panel-btn tile-opacity-btn" id="tile-opacity-btn"><i class="fas fa-eye"></i></div>
                    <div class="slideshow-controls">
                        <button id="prev-slide"><i class="fas fa-chevron-left"></i></button>
                        <button id="play-pause"><i class="fas fa-pause"></i></button>
                        <button id="next-slide"><i class="fas fa-chevron-right"></i></button>
                        <button id="delete-slide"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
                <div class="upload-area">
                    <label for="file-upload" class="upload-btn"><i class="fas fa-upload"></i></label>
                    <input type="file" id="file-upload" multiple accept="image/*">
                    <span id="image-count">0 Bilder</span>
                </div>`;
        }
    }

    function initInteract() {
        interact('.tile').draggable({
            allowFrom: '.tile-content',
            modifiers: [interact.modifiers.restrict({ restriction: 'parent', endOnly: true })],
            listeners: {
                move(e) {
                    const t = e.target;
                    const x = (parseFloat(t.getAttribute('data-x'))||0) + e.dx;
                    const y = (parseFloat(t.getAttribute('data-y'))||0) + e.dy;
                    t.style.transform = `translate(${x}px,${y}px)`;
                    t.setAttribute('data-x', x); t.setAttribute('data-y', y);
                },
                end(e) {
                    const t = e.target;
                    const x = parseFloat(t.getAttribute('data-x'))||0;
                    const y = parseFloat(t.getAttribute('data-y'))||0;
                    t.style.transform = '';
                    t.style.left = (parseFloat(t.style.left)+x)+'px';
                    t.style.top = (parseFloat(t.style.top)+y)+'px';
                    t.setAttribute('data-x',0); t.setAttribute('data-y',0);
                    saveLayout();
                }
            }
        }).resizable({
            edges: { top:true, bottom:true, left:true, right:true },
            modifiers: [
                interact.modifiers.restrict({ restriction: 'parent', endOnly: true }),
                interact.modifiers.restrictSize({ min: { width:80, height:80 } })
            ],
            listeners: {
                move(e) {
                    const t = e.target;
                    let x = (parseFloat(t.getAttribute('data-x'))||0);
                    let y = (parseFloat(t.getAttribute('data-y'))||0);
                    t.style.width = e.rect.width + 'px';
                    t.style.height = e.rect.height + 'px';
                    x += e.deltaRect.left; y += e.deltaRect.top;
                    t.style.transform = `translate(${x}px,${y}px)`;
                    t.setAttribute('data-x', x); t.setAttribute('data-y', y);
                },
                end(e) {
                    const t = e.target;
                    const x = parseFloat(t.getAttribute('data-x'))||0;
                    const y = parseFloat(t.getAttribute('data-y'))||0;
                    t.style.transform = '';
                    t.style.left = (parseFloat(t.style.left)+x)+'px';
                    t.style.top = (parseFloat(t.style.top)+y)+'px';
                    t.setAttribute('data-x',0); t.setAttribute('data-y',0);
                    saveLayout();
                }
            }
        });
    }

    function saveLayout() {
        const tiles = {};
        document.querySelectorAll('.tile').forEach(t => {
            tiles[t.id] = {
                x: parseFloat(t.style.left)||0,
                y: parseFloat(t.style.top)||0,
                w: parseFloat(t.style.width)||100,
                h: parseFloat(t.style.height)||100
            };
        });
        localStorage.setItem('kitchenLayout', JSON.stringify(tiles));
    }

    // --- WETTER ---
    let currentLat = 51.2277, currentLon = 6.7735, currentLocName = 'Düsseldorf';
    async function fetchWeather() {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&current=weather_code,temperature_2m,relative_humidity_2m,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`);
            return await res.json();
        } catch(e) { return null; }
    }
    function wEmoji(c) {
        const m = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌦️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'🌨️',80:'🌧️',81:'🌧️',82:'🌧️',85:'🌨️',86:'🌨️',95:'⛈️'};
        return m[c] || '🌥️';
    }
    function wDesc(c) {
        if(c===0) return 'Sonnig'; if(c===1) return 'Heiter'; if(c===2) return 'Wolkig';
        if(c===3) return 'Bedeckt'; if(c>=45&&c<=48) return 'Nebel'; if(c>=51) return 'Niesel';
        if(c>=61) return 'Regen'; if(c>=71) return 'Schnee'; if(c>=95) return 'Gewitter';
        return 'Bewölkt';
    }
    async function updateWeather() {
        const data = await fetchWeather();
        if(!data) {
            document.getElementById('current-temp').textContent = '--°';
            document.getElementById('current-details').textContent = 'Keine Verbindung';
            document.getElementById('forecast-container').innerHTML = '<div class="forecast-day">--</div>';
            return;
        }
        document.getElementById('current-temp').textContent = Math.round(data.current.temperature_2m) + '°';
        document.getElementById('current-details').innerHTML = `${wDesc(data.current.weather_code)}<br>💧 ${data.current.relative_humidity_2m}% · 💨 ${Math.round(data.current.wind_speed_10m)} km/h`;
        document.getElementById('current-icon').textContent = wEmoji(data.current.weather_code);
        document.getElementById('current-location-name').textContent = currentLocName;
        const fc = document.getElementById('forecast-container');
        if(fc) {
            fc.innerHTML = '';
            data.daily.time.forEach((day,i) => {
                const d = new Date(day);
                const div = document.createElement('div');
                div.className = 'forecast-day' + (i===0?' active':'');
                div.innerHTML = `<div>${d.toLocaleDateString('de-DE',{weekday:'short'})}</div><div>${wEmoji(data.daily.weather_code[i])}</div><div>${Math.round(data.daily.temperature_2m_max[i])}°/${Math.round(data.daily.temperature_2m_min[i])}°</div>`;
                fc.appendChild(div);
            });
        }
    }
    async function searchLocation(query) {
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=3&language=de`);
        const data = await res.json();
        return data.results || [];
    }
    async function setLocation(lat, lon, name) {
        currentLat = lat; currentLon = lon; currentLocName = name;
        localStorage.setItem('weatherLoc', JSON.stringify({lat,lon,name}));
        await updateWeather();
    }

    // --- KALENDER ---
    let calendarEvents = [];
    const palette = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63','#00bcd4','#ff5722'];
    function assignColor(i) { return palette[i % palette.length]; }
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        if(!grid) return;
        grid.innerHTML = '';
        ['So','Mo','Di','Mi','Do','Fr','Sa'].forEach(d => {
            const div = document.createElement('div');
            div.className = 'day-header'; div.textContent = d;
            grid.appendChild(div);
        });
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
        for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=daysInMonth; d++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day';
            const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const eventsOnDay = calendarEvents.filter(e => e.start.startsWith(dateStr));
            dayDiv.innerHTML = `<span class="day-number">${d}</span>`;
            eventsOnDay.slice(0,3).forEach((ev, idx) => {
                const line = document.createElement('div');
                line.className = 'event-line';
                line.style.backgroundColor = ev.color || assignColor(idx);
                line.style.bottom = (2 + idx*5) + 'px';
                dayDiv.appendChild(line);
            });
            const today = new Date();
            if(d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
                dayDiv.classList.add('today');
            }
            grid.appendChild(dayDiv);
        }
        document.getElementById('month-label').textContent = new Date(currentYear, currentMonth).toLocaleDateString('de-DE', {month:'long', year:'numeric'});
        document.getElementById('month-slider').value = currentMonth;
    }

    const CORS_PROXIES = [
        'https://corsproxy.io/?',
        'https://api.allorigins.win/raw?url=',
        'https://api.codetabs.com/v1/proxy?quest='
    ];
    async function fetchICSWithFallback(url) {
        try { const res = await fetch(url); if (res.ok) return await res.text(); } catch(e) {}
        for (const proxy of CORS_PROXIES) {
            try {
                const proxyUrl = proxy + encodeURIComponent(url);
                const res = await fetch(proxyUrl);
                if (res.ok) {
                    const text = await res.text();
                    if (text.includes('BEGIN:VCALENDAR')) return text;
                }
            } catch(e) {}
        }
        throw new Error('Alle Lade-Versuche fehlgeschlagen.');
    }

    async function loadCalendar(url) {
        if(!url) return;
        const infoEl = document.getElementById('ical-info');
        const errEl = document.getElementById('ical-error');
        infoEl.textContent = ''; errEl.textContent = '';
        url = url.replace(/^webcal:\/\//i, 'https://');
        try {
            const data = await fetchICSWithFallback(url);
            const jcal = ICAL.parse(data);
            const comp = new ICAL.Component(jcal);
            const vevents = comp.getAllSubcomponents('vevent');
            if (!vevents || vevents.length === 0) {
                infoEl.textContent = '⚠️ Keine Termine gefunden.';
                calendarEvents = [];
                renderCalendar();
                return;
            }
            calendarEvents = vevents.map((v, i) => {
                const ev = new ICAL.Event(v);
                const start = ev.startDate ? ev.startDate.toJSDate() : new Date();
                const end = ev.endDate ? ev.endDate.toJSDate() : null;
                return {
                    summary: ev.summary || '(Ohne Titel)',
                    start: start.toISOString().substring(0, 10),
                    end: end ? end.toISOString().substring(0, 10) : start.toISOString().substring(0, 10),
                    color: assignColor(i)
                };
            });
            renderCalendar();
            localStorage.setItem('icalUrl', url);
            infoEl.textContent = `✅ ${calendarEvents.length} Termine geladen.`;
        } catch(e) {
            errEl.textContent = '❌ ' + e.message;
            calendarEvents = [];
            renderCalendar();
            infoEl.textContent = '';
        }
    }

    // --- SLIDESHOW ---
    let slides = [], currentSlide = 0, paused = false, timer;
    function loadSlides() {
        const saved = localStorage.getItem('slides');
        if(saved) { slides = JSON.parse(saved); currentSlide = parseInt(localStorage.getItem('slideIdx'))||0; }
        updateSlideDisplay();
    }
    function updateSlideDisplay() {
        const container = document.getElementById('slideshow-container');
        if(!container) return;
        container.querySelectorAll('.slide-img').forEach(i => i.remove());
        if(slides.length && slides[currentSlide]) {
            const img = document.createElement('img');
            img.className = 'slide-img active';
            img.src = slides[currentSlide];
            container.insertBefore(img, container.firstChild);
        } else {
            const placeholder = document.createElement('div');
            placeholder.className = 'slide-img active';
            placeholder.style.background = '#222';
            placeholder.style.display = 'flex'; placeholder.style.alignItems = 'center'; placeholder.style.justifyContent = 'center';
            placeholder.innerHTML = '<span style="color:white; opacity:0.5;">📷 Fotos hochladen</span>';
            container.appendChild(placeholder);
        }
    }
    function next() { if(slides.length) { currentSlide = (currentSlide+1)%slides.length; updateSlideDisplay(); localStorage.setItem('slideIdx', currentSlide); } }
    function prev() { if(slides.length) { currentSlide = (currentSlide-1+slides.length)%slides.length; updateSlideDisplay(); localStorage.setItem('slideIdx', currentSlide); } }
    function startSS() { clearInterval(timer); if(!paused && slides.length) timer = setInterval(next, 10000); }

    document.addEventListener('click', function(e) {
        const t = e.target;
        if(t.closest('#prev-slide')) { prev(); startSS(); }
        else if(t.closest('#next-slide')) { next(); startSS(); }
        else if(t.closest('#play-pause')) {
            paused = !paused;
            const btn = t.closest('#play-pause');
            btn.innerHTML = paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            paused ? clearInterval(timer) : startSS();
        }
        else if(t.closest('#delete-slide') && slides.length) {
            slides.splice(currentSlide, 1);
            if(currentSlide >= slides.length) currentSlide = 0;
            updateSlideDisplay();
            localStorage.setItem('slides', JSON.stringify(slides));
            startSS();
        }
        else if(t.closest('#anim-btn') && settingsVisible) {
            document.getElementById('anim-panel').classList.toggle('open');
        }
        else if(t.closest('#gradient-btn') && settingsVisible) {
            document.getElementById('gradient-panel').classList.toggle('open');
        }
        else if(t.closest('#cal-settings-btn') && settingsVisible) {
            document.getElementById('cal-panel').classList.toggle('open');
        }
        else if(t.closest('#tile-opacity-btn') && settingsVisible) {
            document.getElementById('tile-opacity-panel').classList.toggle('open');
        }
        else if(t.closest('#load-ical')) loadCalendar(document.getElementById('ical-url').value);
        else if(t.closest('#location-search-btn')) {
            const q = document.getElementById('location-search').value;
            searchLocation(q).then(results => {
                if(results.length) setLocation(results[0].latitude, results[0].longitude, results[0].name);
            });
        }
        else if(t.closest('#gps-btn')) {
            navigator.geolocation.getCurrentPosition(p => setLocation(p.coords.latitude, p.coords.longitude, 'GPS'));
        }
    });

    document.addEventListener('change', function(e) {
        if(e.target.id === 'file-upload') {
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader();
                r.onload = ev => {
                    slides.push(ev.target.result);
                    if(slides.length===1) currentSlide = 0;
                    updateSlideDisplay();
                    localStorage.setItem('slides', JSON.stringify(slides));
                    startSS();
                };
                r.readAsDataURL(f);
            });
        }
        if(e.target.id === 'anim-select') {
            document.getElementById('slideshow-container').className = 'slideshow-container slide-anim-' + e.target.value;
            localStorage.setItem('slideAnim', e.target.value);
        }
        if(e.target.id === 'gradient-position-slider') {
            document.documentElement.style.setProperty('--gradient-position', e.target.value);
            document.getElementById('gradient-pos-value').textContent = Math.round(e.target.value * 100) + '%';
            localStorage.setItem('gradientPosition', e.target.value);
        }
        if(e.target.id === 'gradient-width-slider') {
            document.documentElement.style.setProperty('--gradient-width', e.target.value);
            localStorage.setItem('gradientWidth', e.target.value);
        }
        if(e.target.id === 'gradient-opacity-slider') {
            document.documentElement.style.setProperty('--gradient-opacity', e.target.value);
            localStorage.setItem('gradientOpacity', e.target.value);
        }
        if(e.target.id === 'tile-opacity-slider') {
            document.documentElement.style.setProperty('--tile-opacity', e.target.value);
            document.getElementById('tile-opacity-value').textContent = Math.round(e.target.value * 100) + '%';
            localStorage.setItem('tileOpacity', e.target.value);
        }
        if(e.target.id === 'weather-height-slider') {
            const val = e.target.value + 'vh';
            document.documentElement.style.setProperty('--weather-height', val);
            document.getElementById('weather').style.height = val;
            localStorage.setItem('weatherHeight', e.target.value);
        }
        if(e.target.id === 'month-slider') {
            currentMonth = parseInt(e.target.value);
            renderCalendar();
        }
    });

    function init() {
        const savedLoc = localStorage.getItem('weatherLoc');
        if(savedLoc) { const l = JSON.parse(savedLoc); currentLat = l.lat; currentLon = l.lon; currentLocName = l.name; }

        const gp = localStorage.getItem('gradientPosition') || 0.38;
        const gw = localStorage.getItem('gradientWidth') || 0.05;
        const go = localStorage.getItem('gradientOpacity') || 0.8;
        const to = localStorage.getItem('tileOpacity') || 0.85;
        const wh = localStorage.getItem('weatherHeight') || 42;
        document.documentElement.style.setProperty('--gradient-position', gp);
        document.documentElement.style.setProperty('--gradient-width', gw);
        document.documentElement.style.setProperty('--gradient-opacity', go);
        document.documentElement.style.setProperty('--tile-opacity', to);
        document.documentElement.style.setProperty('--weather-height', wh + 'vh');
        document.getElementById('gradient-position-slider').value = gp;
        document.getElementById('gradient-width-slider').value = gw;
        document.getElementById('gradient-opacity-slider').value = go;
        document.getElementById('tile-opacity-slider').value = to;
        document.getElementById('weather-height-slider').value = wh;
        document.getElementById('gradient-pos-value').textContent = Math.round(gp * 100) + '%';
        document.getElementById('tile-opacity-value').textContent = Math.round(to * 100) + '%';

        const savedAnim = localStorage.getItem('slideAnim') || 'fade';
        document.getElementById('anim-select').value = savedAnim;

        const savedIcal = localStorage.getItem('icalUrl');
        if(savedIcal) {
            document.getElementById('ical-url').value = savedIcal;
            loadCalendar(savedIcal);
        }

        createTiles();
        loadSlides();
        updateWeather();
        renderCalendar();
        setInterval(updateWeather, 900000);
        startSS();
        hideSettings();
    }
    init();
})();
</script>

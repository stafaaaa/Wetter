<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Ultimate Dashboard | Wetter & Kalender | Themes & Transparenz</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
.bg-slideshow {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -2;
overflow: hidden;
}
.bg-slideshow img {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: cover;
opacity: 0;
transition: opacity 1.2s ease-in-out;
}
.bg-slideshow img.active { opacity: 1; }
body {
font-family: 'Inter', sans-serif;
background: transparent;
padding: 20px;
height: 100vh;
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
color: #ffffff;
}
.dashboard {
width: 100%;
max-width: 1400px;
height: 100%;
display: flex;
gap: 28px;
flex-wrap: nowrap;
align-items: stretch;
}
.weather-panel, .calendar-panel {
flex: 1;
border-radius: 2rem;
padding: 1.5rem;
backdrop-filter: none;
transition: background 0.1s ease, color 0.1s ease;
display: flex;
flex-direction: column;
background: rgba(0, 0, 0, 0.65);
}
.weather-panel { flex: 1.2; }
.calendar-panel { flex: 1.8; }
.section-title {
font-size: 1.3rem;
font-weight: 700;
margin-bottom: 1rem;
border-left: 4px solid var(--accent-color, #ffd966);
padding-left: 12px;
}
.weather-now {
display: flex;
justify-content: space-between;
align-items: center;
background: transparent;
padding: 12px 0;
flex-wrap: wrap;
}
.temp-large { font-size: 3.8rem; font-weight: 800; line-height: 1; }
.forecast-5days { display: flex; gap: 12px; margin-top: 20px; justify-content: space-between; }
.forecast-day {
background: rgba(0,0,0,0.4);
border-radius: 28px;
padding: 10px 8px;
text-align: center;
flex: 1;
border: 1px solid rgba(255,255,255,0.2);
}
.search-location {
display: flex;
gap: 10px;
margin-bottom: 20px;
}
.search-location input, .search-location button {
padding: 8px 16px;
border-radius: 60px;
border: none;
background: rgba(0,0,0,0.6);
color: white;
font-weight: 500;
}
.search-location button { background: var(--accent-color, #2c6e9e); cursor: pointer; }
.calendar-header-controls {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 20px;
}
.month-nav {
background: rgba(0,0,0,0.5);
border: none;
padding: 6px 16px;
border-radius: 40px;
color: white;
cursor: pointer;
font-weight: 600;
}
.calendar-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 8px;
flex: 1;
}
.weekday {
text-align: center;
font-weight: 600;
padding: 8px 0;
background: rgba(0,0,0,0.3);
border-radius: 30px;
}
.calendar-day {
background: rgba(0,0,0,0.25);
border-radius: 20px;
padding: 8px 4px;
text-align: center;
cursor: pointer;
transition: 0.1s;
min-height: 85px;
display: flex;
flex-direction: column;
align-items: center;
}
.calendar-day:hover { background: rgba(255,255,255,0.2); }
.day-number {
font-weight: 700;
font-size: 1.1rem;
width: 34px;
height: 34px;
line-height: 34px;
border-radius: 40px;
background: rgba(0,0,0,0.5);
margin-bottom: 6px;
}
.event-dots { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.event-dot { width: 8px; height: 8px; border-radius: 10px; }
.modal {
display: none;
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
background: rgba(0,0,0,0.7);
z-index: 2000;
justify-content: center;
align-items: center;
}
.modal-content {
background: #1e2a36;
border-radius: 2rem;
padding: 1.5rem;
max-width: 400px;
width: 80%;
color: white;
text-align: center;
}
.close-modal { background: var(--accent-color, #2c6e9e); padding: 8px 20px; border-radius: 40px; border: none; color: white; cursor: pointer; }
.music-icons {
position: fixed;
bottom: 24px;
left: 24px;
display: flex;
gap: 16px;
z-index: 1050;
}
.icon-btn {
background: rgba(0,0,0,0.6);
width: 50px;
height: 50px;
border-radius: 60px;
display: flex;
align-items: center;
justify-content: center;
font-size: 1.8rem;
color: white;
text-decoration: none;
transition: 0.1s;
}
.icon-btn:hover { transform: scale(1.05); }
.settings-fab {
position: fixed;
bottom: 24px;
right: 24px;
width: 52px;
height: 52px;
background: var(--accent-color, #1e6f9f);
border-radius: 60px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
z-index: 1000;
color: white;
font-size: 1.6rem;
box-shadow: 0 2px 8px black;
}
.settings-panel {
position: fixed;
bottom: 100px;
right: 24px;
width: 360px;
max-height: 80vh;
overflow-y: auto;
background: #11151cd9;
backdrop-filter: blur(12px);
border-radius: 1.5rem;
padding: 1rem;
display: none;
flex-direction: column;
gap: 16px;
z-index: 1100;
color: white;
border: 1px solid rgba(255,255,255,0.2);
}
.settings-panel.open { display: flex; }
.settings-panel input, .settings-panel select, .settings-panel button {
border-radius: 40px;
padding: 8px 12px;
border: none;
background: #2c2f36;
color: white;
}
.slider-label { display: flex; justify-content: space-between; font-size: 0.75rem; }
.color-input { width: 100%; height: 40px; padding: 4px; cursor: pointer; }
.close-settings {
position: absolute;
top: 8px;
right: 12px;
background: none;
border: none;
color: white;
font-size: 1.2rem;
cursor: pointer;
}
hr { border-color: rgba(255,255,255,0.2); margin: 8px 0; }
@media (max-width: 1024px) and (orientation: portrait) {
body { padding: 16px; overflow-y: auto; height: auto; }
.dashboard { flex-direction: column; height: auto; gap: 24px; }
.calendar-day { min-height: 70px; }
}
@media (min-width: 1100px) and (min-height: 700px) { body { overflow: hidden; } .dashboard { height: calc(100vh - 40px); } }
.status-msg { font-size: 0.75rem; margin-top: 5px; padding: 4px; border-radius: 20px; text-align: center; }
</style>
</head>
<body>
<div class="bg-slideshow" id="bgSlideshow"></div>
<div class="dashboard">
<div class="weather-panel" id="weatherPanel">
<div class="section-title"><i class="fas fa-cloud-sun"></i> Aktuelles Wetter</div>
<div class="search-location">
<input type="text" id="cityInput" placeholder="Stadt, z.B. Berlin" value="Berlin">
<button id="searchWeatherBtn"><i class="fas fa-search"></i></button>
<button id="myLocationBtn"><i class="fas fa-location-dot"></i></button>
</div>
<div id="weatherCurrent" class="weather-now">Lade Wetter...</div>
<div style="font-weight:600; margin-top: 8px;">5-Tage-Vorhersage</div>
<div id="forecastContainer" class="forecast-5days"></div>
</div>
<div class="calendar-panel" id="calendarPanel">
<div class="section-title"><i class="fas fa-calendar-alt"></i> Kalender (iCal)</div>
<div class="calendar-header-controls">
<button class="month-nav" id="prevMonthBtn"><i class="fas fa-chevron-left"></i></button>
<span id="monthYearDisplay" style="font-weight:700; font-size:1.2rem;"></span>
<button class="month-nav" id="nextMonthBtn"><i class="fas fa-chevron-right"></i></button>
</div>
<div class="calendar-grid" id="calendarGrid"></div>
<div id="icalStatus" class="status-msg"></div>
</div>
</div>

<div class="music-icons">
<a href="https://open.spotify.com/" target="_blank" class="icon-btn" style="background:#1DB954;"><i class="fab fa-spotify"></i></a>
<a href="https://music.amazon.de/" target="_blank" class="icon-btn" style="background:#FF9900;"><i class="fab fa-amazon"></i></a>
</div>

<div class="settings-fab" id="settingsFab"><i class="fas fa-sliders-h"></i></div>
<div id="settingsPanel" class="settings-panel">
<button class="close-settings" id="closeSettingsBtn">&times;</button>
<h4><i class="fas fa-palette"></i> 10 Akzent-Themes</h4>
<div id="themeButtons" style="display: flex; flex-wrap: wrap; gap: 8px;">
<button data-theme="ocean" class="theme-btn" style="background:#1e6f9f;">🌊 Ozean</button>
<button data-theme="forest" class="theme-btn" style="background:#2f6b3c;">🌲 Wald</button>
<button data-theme="lavender" class="theme-btn" style="background:#6a4e9b;">🌸 Lavendel</button>
<button data-theme="sunset" class="theme-btn" style="background:#c2571a;">🌅 Sunset</button>
<button data-theme="royal" class="theme-btn" style="background:#4a3b7c;">👑 Royal</button>
<button data-theme="mint" class="theme-btn" style="background:#2b7a62;">🍃 Mint</button>
<button data-theme="graphite" class="theme-btn" style="background:#3a4b5c;">⚙️ Graphit</button>
<button data-theme="cherry" class="theme-btn" style="background:#b3414b;">🍒 Kirsche</button>
<button data-theme="sky" class="theme-btn" style="background:#0077be;">☁️ Himmel</button>
<button data-theme="neutral" class="theme-btn" style="background:#5e6f8d;">⚪ Neutral</button>
</div>
<h4><i class="fas fa-fill-drip"></i> Karten-Hintergrundfarbe</h4>
<input type="color" id="cardBgColor" value="#000000">
<div class="slider-label"><span>Deckkraft (Transparenz)</span><span id="opacityValue">0.65</span></div>
<input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="0.65">
<h4><i class="fas fa-font"></i> Schriftfarbe</h4>
<input type="color" id="textColor" value="#ffffff">
<h4><i class="fas fa-link"></i> iCal URL (Google Kalender)</h4>
<input type="text" id="icalUrlInput" placeholder="https://.../basic.ics" value="https://calendar.google.com/calendar/ical/de.german%23holiday%40group.v.calendar.google.com/public/basic.ics">
<button id="applyIcalBtn">📅 Kalender laden</button>
<h4><i class="fas fa-images"></i> Hintergrund Slideshow</h4>
<div style="display: flex; gap: 8px; flex-wrap: wrap;">
<button id="bgPrevBtn"><i class="fas fa-backward"></i></button>
<button id="bgPlayPauseBtn"><i class="fas fa-pause"></i></button>
<button id="bgNextBtn"><i class="fas fa-forward"></i></button>
<label class="upload-label" style="background:#2c6e9e; padding: 6px 12px; border-radius: 30px; cursor:pointer;"><i class="fas fa-upload"></i> Bilder hochladen</label>
<input type="file" id="bgUpload" accept="image/*" multiple style="display:none;">
<button id="resetBgBtn"><i class="fas fa-undo-alt"></i> Reset</button>
</div>
<div style="display: flex; gap:6px; margin-top:6px;">
<input type="text" id="bgUrlInput" placeholder="Bild-URL (https://...)" style="flex:1;">
<button id="addBgUrlBtn">+ URL</button>
</div>
<div id="uploadStatus" class="status-msg" style="color:#aaffdd;"></div>
</div>

<div id="eventModal" class="modal">
<div class="modal-content">
<h3><i class="fas fa-info-circle"></i> Termine an diesem Tag</h3>
<div id="modalEventList"></div>
<button class="close-modal" id="closeModalBtn">Schließen</button>
</div>
</div>

<script>
(function() {
// ---------- 1. HINTERGRUND-SLIDESHOW (Upload FIX & Animation) ----------
let bgPhotos = [
"https://picsum.photos/id/104/1920/1080",
"https://picsum.photos/id/15/1920/1080",
"https://picsum.photos/id/169/1920/1080",
"https://picsum.photos/id/155/1920/1080",
"https://picsum.photos/id/20/1920/1080"
];
let currentBg = 0, bgInterval, bgPlaying = true;
const bgContainer = document.getElementById('bgSlideshow');
let bgImgs = [];
const uploadStatusDiv = document.getElementById('uploadStatus');

function rebuildBg() {
bgContainer.innerHTML = '';
bgImgs = [];
bgPhotos.forEach((src, idx) => {
const img = document.createElement('img');
img.src = src;
if (idx === currentBg) img.classList.add('active');
bgContainer.appendChild(img);
bgImgs.push(img);
});
}
function setActiveBg(idx) { bgImgs.forEach((img,i)=> i===idx ? img.classList.add('active') : img.classList.remove('active')); }
function nextBg() { if(bgPhotos.length){ currentBg = (currentBg+1)%bgPhotos.length; setActiveBg(currentBg); } }
function prevBg() { if(bgPhotos.length){ currentBg = (currentBg-1+bgPhotos.length)%bgPhotos.length; setActiveBg(currentBg); } }
function startBgInterval() { if(bgInterval) clearInterval(bgInterval); bgInterval = setInterval(()=>{ if(bgPlaying) nextBg(); }, 5000); }
function toggleBgPlay() { bgPlaying = !bgPlaying; document.getElementById('bgPlayPauseBtn').innerHTML = bgPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>'; startBgInterval(); }
function addBgPhoto(url) {
if(!url) return;
if(bgPhotos.includes(url)) { uploadStatusDiv.innerText = "⚠️ Bild bereits in der Slideshow"; setTimeout(()=>uploadStatusDiv.innerText="",2000); return; }
bgPhotos.push(url);
if(bgPhotos.length===1) currentBg=0;
rebuildBg();
setActiveBg(currentBg);
uploadStatusDiv.innerText = "✅ Bild hinzugefügt!";
setTimeout(()=>uploadStatusDiv.innerText="",2000);
}
function resetBg() {
bgPhotos = ["https://picsum.photos/id/104/1920/1080","https://picsum.photos/id/15/1920/1080","https://picsum.photos/id/169/1920/1080","https://picsum.photos/id/155/1920/1080","https://picsum.photos/id/20/1920/1080"];
currentBg=0; rebuildBg(); setActiveBg(0);
uploadStatusDiv.innerText = "🔄 Slideshow zurückgesetzt";
setTimeout(()=>uploadStatusDiv.innerText="",2000);
}
document.getElementById('bgPrevBtn').onclick = () => { prevBg(); startBgInterval(); };
document.getElementById('bgNextBtn').onclick = () => { nextBg(); startBgInterval(); };
document.getElementById('bgPlayPauseBtn').onclick = toggleBgPlay;
document.getElementById('resetBgBtn').onclick = resetBg;
document.getElementById('addBgUrlBtn').onclick = () => { let url = document.getElementById('bgUrlInput').value.trim(); if(url) addBgPhoto(url); document.getElementById('bgUrlInput').value = ''; };
// Upload Funktionalität - korrigiert
const uploadLabel = document.querySelector('.upload-label');
const uploadInput = document.getElementById('bgUpload');
if(uploadLabel && uploadInput) {
uploadLabel.addEventListener('click', (e) => { e.preventDefault(); uploadInput.click(); });
uploadInput.addEventListener('change', (e) => {
const files = Array.from(e.target.files);
if(files.length === 0) return;
files.forEach(file => {
if (file.type.startsWith('image/')) {
const reader = new FileReader();
reader.onload = function(ev) {
addBgPhoto(ev.target.result);
};
reader.readAsDataURL(file);
} else {
uploadStatusDiv.innerText = "❌ Nur Bilder erlaubt";
setTimeout(()=>uploadStatusDiv.innerText="",2000);
}
});
uploadInput.value = ''; // ermöglicht erneutes Hochladen
});
}

rebuildBg(); startBgInterval();

// ---------- 2. WETTER ----------
const cityInput = document.getElementById('cityInput');
const searchBtn = document.getElementById('searchWeatherBtn');
const locationBtn = document.getElementById('myLocationBtn');
const weatherDiv = document.getElementById('weatherCurrent');
const forecastDiv = document.getElementById('forecastContainer');

async function getCoords(city) {
const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=de&format=json`);
const data = await res.json();
return data.results?.[0] || null;
}
async function fetchWeather(lat, lon) {
const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=6`;
const res = await fetch(url);
return await res.json();
}
function getWeatherIcon(code) {
const map = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",61:"🌧️",63:"🌧️",71:"❄️",80:"🌦️",95:"⛈️"};
return map[code] || "🌡️";
}
async function loadWeather(city) {
const coord = await getCoords(city);
if(!coord){ weatherDiv.innerHTML = "<div>❌ Stadt nicht gefunden</div>"; return; }
const w = await fetchWeather(coord.latitude, coord.longitude);
if(w?.current_weather){
const curr = w.current_weather;
weatherDiv.innerHTML = `
<div><div style="font-size:2.5rem;">${getWeatherIcon(curr.weathercode)}</div><div class="temp-large">${Math.round(curr.temperature)}°C</div><div>${coord.name}</div></div>
<div><i class="fas fa-wind"></i> ${curr.windspeed} km/h</div>
`;
if(w.daily){
forecastDiv.innerHTML = '';
const days = w.daily.time.slice(0,5);
const maxT = w.daily.temperature_2m_max.slice(0,5);
const minT = w.daily.temperature_2m_min.slice(0,5);
const codes = w.daily.weathercode.slice(0,5);
days.forEach((d,i)=>{
const wk = new Date(d).toLocaleDateString('de-DE',{weekday:'short'});
forecastDiv.innerHTML += `<div class="forecast-day"><div>${wk}</div><div style="font-size:1.6rem;">${getWeatherIcon(codes[i])}</div><div>${Math.round(maxT[i])}°/${Math.round(minT[i])}°</div></div>`;
});
}
}
}
searchBtn.onclick = () => loadWeather(cityInput.value.trim() || "Berlin");
locationBtn.onclick = () => { if(navigator.geolocation) navigator.geolocation.getCurrentPosition(async pos=>{ const w = await fetchWeather(pos.coords.latitude, pos.coords.longitude); if(w?.current_weather) { weatherDiv.innerHTML = `<div><div style="font-size:2.5rem;">${getWeatherIcon(w.current_weather.weathercode)}</div><div class="temp-large">${Math.round(w.current_weather.temperature)}°C</div><div>📍 Mein Standort</div></div><div><i class="fas fa-wind"></i> ${w.current_weather.windspeed} km/h</div>`; if(w.daily) updateForecastQuick(w.daily); } }); };
function updateForecastQuick(daily){ const days = daily.time.slice(0,5); const maxT = daily.temperature_2m_max; const minT = daily.temperature_2m_min; const codes = daily.weathercode; forecastDiv.innerHTML = ''; days.forEach((d,i)=>{ const wk = new Date(d).toLocaleDateString('de-DE',{weekday:'short'}); forecastDiv.innerHTML += `<div class="forecast-day"><div>${wk}</div><div style="font-size:1.6rem;">${getWeatherIcon(codes[i])}</div><div>${Math.round(maxT[i])}°/${Math.round(minT[i])}°</div></div>`; }); }
loadWeather("Berlin");

// ---------- 3. MONATSKALENDER mit iCal & FUNKTIONIERENDER PROXY ----------
let currentDate = new Date();
let icalEvents = [];
const monthYearSpan = document.getElementById('monthYearDisplay');
const calendarGrid = document.getElementById('calendarGrid');
const prevMonthBtn = document.getElementById('prevMonthBtn');
const nextMonthBtn = document.getElementById('nextMonthBtn');
const modal = document.getElementById('eventModal');
const modalEventList = document.getElementById('modalEventList');
const closeModalBtn = document.getElementById('closeModalBtn');
const icalStatus = document.getElementById('icalStatus');

function parseYMD(dtStr) {
if(!dtStr) return null;
if(dtStr.length === 8) return dtStr;
if(dtStr.includes('T')) return dtStr.substring(0,8);
return null;
}

async function loadICalendar(url) {
if(!url) { icalStatus.innerText = "❌ Keine URL"; return; }
icalStatus.innerText = "⏳ Lade Kalender über Proxy...";
try {
// Zwei Proxy-Versuche: allorigins + corsproxy.io als Fallback
let icsText = null;
let proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
let resp = await fetch(proxyUrl);
if(resp.ok) icsText = await resp.text();
if(!icsText) {
proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
resp = await fetch(proxyUrl);
if(resp.ok) icsText = await resp.text();
}
if(!icsText) throw new Error("Keine Antwort vom Proxy");

const events = [];
const lines = icsText.split(/\r?\n/);
let inEvent = false, cur = {};
for(let line of lines){
line = line.trim();
if(line === 'BEGIN:VEVENT'){ inEvent=true; cur={}; continue; }
if(line === 'END:VEVENT'){ if(cur.summary && cur.start) events.push(cur); inEvent=false; continue; }
if(inEvent){
if(line.startsWith('SUMMARY:')) cur.summary = line.substring(8).replace(/\\,/g,',').replace(/\\n/g,' ');
else if(line.startsWith('DTSTART')){
let val = line.split(':')[1];
if(!val && line.includes(';VALUE=DATE')) val = line.split(':').slice(1).join(':');
else if(line.includes(':')) val = line.substring(line.indexOf(':')+1);
if(val) cur.start = val;
}
}
}
icalEvents = events.map(ev => ({ startYMD: parseYMD(ev.start), summary: ev.summary || "Termin" })).filter(e => e.startYMD);
icalStatus.innerText = `✅ ${icalEvents.length} Termine geladen`;
renderCalendar();
} catch(e) {
console.error(e);
icalStatus.innerText = "⚠️ Fehler: CORS oder ungültige URL. Prüfe iCal-Adresse (öffentlich).";
}
}

function renderCalendar() {
const year = currentDate.getFullYear();
const month = currentDate.getMonth();
const firstDay = new Date(year, month, 1);
const startWeekday = firstDay.getDay();
const daysInMonth = new Date(year, month+1, 0).getDate();
const monthNames = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
monthYearSpan.innerText = `${monthNames[month]} ${year}`;
let gridHtml = `<div class="weekday">Mo</div><div class="weekday">Di</div><div class="weekday">Mi</div><div class="weekday">Do</div><div class="weekday">Fr</div><div class="weekday">Sa</div><div class="weekday">So</div>`;
let adjustedStart = (startWeekday === 0 ? 6 : startWeekday-1);
let dayCounter = 1;
for(let i=0; i<42; i++){
if(i < adjustedStart || dayCounter > daysInMonth){
gridHtml += `<div class="calendar-day" style="opacity:0.4;"></div>`;
} else {
let dateStr = `${year}${String(month+1).padStart(2,'0')}${String(dayCounter).padStart(2,'0')}`;
let eventsOnDay = icalEvents.filter(ev => ev.startYMD === dateStr);
let dotsHtml = '';
const colors = ['#f4c542','#e57373','#81c784','#64b5f6','#ba82d6'];
eventsOnDay.forEach((ev,idx) => {
dotsHtml += `<div class="event-dot" style="background-color:${colors[idx % colors.length]};"></div>`;
});
gridHtml += `<div class="calendar-day" data-date="${dateStr}" data-events='${JSON.stringify(eventsOnDay.map(e=>e.summary))}'>
<div class="day-number">${dayCounter}</div>
<div class="event-dots">${dotsHtml}</div>
</div>`;
dayCounter++;
}
}
calendarGrid.innerHTML = gridHtml;
document.querySelectorAll('.calendar-day[data-date]').forEach(dayEl => {
dayEl.addEventListener('click', (e) => {
e.stopPropagation();
const eventsJson = dayEl.getAttribute('data-events');
const evList = JSON.parse(eventsJson);
if(evList.length){
modalEventList.innerHTML = '<ul>' + evList.map(ev => `<li><i class="fas fa-calendar-day"></i> ${ev}</li>`).join('') + '</ul>';
} else {
modalEventList.innerHTML = '<p>Keine Termine an diesem Tag.</p>';
}
modal.style.display = 'flex';
});
});
}

prevMonthBtn.onclick = () => { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); };
nextMonthBtn.onclick = () => { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); };
document.getElementById('applyIcalBtn').onclick = () => { let url = document.getElementById('icalUrlInput').value.trim(); if(url) loadICalendar(url); else icalStatus.innerText = "❌ Bitte URL eingeben"; };
// Standard: Lade deutschen Feiertagskalender
loadICalendar(document.getElementById('icalUrlInput').value.trim());

closeModalBtn.onclick = () => modal.style.display = 'none';
window.onclick = (e) => { if(e.target === modal) modal.style.display = 'none'; };

// ---------- 4. THEMES, KARTENFARBE, DECKKRAFT, SCHRIFTFARBE ----------
const themeBtns = document.querySelectorAll('.theme-btn');
function setAccentColor(color) {
document.documentElement.style.setProperty('--accent-color', color);
document.querySelectorAll('.search-location button, .close-modal, .settings-fab').forEach(el => {
if(el.tagName === 'BUTTON') el.style.backgroundColor = color;
});
}
const themeColors = {
ocean: '#1e6f9f', forest: '#2f6b3c', lavender: '#6a4e9b', sunset: '#c2571a',
royal: '#4a3b7c', mint: '#2b7a62', graphite: '#3a4b5c', cherry: '#b3414b',
sky: '#0077be', neutral: '#5e6f8d'
};
themeBtns.forEach(btn => {
btn.addEventListener('click', () => {
const theme = btn.dataset.theme;
if(themeColors[theme]) setAccentColor(themeColors[theme]);
});
});
setAccentColor('#1e6f9f');

const cardBgColorPicker = document.getElementById('cardBgColor');
const opacitySlider = document.getElementById('opacitySlider');
const opacityValueSpan = document.getElementById('opacityValue');
const weatherPanel = document.getElementById('weatherPanel');
const calendarPanel = document.getElementById('calendarPanel');

function updateCardBackground() {
const color = cardBgColorPicker.value;
const opacity = parseFloat(opacitySlider.value);
const r = parseInt(color.slice(1,3),16);
const g = parseInt(color.slice(3,5),16);
const b = parseInt(color.slice(5,7),16);
const rgba = `rgba(${r}, ${g}, ${b}, ${opacity})`;
weatherPanel.style.background = rgba;
calendarPanel.style.background = rgba;
opacityValueSpan.innerText = opacity.toFixed(2);
}
cardBgColorPicker.addEventListener('input', updateCardBackground);
opacitySlider.addEventListener('input', updateCardBackground);
updateCardBackground();

const textColorPicker = document.getElementById('textColor');
textColorPicker.addEventListener('input', (e) => {
const newColor = e.target.value;
document.body.style.color = newColor;
const elements = document.querySelectorAll('.section-title, .weather-now, .forecast-day, .calendar-day, .weekday, .month-nav, .search-location input, .search-location button, .day-number, .event-dot');
elements.forEach(el => { if(el.style) el.style.color = newColor; });
// Eingabefelder brauchen weiße Schrift?
document.querySelectorAll('.search-location input, .ical-url-input input').forEach(inp => inp.style.color = newColor);
});
textColorPicker.dispatchEvent(new Event('input'));

// Settings Panel Toggle
const settingsFab = document.getElementById('settingsFab');
const settingsPanel = document.getElementById('settingsPanel');
const closeSettings = document.getElementById('closeSettingsBtn');
settingsFab.onclick = () => settingsPanel.classList.toggle('open');
closeSettings.onclick = () => settingsPanel.classList.remove('open');
window.addEventListener('click', (e) => { if(e.target === settingsFab) return; if(!settingsPanel.contains(e.target) && e.target !== settingsFab) settingsPanel.classList.remove('open'); });
})();
</script>
</body>
</html>

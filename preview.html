<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#10131a" />
  <title>Home Dashboard</title>
  <style>
    :root{
      --bg:#0f1218;
      --bg2:#0a0d13;
      --text:#f5f7fc;
      --muted:#bac2d7;
      --tile:rgba(30,36,48,.68);
      --tile-border:rgba(255,255,255,.12);
      --accent:#8fc2ff;
      --accent2:#8ff0c9;
      --danger:#ff8d8d;
      --radius:22px;
      --gap:14px;
      --shadow:0 18px 50px rgba(0,0,0,.30);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(126,163,255,.16), transparent 34%),
        radial-gradient(circle at 82% 78%, rgba(125,255,214,.10), transparent 36%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
    }

    body{padding:14px}

    .app{
      width:100%;
      height:100%;
      display:grid;
      grid-template-rows:auto 1fr;
      gap:14px;
    }

    .toolbar{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:24px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--tile-border);
      backdrop-filter:blur(16px);
      box-shadow:var(--shadow);
      flex-wrap:wrap;
    }

    .brand{
      font-size:12px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
      margin-right:6px;
    }

    .spacer{flex:1}

    button, input, textarea, select { font: inherit; }

    .btn, .file-label{
      border:none;
      border-radius:999px;
      padding:10px 14px;
      color:var(--text);
      background:rgba(255,255,255,.10);
      border:1px solid var(--tile-border);
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .btn:hover, .file-label:hover{background:rgba(255,255,255,.14)}
    .btn.primary{background:var(--accent); color:#0a1018; font-weight:700}
    .btn.danger{background:rgba(255,141,141,.18); border-color:rgba(255,141,141,.35)}
    .file-label input{display:none}

    .workspace{
      min-height:0;
      overflow:auto;
      border-radius:28px;
    }

    .grid{
      min-height:100%;
      display:grid;
      grid-template-columns:repeat(12,minmax(0,1fr));
      grid-auto-rows:88px;
      gap:var(--gap);
    }

    .tile{
      position:relative;
      display:flex;
      flex-direction:column;
      min-height:0;
      overflow:hidden;
      border-radius:var(--radius);
      background:var(--tile);
      border:1px solid var(--tile-border);
      backdrop-filter:blur(14px);
      box-shadow:var(--shadow);
    }

    .tile.dragging{opacity:.45}
    .tile.drop-target{outline:2px dashed rgba(255,255,255,.45); outline-offset:-8px}

    .tile-inner{
      height:100%;
      min-height:0;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .tile-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .tile-title{
      font-size:12px;
      font-weight:700;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .tile-tools{
      display:none;
      gap:8px;
      flex-wrap:wrap;
    }

    body.edit-mode .tile-tools{display:flex}

    .icon-btn{
      width:30px;
      height:30px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      color:var(--text);
      background:rgba(255,255,255,.10);
      border:1px solid var(--tile-border);
    }

    .clock-time{
      margin-top:auto;
      font-size:clamp(38px,5vw,76px);
      line-height:1;
      font-weight:800;
    }

    .clock-date{
      font-size:clamp(16px,1.6vw,22px);
      color:var(--muted);
    }

    .weather-city{
      font-size:clamp(22px,2vw,34px);
      font-weight:700;
    }

    .weather-temp{
      font-size:clamp(42px,4vw,74px);
      line-height:1;
      font-weight:800;
    }

    .muted{color:var(--muted)}
    .small{font-size:13px}

    .forecast{
      margin-top:auto;
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:8px;
    }

    .forecast-item{
      padding:10px 8px;
      border-radius:14px;
      text-align:center;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.06);
      font-size:12px;
    }

    .calendar-month{
      font-size:clamp(18px,1.8vw,28px);
      font-weight:700;
    }

    .calendar-grid{
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
      gap:6px;
      text-align:center;
      font-size:13px;
    }

    .dow{
      color:var(--muted);
      padding:4px 0;
    }

    .day{
      padding:8px 0;
      border-radius:12px;
      background:rgba(255,255,255,.04);
      min-height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .day.empty{background:transparent}
    .day.today{
      background:var(--accent);
      color:#0a1018;
      font-weight:800;
    }
    .day.has-event{
      outline:2px solid rgba(143,240,201,.75);
      outline-offset:-2px;
    }

    .agenda{
      margin-top:auto;
      display:flex;
      flex-direction:column;
      gap:8px;
      overflow:auto;
      min-height:0;
    }

    .agenda-item{
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.06);
    }

    .agenda-item strong{display:block; margin-bottom:4px}

    .slide-stage{
      flex:1;
      min-height:0;
      overflow:hidden;
      border-radius:18px;
      background:rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .slide-stage img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .slide-empty{
      color:var(--muted);
      text-align:center;
      padding:24px;
    }

    .slidestrip{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      max-height:84px;
      overflow:hidden;
    }

    .slidestrip img{
      width:100%;
      height:76px;
      object-fit:cover;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      border-radius:18px;
      background:rgba(0,0,0,.18);
    }

    .settings{
      position:fixed;
      left:14px;
      right:14px;
      bottom:14px;
      z-index:50;
      display:none;
      max-height:72vh;
      overflow:auto;
      padding:16px;
      border-radius:26px;
      background:rgba(17,20,28,.96);
      border:1px solid var(--tile-border);
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
    }

    .settings.open{display:block}

    .settings-top{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .settings-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .settings label{
      display:flex;
      flex-direction:column;
      gap:8px;
      color:var(--muted);
      font-size:14px;
    }

    .settings input, .settings textarea{
      width:100%;
      min-height:46px;
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid var(--tile-border);
      resize:vertical;
    }

    .settings textarea{min-height:110px}

    @media (max-width:1100px){
      .grid{grid-template-columns:repeat(6,minmax(0,1fr))}
      .settings-grid{grid-template-columns:1fr}
    }

    @media (max-width:700px){
      .grid{grid-template-columns:repeat(2,minmax(0,1fr)); grid-auto-rows:120px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="brand">Home Dashboard</div>
    <button class="btn" id="editBtn">Bearbeiten</button>
    <label class="file-label">Bilder hochladen <input id="imageInput" type="file" accept="image/*" multiple></label>
    <button class="btn" id="settingsBtn">Einstellungen</button>
    <button class="btn" id="addTileBtn">+ Kachel</button>
    <div class="spacer"></div>
    <button class="btn danger" id="resetBtn">Reset</button>
  </div>

  <div class="workspace">
    <div class="grid" id="grid"></div>
  </div>
</div>

<div class="settings" id="settingsPanel">
  <div class="settings-top">
    <strong style="font-size:18px">Einstellungen</strong>
    <div class="spacer"></div>
    <button class="btn" id="closeSettings">Schließen</button>
  </div>
  <div class="settings-grid">
    <label>Stadt
      <input id="cityInput" placeholder="z. B. Düsseldorf">
    </label>
    <label>Slideshow Sekunden
      <input id="slideSecondsInput" type="number" min="3" max="300">
    </label>
    <label>Spotify Embed URL
      <input id="spotifyInput" placeholder="https://open.spotify.com/embed/...">
    </label>
    <label>YouTube Embed URL
      <input id="youtubeInput" placeholder="https://www.youtube.com/embed/...">
    </label>
    <label>Termine (eine Zeile pro Termin: 2026-04-06 18:00 | Titel)
      <textarea id="eventsInput"></textarea>
    </label>
    <label>Rezepte (eine Zeile pro Rezept: Titel | Zeit | Zutaten)
      <textarea id="recipesInput"></textarea>
    </label>
  </div>
  <div style="display:flex; gap:10px; margin-top:14px">
    <button class="btn primary" id="saveSettingsBtn">Speichern</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "dashboard-home-fixed-v1";

  const defaultState = {
    city: "Düsseldorf",
    coords: { lat: 51.2277, lon: 6.7735 },
    slideSeconds: 10,
    spotifyUrl: "https://open.spotify.com/embed/playlist/37i9dQZF1DX4WYpdgoIcn6?utm_source=generator",
    youtubeUrl: "https://www.youtube.com/embed/jfKfPfyJRdk",
    photos: [],
    events: [
      "2026-04-10 09:00 | Arzttermin",
      "2026-04-11 15:00 | Einkauf",
      "2026-04-12 19:00 | Abendessen"
    ],
    recipes: [
      "Pasta | 20 Min | Nudeln, Tomaten, Knoblauch",
      "Omelett | 10 Min | Eier, Salz, Pfeffer",
      "Salat | 8 Min | Gurke, Tomate, Feta"
    ],
    layout: [
      {id:"clock",type:"clock",w:4,h:2,title:"Uhr"},
      {id:"weather",type:"weather",w:4,h:3,title:"Wetter"},
      {id:"calendar",type:"calendar",w:4,h:3,title:"Kalender"},
      {id:"slideshow",type:"slideshow",w:6,h:4,title:"Slideshow"},
      {id:"agenda",type:"agenda",w:3,h:4,title:"Termine"},
      {id:"spotify",type:"spotify",w:3,h:4,title:"Spotify"},
      {id:"youtube",type:"youtube",w:6,h:3,title:"YouTube"},
      {id:"recipes",type:"recipes",w:6,h:3,title:"Rezepte"}
    ]
  };

  function deepCopy(obj){
    return JSON.parse(JSON.stringify(obj));
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return deepCopy(defaultState);
      const parsed = JSON.parse(raw);
      const state = deepCopy(defaultState);
      if(typeof parsed.city === "string") state.city = parsed.city;
      if(parsed.coords && Number.isFinite(parsed.coords.lat) && Number.isFinite(parsed.coords.lon)) state.coords = parsed.coords;
      if(Number.isFinite(Number(parsed.slideSeconds))) state.slideSeconds = Math.max(3, Number(parsed.slideSeconds));
      if(typeof parsed.spotifyUrl === "string") state.spotifyUrl = parsed.spotifyUrl;
      if(typeof parsed.youtubeUrl === "string") state.youtubeUrl = parsed.youtubeUrl;
      if(Array.isArray(parsed.photos)) state.photos = parsed.photos.filter(v => typeof v === "string");
      if(Array.isArray(parsed.events)) state.events = parsed.events.filter(v => typeof v === "string");
      if(Array.isArray(parsed.recipes)) state.recipes = parsed.recipes.filter(v => typeof v === "string");
      if(Array.isArray(parsed.layout) && parsed.layout.length){
        state.layout = parsed.layout.filter(item =>
          item && typeof item.type === "string" && Number.isFinite(item.w) && Number.isFinite(item.h)
        ).map(item => ({
          id: String(item.id || (item.type + "-" + Date.now())),
          type: String(item.type),
          w: Math.max(2, Math.min(12, Number(item.w))),
          h: Math.max(2, Math.min(6, Number(item.h))),
          title: String(item.title || item.type)
        }));
        if(!state.layout.length) state.layout = deepCopy(defaultState.layout);
      }
      return state;
    }catch(error){
      return deepCopy(defaultState);
    }
  }

  let state = loadState();
  const grid = document.getElementById("grid");
  const settingsPanel = document.getElementById("settingsPanel");
  let slideshowIndex = 0;
  let slideTimer = null;

  function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function textToEmbedYoutube(value){
    value = (value || "").trim();
    if(!value) return defaultState.youtubeUrl;
    if(value.includes("/embed/")) return value;
    const match = value.match(/[?&]v=([^&]+)/) || value.match(/youtu\.be\/([^?&]+)/);
    if(match && match[1]) return "https://www.youtube.com/embed/" + match[1];
    return value;
  }

  function textToEmbedSpotify(value){
    value = (value || "").trim();
    if(!value) return defaultState.spotifyUrl;
    if(value.includes("/embed/")) return value;
    return value.replace("open.spotify.com/", "open.spotify.com/embed/");
  }

  function cycleTileSize(item){
    const sizes = [
      {w:4,h:2},
      {w:4,h:3},
      {w:6,h:3},
      {w:6,h:4}
    ];
    const idx = sizes.findIndex(s => s.w === item.w && s.h === item.h);
    const next = sizes[(idx + 1 + sizes.length) % sizes.length];
    item.w = next.w;
    item.h = next.h;
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function formatEvent(line){
    const parts = (line || "").split("|").map(s => s.trim());
    const when = parts[0] || "";
    const title = parts[1] || parts[0] || "Termin";
    return '<div class="agenda-item"><strong>' + escapeHtml(title) + '</strong><div class="muted small">' + escapeHtml(when) + '</div></div>';
  }

  function formatRecipe(line){
    const p = (line || "").split("|").map(s => s.trim());
    return '<div class="agenda-item"><strong>' + escapeHtml(p[0] || "Rezept") + '</strong><div class="muted small">' + escapeHtml(p[1] || "") + '</div><div class="small">' + escapeHtml(p[2] || "") + '</div></div>';
  }

  function createCalendarHTML(){
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const first = new Date(year, month, 1);
    const lastDate = new Date(year, month + 1, 0).getDate();
    const startDay = (first.getDay() + 6) % 7;
    const monthTitle = now.toLocaleDateString("de-DE",{month:"long",year:"numeric"});
    const eventDays = new Set(
      (state.events || []).map(line => {
        const raw = String(line).split("|")[0].trim().split(" ")[0];
        return raw;
      })
    );

    let html = '<div class="calendar-month">' + escapeHtml(monthTitle) + '</div>';
    html += '<div class="calendar-grid">';
    ["Mo","Di","Mi","Do","Fr","Sa","So"].forEach(d => html += '<div class="dow">' + d + '</div>');
    for(let i=0;i<startDay;i++) html += '<div class="day empty"></div>';
    for(let d=1; d<=lastDate; d++){
      const dateKey = year + "-" + String(month + 1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
      const classes = ["day"];
      if(d === now.getDate()) classes.push("today");
      if(eventDays.has(dateKey)) classes.push("has-event");
      html += '<div class="' + classes.join(" ") + '">' + d + '</div>';
    }
    html += '</div>';
    return html;
  }

  function weatherCodeLabel(code){
    const map = {
      0:"Klar",1:"Überwiegend klar",2:"Teilweise bewölkt",3:"Bewölkt",
      45:"Nebel",48:"Raureifnebel",51:"Leichter Nieselregen",53:"Nieselregen",55:"Starker Nieselregen",
      61:"Leichter Regen",63:"Regen",65:"Starker Regen",71:"Leichter Schnee",73:"Schnee",75:"Starker Schneefall",
      80:"Regenschauer",81:"Starke Schauer",82:"Sehr starke Schauer",95:"Gewitter",96:"Gewitter mit Hagel",99:"Starkes Gewitter"
    };
    return map[code] || "Aktuell";
  }

  function weatherCodeIcon(code){
    if([0].includes(code)) return "☀️";
    if([1,2].includes(code)) return "🌤️";
    if([3].includes(code)) return "☁️";
    if([45,48].includes(code)) return "🌫️";
    if([51,53,55,61,63,65,80,81,82].includes(code)) return "🌧️";
    if([71,73,75].includes(code)) return "❄️";
    if([95,96,99].includes(code)) return "⛈️";
    return "⛅";
  }

  async function geocodeCity(city){
    try{
      const res = await fetch("https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(city) + "&count=1&language=de&format=json");
      const data = await res.json();
      if(data && data.results && data.results[0]){
        state.coords = {lat:data.results[0].latitude, lon:data.results[0].longitude};
        state.city = data.results[0].name;
        saveState();
      }
    }catch(error){}
  }

  async function loadWeather(){
    const tempEl = document.getElementById("weatherTemp");
    const cityEl = document.getElementById("weatherCity");
    const descEl = document.getElementById("weatherDesc");
    const metaEl = document.getElementById("weatherMeta");
    const iconEl = document.getElementById("weatherIcon");
    const forecastEl = document.getElementById("weatherForecast");
    if(!tempEl || !cityEl || !descEl || !metaEl || !iconEl || !forecastEl) return;

    cityEl.textContent = state.city;

    try{
      const lat = state.coords.lat;
      const lon = state.coords.lon;
      const url = "https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon + "&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto";
      const res = await fetch(url);
      if(!res.ok) throw new Error("weather");
      const data = await res.json();

      tempEl.textContent = Math.round(data.current.temperature_2m) + "°";
      descEl.textContent = weatherCodeLabel(data.current.weather_code);
      metaEl.textContent = "Gefühlt " + Math.round(data.current.apparent_temperature) + "° · Wind " + Math.round(data.current.wind_speed_10m) + " km/h";
      iconEl.textContent = weatherCodeIcon(data.current.weather_code);

      forecastEl.innerHTML = "";
      data.daily.time.slice(0,5).forEach((day, idx) => {
        const date = new Date(day);
        const div = document.createElement("div");
        div.className = "forecast-item";
        div.innerHTML = '<div><strong>' + date.toLocaleDateString("de-DE",{weekday:"short"}) + '</strong></div>'
          + '<div style="font-size:20px; margin:6px 0">' + weatherCodeIcon(data.daily.weather_code[idx]) + '</div>'
          + '<div>' + Math.round(data.daily.temperature_2m_max[idx]) + '° / ' + Math.round(data.daily.temperature_2m_min[idx]) + '°</div>';
        forecastEl.appendChild(div);
      });
    }catch(error){
      tempEl.textContent = "--°";
      descEl.textContent = "Wetter konnte nicht geladen werden";
      metaEl.textContent = "Offline oder API nicht erreichbar";
      iconEl.textContent = "⛅";
      forecastEl.innerHTML = "";
    }
  }

  function updateClock(){
    const t = document.getElementById("clockTime");
    const d = document.getElementById("clockDate");
    if(!t || !d) return;
    const now = new Date();
    t.textContent = now.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit", second:"2-digit"});
    d.textContent = now.toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  }

  function renderTileBody(item, body){
    if(item.type === "clock"){
      body.innerHTML = '<div class="clock-time" id="clockTime">--:--:--</div><div class="clock-date" id="clockDate">--</div>';
      return;
    }

    if(item.type === "weather"){
      body.innerHTML = ''
        + '<div class="weather-city">' + '<span id="weatherIcon">⛅</span> <span id="weatherCity">' + escapeHtml(state.city) + '</span></div>'
        + '<div class="weather-temp" id="weatherTemp">--°</div>'
        + '<div class="muted" id="weatherDesc">Lade Wetter...</div>'
        + '<div class="muted small" id="weatherMeta"></div>'
        + '<div class="forecast" id="weatherForecast"></div>';
      loadWeather();
      return;
    }

    if(item.type === "calendar"){
      body.innerHTML = createCalendarHTML();
      return;
    }

    if(item.type === "slideshow"){
      const current = state.photos.length ? state.photos[slideshowIndex % state.photos.length] : null;
      body.innerHTML = ''
        + '<div class="slide-stage">'
        +   (current
              ? '<img id="slideImage" src="' + current + '" alt="Slideshow">'
              : '<div class="slide-empty">Noch keine Bilder hochgeladen</div>')
        + '</div>'
        + '<div class="slidestrip">'
        + (state.photos || []).slice(0,3).map(src => '<img src="' + src + '" alt="">').join("")
        + '</div>';
      return;
    }

    if(item.type === "agenda"){
      body.innerHTML = state.events.length
        ? '<div class="agenda">' + state.events.map(formatEvent).join("") + '</div>'
        : '<div class="muted">Keine Termine eingetragen</div>';
      return;
    }

    if(item.type === "spotify"){
      body.innerHTML = '<iframe src="' + escapeHtml(state.spotifyUrl) + '" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>';
      return;
    }

    if(item.type === "youtube"){
      body.innerHTML = '<iframe src="' + escapeHtml(state.youtubeUrl) + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>';
      return;
    }

    if(item.type === "recipes"){
      body.innerHTML = state.recipes.length
        ? '<div class="agenda">' + state.recipes.map(formatRecipe).join("") + '</div>'
        : '<div class="muted">Keine Rezepte eingetragen</div>';
      return;
    }

    body.innerHTML = '<div class="muted">Leere Kachel</div>';
  }

  function bindDrag(tile){
    tile.addEventListener("dragstart", e => {
      if(!document.body.classList.contains("edit-mode")){ e.preventDefault(); return; }
      tile.classList.add("dragging");
      e.dataTransfer.setData("text/plain", tile.dataset.id);
    });

    tile.addEventListener("dragend", () => tile.classList.remove("dragging"));

    tile.addEventListener("dragover", e => {
      if(!document.body.classList.contains("edit-mode")) return;
      e.preventDefault();
      tile.classList.add("drop-target");
    });

    tile.addEventListener("dragleave", () => tile.classList.remove("drop-target"));

    tile.addEventListener("drop", e => {
      if(!document.body.classList.contains("edit-mode")) return;
      e.preventDefault();
      tile.classList.remove("drop-target");

      const fromId = e.dataTransfer.getData("text/plain");
      const toId = tile.dataset.id;
      if(!fromId || fromId === toId) return;

      const fromIndex = state.layout.findIndex(t => t.id === fromId);
      const toIndex = state.layout.findIndex(t => t.id === toId);
      if(fromIndex < 0 || toIndex < 0) return;

      const moved = state.layout.splice(fromIndex, 1)[0];
      state.layout.splice(toIndex, 0, moved);
      saveState();
      render();
    });
  }

  function render(){
    if(!Array.isArray(state.layout) || !state.layout.length){
      state.layout = deepCopy(defaultState.layout);
    }

    grid.innerHTML = "";

    state.layout.forEach(item => {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.draggable = true;
      tile.dataset.id = item.id;
      tile.style.gridColumn = "span " + item.w;
      tile.style.gridRow = "span " + item.h;

      tile.innerHTML =
        '<div class="tile-inner">'
        + '<div class="tile-header">'
        +   '<div class="tile-title">' + escapeHtml(item.title || item.type) + '</div>'
        +   '<div class="tile-tools">'
        +     '<button class="icon-btn resize-btn" title="Größe ändern">⤢</button>'
        +     '<button class="icon-btn delete-btn" title="Löschen">×</button>'
        +   '</div>'
        + '</div>'
        + '<div class="tile-body" style="display:flex; flex-direction:column; gap:10px; min-height:0; flex:1"></div>'
        + '</div>';

      renderTileBody(item, tile.querySelector(".tile-body"));

      tile.querySelector(".resize-btn").addEventListener("click", e => {
        e.stopPropagation();
        cycleTileSize(item);
        saveState();
        render();
      });

      tile.querySelector(".delete-btn").addEventListener("click", e => {
        e.stopPropagation();
        if(state.layout.length <= 1) return;
        state.layout = state.layout.filter(t => t.id !== item.id);
        saveState();
        render();
      });

      bindDrag(tile);
      grid.appendChild(tile);
    });

    updateClock();
  }

  function startSlideshow(){
    if(slideTimer) clearInterval(slideTimer);
    slideTimer = setInterval(() => {
      if(!state.photos.length) return;
      slideshowIndex = (slideshowIndex + 1) % state.photos.length;
      const img = document.getElementById("slideImage");
      if(img) img.src = state.photos[slideshowIndex];
    }, Math.max(3, Number(state.slideSeconds || 10)) * 1000);
  }

  function readFile(file){
    return new Promise((resolve,reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  document.getElementById("editBtn").addEventListener("click", () => {
    document.body.classList.toggle("edit-mode");
  });

  document.getElementById("settingsBtn").addEventListener("click", () => {
    document.getElementById("cityInput").value = state.city || "";
    document.getElementById("slideSecondsInput").value = state.slideSeconds || 10;
    document.getElementById("spotifyInput").value = state.spotifyUrl || "";
    document.getElementById("youtubeInput").value = state.youtubeUrl || "";
    document.getElementById("eventsInput").value = (state.events || []).join("\n");
    document.getElementById("recipesInput").value = (state.recipes || []).join("\n");
    settingsPanel.classList.add("open");
  });

  document.getElementById("closeSettings").addEventListener("click", () => settingsPanel.classList.remove("open"));

  document.getElementById("saveSettingsBtn").addEventListener("click", async () => {
    const newCity = document.getElementById("cityInput").value.trim();
    state.slideSeconds = Math.max(3, Number(document.getElementById("slideSecondsInput").value || 10));
    state.spotifyUrl = textToEmbedSpotify(document.getElementById("spotifyInput").value.trim());
    state.youtubeUrl = textToEmbedYoutube(document.getElementById("youtubeInput").value.trim());
    state.events = document.getElementById("eventsInput").value.split("\n").map(s => s.trim()).filter(Boolean);
    state.recipes = document.getElementById("recipesInput").value.split("\n").map(s => s.trim()).filter(Boolean);
    if(newCity && newCity !== state.city){
      state.city = newCity;
      await geocodeCity(newCity);
    }
    saveState();
    settingsPanel.classList.remove("open");
    render();
    startSlideshow();
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  });

  document.getElementById("imageInput").addEventListener("change", async e => {
    const files = Array.from(e.target.files || []);
    for(const file of files){
      state.photos.push(await readFile(file));
    }
    saveState();
    render();
    startSlideshow();
  });

  document.getElementById("addTileBtn").addEventListener("click", () => {
    const options = [
      {type:"clock",title:"Uhr"},
      {type:"weather",title:"Wetter"},
      {type:"calendar",title:"Kalender"},
      {type:"slideshow",title:"Slideshow"},
      {type:"agenda",title:"Termine"},
      {type:"spotify",title:"Spotify"},
      {type:"youtube",title:"YouTube"},
      {type:"recipes",title:"Rezepte"}
    ];
    const next = options[state.layout.length % options.length];
    state.layout.push({id: next.type + "-" + Date.now(), type: next.type, title: next.title, w: 4, h: 3});
    saveState();
    render();
  });

  render();
  startSlideshow();
  loadWeather();
  updateClock();
  setInterval(updateClock, 1000);
})();
</script>
</body>
</html>

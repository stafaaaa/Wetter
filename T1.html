<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>AnnaLove · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@300;400;500&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">

<style>
/* ============================================================
   THEMES — 3 distinct, premium
   ============================================================ */
:root, [data-theme="eclipse"] {
  --bg: #0a0a0b;
  --surface: #131316;
  --surface-2: #1a1a1e;
  --text: #fafafa;
  --muted: #71717a;
  --faint: #3f3f46;
  --accent: #fb923c;
  --line: rgba(255,255,255,0.06);
  --line-2: rgba(255,255,255,0.12);
  --hover: rgba(255,255,255,0.04);
  --hover-2: rgba(255,255,255,0.08);
  --overlay: rgba(0,0,0,0.35);
}

[data-theme="daylight"] {
  --bg: #fafaf9;
  --surface: #ffffff;
  --surface-2: #f4f4f3;
  --text: #0a0a0b;
  --muted: #71717a;
  --faint: #d4d4d8;
  --accent: #0a0a0b;
  --line: rgba(0,0,0,0.06);
  --line-2: rgba(0,0,0,0.12);
  --hover: rgba(0,0,0,0.04);
  --hover-2: rgba(0,0,0,0.08);
  --overlay: rgba(0,0,0,0.4);
}

[data-theme="aurora"] {
  --bg: #0a0e1a;
  --surface: #0f1420;
  --surface-2: #161c2c;
  --text: #fafafa;
  --muted: #64748b;
  --faint: #334155;
  --accent: #22d3ee;
  --line: rgba(255,255,255,0.06);
  --line-2: rgba(255,255,255,0.12);
  --hover: rgba(255,255,255,0.04);
  --hover-2: rgba(255,255,255,0.08);
  --overlay: rgba(0,0,0,0.35);
}

:root {
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
  --serif: 'Instrument Serif', Georgia, serif;
  --r: 8px;
  --r-pill: 999px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%; height: 100vh; height: 100dvh;
  overflow: hidden;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  user-select: none; -webkit-user-select: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Subtle noise — static, no animation */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  z-index: 0;
  mix-blend-mode: overlay;
}

[data-theme="aurora"] body::before {
  content: '';
  position: fixed; inset: -20%;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(34,211,238,0.08) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 70%, rgba(168,85,247,0.06) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 90%, rgba(236,72,153,0.04) 0%, transparent 40%);
  z-index: 0;
  animation: aurora 60s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes aurora {
  0%   { transform: translate3d(0, 0, 0); }
  100% { transform: translate3d(-2%, 1%, 0); }
}

@media (prefers-reduced-motion: reduce) {
  [data-theme="aurora"] body::before { animation: none; }
  *, *::before, *::after {
    animation-duration: 0ms !important;
    transition-duration: 0ms !important;
  }
}

/* ============================================================
   LAYOUT
   ============================================================ */
.dashboard {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 35fr 65fr;
  gap: 14px;
  padding: 14px;
  height: 100vh; height: 100dvh;
}

@media (max-width: 900px) {
  .dashboard {
    grid-template-columns: 1fr;
    grid-template-rows: 45vh 1fr;
  }
}

/* ============================================================
   MEDIA / SLIDESHOW
   ============================================================ */
.media {
  position: relative;
  overflow: hidden;
  border-radius: var(--r);
  background: #000;
  min-height: 0;
}

.slideshow { position: absolute; inset: 0; }

.slide {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0;
  transition: opacity 1.5s ease-in-out;
  z-index: 1;
}

.slide.active {
  opacity: 1;
  z-index: 2;
  animation: kenBurns 14s ease-in-out infinite alternate;
  will-change: transform;
}

@keyframes kenBurns {
  0%   { transform: translate3d(0, 0, 0) scale(1); }
  100% { transform: translate3d(-1%, 1%, 0) scale(1.08); }
}

.slide-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.3) 100%);
  z-index: 4;
  pointer-events: none;
}

.slide-empty {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: rgba(255,255,255,0.5);
  gap: 14px; padding: 24px; text-align: center;
  z-index: 3;
  font-size: 13px;
}
.slide-empty svg { width: 48px; height: 48px; opacity: 0.4; stroke-width: 1; }

.slide-counter {
  position: absolute;
  bottom: 14px; right: 14px;
  z-index: 7;
  display: flex; gap: 4px;
}
.slide-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transition: all 200ms var(--ease);
}
.slide-dot.active {
  background: #fff;
  width: 18px;
  border-radius: 3px;
}

/* ============ TOP-RIGHT TIME OVERLAY ============ */
.media-time {
  position: absolute;
  top: 14px; right: 14px;
  z-index: 6;
  background: var(--overlay);
  padding: 14px 18px;
  border-radius: var(--r);
  text-align: right;
  color: #fff;
  max-width: calc(100% - 28px);
}

.media-mood {
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  margin-bottom: 6px;
  line-height: 1;
}

.media-clock {
  font-family: var(--mono);
  font-size: clamp(56px, 8vw, 112px);
  font-weight: 500;
  letter-spacing: -0.05em;
  line-height: 0.95;
  font-variant-numeric: tabular-nums;
  color: #fff;
}

.media-date {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  margin-top: 8px;
}

/* ============ BOTTOM-LEFT WEATHER OVERLAY ============ */
.media-weather {
  position: absolute;
  bottom: 14px; left: 14px;
  z-index: 6;
  background: var(--overlay);
  padding: 12px 16px;
  border-radius: var(--r);
  color: #fff;
  cursor: pointer;
  transition: opacity 200ms var(--ease);
}
.media-weather:hover { opacity: 0.85; }

.mw-meta {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.65);
  font-variant-numeric: tabular-nums;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.mw-meta .sep { opacity: 0.4; }

.mw-main {
  display: flex; align-items: center; gap: 12px;
}

.mw-temp {
  font-family: var(--mono);
  font-size: clamp(40px, 6vw, 72px);
  font-weight: 300;
  letter-spacing: -0.04em;
  line-height: 0.9;
  font-variant-numeric: tabular-nums;
}
.mw-temp .u {
  font-size: 0.4em;
  vertical-align: super;
  opacity: 0.6;
  font-weight: 400;
  margin-left: 2px;
}

.mw-icon { width: 32px; height: 32px; flex-shrink: 0; color: #fff; }

/* ============ GEAR (top-left) ============ */
.gear {
  position: absolute;
  top: 14px; left: 14px;
  z-index: 7;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--overlay);
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #fff;
  opacity: 0.4;
  transition: opacity 200ms var(--ease);
  touch-action: manipulation;
}
.gear:hover, .gear:active { opacity: 1; }
.gear svg { width: 18px; height: 18px; }

/* ============================================================
   CALENDAR
   ============================================================ */
.cal {
  background: var(--surface);
  border-radius: var(--r);
  padding: 18px 22px 22px;
  display: flex; flex-direction: column;
  min-height: 0;
  overflow: hidden;
  border: 1px solid var(--line);
}

.cal-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap; gap: 12px;
}

.cal-title {
  display: flex; align-items: baseline; gap: 8px;
  line-height: 1;
}
.cal-month {
  font-family: var(--serif);
  font-style: italic;
  font-size: 32px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: -0.01em;
}
.cal-year {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 300;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

.cal-nav { display: flex; gap: 6px; align-items: center; }

.cal-btn {
  width: 32px; height: 32px;
  border-radius: var(--r);
  border: 1px solid var(--line-2);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: border-color 200ms var(--ease);
  touch-action: manipulation;
  font-family: var(--sans);
}
.cal-btn:hover, .cal-btn:active { border-color: var(--accent); }
.cal-btn.dot { font-size: 8px; }

.toggle {
  display: flex;
  border: 1px solid var(--line-2);
  border-radius: var(--r);
  padding: 2px;
  margin-left: 4px;
}
.toggle-btn {
  padding: 6px 12px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  cursor: pointer;
  border-radius: 6px;
  transition: all 200ms var(--ease);
  touch-action: manipulation;
}
.toggle-btn.active {
  background: var(--text);
  color: var(--bg);
}

/* Weekday headers */
.cal-wd {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 4px;
}
.cal-wd-cell {
  text-align: center;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

/* Day grid */
.cal-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-auto-rows: 1fr;
  min-height: 0;
}

.cal-day {
  position: relative;
  display: flex; flex-direction: column;
  padding: 6px 6px 4px;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background 200ms var(--ease);
  overflow: hidden;
  min-width: 0;
  touch-action: manipulation;
}
.cal-day:nth-child(7n) { border-right: none; }
.cal-day:nth-last-child(-n+7) { border-bottom: none; }
.cal-day:hover { background: var(--hover); }

.cal-day-n {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 400;
  text-align: center;
  line-height: 1;
  margin: 4px 0 6px;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  position: relative;
}

.cal-day.other .cal-day-n { opacity: 0.3; }
.cal-day.other .cal-evs { opacity: 0.4; }

.cal-day.today .cal-day-n {
  color: var(--accent);
  font-weight: 500;
}

.cal-day.today .cal-day-n::after {
  content: '';
  position: absolute;
  left: 50%;
  bottom: -5px;
  transform: translateX(-50%);
  width: 14px;
  height: 2px;
  background: var(--accent);
  border-radius: 1px;
}

.cal-evs {
  display: flex; flex-direction: column;
  gap: 2px;
  font-size: 11px;
  margin-top: 4px;
  overflow: hidden;
}

.cal-ev {
  display: flex; align-items: center; gap: 6px;
  padding: 2px 6px;
  background: var(--hover);
  border-radius: 4px;
  border-left: 2px solid var(--accent);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  transition: background 200ms var(--ease);
  min-width: 0;
}
.cal-ev:hover { background: var(--hover-2); }

.cal-ev-time {
  font-family: var(--mono);
  font-weight: 500;
  font-size: 10px;
  flex-shrink: 0;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}

.cal-ev-title {
  flex: 1;
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
}

.cal-ev-more {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  padding: 2px 6px;
  font-weight: 400;
  cursor: pointer;
}
.cal-ev-more:hover { color: var(--text); }

/* Week view */
.cal-week {
  flex: 1;
  display: flex; flex-direction: column;
  gap: 8px;
  overflow-y: auto;
  min-height: 0;
}
.cal-wkd {
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 14px 18px;
  min-height: 70px;
}
.cal-wkd.today { border-color: var(--accent); }
.cal-wkd-h {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 8px;
}
.cal-wkd-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.cal-wkd-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.cal-wkd-empty {
  font-size: 11px;
  color: var(--faint);
}
.cal-wk-ev {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 10px;
  margin-top: 6px;
  border-radius: var(--r);
  background: var(--hover);
  cursor: pointer;
  border-left: 2px solid var(--accent);
  transition: background 200ms var(--ease);
}
.cal-wk-ev:hover { background: var(--hover-2); }
.cal-wk-ev-t {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  min-width: 80px;
  font-variant-numeric: tabular-nums;
}
.cal-wk-ev-n {
  font-size: 13px;
  font-weight: 500;
  flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ============================================================
   WEATHER ICONS — monochrome outline (currentColor, 1.5px stroke)
   ============================================================ */
.wi { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.wi-sun-rays { transform-origin: center; animation: sunRotate 60s linear infinite; }
@keyframes sunRotate { to { transform: rotate(360deg); } }
.wi-rain-drop { animation: rainPulse 2s ease-in-out infinite; }
.wi-rain-drop:nth-child(2) { animation-delay: 0.4s; }
.wi-rain-drop:nth-child(3) { animation-delay: 0.8s; }
@keyframes rainPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

@media (prefers-reduced-motion: reduce) {
  .wi-sun-rays, .wi-rain-drop { animation: none !important; }
}

/* ============================================================
   MODALS
   ============================================================ */
.backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms var(--ease);
}
.backdrop.active { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--surface);
  border: 1px solid var(--line-2);
  border-radius: var(--r);
  padding: 28px;
  max-width: 540px; width: 100%; max-height: 80vh;
  overflow-y: auto;
  color: var(--text);
  transform: translateY(8px);
  transition: transform 200ms var(--ease);
}
.backdrop.active .modal { transform: translateY(0); }

.x-btn {
  position: absolute;
  top: 14px; right: 14px;
  width: 32px; height: 32px;
  border-radius: var(--r);
  border: 1px solid var(--line-2);
  background: transparent;
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  transition: border-color 200ms var(--ease);
  touch-action: manipulation;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--sans);
}
.x-btn:hover { border-color: var(--accent); }

.modal-bar {
  width: 32px; height: 2px;
  background: var(--accent);
  border-radius: 1px;
  margin-bottom: 18px;
}

.modal h2 {
  font-family: var(--sans);
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 8px;
  padding-right: 40px;
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.meta { display: flex; flex-direction: column; gap: 16px; margin-top: 18px; }
.row { display: flex; gap: 14px; align-items: flex-start; }
.row svg { width: 16px; height: 16px; color: var(--muted); margin-top: 2px; flex-shrink: 0; stroke-width: 1.5; }
.row-l {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 3px;
}
.row-v {
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  color: var(--text);
}

/* Weather modal */
.fc-modal { max-width: 680px; position: relative; }
.fc-loc {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  font-weight: 500;
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 6px;
}
.fc-loc svg { width: 12px; height: 12px; stroke-width: 1.5; }
.fc-current {
  display: flex; align-items: center; gap: 20px;
  margin: 18px 0 24px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--line);
}
.fc-cur-icon { width: 64px; height: 64px; color: var(--text); flex-shrink: 0; }
.fc-cur-temp {
  font-family: var(--mono);
  font-size: 56px;
  font-weight: 300;
  letter-spacing: -0.04em;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.fc-cur-desc {
  font-family: var(--serif);
  font-style: italic;
  font-size: 16px;
  color: var(--accent);
  margin-top: 6px;
  text-transform: lowercase;
}
.fc-cur-range {
  display: flex; gap: 14px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-top: 8px;
  font-variant-numeric: tabular-nums;
}
.fc-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.fc-day {
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 14px 8px;
  border-radius: var(--r);
  background: var(--surface-2);
  border: 1px solid var(--line);
}
.fc-name {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  font-weight: 500;
}
.fc-icon { width: 36px; height: 36px; margin: 8px 0; color: var(--text); }
.fc-temps {
  display: flex; flex-direction: column;
  gap: 2px; align-items: center;
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
}
.fc-max { font-size: 18px; font-weight: 500; color: var(--text); }
.fc-min { font-size: 11px; color: var(--muted); }

/* ============================================================
   SETTINGS PANEL
   ============================================================ */
.settings {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: min(380px, 100vw);
  background: var(--surface);
  border-left: 1px solid var(--line-2);
  z-index: 999;
  transform: translate3d(100%, 0, 0);
  transition: transform 200ms var(--ease);
  overflow-y: auto;
  padding: 24px 22px;
  color: var(--text);
}
.settings.active { transform: translate3d(0, 0, 0); }

.settings-h {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px;
}
.settings-h h2 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.section { margin-bottom: 28px; }
.section h3 {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
}

.fld { margin-bottom: 12px; }
.lbl {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 6px;
}

.inp, .ta {
  width: 100%;
  padding: 10px 12px;
  border-radius: var(--r);
  border: 1px solid var(--line-2);
  background: var(--surface-2);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  transition: border-color 200ms var(--ease);
}
.inp:focus, .ta:focus {
  outline: none;
  border-color: var(--accent);
}
.ta {
  min-height: 70px;
  resize: vertical;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.5;
}

.btn {
  padding: 10px 16px;
  border-radius: var(--r);
  border: 1px solid var(--accent);
  background: var(--accent);
  color: var(--bg);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: opacity 200ms var(--ease);
  font-family: var(--sans);
  touch-action: manipulation;
}
.btn:hover { opacity: 0.85; }
.btn-2 {
  background: transparent;
  color: var(--text);
  border-color: var(--line-2);
}
.btn-2:hover { border-color: var(--text); opacity: 1; }
.btn-x {
  background: transparent;
  color: #ef4444;
  border-color: rgba(239,68,68,0.3);
}
.btn-x:hover { border-color: #ef4444; opacity: 1; }

/* Theme picker */
.themes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.th-opt {
  position: relative;
  aspect-ratio: 1;
  border-radius: var(--r);
  cursor: pointer;
  border: 1px solid var(--line-2);
  overflow: hidden;
  transition: border-color 200ms var(--ease);
  padding: 10px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.th-opt:hover { border-color: var(--text); }
.th-opt.active { border-color: var(--accent); }

.th-prev-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}
.th-prev-bars {
  display: flex; flex-direction: column; gap: 3px;
}
.th-prev-bars div { height: 2px; border-radius: 1px; }
.th-prev-bars div:nth-child(1) { width: 100%; }
.th-prev-bars div:nth-child(2) { width: 60%; }
.th-prev-bars div:nth-child(3) { width: 80%; }

.th-lbl {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  text-align: left;
}

/* Calendar source list */
.cal-src {
  display: flex; align-items: center; gap: 10px;
  padding: 10px;
  background: var(--surface-2);
  border-radius: var(--r);
  margin-bottom: 6px;
  border: 1px solid var(--line);
}
.cal-src-c {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 1px solid var(--line-2);
}
.cal-src-info { flex: 1; min-width: 0; }
.cal-src-n { font-size: 12px; font-weight: 500; }
.cal-src-u {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.cal-src-x {
  width: 24px; height: 24px;
  border-radius: var(--r);
  border: 1px solid var(--line-2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  transition: all 200ms var(--ease);
  font-family: var(--sans);
}
.cal-src-x:hover { color: #ef4444; border-color: #ef4444; }

.imgs {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  margin-top: 8px;
  max-height: 200px; overflow-y: auto;
}
.img-i {
  position: relative;
  aspect-ratio: 1;
  background-size: cover; background-position: center;
  background-color: var(--surface-2);
  border-radius: var(--r);
  border: 1px solid var(--line);
}
.img-x {
  position: absolute;
  top: 2px; right: 2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  border: none;
  cursor: pointer;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translate3d(-50%, 80px, 0);
  background: var(--surface);
  border: 1px solid var(--line-2);
  padding: 10px 16px;
  border-radius: var(--r);
  font-size: 12px;
  color: var(--text);
  z-index: 2000;
  transition: transform 200ms var(--ease);
}
.toast.active { transform: translate3d(-50%, 0, 0); }

/* Hide elements w/ data-hidden="1" */
[data-hidden="1"] { display: none !important; }
</style>

<script>
'use strict';

const THEMES = [
  { id:'eclipse',  label:'Eclipse',  bg:'#0a0a0b', accent:'#fb923c' },
  { id:'daylight', label:'Daylight', bg:'#fafaf9', accent:'#0a0a0b' },
  { id:'aurora',   label:'Aurora',   bg:'#0a0e1a', accent:'#22d3ee' }
];

const DEFAULTS = {
  weatherKey:'769c5861cd255a3982bafb1680abf194',
  weatherLoc:'Düsseldorf,DE',
  driveFolders:[],
  slideInterval:8,
  theme:'eclipse',
  calSources:[{ id:'gcal-default', name:'Google Calendar', url:'https://calendar.google.com/calendar/ical/bee6bd50fed6997d7a4b9ad5a26e274fafe8499c2', color:'#fb923c' }],
  proxies:['https://corsproxy.io/?','https://api.allorigins.win/raw?url=']
};
const SK = 'annalove4_cfg';
const DB_NAME = 'annalove4_db';
const DB_STORE = 'imgs';
const DB_VERSION = 1;
const MAX_IMG_W = 1280;
const JPEG_Q = 0.82;

let cfg = (() => {
  try { const s = localStorage.getItem(SK); if (s) return { ...DEFAULTS, ...JSON.parse(s) }; }
  catch(e) {}
  return { ...DEFAULTS };
})();

let st = { view:'month', cursor:new Date(), events:[], slides:[], slideIndex:0, slideTimer:null, weather:null };

function saveCfg() { try { localStorage.setItem(SK, JSON.stringify(cfg)); } catch(e) {} }

/* IndexedDB */
let _db = null;
function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE, { keyPath:'id', autoIncrement:true });
    };
    req.onsuccess = () => { _db = req.result; res(_db); };
    req.onerror = () => rej(req.error);
  });
}
async function dbAll() { const db = await openDB(); return new Promise((res, rej) => { const tx = db.transaction(DB_STORE, 'readonly'); const r = tx.objectStore(DB_STORE).getAll(); r.onsuccess = () => res(r.result || []); r.onerror = () => rej(r.error); }); }
async function dbAdd(blob) { const db = await openDB(); return new Promise((res, rej) => { const tx = db.transaction(DB_STORE, 'readwrite'); const r = tx.objectStore(DB_STORE).add({ blob, addedAt:Date.now() }); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }
async function dbDelete(id) { const db = await openDB(); return new Promise((res, rej) => { const tx = db.transaction(DB_STORE, 'readwrite'); const r = tx.objectStore(DB_STORE).delete(id); r.onsuccess = () => res(); r.onerror = () => rej(r.error); }); }
async function dbClear() { const db = await openDB(); return new Promise((res, rej) => { const tx = db.transaction(DB_STORE, 'readwrite'); const r = tx.objectStore(DB_STORE).clear(); r.onsuccess = () => res(); r.onerror = () => rej(r.error); }); }

function resizeImage(file) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      try {
        let { width:w, height:h } = img;
        if (!w || !h) { URL.revokeObjectURL(url); rej(new Error('Bild hat keine Größe')); return; }
        if (w > MAX_IMG_W) { h = Math.round(h * (MAX_IMG_W/w)); w = MAX_IMG_W; }
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        const ctx = cv.getContext('2d');
        if (!ctx) { URL.revokeObjectURL(url); rej(new Error('Canvas nicht verfügbar')); return; }
        ctx.drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);

        // Try toBlob first (modern), fall back to toDataURL
        if (cv.toBlob) {
          cv.toBlob(b => {
            if (b) { res(b); }
            else { dataUrlFallback(cv, res, rej); }
          }, 'image/jpeg', JPEG_Q);
        } else {
          dataUrlFallback(cv, res, rej);
        }
      } catch(err) {
        URL.revokeObjectURL(url);
        rej(err);
      }
    };
    img.onerror = (err) => {
      URL.revokeObjectURL(url);
      rej(new Error('Bild ungültig oder Format nicht unterstützt'));
    };
    img.src = url;
  });
}

function dataUrlFallback(canvas, res, rej) {
  try {
    const dataUrl = canvas.toDataURL('image/jpeg', JPEG_Q);
    if (!dataUrl || dataUrl === 'data:,') { rej(new Error('toDataURL leer')); return; }
    // Convert dataURL to Blob
    const parts = dataUrl.split(',');
    const mime = parts[0].match(/:(.*?);/)[1];
    const bin = atob(parts[1]);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    res(new Blob([buf], { type: mime }));
  } catch(err) {
    rej(new Error('Fallback fehlgeschlagen: ' + err.message));
  }
}

let _imgCache = [];
function clearImgCache() { _imgCache.forEach(x => URL.revokeObjectURL(x.url)); _imgCache = []; }
async function loadImgsURLs() {
  clearImgCache();
  const items = await dbAll();
  _imgCache = items.map(it => ({ id:it.id, url:URL.createObjectURL(it.blob) }));
  return _imgCache;
}

function $(id) { return document.getElementById(id); }
function $$(s) { return document.querySelectorAll(s); }
function pad(n) { return String(n).padStart(2,'0'); }
function esc(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(m, ms=2500) { const e = $('toast'); e.textContent = m; e.classList.add('active'); clearTimeout(toast._t); toast._t = setTimeout(() => e.classList.remove('active'), ms); }

const M_DE = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const D_LONG = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const DS_SHORT = ['Mo','Di','Mi','Do','Fr','Sa','So'];
const WD_HEAD = ['MO','DI','MI','DO','FR','SA','SO'];

function isoWk(d) {
  const x = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dn = x.getUTCDay() || 7;
  x.setUTCDate(x.getUTCDate() + 4 - dn);
  const ys = new Date(Date.UTC(x.getUTCFullYear(), 0, 1));
  return Math.ceil((((x - ys) / 86400000) + 1) / 7);
}
function sameDay(a, b) { return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate(); }
function startOfWk(d) {
  const r = new Date(d);
  const dy = r.getDay();
  r.setDate(r.getDate() + (dy === 0 ? -6 : 1 - dy));
  r.setHours(0,0,0,0);
  return r;
}
function fmtT(d) { return pad(d.getHours()) + ':' + pad(d.getMinutes()); }

/* ============ THEMES ============ */
function applyTheme(id) {
  document.body.setAttribute('data-theme', id);
  cfg.theme = id;
  saveCfg();
  renderThemes();
}
function renderThemes() {
  $('themes').innerHTML = THEMES.map(t => {
    const isLight = t.id === 'daylight';
    const barColor = isLight ? '#0a0a0b' : '#fafafa';
    return `<div class="th-opt ${t.id === cfg.theme ? 'active' : ''}" data-id="${t.id}" style="background:${t.bg}">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div class="th-prev-bars">
          <div style="background:${barColor}; opacity:0.9"></div>
          <div style="background:${barColor}; opacity:0.5"></div>
          <div style="background:${barColor}; opacity:0.7"></div>
        </div>
        <div class="th-prev-dot" style="background:${t.accent}"></div>
      </div>
      <div class="th-lbl" style="color:${barColor}; opacity:0.8">${t.label}</div>
    </div>`;
  }).join('');
  $$('.th-opt').forEach(o => o.addEventListener('click', () => applyTheme(o.dataset.id)));
}

/* ============ CLOCK & MOOD ============ */
function moodForNow(weatherCode) {
  const h = new Date().getHours();
  if (weatherCode) {
    const c = parseInt(weatherCode, 10);
    if (c >= 200 && c <= 531) return 'rainy thoughts';
    if (c >= 600 && c <= 622) return 'snowfall';
  }
  if (h >= 5 && h < 11)  return 'a quiet morning';
  if (h >= 11 && h < 17) return 'afternoon light';
  if (h >= 17 && h < 22) return 'evening settles in';
  return 'late hours';
}
function updClock() {
  const n = new Date();
  $('media-clock').textContent = pad(n.getHours()) + ':' + pad(n.getMinutes());
  $('media-date').textContent = D_LONG[n.getDay()] + ', ' + n.getDate() + '. ' + M_DE[n.getMonth()];
  const code = st.weather && st.weather.c ? st.weather.c.weather[0].id : null;
  $('media-mood').textContent = moodForNow(code);
}
setInterval(updClock, 1000);
updClock();

/* ============ MONOCHROME WEATHER ICONS ============ */
function wIcon(code, night) {
  const c = parseInt(code, 10);
  const a = `class="wi" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"`;

  // Clear
  if (c === 800) return night
    ? `<svg ${a}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
    : `<svg ${a}><g class="wi-sun-rays"><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></g><circle cx="12" cy="12" r="4"/></svg>`;

  // Few/scattered clouds
  if (c >= 801 && c <= 802) return night
    ? `<svg ${a}><path d="M16 8c-1 0-1.5.5-2 1M21 12.79A7 7 0 1 1 11.21 5"/><path d="M18 17H6a3.5 3.5 0 0 1 0-7c.4-2.5 2.5-4 5-4 2 0 3.5 1 4.5 2.5C18 9 20 11 20 13c0 2-1 4-2 4z"/></svg>`
    : `<svg ${a}><g class="wi-sun-rays" style="transform-origin:8px 8px"><line x1="8" y1="2" x2="8" y2="3"/><line x1="2" y1="8" x2="3" y2="8"/><line x1="13" y1="8" x2="14" y2="8"/></g><circle cx="8" cy="8" r="3"/><path d="M18 17H8a3.5 3.5 0 0 1 0-7h.5a4 4 0 0 1 7 .5C18 11 20 12 20 14c0 1.5-1 3-2 3z"/></svg>`;

  // Overcast
  if (c >= 803) return `<svg ${a}><path d="M17 18H7a4 4 0 0 1 0-8 5 5 0 0 1 9.5-2A4 4 0 0 1 17 18z"/><path d="M19 14a3 3 0 0 0 0-6c-.4-1.5-1.5-3-4-3" opacity="0.5"/></svg>`;

  // Rain
  if (c >= 500 && c <= 531) return `<svg ${a}><path d="M16 13a4 4 0 0 0-1-7.87A5.5 5.5 0 0 0 5 7a4 4 0 0 0 0 8h11"/><line class="wi-rain-drop" x1="8" y1="19" x2="8" y2="21"/><line class="wi-rain-drop" x1="12" y1="19" x2="12" y2="21"/><line class="wi-rain-drop" x1="16" y1="19" x2="16" y2="21"/></svg>`;

  // Drizzle
  if (c >= 300 && c <= 321) return `<svg ${a}><path d="M16 13a4 4 0 0 0-1-7.87A5.5 5.5 0 0 0 5 7a4 4 0 0 0 0 8h11"/><line class="wi-rain-drop" x1="9" y1="18" x2="9" y2="20"/><line class="wi-rain-drop" x1="13" y1="18" x2="13" y2="20"/></svg>`;

  // Thunderstorm
  if (c >= 200 && c <= 232) return `<svg ${a}><path d="M16 13a4 4 0 0 0-1-7.87A5.5 5.5 0 0 0 5 7a4 4 0 0 0 0 8h11"/><polyline points="11 15 9 19 13 19 11 23"/></svg>`;

  // Snow
  if (c >= 600 && c <= 622) return `<svg ${a}><path d="M16 13a4 4 0 0 0-1-7.87A5.5 5.5 0 0 0 5 7a4 4 0 0 0 0 8h11"/><circle class="wi-rain-drop" cx="8" cy="20" r="0.8" fill="currentColor"/><circle class="wi-rain-drop" cx="12" cy="20" r="0.8" fill="currentColor"/><circle class="wi-rain-drop" cx="16" cy="20" r="0.8" fill="currentColor"/></svg>`;

  // Atmosphere (fog/mist)
  if (c >= 700 && c <= 781) return `<svg ${a}><line x1="3" y1="8" x2="21" y2="8"/><line x1="5" y1="12" x2="19" y2="12"/><line x1="3" y1="16" x2="21" y2="16"/><line x1="6" y1="20" x2="18" y2="20"/></svg>`;

  return `<svg ${a}><circle cx="12" cy="12" r="6"/></svg>`;
}

function renderW() {
  const { c } = st.weather;

function degToCompass(deg) {
  if (deg == null) return '';
  const dirs = ['N','NO','O','SO','S','SW','W','NW'];
  return dirs[Math.round((deg % 360) / 45) % 8];
}

function aggDaily(list) {
  const by = {};
  const today = new Date(); today.setHours(0,0,0,0);
  for (const i of list) {
    const dt = new Date(i.dt * 1000);
    if (dt < today) continue;
    if (sameDay(dt, today)) continue;
    const k = dt.toISOString().slice(0,10);
    if (!by[k]) by[k] = { dt, temps:[], codes:[] };
    by[k].temps.push(i.main.temp);
    by[k].codes.push({ code:i.weather[0].id, hour:dt.getHours() });
  }
  return Object.values(by).map(d => {
    const mid = d.codes.find(x => x.hour >= 11 && x.hour <= 14) || d.codes[0];
    return { dt:d.dt, name:DS_SHORT[(d.dt.getDay() + 6) % 7], min:Math.min(...d.temps), max:Math.max(...d.temps), code:mid.code };
  }).sort((a, b) => a.dt - b.dt);
}

/* ============ ICAL ============ */
function pIcalDate(s) {
  if (!s) return null;
  const x = s.replace(/[-:]/g, '');
  if (x.length === 8) return new Date(parseInt(x.slice(0,4)), parseInt(x.slice(4,6))-1, parseInt(x.slice(6,8)));
  const y = parseInt(x.slice(0,4)), mo = parseInt(x.slice(4,6))-1, d = parseInt(x.slice(6,8));
  const h = parseInt(x.slice(9,11)), mi = parseInt(x.slice(11,13)), sec = parseInt(x.slice(13,15)) || 0;
  if (x.endsWith('Z')) return new Date(Date.UTC(y, mo, d, h, mi, sec));
  return new Date(y, mo, d, h, mi, sec);
}
function pIcal(text, src) {
  const evs = [];
  const lines = text.replace(/\r\n[ \t]/g, '').replace(/\n[ \t]/g, '').split(/\r?\n/);
  let cur = null;
  for (const r of lines) {
    if (r === 'BEGIN:VEVENT') { cur = {}; continue; }
    if (r === 'END:VEVENT') {
      if (cur && cur.start) evs.push({ ...cur, source:src.id, sourceName:src.name, color:src.color, allDay:cur.allDay || false });
      cur = null; continue;
    }
    if (!cur) continue;
    const co = r.indexOf(':');
    if (co < 0) continue;
    const kp = r.slice(0, co), v = r.slice(co+1);
    const [k, ...ps] = kp.split(';');
    const ps2 = ps.join(';');
    switch (k) {
      case 'SUMMARY': cur.title = uIcal(v); break;
      case 'DESCRIPTION': cur.description = uIcal(v); break;
      case 'LOCATION': cur.location = uIcal(v); break;
      case 'DTSTART':
        cur.start = pIcalDate(v);
        if (ps2.includes('VALUE=DATE')) cur.allDay = true;
        break;
      case 'DTEND': cur.end = pIcalDate(v); break;
      case 'ATTENDEE':
        if (!cur.attendees) cur.attendees = [];
        const cn = ps2.match(/CN=([^;:]+)/);
        cur.attendees.push(cn ? cn[1] : v.replace(/^mailto:/i, ''));
        break;
      case 'RRULE': cur.rrule = v; break;
    }
  }
  return evs;
}
function uIcal(s) { return s.replace(/\\n/g,'\n').replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\\\/g,'\\'); }

function expand(ev, rs, re) {
  if (!ev.rrule) return [ev];
  const rr = {};
  for (const p of ev.rrule.split(';')) { const [k, v] = p.split('='); rr[k] = v; }
  const f = rr.FREQ;
  if (!f) return [ev];
  const iv = parseInt(rr.INTERVAL || '1');
  const ct = rr.COUNT ? parseInt(rr.COUNT) : null;
  const ut = rr.UNTIL ? pIcalDate(rr.UNTIL) : null;
  const out = [];
  const dur = (ev.end ? ev.end - ev.start : 0);
  let c = new Date(ev.start);
  let i = 0;
  while (i < 400) {
    if (ut && c > ut) break;
    if (ct && i >= ct) break;
    if (c > re) break;
    if (c >= rs) out.push({ ...ev, start:new Date(c), end:dur ? new Date(c.getTime() + dur) : ev.end });
    if (f === 'DAILY') c.setDate(c.getDate() + iv);
    else if (f === 'WEEKLY') c.setDate(c.getDate() + 7*iv);
    else if (f === 'MONTHLY') c.setMonth(c.getMonth() + iv);
    else if (f === 'YEARLY') c.setFullYear(c.getFullYear() + iv);
    else break;
    i++;
  }
  return out;
}

async function fetchIcal(src) {
  const tries = [src.url, ...DEFAULTS.proxies.map(p => p + encodeURIComponent(src.url))];
  for (const u of tries) {
    try {
      const r = await fetch(u);
      if (!r.ok) continue;
      const t = await r.text();
      if (t.includes('BEGIN:VCALENDAR')) return pIcal(t, src);
    } catch(e) {}
  }
  return [];
}

async function loadCal() {
  const all = [];
  for (const s of cfg.calSources) {
    if (!s.url) continue;
    try { all.push(...await fetchIcal(s)); } catch(e) {}
  }
  const rs = new Date(); rs.setFullYear(rs.getFullYear() - 1);
  const re = new Date(); re.setFullYear(re.getFullYear() + 1);
  const out = [];
  for (const e of all) out.push(...expand(e, rs, re));
  st.events = out;
  renderCal();
}

function evsForDay(d) {
  return st.events.filter(e => sameDay(new Date(e.start), d)).sort((a, b) => {
    if (a.allDay !== b.allDay) return a.allDay ? -1 : 1;
    return a.start - b.start;
  });
}

/* ============ CALENDAR RENDER ============ */
function renderCal() {
  if (st.view === 'month') renderMonth();
  else renderWeek();
}

function renderMonth() {
  $('cal-month-view').removeAttribute('data-hidden');
  $('cal-week-view').setAttribute('data-hidden', '1');

  const cur = st.cursor;
  $('cal-month').textContent = M_DE[cur.getMonth()];
  $('cal-year').textContent = cur.getFullYear();

  $('cal-wd').innerHTML = WD_HEAD.map(l => `<div class="cal-wd-cell">${l}</div>`).join('');

  const fom = new Date(cur.getFullYear(), cur.getMonth(), 1);
  const start = startOfWk(fom);
  const today = new Date();
  let h = '';
  let c = new Date(start);

  for (let w = 0; w < 6; w++) {
    for (let d = 0; d < 7; d++) {
      const evs = evsForDay(c);
      const oth = c.getMonth() !== cur.getMonth();
      const td = sameDay(c, today);
      const evsHtml = renderDayEvents(evs);
      h += `<div class="cal-day${oth?' other':''}${td?' today':''}" data-d="${c.toISOString()}">
              <div class="cal-day-n">${c.getDate()}</div>
              <div class="cal-evs">${evsHtml}</div>
            </div>`;
      c.setDate(c.getDate() + 1);
    }
  }
  $('cal-grid').innerHTML = h;

  $$('.cal-day').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.cal-ev') || e.target.closest('.cal-ev-more')) return;
      st.cursor = new Date(el.dataset.d);
      st.view = 'week';
      $$('.toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.view === 'week'));
      renderCal();
    });
  });
  $$('.cal-ev').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const dayIso = el.closest('.cal-day').dataset.d;
      const idx = parseInt(el.dataset.idx);
      const evs = evsForDay(new Date(dayIso));
      openEv(evs[idx]);
    });
  });
  $$('.cal-ev-more').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      st.cursor = new Date(el.closest('.cal-day').dataset.d);
      st.view = 'week';
      $$('.toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.view === 'week'));
      renderCal();
    });
  });
}

function renderDayEvents(evs) {
  const MAX = 4;
  const visible = evs.slice(0, MAX);
  const more = evs.length - MAX;
  const items = visible.map((ev, i) => {
    const timeText = ev.allDay ? 'ganztags' : fmtT(ev.start);
    return `<div class="cal-ev" data-idx="${i}" style="border-left-color:${ev.color}">
              <span class="cal-ev-time" style="color:${ev.color}">${timeText}</span>
              <span class="cal-ev-title">${esc(ev.title || '—')}</span>
            </div>`;
  }).join('');
  const moreHtml = more > 0 ? `<div class="cal-ev-more">+${more} mehr</div>` : '';
  return items + moreHtml;
}

function renderWeek() {
  $('cal-month-view').setAttribute('data-hidden', '1');
  $('cal-week-view').removeAttribute('data-hidden');
  const ws = startOfWk(st.cursor);
  const we = new Date(ws); we.setDate(we.getDate() + 6);
  const today = new Date();
  $('cal-month').textContent = `KW ${isoWk(ws)}`;
  $('cal-year').textContent = `${ws.getDate()}.${pad(ws.getMonth()+1)} – ${we.getDate()}.${pad(we.getMonth()+1)}.${we.getFullYear()}`;
  let h = '';
  const c = new Date(ws);
  for (let i = 0; i < 7; i++) {
    const evs = evsForDay(c);
    const td = sameDay(c, today);
    h += `<div class="cal-wkd${td?' today':''}">
            <div class="cal-wkd-h">
              <div class="cal-wkd-name">${D_LONG[c.getDay()]}</div>
              <div class="cal-wkd-date">${pad(c.getDate())}.${pad(c.getMonth()+1)}</div>
            </div>
            ${evs.length === 0
              ? '<div class="cal-wkd-empty">— nichts geplant —</div>'
              : evs.map((e, idx) => `<div class="cal-wk-ev" style="border-left-color:${e.color}" data-k="${c.toISOString()}__${idx}">
                  <div class="cal-wk-ev-t">${e.allDay ? 'ganztags' : fmtT(e.start) + (e.end ? '–' + fmtT(e.end) : '')}</div>
                  <div class="cal-wk-ev-n">${esc(e.title || '—')}</div>
                </div>`).join('')}
          </div>`;
    c.setDate(c.getDate() + 1);
  }
  $('cal-week-view').innerHTML = h;
  $$('.cal-wk-ev').forEach(el => el.addEventListener('click', () => {
    const [iso, idx] = el.dataset.k.split('__');
    const evs = evsForDay(new Date(iso));
    openEv(evs[parseInt(idx)]);
  }));
}

function openEv(e) {
  if (!e) return;
  $('ev-title').textContent = e.title || '(ohne Titel)';

    users:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>',
    tag:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1"/></svg>'
  };

/* ============ SLIDESHOW ============ */
function buildSlides() {
  const s = [];
  for (const e of (cfg.driveFolders || [])) {
    const t = (e || '').trim();
    if (!t) continue;
    if (t.startsWith('http')) s.push({ url:t });
    else s.push({ url:`https://lh3.googleusercontent.com/d/${t}=w2000` });
  }
  for (const x of _imgCache) s.push({ url:x.url });
  st.slides = s;
}

function renderSlides() {
  const ss = $('slideshow');
  ss.querySelectorAll('.slide').forEach(x => x.remove());
  if (st.slides.length === 0) {
    $('slide-empty').style.display = '';
    $('slide-counter').innerHTML = '';
    if (st.slideTimer) { clearInterval(st.slideTimer); st.slideTimer = null; }
    return;
  }
  $('slide-empty').style.display = 'none';
  const vignette = ss.querySelector('.slide-vignette');
  let activated = false;
  let errors = 0;

  st.slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide';
    div.dataset.idx = i;
    ss.insertBefore(div, vignette);
    const probe = new Image();
    probe.onload = () => {
      div.style.backgroundImage = `url('${s.url}')`;
      div.dataset.loaded = '1';
      if (!activated) {
        activated = true;
        div.classList.add('active');
        st.slideIndex = i;
        updateDots();
        startSlide();
      }
    };
    probe.onerror = () => {
      errors++;
      div.dataset.broken = '1';
      if (errors === st.slides.length) {
        $('slide-empty').style.display = '';
        $('slide-empty').innerHTML = '<div style="color:var(--accent)">Bilder nicht ladbar</div>';
      }
    };
    probe.src = s.url;
  });

  $('slide-counter').innerHTML = st.slides.map((_, i) => `<span class="slide-dot" data-idx="${i}"></span>`).join('');
  updateDots();
}

function updateDots() {
  $$('.slide-dot').forEach((d, i) => d.classList.toggle('active', i === st.slideIndex));
}

function startSlide() {
  if (st.slideTimer) { clearInterval(st.slideTimer); st.slideTimer = null; }
  if (st.slides.length < 2) return;
  const iv = Math.max(3, parseInt(cfg.slideInterval) || 8) * 1000;
  st.slideTimer = setInterval(advance, iv);
}

function advance() {
  const slides = document.querySelectorAll('.slide');
  if (slides.length < 2) return;
  let next = st.slideIndex;
  for (let i = 1; i <= slides.length; i++) {
    const cand = (st.slideIndex + i) % slides.length;
    const el = slides[cand];
    if (el && el.dataset.loaded === '1' && el.dataset.broken !== '1') { next = cand; break; }
  }
  if (next === st.slideIndex) return;
  slides[st.slideIndex].classList.remove('active');
  slides[next].classList.add('active');
  st.slideIndex = next;
  updateDots();
}

/* ============ SETTINGS ============ */
$('gear').addEventListener('click', openSettings);
$('settings-close').addEventListener('click', () => $('settings').classList.remove('active'));

function openSettings() {
  $('loc-inp').value = cfg.weatherLoc;
  $('interval').value = cfg.slideInterval;
  $('drive').value = (cfg.driveFolders || []).join('\n');
  renderThemes();
  renderCalList();
  renderImgs();
  $('settings').classList.add('active');
}

function renderCalList() {
  const l = $('cal-list');
  if (cfg.calSources.length === 0) { l.innerHTML = '<div style="color:var(--muted);font-size:11px">Noch keine Quellen</div>'; return; }
  l.innerHTML = cfg.calSources.map(s => `<div class="cal-src"><div class="cal-src-c" style="background:${s.color}"></div><div class="cal-src-info"><div class="cal-src-n">${esc(s.name)}</div><div class="cal-src-u">${esc(s.url || '—')}</div></div><button class="cal-src-x" data-id="${s.id}">×</button></div>`).join('');
  l.querySelectorAll('.cal-src-x').forEach(b => b.addEventListener('click', () => {
    cfg.calSources = cfg.calSources.filter(s => s.id !== b.dataset.id);
    saveCfg(); renderCalList(); loadCal();
  }));
}

$('cal-add').addEventListener('click', () => {
  const n = $('cal-n').value.trim(), u = $('cal-u').value.trim(), c = $('cal-c').value || '#fb923c';
  if (!n || !u) { toast('Name und URL erforderlich'); return; }
  cfg.calSources.push({ id:'cal-'+Date.now(), name:n, url:u, color:c });
  saveCfg();
  $('cal-n').value = ''; $('cal-u').value = '';
  renderCalList(); loadCal();
  toast('Kalender hinzugefügt');
});

$('loc-save').addEventListener('click', () => {
  const v = $('loc-inp').value.trim();
  if (!v) { toast('Standort erforderlich'); return; }
  cfg.weatherLoc = v; saveCfg(); loadW(); toast('Standort gespeichert');
});

$('img-save').addEventListener('click', () => {
  cfg.driveFolders = $('drive').value.split('\n').map(s => s.trim()).filter(Boolean);
  cfg.slideInterval = parseInt($('interval').value) || 8;
  saveCfg();
  buildSlides(); renderSlides();
  toast('Slideshow aktualisiert (' + st.slides.length + ' Bilder)');
});

$('upload').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  let ok = 0, fail = 0;
  let lastError = '';
  toast('Lade ' + files.length + ' Bild(er)...', 5000);
  console.log('[Upload] Start:', files.length, 'files');
  for (const f of files) {
    console.log('[Upload] Processing:', f.name, f.type, f.size, 'bytes');
    if (!f.type.startsWith('image/')) {
      console.warn('[Upload] Not an image:', f.type);
      lastError = 'Kein Bild: ' + f.type;
      fail++; continue;
    }
    try {
      const blob = await resizeImage(f);
      console.log('[Upload] Resized to', blob.size, 'bytes');
      const id = await dbAdd(blob);
      console.log('[Upload] Saved with id', id);
      ok++;
    } catch(err) {
      console.error('[Upload] FAILED for', f.name, err);
      lastError = err.message || String(err);
      fail++;
    }
  }
  await loadImgsURLs();
  renderImgs(); buildSlides(); renderSlides();
  if (ok > 0) {
    toast(ok + ' gespeichert' + (fail ? ', ' + fail + ' fehlgeschlagen' : ''));
  } else {
    toast('Fehler: ' + lastError, 6000);
  }
  e.target.value = '';
});

$('img-clr').addEventListener('click', async () => {
  if (!confirm('Lokale Bilder löschen?')) return;
  await dbClear();
  await loadImgsURLs();
  renderImgs(); buildSlides(); renderSlides();
  toast('Lokale Bilder gelöscht');
});

function renderImgs() {
  const lo = _imgCache;
  const dr = (cfg.driveFolders || []).filter(s => s.trim()).map(s => s.trim().startsWith('http') ? s.trim() : `https://lh3.googleusercontent.com/d/${s.trim()}=w400`);
  const all = [...dr.map((url) => ({ url, t:'drive' })), ...lo.map(x => ({ url:x.url, t:'local', dbid:x.id }))];
  if (all.length === 0) { $('imgs').innerHTML = '<div style="color:var(--muted);font-size:11px;grid-column:1/-1;text-align:center;padding:12px">Keine Bilder</div>'; return; }
  $('imgs').innerHTML = all.map(i => `<div class="img-i" style="background-image:url('${i.url}')">${i.t === 'local' ? `<button class="img-x" data-dbid="${i.dbid}">×</button>` : ''}</div>`).join('');
  $('imgs').querySelectorAll('.img-x').forEach(b => b.addEventListener('click', async (e) => {
    e.stopPropagation();
    await dbDelete(parseInt(b.dataset.dbid));
    await loadImgsURLs();
    renderImgs(); buildSlides(); renderSlides();
  }));
}

$('reload').addEventListener('click', () => location.reload());

/* Long-press on time -> open settings */
let pt = null;
['touchstart','mousedown'].forEach(ev => $('media-time').addEventListener(ev, () => { pt = setTimeout(openSettings, 1200); }, { passive:true }));
['touchend','mouseup','mouseleave','touchcancel'].forEach(ev => $('media-time').addEventListener(ev, () => clearTimeout(pt)));

/* ============ INIT ============ */
applyTheme(cfg.theme || 'eclipse');
(async () => {
  try { await loadImgsURLs(); } catch(e) { console.warn('IndexedDB init failed', e); }
  buildSlides();
  renderSlides();
})();
loadW();
loadCal();
renderCal();

setInterval(loadW, 15 * 60 * 1000);
setInterval(loadCal, 30 * 60 * 1000);

document.addEventListener('visibilitychange', () => {
  if (document.hidden) { if (st.slideTimer) { clearInterval(st.slideTimer); st.slideTimer = null; } }
  else startSlide();
});
</script>
</body>

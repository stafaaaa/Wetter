<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SmartHub Ultimate · Kühlschrank Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* cleaner tablet feel */
        }

        /* ----- GLOBAL THEME VARIABLES (default: OLED Deep Black) ----- */
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.85);
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --accent: #00e5ff;
            --border-glow: rgba(0, 229, 255, 0.3);
            --calendar-bg: #111;
            --event-work: #1e88e5;
            --event-birthday: #ec407a;
            --event-appointment: #ff9800;
            --event-waste: #43a047;
            --event-default: #546e7a;
        }

        /* Theme definitions */
        body.theme-oled-black { --bg-primary: #000000; --bg-secondary: #0a0a0a; --card-bg: #111; --text-primary: #fff; --text-secondary: #aaa; --accent: #00e5ff; }
        body.theme-frosted-glass { --bg-primary: #cfe8ff; --bg-secondary: rgba(255,255,240,0.5); --card-bg: rgba(255,255,255,0.25); --text-primary: #0a2f44; --text-secondary: #1e3a5f; --accent: #2c7da0; backdrop-filter: blur(12px); }
        body.theme-nordic-dark { --bg-primary: #1e2a3e; --bg-secondary: #0f1722; --card-bg: #2d3a4b; --text-primary: #e5e9f0; --text-secondary: #88c0d0; --accent: #81a1c1; }
        body.theme-cyberpunk-neon { --bg-primary: #0b0b1a; --bg-secondary: #1a1a3a; --card-bg: #0f0f2a; --text-primary: #0afff0; --text-secondary: #ff3d8c; --accent: #ff00cc; --border-glow: #0afff0; }
        body.theme-emerald-forest { --bg-primary: #0b2f1f; --bg-secondary: #1a4a2a; --card-bg: #1f5a30; --text-primary: #dcfce8; --text-secondary: #b2e6c6; --accent: #6fbf4c; }
        body.theme-sunset-purple { --bg-primary: #2e1a36; --bg-secondary: #45214a; --card-bg: #5e2a5c; --text-primary: #f3d9dc; --text-secondary: #e7b9c3; --accent: #ffb347; }
        body.theme-midnight-ocean { --bg-primary: #0a192f; --bg-secondary: #102a43; --card-bg: #1e3a5f; --text-primary: #ccf4ff; --text-secondary: #9ac7e7; --accent: #3b82f6; }
        body.theme-minimal-white { --bg-primary: #f8fafc; --bg-secondary: #ffffff; --card-bg: #ffffff; --text-primary: #0f172a; --text-secondary: #475569; --accent: #0ea5e9; }
        body.theme-crimson-red { --bg-primary: #3b0b11; --bg-secondary: #5e151f; --card-bg: #8a1e2c; --text-primary: #ffe3e3; --text-secondary: #ffb2b2; --accent: #ef4444; }
        body.theme-royal-indigo { --bg-primary: #12102e; --bg-secondary: #1f1b4e; --card-bg: #2a2378; --text-primary: #e0d9ff; --text-secondary: #b9afff; --accent: #6d5ac9; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            transition: background 0.2s ease, color 0.2s;
            padding: 20px;
            min-height: 100vh;
        }

        /* MAIN GRID - 2 columns */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.2fr 1.8fr;
            gap: 24px;
            height: calc(100vh - 40px);
        }

        /* cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            transition: all 0.2s;
            border: 1px solid var(--border-glow);
            overflow: hidden;
        }

        /* Zeitbereich extragroß */
        .time-section {
            text-align: center;
            margin-bottom: 24px;
        }
        .clock {
            font-size: 5.2rem;
            font-weight: 800;
            letter-spacing: 4px;
            font-family: monospace;
            line-height: 1;
        }
        .date {
            font-size: 1.6rem;
            font-weight: 500;
            margin-top: 8px;
            color: var(--text-secondary);
        }

        /* Wetter */
        .weather-main {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            margin-top: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 3rem;
            padding: 12px;
        }
        .temp-big {
            font-size: 4rem;
            font-weight: 800;
        }
        .weather-icon-svg svg {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 0 6px var(--accent));
        }
        .forecast-row {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            margin-top: 20px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .forecast-day {
            text-align: center;
            min-width: 70px;
            background: rgba(0,0,0,0.3);
            border-radius: 2rem;
            padding: 8px 4px;
        }

        /* Medien-Showroom */
        .media-container {
            margin-top: 24px;
            border-radius: 2rem;
            background: rgba(0,0,0,0.4);
            min-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .media-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .media-inner img, .media-inner video {
            max-width: 100%;
            max-height: 260px;
            border-radius: 1.5rem;
            object-fit: contain;
            transition: transform 0.3s;
        }
        /* animation classes */
        .anim-fade { animation: fadeAnim 0.6s ease; }
        .anim-zoom-in { animation: zoomIn 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .anim-zoom-out { animation: zoomOut 0.5s ease; }
        .anim-slide-left { animation: slideLeft 0.5s ease-out; }
        .anim-slide-right { animation: slideRight 0.5s ease-out; }
        .anim-blur-in { animation: blurIn 0.5s forwards; }
        .anim-rotation { animation: rotateIn 0.6s ease-out; }
        .anim-3d-flip { animation: flipIn 0.7s; }
        .anim-kenburns { animation: kenBurns 8s infinite alternate; }
        .anim-bounce { animation: bounceIn 0.7s cubic-bezier(0.28, 1.1, 0.55, 1); }
        @keyframes fadeAnim { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes zoomIn { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes zoomOut { 0% { transform: scale(1.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes slideLeft { 0% { transform: translateX(60px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes slideRight { 0% { transform: translateX(-60px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes blurIn { 0% { filter: blur(12px); opacity: 0; } 100% { filter: blur(0); opacity: 1; } }
        @keyframes rotateIn { 0% { transform: rotate(-20deg) scale(0.8); opacity: 0; } 100% { transform: rotate(0deg) scale(1); opacity: 1; } }
        @keyframes flipIn { 0% { transform: perspective(400px) rotateY(90deg); opacity: 0; } 100% { transform: perspective(400px) rotateY(0deg); opacity: 1; } }
        @keyframes kenBurns { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
        @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }

        /* Kalenderbereich (farbige balken) */
        .calendar-events {
            overflow-y: auto;
            max-height: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .event-bar {
            background: var(--event-default);
            padding: 14px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.1s ease, filter 0.2s;
            border-left: 8px solid white;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }
        .event-bar:hover {
            transform: scale(1.01);
            filter: brightness(1.05);
        }
        .event-title {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .event-time {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        /* settings button + sidebar */
        .settings-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--accent);
            border: none;
            border-radius: 60px;
            width: 55px;
            height: 55px;
            font-size: 28px;
            cursor: pointer;
            z-index: 1000;
            color: black;
            font-weight: bold;
            box-shadow: 0 4px 14px rgba(0,0,0,0.4);
        }
        .sidebar {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            height: 100vh;
            background: var(--bg-secondary);
            backdrop-filter: blur(24px);
            z-index: 1100;
            padding: 24px;
            transition: right 0.3s ease;
            box-shadow: -4px 0 20px black;
            overflow-y: auto;
            border-left: 1px solid var(--accent);
        }
        .sidebar.open {
            right: 0;
        }
        .sidebar label {
            display: block;
            margin-top: 18px;
            font-weight: bold;
        }
        .sidebar select, .sidebar input, .sidebar textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 40px;
            border: none;
            background: var(--card-bg);
            color: var(--text-primary);
        }
        button {
            background: var(--accent);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            margin-top: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .media-upload-preview {
            font-size: 0.75rem;
            margin-top: 8px;
            word-break: break-all;
        }
        hr {
            margin: 20px 0;
            border-color: var(--text-secondary);
        }

        /* modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 2rem;
            max-width: 500px;
            width: 80%;
            color: var(--text-primary);
        }
        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr; gap: 20px; height: auto; }
            .clock { font-size: 3.2rem; }
        }
    </style>
</head>
<body class="theme-oled-black">
    <div class="dashboard">
        <!-- LINKe Spalte: Zeit, Wetter, Medien -->
        <div class="left-col" style="display: flex; flex-direction: column; gap: 24px;">
            <div class="card">
                <div class="time-section">
                    <div class="clock" id="clock">--:--:--</div>
                    <div class="date" id="date"></div>
                </div>
                <div id="weatherWidget">
                    <div class="weather-main">
                        <div class="temp-big" id="currentTemp">--°C</div>
                        <div id="weatherIcon" class="weather-icon-svg"></div>
                    </div>
                    <div id="forecast" class="forecast-row">5-Tage Vorhersage laden...</div>
                </div>
            </div>
            <div class="card">
                <h3 style="margin-bottom: 12px;">📸 Familienerinnerungen</h3>
                <div class="media-container" id="mediaContainer">
                    <div class="media-inner" id="mediaInner">✨ Medien werden geladen</div>
                </div>
                <div style="font-size: 12px; text-align: center; margin-top: 8px;">🎬 Automatische Slideshow</div>
            </div>
        </div>

        <!-- RECHTE Spalte: Kalender (farbige Balken) -->
        <div class="card" style="display: flex; flex-direction: column;">
            <h2 style="margin-bottom: 16px;">📅 Termine & Kalender</h2>
            <div id="calendarList" class="calendar-events">
                <p style="opacity:0.7;">ICS-URL einrichten & termin synchronisieren</p>
            </div>
        </div>
    </div>

    <button class="settings-toggle" id="settingsToggle">⚙️</button>
    <div id="sidebar" class="sidebar">
        <h3>SmartHub Einstellungen</h3>
        <label>🎨 Thema</label>
        <select id="themeSelect">
            <option value="oled-black">OLED Deep Black</option><option value="frosted-glass">Frosted Glass</option><option value="nordic-dark">Nordic Dark</option>
            <option value="cyberpunk-neon">Cyberpunk Neon</option><option value="emerald-forest">Emerald Forest</option><option value="sunset-purple">Sunset Purple</option>
            <option value="midnight-ocean">Midnight Ocean</option><option value="minimal-white">Minimal White</option><option value="crimson-red">Crimson Red</option><option value="royal-indigo">Royal Indigo</option>
        </select>
        <label>🌍 Stadt (Wetter)</label>
        <input type="text" id="cityInput" placeholder="z.B. Berlin" value="Berlin">
        <label>🔑 OpenWeatherMap API Key</label>
        <input type="text" id="apiKeyInput" placeholder="API Key" value="">
        <label>📆 Google Kalender ICS-URL (mit corsproxy)</label>
        <input type="text" id="icsUrlInput" placeholder="https://.../basic.ics">
        <label>🖼️ Medien-URLs (Bilder/MP4/MOV, eine pro Zeile)</label>
        <textarea id="mediaUrlsInput" rows="3" placeholder="https://example.com/bild.jpg\nhttps://example.com/video.mp4"></textarea>
        <label>✨ Slideshow-Animation</label>
        <select id="animationSelect">
            <option value="anim-fade">Fade</option><option value="anim-zoom-in">Zoom-In</option><option value="anim-zoom-out">Zoom-Out</option>
            <option value="anim-slide-left">Slide Links</option><option value="anim-slide-right">Slide Rechts</option><option value="anim-blur-in">Blur-In</option>
            <option value="anim-rotation">Rotation</option><option value="anim-3d-flip">3D-Flip</option><option value="anim-kenburns">Ken-Burns</option><option value="anim-bounce">Bounce</option>
        </select>
        <label>📁 Lokale Uploads (Bild/Video)</label>
        <input type="file" id="localUpload" accept="image/*,video/mp4,video/quicktime">
        <button id="applyMediaBtn">➕ Medienliste übernehmen</button>
        <div class="media-upload-preview" id="mediaDebug"></div>
        <hr>
        <button id="forceWeatherBtn">🔄 Wetter aktualisieren</button>
        <button id="forceCalendarBtn">📅 Kalender neu laden</button>
    </div>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3 id="modalTitle">Termin</h3>
            <p id="modalTime"></p>
            <p id="modalLocation"></p>
            <p id="modalDesc"></p>
        </div>
    </div>

    <script>
        // ---------- GLOBALE STATE ----------
        let mediaList = [];        // Array von { url, type } (type 'image'/'video')
        let slideIndex = 0;
        let slideInterval = null;
        let currentAnimation = "anim-fade";
        let currentEvents = [];     // gespeicherte Termine fürs Kalender-Modal
        let weatherInterval = null;
        let clockInterval = null;

        // DOM-Elemente
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('date');
        const mediaInner = document.getElementById('mediaInner');
        const calendarListDiv = document.getElementById('calendarList');
        const themeSelect = document.getElementById('themeSelect');
        const cityInput = document.getElementById('cityInput');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const icsUrlInput = document.getElementById('icsUrlInput');
        const mediaUrlsInput = document.getElementById('mediaUrlsInput');
        const animationSelect = document.getElementById('animationSelect');
        const localUpload = document.getElementById('localUpload');
        const applyMediaBtn = document.getElementById('applyMediaBtn');

        // Helper: localStorage load/save
        function loadSettings() {
            try {
                const theme = localStorage.getItem('smarthub_theme') || 'oled-black';
                themeSelect.value = theme;
                document.body.className = `theme-${theme}`;
                const city = localStorage.getItem('smarthub_city') || 'Berlin';
                cityInput.value = city;
                const apikey = localStorage.getItem('smarthub_apikey') || '';
                apiKeyInput.value = apikey;
                const ics = localStorage.getItem('smarthub_ics') || '';
                icsUrlInput.value = ics;
                const mediaUrlsRaw = localStorage.getItem('smarthub_media_urls');
                if(mediaUrlsRaw) mediaUrlsInput.value = mediaUrlsRaw;
                const anim = localStorage.getItem('smarthub_animation') || 'anim-fade';
                animationSelect.value = anim;
                currentAnimation = anim;
            } catch(e) {}
        }
        function saveAllSettings() {
            localStorage.setItem('smarthub_theme', themeSelect.value);
            localStorage.setItem('smarthub_city', cityInput.value);
            localStorage.setItem('smarthub_apikey', apiKeyInput.value);
            localStorage.setItem('smarthub_ics', icsUrlInput.value);
            localStorage.setItem('smarthub_media_urls', mediaUrlsInput.value);
            localStorage.setItem('smarthub_animation', animationSelect.value);
        }

        // Theme wechseln
        function applyTheme() { document.body.className = `theme-${themeSelect.value}`; saveAllSettings(); }

        // Uhr & Datum
        function updateClock() {
            const now = new Date();
            clockEl.innerText = now.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            dateEl.innerText = now.toLocaleDateString('de-DE', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
        }

        // WETTER: openweather API  
        async function fetchWeather() {
            const city = cityInput.value.trim();
            const apiKey = apiKeyInput.value.trim();
            if(!apiKey) { document.getElementById('currentTemp').innerHTML = '🔑 API Key fehlt'; return; }
            try {
                const geo = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=de`;
                const fore = `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric&lang=de`;
                const [weatherRes, forecastRes] = await Promise.all([fetch(geo), fetch(fore)]);
                if(!weatherRes.ok || !forecastRes.ok) throw new Error('Wetter API Fehler');
                const weatherData = await weatherRes.json();
                const forecastData = await forecastRes.json();
                const temp = Math.round(weatherData.main.temp);
                document.getElementById('currentTemp').innerHTML = `${temp}°C`;
                const condition = weatherData.weather[0].main;
                const iconSvg = getWeatherSvg(condition);
                document.getElementById('weatherIcon').innerHTML = iconSvg;
                // 5-Tage Vorhersage gruppieren
                const dailyMap = new Map();
                forecastData.list.forEach(item => {
                    const date = item.dt_txt.split(' ')[0];
                    if(!dailyMap.has(date)) dailyMap.set(date, []);
                    dailyMap.get(date).push(item.main.temp_max);
                });
                let forecastHtml = '';
                let idx=0;
                for(let [date, temps] of dailyMap.entries()) {
                    if(idx++>=5) break;
                    const maxTemp = Math.max(...temps);
                    const dayName = new Date(date).toLocaleDateString('de-DE', { weekday:'short' });
                    forecastHtml += `<div class="forecast-day">${dayName}<br>${Math.round(maxTemp)}°C</div>`;
                }
                document.getElementById('forecast').innerHTML = forecastHtml || 'Vorhersage nicht verfügbar';
            } catch(err) { console.warn(err); document.getElementById('currentTemp').innerHTML = '⚠️ Wetterfehler'; }
        }
        function getWeatherSvg(condition) {
            const lower = condition.toLowerCase();
            if(lower.includes('clear') || lower.includes('sun')) return `<svg viewBox="0 0 100 100" width="70"><circle cx="50" cy="50" r="22" fill="#FFD966"/><line x1="50" y1="10" x2="50" y2="22" stroke="#FFD966" stroke-width="4"/><line x1="50" y1="78" x2="50" y2="90" stroke="#FFD966" stroke-width="4"/><line x1="10" y1="50" x2="22" y2="50" stroke="#FFD966" stroke-width="4"/><line x1="78" y1="50" x2="90" y2="50" stroke="#FFD966" stroke-width="4"/></svg>`;
            if(lower.includes('cloud')) return `<svg viewBox="0 0 100 50" fill="#B0BEC5"><circle cx="30" cy="25" r="18" fill="#CFD8DC"/><circle cx="60" cy="25" r="22" fill="#90A4AE"/><rect x="20" y="28" width="55" height="20" rx="8" fill="#BCD4E6"/></svg>`;
            if(lower.includes('rain')) return `<svg viewBox="0 0 100 60"><circle cx="40" cy="22" r="18" fill="#78909C"/><path d="M55 35 L60 50 L65 35" stroke="#64B5F6" fill="none" stroke-width="3"/><path d="M70 32 L75 47 L80 32" stroke="#64B5F6" fill="none"/></svg>`;
            return `<svg viewBox="0 0 100 50"><circle cx="50" cy="25" r="20" fill="#CFD8DC"/></svg>`;
        }

        // ---------- ICS KALENDER PARSER + farbige Balken ----------
        async function loadCalendar() {
            let icsUrl = icsUrlInput.value.trim();
            if(!icsUrl) { calendarListDiv.innerHTML = '<p>⚙️ Keine ICS-URL konfiguriert</p>'; return; }
            try {
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(icsUrl)}`;
                const response = await fetch(proxyUrl);
                const icsText = await response.text();
                const events = parseICS(icsText);
                currentEvents = events;
                renderCalendarEvents(events);
            } catch(err) { calendarListDiv.innerHTML = `<p>❌ Fehler beim Laden: ${err.message}</p>`; }
        }
        function parseICS(icsData) {
            const events = [];
            const lines = icsData.split(/\r?\n/);
            let inEvent = false;
            let current = {};
            for(let line of lines) {
                line = line.trim();
                if(line === 'BEGIN:VEVENT') { inEvent=true; current={}; }
                else if(line === 'END:VEVENT') {
                    if(current.summary && current.start) {
                        const startDate = parseICSDate(current.start);
                        if(startDate && !isNaN(startDate)) {
                            current.startDate = startDate;
                            events.push(current);
                        }
                    }
                    inEvent=false;
                } else if(inEvent) {
                    if(line.startsWith('SUMMARY:')) current.summary = line.replace('SUMMARY:','').trim();
                    if(line.startsWith('DTSTART')) current.start = line.split(':')[1]?.trim();
                    if(line.startsWith('DTEND')) current.end = line.split(':')[1]?.trim();
                    if(line.startsWith('LOCATION:')) current.location = line.replace('LOCATION:','').trim();
                    if(line.startsWith('DESCRIPTION:')) current.description = line.replace('DESCRIPTION:','').trim();
                }
            }
            events.sort((a,b)=>a.startDate - b.startDate);
            return events.slice(0,30);
        }
        function parseICSDate(dtstr) {
            if(!dtstr) return null;
            let year, month, day, hour=0, minute=0;
            if(dtstr.includes('T')) {
                let [datePart, timePart] = dtstr.split('T');
                year = parseInt(datePart.slice(0,4));
                month = parseInt(datePart.slice(4,6))-1;
                day = parseInt(datePart.slice(6,8));
                hour = parseInt(timePart.slice(0,2));
                minute = parseInt(timePart.slice(2,4));
            } else {
                year = parseInt(dtstr.slice(0,4));
                month = parseInt(dtstr.slice(4,6))-1;
                day = parseInt(dtstr.slice(6,8));
            }
            return new Date(year, month, day, hour, minute);
        }
        function getCategoryColor(summary) {
            const s = summary.toLowerCase();
            if(s.includes('müll')||s.includes('abfall')||s.includes('recycling')) return 'var(--event-waste)';
            if(s.includes('arbeit')||s.includes('meeting')||s.includes('job')) return 'var(--event-work)';
            if(s.includes('geburtstag')||s.includes('birthday')) return 'var(--event-birthday)';
            if(s.includes('arzt')||s.includes('termin')||s.includes('zahn')) return 'var(--event-appointment)';
            return 'var(--event-default)';
        }
        function renderCalendarEvents(events) {
            if(!events.length) { calendarListDiv.innerHTML = '<p>📭 Keine Termine gefunden</p>'; return; }
            let html = '';
            events.forEach(ev => {
                const color = getCategoryColor(ev.summary);
                const timeStr = ev.startDate ? ev.startDate.toLocaleString('de-DE', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }) : 'Uhrzeit unbekannt';
                html += `<div class="event-bar" style="background: ${color}; border-left-color: white;" data-event-idx="${currentEvents.indexOf(ev)}">
                            <div class="event-title">🗓️ ${ev.summary}</div>
                            <div class="event-time">⏱️ ${timeStr}</div>
                         </div>`;
            });
            calendarListDiv.innerHTML = html;
            document.querySelectorAll('.event-bar').forEach(bar => {
                bar.addEventListener('click', (e) => {
                    const idx = bar.getAttribute('data-event-idx');
                    const ev = currentEvents[parseInt(idx)];
                    if(ev) showEventModal(ev);
                });
            });
        }
        function showEventModal(ev) {
            document.getElementById('modalTitle').innerText = ev.summary || 'Termin';
            const startStr = ev.startDate ? ev.startDate.toLocaleString('de-DE') : 'Keine Zeit';
            document.getElementById('modalTime').innerHTML = `🕒 ${startStr}`;
            document.getElementById('modalLocation').innerHTML = `📍 ${ev.location || 'Kein Ort'}`;
            document.getElementById('modalDesc').innerHTML = `📝 ${ev.description || 'Keine Beschreibung'}`;
            document.getElementById('eventModal').style.display = 'flex';
        }

        // ---------- MULTIMEDIA ENGINE ----------
        function buildMediaListFromTextarea() {
            let raw = mediaUrlsInput.value;
            let lines = raw.split(/\r?\n/).filter(l=>l.trim().length>0);
            let newList = [];
            for(let url of lines) {
                let type = 'image';
                if(url.match(/\.(mp4|mov|MOV|MP4)$/i)) type='video';
                newList.push({ url: url.trim(), type: type });
            }
            mediaList = newList;
            saveAllSettings();
            restartSlideshow();
        }
        function addLocalFile(file) {
            const blobUrl = URL.createObjectURL(file);
            let type = file.type.startsWith('video/') ? 'video' : 'image';
            mediaList.push({ url: blobUrl, type: type, isBlob: true });
            restartSlideshow();
        }
        function restartSlideshow() {
            if(slideInterval) clearInterval(slideInterval);
            slideIndex = 0;
            if(mediaList.length===0) { mediaInner.innerHTML = '<div style="padding:20px;">➕ Medien hinzufügen (URLs oder Upload)</div>'; return; }
            showMediaItem(slideIndex);
        }
        let currentVideoElement = null;
        function showMediaItem(index) {
            if(mediaList.length===0) return;
            const media = mediaList[index % mediaList.length];
            const animationClass = currentAnimation;
            mediaInner.className = 'media-inner';
            mediaInner.style.opacity = '0';
            setTimeout(()=>{
                mediaInner.innerHTML = '';
                if(media.type === 'video') {
                    const video = document.createElement('video');
                    video.src = media.url;
                    video.autoplay = true;
                    video.muted = true;
                    video.playsInline = true;
                    video.style.maxWidth = '100%';
                    video.style.maxHeight = '260px';
                    video.onended = () => { nextSlide(); };
                    video.onerror = () => { nextSlide(); };
                    mediaInner.appendChild(video);
                    video.load();
                    currentVideoElement = video;
                } else {
                    const img = document.createElement('img');
                    img.src = media.url;
                    img.style.maxWidth = '100%';
                    img.style.maxHeight = '260px';
                    img.onerror = () => { nextSlide(); };
                    mediaInner.appendChild(img);
                    // bild timer
                    if(slideInterval) clearInterval(slideInterval);
                    slideInterval = setInterval(() => { nextSlide(); }, 6000);
                }
                mediaInner.classList.add(animationClass);
                mediaInner.style.opacity = '1';
                setTimeout(() => { mediaInner.classList.remove(animationClass); }, 700);
            }, 20);
        }
        function nextSlide() {
            if(mediaList.length===0) return;
            if(currentVideoElement && !currentVideoElement.ended && currentVideoElement.duration && currentVideoElement.currentTime < currentVideoElement.duration-0.2) {
                // warten bis video zuende
                return;
            }
            if(slideInterval) clearInterval(slideInterval);
            slideIndex = (slideIndex+1) % mediaList.length;
            showMediaItem(slideIndex);
        }

        // Helper Event Listener sync
        function attachEvents() {
            themeSelect.addEventListener('change', applyTheme);
            document.getElementById('forceWeatherBtn').addEventListener('click', ()=>{ fetchWeather(); });
            document.getElementById('forceCalendarBtn').addEventListener('click', ()=>{ loadCalendar(); });
            animationSelect.addEventListener('change', (e)=>{ currentAnimation = e.target.value; saveAllSettings(); restartSlideshow(); });
            applyMediaBtn.addEventListener('click', ()=>{ buildMediaListFromTextarea(); });
            localUpload.addEventListener('change', (e)=> {
                if(e.target.files.length) addLocalFile(e.target.files[0]);
                localUpload.value = '';
            });
            cityInput.addEventListener('change', ()=>{ saveAllSettings(); fetchWeather(); });
            apiKeyInput.addEventListener('change', ()=>{ saveAllSettings(); fetchWeather(); });
            icsUrlInput.addEventListener('change', ()=>{ saveAllSettings(); loadCalendar(); });
            document.querySelector('.close-modal').onclick = ()=> document.getElementById('eventModal').style.display='none';
            window.onclick = (e)=> { if(e.target === document.getElementById('eventModal')) document.getElementById('eventModal').style.display='none'; };
        }

        function init() {
            loadSettings();
            attachEvents();
            updateClock();
            clockInterval = setInterval(updateClock, 1000);
            fetchWeather();
            if(weatherInterval) clearInterval(weatherInterval);
            weatherInterval = setInterval(fetchWeather, 600000);
            // media urls aus storage in textarea laden & starten
            const savedMedia = localStorage.getItem('smarthub_media_urls');
            if(savedMedia) mediaUrlsInput.value = savedMedia;
            buildMediaListFromTextarea(); // lädt mediaList
            loadCalendar();
            setInterval(() => { if(document.getElementById('icsUrlInput').value) loadCalendar(); }, 3600000);
        }
        init();
    </script>
</body>

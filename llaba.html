<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Alpine Dashboard</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 + ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- date-fns v2 (exposes window.dateFns global) -->
  <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/index.min.js"></script>

  <!-- ical.js for parsing iCal feeds in browser (exposes window.ICAL) -->
  <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>

  <!-- Babel for in-browser JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body, #root {
      height: 100%;
      margin: 0;
      background: #000;
      overscroll-behavior: none;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      color: white;
      overflow: hidden;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .shadow-well { box-shadow: 0 0 100px rgba(0,0,0,1), inset 0 0 50px rgba(255,255,255,0.02); }
    input[type='range']::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 24px;
      width: 24px;
      border-radius: 50%;
      background: #3b82f6;
      box-shadow: 0 0 15px rgba(59,130,246,0.5);
      cursor: pointer;
    }
    input[type='range']::-moz-range-thumb {
      height: 24px;
      width: 24px;
      border-radius: 50%;
      background: #3b82f6;
      border: none;
      box-shadow: 0 0 15px rgba(59,130,246,0.5);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // Lightweight motion shims (CSS-based) — no framer-motion needed.
    // motion.div / AnimatePresence drop-in replacements for the props this app uses.
    const motion = {
      div: React.forwardRef(function MotionDiv({ initial, animate, exit, transition, style, className, children, ...rest }, ref) {
        // We mostly use animate for the final state. Apply animate styles directly,
        // and let CSS transitions handle the smooth change from initial.
        const [mounted, setMounted] = useState(false);
        useEffect(() => { setMounted(true); }, []);
        const dur = (transition && transition.duration) ? transition.duration : 0.6;
        const target = mounted ? (animate || {}) : (initial || {});
        const animStyle = {
          transition: `all ${dur}s ${(transition && transition.ease) || 'ease'}`,
          opacity: target.opacity !== undefined ? target.opacity : 1,
          transform: [
            target.x !== undefined ? `translateX(${typeof target.x === 'number' ? target.x + 'px' : target.x})` : '',
            target.y !== undefined ? `translateY(${typeof target.y === 'number' ? target.y + 'px' : target.y})` : '',
            target.scale !== undefined ? `scale(${target.scale})` : ''
          ].filter(Boolean).join(' ') || 'none',
        };
        return <div ref={ref} className={className} style={{ ...animStyle, ...style }} {...rest}>{children}</div>;
      })
    };
    // AnimatePresence: render children when truthy; rely on CSS for fade-in.
    // Exit animations are skipped (acceptable trade-off for single-file build).
    const AnimatePresence = ({ children }) => <>{children}</>;

    // date-fns globals
    const {
      format, addDays, startOfWeek, isSameDay, isToday,
      startOfMonth, endOfMonth, eachDayOfInterval, isSameMonth
    } = window.dateFns;

    // Minimal German locale for date-fns v2 (only what format() needs here)
    const de = {
      code: 'de',
      formatDistance: () => '',
      formatRelative: () => '',
      localize: {
        ordinalNumber: (n) => n + '.',
        era: () => '',
        quarter: () => '',
        month: (n) => ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'][n],
        day: (n) => ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'][n],
        dayPeriod: () => ''
      },
      formatLong: {
        date: () => 'dd.MM.yyyy',
        time: () => 'HH:mm',
        dateTime: () => 'dd.MM.yyyy HH:mm'
      },
      match: {
        ordinalNumber: () => null, era: () => null, quarter: () => null,
        month: () => null, day: () => null, dayPeriod: () => null
      },
      options: { weekStartsOn: 1, firstWeekContainsDate: 4 }
    };

    const DEFAULT_BG = "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop";

    // ---------------- ICONS ----------------
    const SunIcon = () => (
      <svg viewBox="0 0 24 24" className="w-full h-full text-yellow-400" style={{filter: "drop-shadow(0 0 10px rgba(250,204,21,0.6))"}}>
        <circle cx="12" cy="12" r="5" fill="currentColor" />
        <g stroke="currentColor" strokeWidth="2" strokeLinecap="round">
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </g>
      </svg>
    );

    const CloudIcon = () => (
      <svg viewBox="0 0 24 24" className="w-full h-full text-white/80" style={{filter: "drop-shadow(0 0 8px rgba(255,255,255,0.4))"}}>
        <path fill="currentColor" d="M17.5,19c-3.037,0-5.5-2.463-5.5-5.5c0-0.084,0.002-0.168,0.006-0.251C11.664,13.111,11.339,13,11,13 c-2.209,0-4,1.791-4,4c0,2.209,1.791,4,4,4h6.5c2.485,0,4.5-2.015,4.5-4.5S19.985,12,17.5,12c-0.222,0-0.44,0.016-0.652,0.046 C16.518,10.285,14.9,9,13,9c-2.209,0-4,1.791-4,4c0,0.084,0.002,0.168,0.006,0.251C8.664,13.111,8.339,13,8,13c-2.209,0-4,1.791-4,4 c0,2.209,1.791,4,4,4h9.5c2.485,0,4.5-2.015,4.5-4.5S19.985,14,17.5,14c-0.222,0-0.44,0.016-0.652,0.046 C16.518,12.285,14.9,11,13,11c-0.21,0-0.414,0.016-0.614,0.047C12.181,9.851,11.189,9,10,9c-1.657,0-3,1.343-3,3 c0,0.147,0.011,0.29,0.032,0.43C5.195,12.871,4,14.298,4,16c0,2.209,1.791,4,4,4h9.5c1.933,0,3.5-1.567,3.5-3.5S19.433,13,17.5,13 z" />
      </svg>
    );

    // Tiny Lucide-equivalents (line icons) — match style/size of original
    const Icon = ({ d, size = 18, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {d}
      </svg>
    );
    const X            = (p) => <Icon size={p.size} className={p.className} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}/>;
    const ChevronLeft  = (p) => <Icon size={p.size} className={p.className} d={<polyline points="15 18 9 12 15 6"/>}/>;
    const ChevronRight = (p) => <Icon size={p.size} className={p.className} d={<polyline points="9 18 15 12 9 6"/>}/>;
    const Music        = (p) => <Icon size={p.size} className={p.className} d={<><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></>}/>;
    const Settings2    = (p) => <Icon size={p.size} className={p.className} d={<><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></>}/>;
    const ImageIcon    = (p) => <Icon size={p.size} className={p.className} d={<><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>}/>;
    const MapPin       = (p) => <Icon size={p.size} className={p.className} d={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>}/>;
    const ClockIcon    = (p) => <Icon size={p.size} className={p.className} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>}/>;
    const AlignLeft    = (p) => <Icon size={p.size} className={p.className} d={<><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></>}/>;
    const CalendarIcon = (p) => <Icon size={p.size} className={p.className} d={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>}/>;

    // ---------------- iCal parsing in browser (replaces /api/calendar) ----------------
    function parseIcalToEvents(icsText) {
      try {
        const jcalData = ICAL.parse(icsText);
        const comp = new ICAL.Component(jcalData);
        const vevents = comp.getAllSubcomponents('vevent');
        return vevents.map(ve => {
          const ev = new ICAL.Event(ve);
          const start = ev.startDate ? ev.startDate.toJSDate() : null;
          const end   = ev.endDate   ? ev.endDate.toJSDate()   : start;
          const allDay = ev.startDate ? ev.startDate.isDate : false;
          return {
            summary: ev.summary || '(ohne Titel)',
            start, end, allDay,
            location: ev.location || '',
            description: ev.description || ''
          };
        }).filter(e => e.start);
      } catch (err) {
        console.error('iCal parse error:', err);
        return [];
      }
    }

    async function fetchIcal(icalUrl) {
      // Direct fetch first; if CORS blocks, fall back to a public CORS proxy.
      const tryFetch = async (url) => {
        const r = await fetch(url, { cache: 'no-store' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return await r.text();
      };
      try {
        return await tryFetch(icalUrl);
      } catch (e) {
        const proxied = 'https://corsproxy.io/?' + encodeURIComponent(icalUrl);
        return await tryFetch(proxied);
      }
    }

    // ---------------- MAIN APP ----------------
    function App() {
      const [currentTime, setCurrentTime] = useState(new Date());
      const [icalUrl, setIcalUrl] = useState(() => localStorage.getItem('alpine-ical-url') || '');
      const [events, setEvents] = useState([]);
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [isLoadingEvents, setIsLoadingEvents] = useState(false);
      const [selectedEvent, setSelectedEvent] = useState(null);

      const [bgImages, setBgImages] = useState(() => {
        const saved = localStorage.getItem('alpine-bg-images');
        return saved ? JSON.parse(saved) : [DEFAULT_BG];
      });
      const [currentBgIndex, setCurrentBgIndex] = useState(0);
      const [slideshowInterval, setSlideshowInterval] = useState(() => Number(localStorage.getItem('alpine-interval')) || 30);
      const [transitionType, setTransitionType] = useState(() => localStorage.getItem('alpine-transition') || 'fade');
      const [brightness, setBrightness] = useState(() => Number(localStorage.getItem('alpine-brightness')) || 100);
      const [bgBlur, setBgBlur] = useState(() => Number(localStorage.getItem('alpine-blur')) || 0);

      const [viewedMonth, setViewedMonth] = useState(new Date());
      const fileInputRef = useRef(null);

      // slideshow
      useEffect(() => {
        if (bgImages.length <= 1) return;
        const timer = setInterval(() => {
          setCurrentBgIndex((prev) => (prev + 1) % bgImages.length);
        }, slideshowInterval * 1000);
        return () => clearInterval(timer);
      }, [bgImages, slideshowInterval]);

      // clock
      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      // ical fetch
      useEffect(() => { if (icalUrl) fetchEvents(); }, [icalUrl]);

      const fetchEvents = async () => {
        if (!icalUrl) return;
        setIsLoadingEvents(true);
        try {
          const text = await fetchIcal(icalUrl);
          setEvents(parseIcalToEvents(text));
        } catch (err) {
          console.error("Failed to fetch events:", err);
        } finally {
          setIsLoadingEvents(false);
        }
      };

      const saveSettings = () => {
        localStorage.setItem('alpine-ical-url', icalUrl);
        localStorage.setItem('alpine-bg-images', JSON.stringify(bgImages));
        localStorage.setItem('alpine-brightness', brightness.toString());
        localStorage.setItem('alpine-blur', bgBlur.toString());
        localStorage.setItem('alpine-interval', slideshowInterval.toString());
        localStorage.setItem('alpine-transition', transitionType);
        setIsSettingsOpen(false);
        fetchEvents();
      };

      const handleImageUpload = (e) => {
        const files = e.target.files;
        if (files) {
          Array.from(files).forEach((file) => {
            const reader = new FileReader();
            reader.onloadend = () => {
              setBgImages(prev => [...prev, reader.result]);
            };
            reader.readAsDataURL(file);
          });
        }
      };

      const removeImage = (index) => {
        if (bgImages.length <= 1) return;
        setBgImages(prev => prev.filter((_, i) => i !== index));
        if (currentBgIndex >= index) setCurrentBgIndex(prev => Math.max(0, prev - 1));
      };

      const getAnimationProps = () => {
        switch (transitionType) {
          case 'slide':
            return { initial: { x: '100%', opacity: 0 }, animate: { x: 0, opacity: 1 }, exit: { x: '-100%', opacity: 0 }, transition: { duration: 1, ease: 'easeInOut' } };
          case 'zoom':
            return { initial: { scale: 1.2, opacity: 0 }, animate: { scale: 1, opacity: 1 }, exit: { scale: 0.8, opacity: 0 }, transition: { duration: 1.5, ease: 'easeOut' } };
          default:
            return { initial: { opacity: 0 }, animate: { opacity: 1 }, exit: { opacity: 0 }, transition: { duration: 1 } };
        }
      };

      const getDaysInMonthGrid = () => {
        const start = startOfWeek(startOfMonth(viewedMonth), { weekStartsOn: 1 });
        const end = addDays(start, 41);
        return eachDayOfInterval({ start, end });
      };
      const monthGrid = getDaysInMonthGrid();

      return (
        <div className="relative h-screen w-full bg-black text-white font-sans overflow-hidden">
          {/* Background Slideshow Layer */}
          <div className="fixed inset-0 z-0 bg-black overflow-hidden pointer-events-none">
            <AnimatePresence mode="popLayout" initial={false}>
              <motion.div
                key={currentBgIndex}
                {...getAnimationProps()}
                className="absolute inset-0 bg-cover bg-center"
                style={{
                  backgroundImage: `url(${bgImages[currentBgIndex]})`,
                  filter: `brightness(${brightness}%) blur(${bgBlur}px)`
                }}
              />
            </AnimatePresence>
          </div>

          <div className="absolute inset-0 bg-gradient-to-b from-black/10 via-transparent to-black/20 pointer-events-none" style={{zIndex: 1}} />

          {/* TOP LEFT: Month Navigation */}
          <div className="absolute top-6 left-10 z-30">
            <div className="flex items-center gap-1 px-4 py-2 bg-black/20 backdrop-blur-lg rounded-2xl border border-white/5 shadow-2xl">
              <button onClick={() => setViewedMonth(addDays(startOfMonth(viewedMonth), -1))} className="p-2 hover:bg-white/10 rounded-full transition-colors text-white">
                <ChevronLeft size={18} />
              </button>
              <span className="text-[11px] font-bold px-3 w-[160px] text-center tracking-widest uppercase text-white">{format(viewedMonth, 'MMMM yyyy', { locale: de })}</span>
              <button onClick={() => setViewedMonth(addDays(endOfMonth(viewedMonth), 1))} className="p-2 hover:bg-white/10 rounded-full transition-colors text-white">
                <ChevronRight size={18} />
              </button>
            </div>
          </div>

          {/* TOP CENTER: Clock */}
          <div className="absolute top-6 left-1/2 -translate-x-1/2 z-30">
            <div className="flex flex-col items-center">
              <h1 className="text-6xl font-extralight tracking-tighter tabular-nums flex items-baseline">
                {format(currentTime, 'H:mm')}
                <span className="text-xl ml-2 font-thin opacity-30 tracking-normal">{format(currentTime, 'ss')}</span>
              </h1>
              <p className="text-[10px] font-bold text-white tracking-[0.3em] uppercase mt-1">
                {format(currentTime, 'EEEE, dd. MMMM', { locale: de })}
              </p>
            </div>
          </div>

          {/* TOP RIGHT: Music Apps */}
          <div className="absolute top-6 right-10 z-30 flex items-center gap-4">
            <div className="flex items-center gap-3 bg-black/10 backdrop-blur-md p-1.5 rounded-[2rem] border border-white/5">
              <a href="https://open.spotify.com" target="_blank" rel="noreferrer" className="hover:scale-105 transition-transform active:scale-95 group">
                <div className="p-3 bg-white/5 rounded-2xl border border-white/5 shadow-xl transition-all hover:bg-[#1DB954]/10">
                  <Music className="w-8 h-8 text-[#1DB954]" />
                </div>
              </a>
              <a href="https://music.amazon.de" target="_blank" rel="noreferrer" className="hover:scale-105 transition-transform active:scale-95 group">
                <div className="p-3 bg-white/5 rounded-2xl border border-white/5 shadow-xl transition-all hover:bg-[#00A8E1]/10 flex flex-col items-center justify-center relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-[2px] bg-[#00A8E1]" />
                  <svg viewBox="0 0 24 24" className="w-8 h-8" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z" fill="#00A8E1" fillOpacity="0.1"/>
                    <path d="M12 4C7.58 4 4 7.58 4 12C4 16.42 7.58 20 12 20C16.42 20 20 16.42 20 12C20 7.58 16.42 4 12 4Z" stroke="#00A8E1" strokeWidth="1" strokeOpacity="0.3"/>
                    <path d="M7 13.5C7 13.5 9 15.5 12 15.5C15 15.5 17 13.5 17 13.5" stroke="#00A8E1" strokeWidth="2" strokeLinecap="round"/>
                    <path d="M16 14.5C17 15.5 18 17 17 18.5" stroke="#00A8E1" strokeWidth="2" strokeLinecap="round"/>
                  </svg>
                </div>
              </a>
            </div>

            <div className="p-3 bg-black/10 backdrop-blur-md rounded-2xl border border-white/5 shadow-xl flex items-center justify-center gap-3">
              <div className="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center">
                <AlignLeft size={16} className="text-blue-400 opacity-50" />
              </div>
              <div className="flex flex-col">
                <span className="text-[8px] font-bold text-white/20 uppercase tracking-widest">Display</span>
                <span className="text-xs font-light text-white/60">Active</span>
              </div>
            </div>
          </div>

          {/* SETTINGS BUTTON */}
          <div className="absolute bottom-10 left-10 z-40">
            <button
              onClick={() => setIsSettingsOpen(true)}
              className="p-4 bg-black/20 backdrop-blur-lg rounded-2xl border border-white/10 hover:bg-white/10 transition-all shadow-2xl"
            >
              <Settings2 size={24} className="text-white" />
            </button>
          </div>

          {/* MAIN LAYOUT */}
          <div className="relative z-10 w-full h-screen grid grid-cols-1 lg:grid-cols-2 overflow-hidden">

            {/* LEFT: Weather */}
            <div className="relative flex flex-col justify-end p-12 pb-32">
              <motion.div
                initial={{ opacity: 0, x: -20 }}
                animate={{ opacity: 1, x: 0 }}
                className="flex flex-col mb-12"
              >
                <div className="flex items-center gap-4">
                  <span className="text-[10rem] font-extralight tracking-tighter leading-none">21</span>
                  <div className="flex flex-col mb-10 w-24 h-24">
                    <span className="text-5xl font-thin opacity-60 ml-2">°C</span>
                    <div className="w-full h-full"><SunIcon /></div>
                  </div>
                </div>
                <div className="text-white font-light space-y-1 mt-[-20px] ml-4">
                  <p className="text-lg tracking-wide opacity-80">Gefühlt 20°</p>
                  <p className="text-3xl font-bold tracking-tight uppercase">Sonnig</p>
                </div>

                {/* 5-Day Forecast */}
                <div className="mt-10 flex gap-10">
                  {['Heute', 'Di', 'Mi', 'Do', 'Fr'].map((day, i) => (
                    <div key={day} className="flex flex-col items-center gap-3">
                      <span className="text-[9px] font-bold uppercase tracking-[0.3em] text-white underline underline-offset-4 decoration-white/20">{day}</span>
                      <div className="w-8 h-8">
                        {i === 0 || i === 3 ? <SunIcon /> : <CloudIcon />}
                      </div>
                      <div className="flex flex-col items-center">
                        <span className="text-base font-bold text-white">20°</span>
                        <span className="text-[10px] text-white/60">8°</span>
                      </div>
                    </div>
                  ))}
                </div>

                {/* Hourly Strip */}
                <div className="mt-12 flex bg-white/5 backdrop-blur-md rounded-2xl border border-white/5 py-4 overflow-x-auto no-scrollbar max-w-xl">
                  {Array.from({ length: 12 }).map((_, i) => (
                    <div key={i} className="flex flex-col items-center border-r border-white/5 gap-1.5 px-6 last:border-none">
                      <span className="text-[9px] text-white font-bold tracking-widest whitespace-nowrap">{(10 + i) % 24}:00</span>
                      <div className="w-5 h-5 opacity-80">
                        {i < 4 || i > 9 ? <SunIcon /> : <CloudIcon />}
                      </div>
                      <span className="text-[10px] tabular-nums font-bold text-white">{18 + (i % 3)}°</span>
                    </div>
                  ))}
                </div>
              </motion.div>
            </div>

            {/* RIGHT: Calendar */}
            <div className="bg-white/[0.02] border-l border-white/5 h-full pt-16 px-12 pb-24 overflow-hidden flex flex-col" style={{boxShadow: '-40px 0 100px rgba(0,0,0,0.5)'}}>
              <div className="flex justify-end mb-8">
                <div className="flex items-center gap-2 text-white/20">
                  <CalendarIcon size={14} />
                  <span className="text-[8px] font-bold tracking-[0.2em] uppercase">Sync Status</span>
                </div>
              </div>

              <div className="grid grid-cols-7 gap-px h-full text-center">
                {['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'].map(d => (
                  <div key={d} className="text-[10px] font-bold uppercase tracking-[0.5em] text-white/90 py-4 mb-2">{d}</div>
                ))}

                {monthGrid.map((day, i) => {
                  const dayEvents = events.filter(e => isSameDay(new Date(e.start), day));
                  const currentMonth = isSameMonth(day, viewedMonth);
                  const today = isToday(day);

                  return (
                    <button
                      key={i}
                      onClick={() => dayEvents.length > 0 && setSelectedEvent(dayEvents[0])}
                      className={`relative border-t border-white/10 flex flex-col items-center pt-6 h-full transition-all hover:bg-white/[0.08] active:scale-[0.98] ${!currentMonth ? 'opacity-5' : ''}`}
                    >
                      <span className={`text-base mb-3 transition-all ${today ? 'text-blue-400 font-black scale-125' : 'text-white font-bold'}`}>
                        {format(day, 'd')}
                      </span>
                      <div className="flex flex-wrap justify-center gap-2 px-1">
                        {dayEvents.map((_, idx) => (
                          <div key={idx} className="w-3.5 h-3.5 rounded-full bg-blue-500" style={{boxShadow: '0 0 12px rgba(59,130,246,0.9)'}} />
                        ))}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>

          {/* EVENT DETAIL */}
          <AnimatePresence>
            {selectedEvent && (
              <motion.div
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 flex items-center justify-center p-8 bg-black/60 backdrop-blur-md"
                style={{zIndex: 60}}
                onClick={() => setSelectedEvent(null)}
              >
                <motion.div
                  initial={{ scale: 0.9, y: 30 }}
                  animate={{ scale: 1, y: 0 }}
                  exit={{ scale: 0.9, y: 30 }}
                  className="bg-zinc-900 border border-white/10 p-10 rounded-[2.5rem] w-full max-w-lg"
                  style={{boxShadow: '0 50px 100px rgba(0,0,0,0.8)'}}
                  onClick={e => e.stopPropagation()}
                >
                  <div className="flex justify-between items-start mb-8">
                    <h3 className="text-3xl font-bold tracking-tight pr-8">{selectedEvent.summary}</h3>
                    <button onClick={() => setSelectedEvent(null)} className="p-2 hover:bg-white/5 rounded-full"><X size={20}/></button>
                  </div>

                  <div className="space-y-6">
                    <div className="flex items-center gap-4 text-gray-300">
                      <div className="p-3 bg-white/5 rounded-2xl"><ClockIcon size={20} className="text-blue-400" /></div>
                      <div>
                        <p className="text-sm font-bold text-white">{format(new Date(selectedEvent.start), 'dd. MMMM yyyy', { locale: de })}</p>
                        <p className="text-xs">{selectedEvent.allDay ? 'Ganztägig' : `${format(new Date(selectedEvent.start), 'HH:mm')} - ${format(new Date(selectedEvent.end), 'HH:mm')}`}</p>
                      </div>
                    </div>

                    {selectedEvent.location && (
                      <div className="flex items-center gap-4 text-gray-300">
                        <div className="p-3 bg-white/5 rounded-2xl"><MapPin size={20} className="text-red-400" /></div>
                        <p className="text-sm">{selectedEvent.location}</p>
                      </div>
                    )}

                    {selectedEvent.description && (
                      <div className="flex items-start gap-4 text-gray-300">
                        <div className="p-3 bg-white/5 rounded-2xl"><AlignLeft size={20} className="text-gray-400" /></div>
                        <p className="text-sm font-light leading-relaxed whitespace-pre-wrap">{selectedEvent.description}</p>
                      </div>
                    )}
                  </div>

                  <button
                    onClick={() => setSelectedEvent(null)}
                    className="w-full mt-10 bg-white/5 hover:bg-white/10 text-white font-bold py-5 rounded-2xl transition-all"
                  >
                    Schließen
                  </button>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* SETTINGS */}
          <AnimatePresence>
            {isSettingsOpen && (
              <motion.div
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 z-50 flex items-end justify-end p-6 bg-black/20"
                style={{backdropFilter: 'blur(2px)'}}
              >
                <motion.div
                  initial={{ scale: 0.95, opacity: 0, y: 50, x: 50 }}
                  animate={{ scale: 1, opacity: 1, y: 0, x: 0 }}
                  exit={{ scale: 0.95, opacity: 0, y: 50, x: 50 }}
                  className="bg-black/95 border border-white/10 p-8 rounded-[2.5rem] w-full max-w-sm shadow-well overflow-y-auto max-h-[85vh] no-scrollbar"
                >
                  <div className="flex justify-between items-center mb-8">
                    <div className="flex items-center gap-3">
                      <div className="p-2 bg-blue-500/20 rounded-xl"><Settings2 size={20} className="text-blue-400" /></div>
                      <h3 className="text-xl font-bold tracking-tight">System</h3>
                    </div>
                    <button onClick={() => setIsSettingsOpen(false)} className="bg-white/5 p-3 rounded-full hover:bg-white/10 transition-colors"><X size={18} /></button>
                  </div>

                  <div className="space-y-8">
                    <div className="space-y-3">
                      <label className="text-[8px] font-bold uppercase tracking-[0.3em] text-gray-500 block pl-1">Calendar URL</label>
                      <input
                        type="text"
                        value={icalUrl}
                        onChange={(e) => setIcalUrl(e.target.value)}
                        placeholder="https://..."
                        className="w-full bg-white/5 border border-white/10 rounded-[1.2rem] px-6 py-4 text-sm font-light focus:outline-none focus:ring-1 focus:ring-blue-500/30 transition-all text-white"
                      />
                    </div>

                    <div className="space-y-4">
                      <label className="text-[8px] font-bold uppercase tracking-[0.3em] text-gray-500 pl-1 flex items-center justify-between">
                        <span>Background Slideshow ({bgImages.length})</span>
                        <button
                          onClick={() => {
                            const url = prompt("Bild URL eingeben:");
                            if (url) setBgImages(prev => [...prev, url]);
                          }}
                          className="text-blue-400 hover:underline"
                        >
                          + URL hinzufügen
                        </button>
                      </label>

                      <div className="grid grid-cols-4 gap-2">
                        {bgImages.map((img, i) => (
                          <div key={i} className="relative group aspect-square rounded-xl overflow-hidden border border-white/10">
                            <img src={img} className="w-full h-full object-cover" alt="" />
                            <button
                              onClick={() => removeImage(i)}
                              className="absolute top-1 right-1 p-1 bg-red-500 text-white rounded-md opacity-0 group-hover:opacity-100 transition-opacity"
                            >
                              <X size={10} />
                            </button>
                          </div>
                        ))}
                        <button
                          onClick={() => fileInputRef.current?.click()}
                          className="aspect-square rounded-xl border-2 border-dashed border-white/10 flex items-center justify-center hover:bg-white/5 transition-colors"
                        >
                          <ImageIcon size={16} className="text-gray-500" />
                        </button>
                      </div>

                      <input
                        type="file"
                        ref={fileInputRef}
                        onChange={handleImageUpload}
                        multiple
                        accept="image/*"
                        className="hidden"
                      />
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div className="space-y-3">
                        <label className="text-[8px] font-bold uppercase tracking-[0.3em] text-gray-500 block pl-1 text-center">Intervall (Sek)</label>
                        <input
                          type="number"
                          value={slideshowInterval}
                          onChange={(e) => setSlideshowInterval(Number(e.target.value))}
                          className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-center text-sm font-bold text-white focus:outline-none focus:ring-1 focus:ring-blue-500"
                        />
                      </div>
                      <div className="space-y-3">
                        <label className="text-[8px] font-bold uppercase tracking-[0.3em] text-gray-500 block pl-1 text-center">Animation</label>
                        <select
                          value={transitionType}
                          onChange={(e) => setTransitionType(e.target.value)}
                          className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white focus:outline-none focus:ring-1 focus:ring-blue-500"
                        >
                          <option value="fade">Fade</option>
                          <option value="slide">Slide</option>
                          <option value="zoom">Zoom</option>
                        </select>
                      </div>
                    </div>

                    <div className="space-y-6 p-5 bg-white/[0.03] rounded-3xl border border-white/5">
                      <div className="space-y-3">
                        <label className="text-[8px] font-bold uppercase tracking-[0.3em] text-gray-400 flex items-center justify-between">
                          Helligkeit <span className="text-blue-400 font-mono">{brightness}%</span>
                        </label>
                        <input
                          type="range" min="10" max="150" value={brightness}
                          onChange={(e) => setBrightness(Number(e.target.value))}
                          className="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-blue-500"
                        />
                      </div>
                      <div className="space-y-3">
                        <label className="text-[8px] font-bold uppercase tracking-[0.3em] text-gray-400 flex items-center justify-between">
                          Unschärfe <span className="text-blue-400 font-mono">{bgBlur}px</span>
                        </label>
                        <input
                          type="range" min="0" max="20" value={bgBlur}
                          onChange={(e) => setBgBlur(Number(e.target.value))}
                          className="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-blue-500"
                        />
                      </div>
                    </div>

                    <div className="pt-4">
                      <button
                        onClick={saveSettings}
                        className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-5 rounded-[1.2rem] transition-all shadow-xl active:scale-[0.98] text-sm"
                      >
                        Bestätigen & Speichern
                      </button>
                      <button
                        onClick={() => setBgImages([DEFAULT_BG])}
                        className="w-full mt-2 text-[10px] text-red-400/50 hover:text-red-400 transition-colors uppercase tracking-widest font-bold"
                      >
                        Hintergrund-Reset
                      </button>
                    </div>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

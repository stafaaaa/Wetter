<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpin Dashboard - Portable Edition</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: black; margin: 0; overflow: hidden; color: white; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="range"] { accent-color: #3b82f6; }
        select { background-color: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        const DEFAULT_BG = "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=3540";

        // Simple SVG Icons since Lucide in CDN needs careful use as components
        const SunIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const CloudIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19x3.5a4.5 4.5 0 0 0 0-9 5 5 0 0 0-9.5-2.5 5 5 0 0 0-5 6.5A4.5 4.5 0 0 0 7.5 19z"/></svg>;
        const ChevronLeft = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
        const ChevronRight = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const SettingsIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.72l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const MusicIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="#1DB954" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>;

        function App() {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [viewedMonth, setViewedMonth] = useState(new Date());

            // Slideshow State
            const [bgImages, setBgImages] = useState(() => {
                const saved = localStorage.getItem('alpine-bg-images');
                return saved ? JSON.parse(saved) : [DEFAULT_BG];
            });
            const [currentBgIndex, setCurrentBgIndex] = useState(0);
            const [slideshowInterval, setSlideshowInterval] = useState(() => Number(localStorage.getItem('alpine-interval')) || 30);
            const [transitionType, setTransitionType] = useState(() => localStorage.getItem('alpine-transition') || 'fade');
            const [brightness, setBrightness] = useState(() => Number(localStorage.getItem('alpine-brightness')) || 100);
            const [bgBlur, setBgBlur] = useState(() => Number(localStorage.getItem('alpine-blur')) || 0);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (bgImages.length <= 1) return;
                const timer = setInterval(() => {
                    setCurrentBgIndex((prev) => (prev + 1) % bgImages.length);
                }, slideshowInterval * 1000);
                return () => clearInterval(timer);
            }, [bgImages, slideshowInterval]);

            const daysInMonth = useMemo(() => {
                const year = viewedMonth.getFullYear();
                const month = viewedMonth.getMonth();
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const startDay = (firstDay.getDay() + 6) % 7;
                
                const days = [];
                for (let i = 0; i < startDay; i++) {
                    const d = new Date(year, month, -i);
                    days.unshift({ date: d, isCurrentMonth: false });
                }
                for (let i = 1; i <= lastDay.getDate(); i++) {
                    days.push({ date: new Date(year, month, i), isCurrentMonth: true });
                }
                const remaining = 42 - days.length;
                for (let i = 1; i <= remaining; i++) {
                    days.push({ date: new Date(year, month + 1, i), isCurrentMonth: false });
                }
                return days;
            }, [viewedMonth]);

            const handleImageUpload = (e) => {
                const files = e.target.files;
                if (files) {
                    Array.from(files).forEach(file => {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            setBgImages(prev => [...prev, reader.result]);
                        };
                        reader.readAsDataURL(file);
                    });
                }
            };

            const removeImage = (index) => {
                if (bgImages.length <= 1) return;
                const newBgs = bgImages.filter((_, i) => i !== index);
                setBgImages(newBgs);
                localStorage.setItem('alpine-bg-images', JSON.stringify(newBgs));
                if (currentBgIndex >= index) setCurrentBgIndex(prev => Math.max(0, prev - 1));
            };

            const saveSettings = () => {
                localStorage.setItem('alpine-bg-images', JSON.stringify(bgImages));
                localStorage.setItem('alpine-brightness', brightness.toString());
                localStorage.setItem('alpine-blur', bgBlur.toString());
                localStorage.setItem('alpine-interval', slideshowInterval.toString());
                localStorage.setItem('alpine-transition', transitionType);
                setIsSettingsOpen(false);
            };

            const getAnimationProps = () => {
                switch (transitionType) {
                    case 'slide': return { initial: { x: '100%', opacity: 0 }, animate: { x: 0, opacity: 1 }, exit: { x: '-100%', opacity: 0 }, transition: { duration: 1 } };
                    case 'zoom': return { initial: { scale: 1.2, opacity: 0 }, animate: { scale: 1, opacity: 1 }, exit: { scale: 0.8, opacity: 0 }, transition: { duration: 1.5 } };
                    default: return { initial: { opacity: 0 }, animate: { opacity: 1 }, exit: { opacity: 0 }, transition: { duration: 1 } };
                }
            };

            return (
                <div className="relative h-screen w-full bg-black text-white font-sans overflow-hidden">
                    {/* Background */}
                    <div className="fixed inset-0 z-0 bg-black pointer-events-none">
                        <AnimatePresence mode="popLayout" initial={false}>
                            <motion.div 
                                key={currentBgIndex}
                                {...getAnimationProps()}
                                className="absolute inset-0 bg-cover bg-center"
                                style={{ 
                                    backgroundImage: `url(${bgImages[currentBgIndex]})`,
                                    filter: `brightness(${brightness}%) blur(${bgBlur}px)`
                                }}
                            />
                        </AnimatePresence>
                    </div>

                    <div className="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/30 z-1 pointer-events-none" />

                    {/* TOP NAV */}
                    <div className="absolute top-6 left-10 z-30">
                        <div className="flex items-center gap-1 px-4 py-2 bg-black/30 backdrop-blur-xl rounded-2xl border border-white/5 shadow-2xl">
                            <button onClick={() => setViewedMonth(new Date(viewedMonth.setMonth(viewedMonth.getMonth() - 1)))} className="p-2 hover:bg-white/10 rounded-full transition-colors"><ChevronLeft/></button>
                            <span className="text-[11px] font-bold px-3 w-[160px] text-center tracking-widest uppercase">
                                {viewedMonth.toLocaleString('de-DE', { month: 'long', year: 'numeric' })}
                            </span>
                            <button onClick={() => setViewedMonth(new Date(viewedMonth.setMonth(viewedMonth.getMonth() + 1)))} className="p-2 hover:bg-white/10 rounded-full transition-colors"><ChevronRight/></button>
                        </div>
                    </div>

                    <div className="absolute top-6 left-1/2 -translate-x-1/2 z-30 flex flex-col items-center">
                        <h1 className="text-7xl font-light tracking-tighter tabular-nums">
                            {currentTime.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}
                        </h1>
                        <p className="text-[10px] font-bold tracking-[0.3em] uppercase opacity-60 mt-2">
                             {currentTime.toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: 'long' })}
                        </p>
                    </div>

                    <div className="absolute top-6 right-10 z-30 flex items-center gap-4">
                        <div className="flex items-center gap-3 bg-black/20 backdrop-blur-xl p-1.5 rounded-[2rem] border border-white/5">
                            <a href="https://open.spotify.com" target="_blank" className="p-3 bg-white/5 rounded-2xl flex hover:bg-white/10 transition-all"><MusicIcon/></a>
                            <a href="https://music.amazon.de" target="_blank" className="p-3 bg-white/5 rounded-2xl flex hover:bg-white/10 transition-all">
                                <svg viewBox="0 0 24 24" className="w-8 h-8" fill="#00A8E1"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/><path d="M7 13.5s2 2 5 2 5-2 5-2" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"/><path d="M16 14.5c1 1 2 2.5 1 4" fill="none" stroke="#00A8E1" strokeWidth="2" strokeLinecap="round"/></svg>
                            </a>
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="relative z-10 grid grid-cols-12 h-screen pt-24">
                        {/* LEFT PANEL */}
                        <div className="col-span-4 p-12 flex flex-col justify-center">
                            <motion.div initial={{ x: -20, opacity: 0 }} animate={{ x: 0, opacity: 1 }} className="space-y-4">
                                <span className="text-blue-400 text-xs font-bold uppercase tracking-[0.3em]">Aktuelles Wetter</span>
                                <h2 className="text-6xl font-light">Sonnig</h2>
                                <h3 className="text-8xl font-thin tracking-tighter">21°</h3>
                                <div className="mt-8 flex gap-8">
                                    {[1,2,3,4,5].map(i => (
                                        <div key={i} className="flex flex-col items-center gap-2 opacity-60">
                                            <span className="text-[10px] font-bold">Mo</span>
                                            <div className="w-4 h-4"><SunIcon/></div>
                                            <span className="text-xs">22°</span>
                                        </div>
                                    ))}
                                </div>
                            </motion.div>
                        </div>

                        {/* RIGHT PANEL: CALENDAR */}
                        <div className="col-span-8 bg-black/10 backdrop-blur-sm border-l border-white/5 p-12 overflow-hidden">
                            <div className="grid grid-cols-7 gap-4 mb-8">
                                {['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'].map(d => (
                                    <div key={d} className="text-center text-[10px] font-bold uppercase tracking-widest text-white/30">{d}</div>
                                ))}
                            </div>
                            <div className="grid grid-cols-7 gap-2">
                                {daysInMonth.map((d, i) => (
                                    <div key={i} className={`p-4 h-24 rounded-2xl border transition-all ${d.isCurrentMonth ? 'bg-white/5 border-white/5 hover:bg-white/10' : 'bg-transparent border-transparent opacity-20'}`}>
                                        <span className="text-sm font-light">{d.date.getDate()}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* SETTINGS BUTTON */}
                    <button onClick={() => setIsSettingsOpen(true)} className="absolute bottom-10 left-10 z-40 p-4 bg-black/40 backdrop-blur-xl border border-white/10 rounded-2xl hover:bg-white/5 transition-all outline-none">
                        <div className="w-6 h-6 text-white/60"><SettingsIcon/></div>
                    </button>

                    {/* SETTINGS MODAL */}
                    <AnimatePresence>
                        {isSettingsOpen && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/70 backdrop-blur-xl">
                                <div className="bg-[#111] w-full max-w-2xl rounded-[3rem] border border-white/10 p-12 overflow-y-auto max-h-[90vh] no-scrollbar">
                                    <div className="flex justify-between items-center mb-12">
                                        <h2 className="text-3xl font-light">Einstellungen</h2>
                                        <button onClick={saveSettings} className="px-6 py-2 bg-blue-600 rounded-full text-sm font-bold">Speichern</button>
                                    </div>

                                    <div className="space-y-12">
                                        {/* BG Images */}
                                        <section className="space-y-4">
                                            <label className="text-[10px] font-bold uppercase tracking-widest text-white/40">Hintergrund Slideshow</label>
                                            <div className="grid grid-cols-4 gap-4">
                                                {bgImages.map((img, i) => (
                                                    <div key={i} className="relative aspect-square rounded-2xl overflow-hidden border border-white/10 group">
                                                        <img src={img} className="w-full h-full object-cover" />
                                                        <button onClick={() => removeImage(i)} className="absolute top-2 right-2 p-1 bg-red-500 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity">X</button>
                                                    </div>
                                                ))}
                                                <label className="aspect-square rounded-2xl border-2 border-dashed border-white/10 flex items-center justify-center cursor-pointer hover:bg-white/5">
                                                    <input type="file" multiple accept="image/*" onChange={handleImageUpload} className="hidden" />
                                                    <span className="text-2xl text-white/20">+</span>
                                                </label>
                                            </div>
                                        </section>

                                        {/* Inputs */}
                                        <div className="grid grid-cols-2 gap-8">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-bold uppercase tracking-widest text-white/40">Intervall (Sek)</label>
                                                <input type="number" value={slideshowInterval} onChange={e => setSlideshowInterval(e.target.value)} className="w-full p-3 rounded-xl outline-none" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-bold uppercase tracking-widest text-white/40">Animation</label>
                                                <select value={transitionType} onChange={e => setTransitionType(e.target.value)} className="w-full p-4 rounded-xl outline-none">
                                                    <option value="fade">Fade</option>
                                                    <option value="slide">Slide</option>
                                                    <option value="zoom">Zoom</option>
                                                </select>
                                            </div>
                                        </div>

                                        {/* Sliders */}
                                        <div className="space-y-8">
                                            <div className="space-y-2">
                                                <div className="flex justify-between">
                                                    <label className="text-[10px] font-bold uppercase tracking-widest text-white/40">Helligkeit</label>
                                                    <span className="text-blue-400">{brightness}%</span>
                                                </div>
                                                <input type="range" min="20" max="150" value={brightness} onChange={e => setBrightness(e.target.value)} className="w-full" />
                                            </div>
                                            <div className="space-y-2">
                                                <div className="flex justify-between">
                                                    <label className="text-[10px] font-bold uppercase tracking-widest text-white/40">Blur</label>
                                                    <span className="text-blue-400">{bgBlur}px</span>
                                                </div>
                                                <input type="range" min="0" max="40" value={bgBlur} onChange={e => setBgBlur(e.target.value)} className="w-full" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Ultimate Dashboard | 50/50 | Wetter & Kalender | 15 Slideshow-Animationen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
/* ---------- Hintergrund-Slideshow (Container) ---------- */
.bg-slideshow {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -2;
overflow: hidden;
}
.bg-slideshow img {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: cover;
opacity: 0;
transition: opacity 1s ease-in-out;
will-change: opacity, transform;
}
.bg-slideshow img.active {
opacity: 1;
z-index: 1;
}
/* Animationen (werden per JS als Klasse hinzugefügt) */
@keyframes fadeIn {
from { opacity: 0; }
to { opacity: 1; }
}
@keyframes zoomIn {
from { transform: scale(1.1); opacity: 0; }
to { transform: scale(1); opacity: 1; }
}
@keyframes zoomOut {
from { transform: scale(0.9); opacity: 0; }
to { transform: scale(1); opacity: 1; }
}
@keyframes slideLeft {
from { transform: translateX(30px); opacity: 0; }
to { transform: translateX(0); opacity: 1; }
}
@keyframes slideRight {
from { transform: translateX(-30px); opacity: 0; }
to { transform: translateX(0); opacity: 1; }
}
@keyframes slideUp {
from { transform: translateY(30px); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}
@keyframes slideDown {
from { transform: translateY(-30px); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}
@keyframes rotateIn {
from { transform: rotate(-5deg) scale(1.05); opacity: 0; }
to { transform: rotate(0) scale(1); opacity: 1; }
}
@keyframes blurIn {
from { filter: blur(10px); opacity: 0; }
to { filter: blur(0); opacity: 1; }
}
@keyframes flipIn {
from { transform: perspective(400px) rotateY(15deg); opacity: 0; }
to { transform: perspective(400px) rotateY(0); opacity: 1; }
}
@keyframes swirlIn {
from { transform: rotate(15deg) scale(0.9); opacity: 0; }
to { transform: rotate(0) scale(1); opacity: 1; }
}
@keyframes bounceIn {
0% { transform: scale(0.9); opacity: 0; }
60% { transform: scale(1.05); }
100% { transform: scale(1); opacity: 1; }
}
@keyframes shakeIn {
0% { transform: translateX(-15px); opacity: 0; }
30% { transform: translateX(10px); }
60% { transform: translateX(-5px); }
100% { transform: translateX(0); opacity: 1; }
}
@keyframes flashIn {
0% { opacity: 0; filter: brightness(1.5); }
30% { opacity: 1; filter: brightness(1.2); }
100% { opacity: 1; filter: brightness(1); }
}
@keyframes glitchIn {
0% { transform: skew(5deg, 2deg) translateX(-10px); opacity: 0; }
50% { transform: skew(-3deg, -1deg) translateX(5px); }
100% { transform: skew(0) translateX(0); opacity: 1; }
}
@keyframes pulseIn {
0% { transform: scale(0.95); opacity: 0; }
50% { transform: scale(1.03); }
100% { transform: scale(1); opacity: 1; }
}
/* Animations-Klassen */
.anim-fadeIn { animation: fadeIn 0.9s ease forwards; }
.anim-zoomIn { animation: zoomIn 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards; }
.anim-zoomOut { animation: zoomOut 0.9s ease forwards; }
.anim-slideLeft { animation: slideLeft 0.8s ease-out forwards; }
.anim-slideRight { animation: slideRight 0.8s ease-out forwards; }
.anim-slideUp { animation: slideUp 0.8s ease-out forwards; }
.anim-slideDown { animation: slideDown 0.8s ease-out forwards; }
.anim-rotateIn { animation: rotateIn 0.9s cubic-bezier(0.2, 0.8, 0.4, 1) forwards; }
.anim-blurIn { animation: blurIn 1s ease forwards; }
.anim-flipIn { animation: flipIn 0.8s ease-out forwards; }
.anim-swirlIn { animation: swirlIn 0.9s ease-out forwards; }
.anim-bounceIn { animation: bounceIn 0.9s cubic-bezier(0.28, 0.84, 0.42, 1) forwards; }
.anim-shakeIn { animation: shakeIn 0.7s ease forwards; }
.anim-flashIn { animation: flashIn 0.8s ease-out forwards; }
.anim-glitchIn { animation: glitchIn 0.8s steps(2, end) forwards; }
.anim-pulseIn { animation: pulseIn 0.8s ease-in-out forwards; }

body {
font-family: 'Inter', sans-serif;
background: transparent;
padding: 20px;
height: 100vh;
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
color: #ffffff;
}
/* Dashboard 50/50 */
.dashboard {
width: 100%;
max-width: 1600px;
height: 100%;
display: flex;
gap: 28px;
flex-wrap: nowrap;
align-items: stretch;
}
.weather-panel, .calendar-panel {
flex: 1;
border-radius: 2rem;
padding: 1.5rem;
backdrop-filter: none;
transition: background 0.1s ease;
display: flex;
flex-direction: column;
background: rgba(0, 0, 0, 0.65);
overflow-y: auto;
}
@media (max-width: 1024px) and (orientation: portrait) {
body { padding: 16px; overflow-y: auto; height: auto; }
.dashboard { flex-direction: column; height: auto; gap: 24px; }
}
@media (min-width: 1025px) and (orientation: landscape) {
body { overflow: hidden; }
.dashboard { height: calc(100vh - 40px); }
}
.section-title {
font-size: 1.3rem;
font-weight: 700;
margin-bottom: 1rem;
border-left: 4px solid var(--accent-color, #ffd966);
padding-left: 12px;
}
.weather-now {
display: flex;
justify-content: space-between;
align-items: center;
background: transparent;
padding: 12px 0;
flex-wrap: wrap;
}
.temp-large { font-size: 3.8rem; font-weight: 800; line-height: 1; }
.forecast-5days {
display: flex;
gap: 12px;
margin-top: 12px;
justify-content: space-between;
overflow-x: auto;
}
.forecast-day {
background: rgba(0,0,0,0.4);
border-radius: 28px;
padding: 8px 8px;
text-align: center;
flex: 1;
min-width: 70px;
}
.hourly-forecast {
margin-top: 20px;
background: rgba(0,0,0,0.3);
border-radius: 28px;
padding: 12px;
}
.hourly-row {
display: flex;
gap: 12px;
overflow-x: auto;
margin-bottom: 12px;
}
.hourly-item {
background: rgba(0,0,0,0.5);
border-radius: 24px;
padding: 8px 12px;
min-width: 70px;
text-align: center;
}
.search-location {
display: flex;
gap: 10px;
margin-bottom: 20px;
}
.search-location input, .search-location button {
padding: 8px 16px;
border-radius: 60px;
border: none;
background: rgba(0,0,0,0.6);
color: white;
font-weight: 500;
}
.search-location button { background: var(--accent-color, #2c6e9e); cursor: pointer; }
.calendar-header-controls {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 20px;
}
.month-nav {
background: rgba(0,0,0,0.5);
border: none;
padding: 6px 16px;
border-radius: 40px;
color: white;
cursor: pointer;
font-weight: 600;
}
.calendar-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 8px;
flex: 1;
}
.weekday {
text-align: center;
font-weight: 600;
padding: 8px 0;
background: rgba(0,0,0,0.3);
border-radius: 30px;
}
.calendar-day {
background: rgba(0,0,0,0.25);
border-radius: 20px;
padding: 8px 4px;
text-align: center;
cursor: pointer;
transition: 0.1s;
min-height: 85px;
display: flex;
flex-direction: column;
align-items: center;
}
.calendar-day:hover { background: rgba(255,255,255,0.2); }
.day-number {
font-weight: 700;
font-size: 1.1rem;
width: 34px;
height: 34px;
line-height: 34px;
border-radius: 40px;
background: rgba(0,0,0,0.5);
margin-bottom: 6px;
}
.event-dots { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.event-dot { width: 8px; height: 8px; border-radius: 10px; }
.modal {
display: none;
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
background: rgba(0,0,0,0.7);
z-index: 2000;
justify-content: center;
align-items: center;
}
.modal-content {
background: #1e2a36;
border-radius: 2rem;
padding: 1.5rem;
max-width: 400px;
width: 80%;
color: white;
text-align: center;
}
.close-modal { background: var(--accent-color); padding: 8px 20px; border-radius: 40px; border: none; color: white; cursor: pointer; }
.music-icons {
position: fixed;
bottom: 24px;
left: 24px;
display: flex;
gap: 16px;
z-index: 1050;
}
.icon-btn {
background: rgba(0,0,0,0.6);
width: 50px;
height: 50px;
border-radius: 60px;
display: flex;
align-items: center;
justify-content: center;
font-size: 1.8rem;
color: white;
text-decoration: none;
transition: 0.1s;
}
.icon-btn:hover { transform: scale(1.05); }
.settings-fab {
position: fixed;
bottom: 24px;
right: 24px;
width: 52px;
height: 52px;
background: var(--accent-color, #1e6f9f);
border-radius: 60px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
z-index: 1000;
color: white;
font-size: 1.6rem;
box-shadow: 0 2px 8px black;
}
.settings-panel {
position: fixed;
bottom: 100px;
right: 24px;
width: 360px;
max-height: 80vh;
overflow-y: auto;
background: #11151cd9;
backdrop-filter: blur(12px);
border-radius: 1.5rem;
padding: 1rem;
display: none;
flex-direction: column;
gap: 16px;
z-index: 1100;
color: white;
border: 1px solid rgba(255,255,255,0.2);
}
.settings-panel.open { display: flex; }
.settings-panel input, .settings-panel select, .settings-panel button {
border-radius: 40px;
padding: 8px 12px;
border: none;
background: #2c2f36;
color: white;
}
.slider-label { display: flex; justify-content: space-between; font-size: 0.75rem; }
.close-settings {
position: absolute;
top: 8px;
right: 12px;
background: none;
border: none;
color: white;
font-size: 1.2rem;
cursor: pointer;
}
hr { border-color: rgba(255,255,255,0.2); margin: 8px 0; }
.status-msg { font-size: 0.75rem; margin-top: 8px; padding: 4px; border-radius: 20px; text-align: center; background: rgba(0,0,0,0.4); }
</style>

<body>

<script>
(function() {
// ---------- 1. HINTERGRUND SLIDESHOW mit 15 Animationen ----------
let bgPhotos = [
"https://picsum.photos/id/104/1920/1080",
"https://picsum.photos/id/15/1920/1080",
"https://picsum.photos/id/169/1920/1080",
"https://picsum.photos/id/155/1920/1080",
"https://picsum.photos/id/20/1920/1080"
];
let currentBg = 0, bgInterval, bgPlaying = true;
let currentAnimation = "fadeIn"; // Standard
const bgContainer = document.getElementById('bgSlideshow');
let bgImgs = [];
const animationSelect = document.getElementById('animationSelect');
const uploadStatusDiv = document.getElementById('uploadStatus');

// Update Animation aus Dropdown
animationSelect.addEventListener('change', () => { currentAnimation = animationSelect.value; });

function rebuildBg() {
bgContainer.innerHTML = '';
bgImgs = [];
bgPhotos.forEach((src, idx) => {
const img = document.createElement('img');
img.src = src;
if (idx === currentBg) img.classList.add('active');
bgContainer.appendChild(img);
bgImgs.push(img);
});
}
function setActiveBgWithAnimation(idx) {
// Entferne active von allen und setze neue active
bgImgs.forEach((img, i) => {
img.classList.remove('active');
// Eventuelle Animationsklassen entfernen
img.classList.forEach(cls => { if(cls.startsWith('anim-')) img.classList.remove(cls); });
});
const newImg = bgImgs[idx];
newImg.classList.add('active');
// Animation anwenden (nicht auf fadeIn, da es schon weich ist, aber auch möglich)
if(currentAnimation !== 'fadeIn') {
newImg.classList.add(`anim-${currentAnimation}`);
// Animation nach Ende entfernen (ca. 0.9s), damit nicht gestört wird
setTimeout(() => {
newImg.classList.remove(`anim-${currentAnimation}`);
}, 950);
}
}
function nextBg() {
if(bgPhotos.length){
currentBg = (currentBg + 1) % bgPhotos.length;
setActiveBgWithAnimation(currentBg);
}
}
function prevBg() {
if(bgPhotos.length){
currentBg = (currentBg - 1 + bgPhotos.length) % bgPhotos.length;
setActiveBgWithAnimation(currentBg);
}
}
function startBgInterval() {
if(bgInterval) clearInterval(bgInterval);
bgInterval = setInterval(() => { if(bgPlaying) nextBg(); }, 5000);
}
function toggleBgPlay() {
bgPlaying = !bgPlaying;
document.getElementById('bgPlayPauseBtn').innerHTML = bgPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
startBgInterval();
}
function addBgPhoto(url) {
if(!url) return;
if(bgPhotos.includes(url)) { uploadStatusDiv.innerText = "⚠️ Bild bereits vorhanden"; setTimeout(()=>uploadStatusDiv.innerText="",2000); return; }
bgPhotos.push(url);
if(bgPhotos.length===1) currentBg=0;
rebuildBg();
setActiveBgWithAnimation(currentBg);
uploadStatusDiv.innerText = "✅ Bild hinzugefügt!";
setTimeout(()=>uploadStatusDiv.innerText="",2000);
}
function resetBg() {
bgPhotos = ["https://picsum.photos/id/104/1920/1080","https://picsum.photos/id/15/1920/1080","https://picsum.photos/id/169/1920/1080","https://picsum.photos/id/155/1920/1080","https://picsum.photos/id/20/1920/1080"];
currentBg=0; rebuildBg(); setActiveBgWithAnimation(0);
uploadStatusDiv.innerText = "🔄 Slideshow zurückgesetzt";
setTimeout(()=>uploadStatusDiv.innerText="",2000);
}
document.getElementById('bgPrevBtn').onclick = () => { prevBg(); startBgInterval(); };
document.getElementById('bgNextBtn').onclick = () => { nextBg(); startBgInterval(); };
document.getElementById('bgPlayPauseBtn').onclick = toggleBgPlay;
document.getElementById('resetBgBtn').onclick = resetBg;
document.getElementById('addBgUrlBtn').onclick = () => { let url = document.getElementById('bgUrlInput').value.trim(); if(url) addBgPhoto(url); document.getElementById('bgUrlInput').value = ''; };
const uploadLabel = document.querySelector('.upload-label');
const uploadInput = document.getElementById('bgUpload');
uploadLabel.addEventListener('click', (e) => { e.preventDefault(); uploadInput.click(); });
uploadInput.addEventListener('change', (e) => {
Array.from(e.target.files).forEach(file => {
if(file.type.startsWith('image/')){
const reader = new FileReader();
reader.onload = ev => addBgPhoto(ev.target.result);
reader.readAsDataURL(file);
} else { uploadStatusDiv.innerText = "❌ Nur Bilder"; setTimeout(()=>uploadStatusDiv.innerText="",2000); }
});
uploadInput.value = '';
});
rebuildBg(); startBgInterval();

// ---------- 2. WETTER + STÜNDLICH ----------
const cityInput = document.getElementById('cityInput');
const searchBtn = document.getElementById('searchWeatherBtn');
const locationBtn = document.getElementById('myLocationBtn');
const weatherDiv = document.getElementById('weatherCurrent');
const forecastDiv = document.getElementById('forecastContainer');
const hourlyContainer = document.getElementById('hourlyContainer');
async function getCoords(city) {
const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=de&format=json`);
const data = await res.json();
return data.results?.[0] || null;
}
async function fetchFullWeather(lat, lon) {
const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&hourly=temperature_2m,weathercode&timezone=auto&forecast_days=6`;
const res = await fetch(url);
return await res.json();
}
function getWeatherIcon(code) {
const map = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",61:"🌧️",63:"🌧️",71:"❄️",80:"🌦️",95:"⛈️"};
return map[code] || "🌡️";
}
function renderHourlySplit(times, temps, codes, todayStr) {
let items = [];
for(let i=0; i<times.length; i++){
if(times[i].startsWith(todayStr)){
items.push({ time: times[i].slice(11,16), temp: Math.round(temps[i]), icon: getWeatherIcon(codes[i]) });
if(items.length >= 12) break;
}
}
const mid = Math.ceil(items.length/2);
const row1 = items.slice(0,mid), row2 = items.slice(mid);
let html = '';
if(row1.length) { html += '<div class="hourly-row">' + row1.map(i => `<div class="hourly-item"><div>${i.time}</div><div style="font-size:1.4rem;">${i.icon}</div><div>${i.temp}°</div></div>`).join('') + '</div>'; }
if(row2.length) { html += '<div class="hourly-row">' + row2.map(i => `<div class="hourly-item"><div>${i.time}</div><div style="font-size:1.4rem;">${i.icon}</div><div>${i.temp}°</div></div>`).join('') + '</div>'; }
hourlyContainer.innerHTML = html || '<div>Keine Daten</div>';
}
async function loadWeather(city) {
const coord = await getCoords(city);
if(!coord){ weatherDiv.innerHTML = "<div>❌ Stadt nicht gefunden</div>"; return; }
const w = await fetchFullWeather(coord.latitude, coord.longitude);
if(w?.current_weather){
weatherDiv.innerHTML = `<div><div style="font-size:2.5rem;">${getWeatherIcon(w.current_weather.weathercode)}</div><div class="temp-large">${Math.round(w.current_weather.temperature)}°C</div><div>${coord.name}</div></div><div><i class="fas fa-wind"></i> ${w.current_weather.windspeed} km/h</div>`;
if(w.daily){
forecastDiv.innerHTML = '';
w.daily.time.slice(0,5).forEach((d,i)=>{
const wk = new Date(d).toLocaleDateString('de-DE',{weekday:'short'});
forecastDiv.innerHTML += `<div class="forecast-day"><div>${wk}</div><div style="font-size:1.6rem;">${getWeatherIcon(w.daily.weathercode[i])}</div><div>${Math.round(w.daily.temperature_2m_max[i])}°/${Math.round(w.daily.temperature_2m_min[i])}°</div></div>`;
});
}
if(w.hourly){
const today = new Date().toISOString().slice(0,10);
renderHourlySplit(w.hourly.time, w.hourly.temperature_2m, w.hourly.weathercode, today);
}
}
}
searchBtn.onclick = () => loadWeather(cityInput.value.trim() || "Berlin");
locationBtn.onclick = () => { if(navigator.geolocation) navigator.geolocation.getCurrentPosition(async pos=>{ const w = await fetchFullWeather(pos.coords.latitude, pos.coords.longitude); if(w?.current_weather) { weatherDiv.innerHTML = `<div><div style="font-size:2.5rem;">${getWeatherIcon(w.current_weather.weathercode)}</div><div class="temp-large">${Math.round(w.current_weather.temperature)}°C</div><div>📍 Standort</div></div><div><i class="fas fa-wind"></i> ${w.current_weather.windspeed} km/h</div>`; if(w.daily) updateForecastQuick(w.daily); if(w.hourly) { const today = new Date().toISOString().slice(0,10); renderHourlySplit(w.hourly.time, w.hourly.temperature_2m, w.hourly.weathercode, today); } } }); };
function updateForecastQuick(daily){ forecastDiv.innerHTML = ''; daily.time.slice(0,5).forEach((d,i)=>{ const wk = new Date(d).toLocaleDateString('de-DE',{weekday:'short'}); forecastDiv.innerHTML += `<div class="forecast-day"><div>${wk}</div><div style="font-size:1.6rem;">${getWeatherIcon(daily.weathercode[i])}</div><div>${Math.round(daily.temperature_2m_max[i])}°/${Math.round(daily.temperature_2m_min[i])}°</div></div>`; }); }
loadWeather("Berlin");

// ---------- 3. iCal KALENDER (funktioniert) ----------
let currentDate = new Date();
let icalEvents = [];
const monthYearSpan = document.getElementById('monthYearDisplay');
const calendarGrid = document.getElementById('calendarGrid');
const prevMonthBtn = document.getElementById('prevMonthBtn');
const nextMonthBtn = document.getElementById('nextMonthBtn');
const modal = document.getElementById('eventModal');
const modalEventList = document.getElementById('modalEventList');
const closeModalBtn = document.getElementById('closeModalBtn');
const icalStatus = document.getElementById('icalStatus');
function parseYMD(dt){ if(!dt) return null; if(dt.length===8 && !isNaN(parseInt(dt))) return dt; if(dt.includes('T')) return dt.substring(0,8); return null; }
async function loadICalendar(url){
if(!url){ icalStatus.innerText="❌ Keine URL"; return; }
icalStatus.innerText="⏳ Lade...";
const proxies = [`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, `https://corsproxy.io/?${encodeURIComponent(url)}`];
let icsText=null;
for(let p of proxies){ try{ const r=await fetch(p); if(r.ok){ icsText=await r.text(); if(icsText.includes('BEGIN:VCALENDAR')) break; } }catch(e){} }
if(!icsText){ icalStatus.innerText="⚠️ Fehler: URL öffentlich?"; return; }
const events=[]; let inEvent=false, cur={};
for(let line of icsText.split(/\r?\n/)){
line=line.trim();
if(line==='BEGIN:VEVENT'){ inEvent=true; cur={}; continue; }
if(line==='END:VEVENT'){ if(cur.summary && cur.start) events.push(cur); inEvent=false; continue; }
if(inEvent){
if(line.startsWith('SUMMARY:')) cur.summary=line.substring(8).replace(/\\,/g,',').replace(/\\n/g,' ');
else if(line.startsWith('DTSTART')){
let val=line.split(':')[1];
if(!val && line.includes(';VALUE=DATE')) val=line.split(':').slice(1).join(':');
else if(line.includes(':')) val=line.substring(line.indexOf(':')+1);
if(val) cur.start=val;
}
}
}
icalEvents = events.map(e=>({ startYMD: parseYMD(e.start), summary: e.summary||"Termin" })).filter(e=>e.startYMD);
icalStatus.innerText = `✅ ${icalEvents.length} Termine geladen`;
renderCalendar();
}
function renderCalendar(){
const year=currentDate.getFullYear(), month=currentDate.getMonth();
const firstDay=new Date(year,month,1), startWD=firstDay.getDay();
const daysInMonth=new Date(year,month+1,0).getDate();
const monthNames=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
monthYearSpan.innerText=`${monthNames[month]} ${year}`;
let html=`<div class="weekday">Mo</div><div class="weekday">Di</div><div class="weekday">Mi</div><div class="weekday">Do</div><div class="weekday">Fr</div><div class="weekday">Sa</div><div class="weekday">So</div>`;
let adjStart=(startWD===0?6:startWD-1), day=1;
for(let i=0;i<42;i++){
if(i<adjStart || day>daysInMonth){ html+=`<div class="calendar-day" style="opacity:0.4;"></div>`; }
else{
let dateStr=`${year}${String(month+1).padStart(2,'0')}${String(day).padStart(2,'0')}`;
let evs=icalEvents.filter(e=>e.startYMD===dateStr);
let dots=evs.map((_,idx)=>`<div class="event-dot" style="background-color:${['#f4c542','#e57373','#81c784','#64b5f6','#ba82d6'][idx%5]};"></div>`).join('');
html+=`<div class="calendar-day" data-date="${dateStr}" data-events='${JSON.stringify(evs.map(e=>e.summary))}'><div class="day-number">${day}</div><div class="event-dots">${dots}</div></div>`;
day++;
}
}
calendarGrid.innerHTML=html;
document.querySelectorAll('.calendar-day[data-date]').forEach(el=>{
el.addEventListener('click',()=>{
const list=JSON.parse(el.getAttribute('data-events'));
modalEventList.innerHTML=list.length ? '<ul>'+list.map(t=>`<li><i class="fas fa-calendar-day"></i> ${t}</li>`).join('')+'</ul>' : '<p>Keine Termine</p>';
modal.style.display='flex';
});
});
}
prevMonthBtn.onclick=()=>{ currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); };
nextMonthBtn.onclick=()=>{ currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); };
document.getElementById('applyIcalBtn').onclick=()=>{ let u=document.getElementById('icalUrlInput').value.trim(); if(u) loadICalendar(u); };
loadICalendar(document.getElementById('icalUrlInput').value.trim());
closeModalBtn.onclick=()=>modal.style.display='none';
window.onclick=e=>{ if(e.target===modal) modal.style.display='none'; };

// ---------- 4. THEMES, FARBEN, TRANSPARENZ, SCHRIFT ----------
const themeBtns=document.querySelectorAll('.theme-btn');
function setAccentColor(c){ document.documentElement.style.setProperty('--accent-color',c); document.querySelectorAll('.search-location button, .close-modal, .settings-fab').forEach(el=>{ if(el.tagName==='BUTTON') el.style.backgroundColor=c; }); }
const themeColors={ ocean:'#1e6f9f', forest:'#2f6b3c', lavender:'#6a4e9b', sunset:'#c2571a', royal:'#4a3b7c', mint:'#2b7a62', graphite:'#3a4b5c', cherry:'#b3414b', sky:'#0077be', neutral:'#5e6f8d' };
themeBtns.forEach(btn=>btn.addEventListener('click',()=>{ if(themeColors[btn.dataset.theme]) setAccentColor(themeColors[btn.dataset.theme]); }));
setAccentColor('#1e6f9f');
const cardBg=document.getElementById('cardBgColor'), opacitySlider=document.getElementById('opacitySlider'), opacitySpan=document.getElementById('opacityValue');
const weatherPanel=document.getElementById('weatherPanel'), calendarPanel=document.getElementById('calendarPanel');
function updateCardBg(){ const c=cardBg.value, o=parseFloat(opacitySlider.value); const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16); weatherPanel.style.background=`rgba(${r},${g},${b},${o})`; calendarPanel.style.background=`rgba(${r},${g},${b},${o})`; opacitySpan.innerText=o.toFixed(2); }
cardBg.addEventListener('input',updateCardBg); opacitySlider.addEventListener('input',updateCardBg); updateCardBg();
const textColor=document.getElementById('textColor');
textColor.addEventListener('input',e=>{ document.body.style.color=e.target.value; document.querySelectorAll('.section-title, .weather-now, .forecast-day, .calendar-day, .weekday, .month-nav, .search-location input, .search-location button, .day-number, .hourly-item, .status-msg').forEach(el=>{ if(el) el.style.color=e.target.value; }); });
textColor.dispatchEvent(new Event('input'));
const fab=document.getElementById('settingsFab'), panel=document.getElementById('settingsPanel'), closeSet=document.getElementById('closeSettingsBtn');
fab.onclick=()=>panel.classList.toggle('open');
closeSet.onclick=()=>panel.classList.remove('open');
window.onclick=e=>{ if(!panel.contains(e.target) && e.target!==fab) panel.classList.remove('open'); };
})();
</script>

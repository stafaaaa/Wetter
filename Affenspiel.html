<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐒 Affen-Becherspiel · Finde die Nuss!</title>
<style>
* {
box-sizing: border-box;
font-family: 'Segoe UI', 'Arial', sans-serif;
}
body {
min-height: 100vh;
margin: 0;
background: linear-gradient(145deg, #2b5a3a 0%, #1e7b4b 100%);
display: flex;
justify-content: center;
align-items: center;
}
.game-container {
background: #f7e3c0;
background-image: radial-gradient(circle at 30% 20%, #fff3d6, #e7cba5);
padding: 2rem 2rem 2.5rem;
border-radius: 80px 20px 80px 20px;
box-shadow: 0 20px 30px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,240,0.8);
border: 4px solid #aa7e5a;
text-align: center;
max-width: 700px;
width: 95%;
}
h1 {
margin: 0 0 5px;
font-size: 2.4rem;
font-weight: 700;
color: #3d2a1b;
text-shadow: 2px 2px 0 #e0b87b;
display: flex;
align-items: center;
justify-content: center;
gap: 15px;
}
.monkey-area {
font-size: 4.5rem;
margin: 5px 0 10px;
filter: drop-shadow(4px 6px 4px rgba(0,0,0,0.2));
transition: transform 0.2s;
}
.monkey-area span {
display: inline-block;
animation: monkeyIdle 3s infinite ease-in-out;
}
@keyframes monkeyIdle {
0%,100% { transform: rotate(0deg); }
25% { transform: rotate(8deg); }
75% { transform: rotate(-6deg); }
}
.message {
background: #fef7e9;
padding: 12px 20px;
border-radius: 50px;
font-size: 1.3rem;
font-weight: bold;
color: #3b2c1a;
box-shadow: inset 0 2px 5px #bba88b, 0 4px 0 #6b4f32;
margin: 20px 0 25px;
border: 1px solid #b2926a;
min-height: 4.2rem;
display: flex;
align-items: center;
justify-content: center;
}
.cups-row {
display: flex;
justify-content: center;
gap: 20px;
margin: 15px 0 20px;
perspective: 600px;
}
.cup {
width: 120px;
height: 140px;
background: #c93e3e;
background: linear-gradient(145deg, #d14b4b, #a52a2a);
border-radius: 40% 40% 30% 30% / 60% 60% 20% 20%;
box-shadow: 0 15px 0 #631e1e, 0 20px 15px rgba(0,0,0,0.25), inset 0 -8px 0 rgba(0,0,0,0.1);
border: 2px solid #2c1c0e;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
justify-content: flex-end;
padding-bottom: 12px;
transition: all 0.1s ease;
position: relative;
transform-style: preserve-3d;
}
.cup:hover {
transform: translateY(-8px);
box-shadow: 0 8px 0 #631e1e, 0 18px 20px rgba(0,0,0,0.3);
}
.cup:active {
transform: translateY(5px);
box-shadow: 0 5px 0 #631e1e, 0 12px 12px rgba(0,0,0,0.3);
}
.cup.disabled {
opacity: 0.7;
pointer-events: none;
filter: grayscale(0.3);
transform: translateY(0);
}
.cup .cup-label {
font-size: 2.2rem;
font-weight: bold;
color: #ffd78a;
text-shadow: 2px 2px 0 #411010;
background: #6f2c2c;
width: 50px;
height: 50px;
line-height: 50px;
border-radius: 50%;
margin-bottom: 5px;
box-shadow: inset 0 -2px 0 #2f1212, 0 3px 0 #3f1a1a;
border: 1px solid #ebb37a;
}
/* Nuss-Anzeige unter dem Becher (wird nach Wahl sichtbar) */
.nut-reveal {
font-size: 3rem;
margin-top: -5px;
filter: drop-shadow(0 4px 4px #3a2b1c);
transition: 0.2s;
}
.stats {
display: flex;
justify-content: space-around;
background: #5c3e28c9;
padding: 12px 25px;
border-radius: 60px;
margin: 25px 0 15px;
color: #f9efda;
font-weight: bold;
font-size: 1.4rem;
backdrop-filter: blur(3px);
border: 1px solid #c9aa7b;
}
.button-group {
display: flex;
gap: 20px;
justify-content: center;
}
.btn {
background: #f3d37c;
border: none;
border-bottom: 6px solid #9e712e;
color: #2d1f0c;
font-weight: bold;
font-size: 1.3rem;
padding: 12px 28px;
border-radius: 40px;
cursor: pointer;
box-shadow: 0 4px 8px rgba(0,0,0,0.2);
transition: 0.07s;
border: 1px solid #ffeaae;
letter-spacing: 1px;
}
.btn:hover {
background: #ffdd8a;
transform: scale(0.98);
border-bottom-width: 3px;
}
.btn:active {
border-bottom-width: 2px;
transform: translateY(4px);
}
.footer {
margin-top: 15px;
color: #2c472c;
font-style: italic;
font-weight: 500;
}
</style>
</head>
<body>
<div class="game-container">
<h1>
<span>🐵</span> AFFEN-HÜTCHEN <span>🥥</span>
</h1>
<div class="monkey-area">
<span>🐒</span>   <span>🥤🥤🥤</span>
</div>

<div class="message" id="messageBox">
🐵 Der Affe mischt die Becher ...<br>Wo ist die Nuss?
</div>

<!-- Drei Becher -->
<div class="cups-row" id="cupsContainer">
<!-- Dynamisch per JS befüllt -->
</div>

<div class="stats">
<span>✅ Richtig: <span id="correctCount">0</span></span>
<span>❌ Falsch: <span id="wrongCount">0</span></span>
</div>

<div class="button-group">
<button class="btn" id="shuffleBtn">🔄 Neu mischen</button>
<button class="btn" id="resetScoreBtn">🏆 Punkte zurücksetzen</button>
</div>
<div class="footer">
Klicke auf einen Becher, um zu raten!
</div>
</div>

<script>
(function(){
"use strict";

// ---------- SPIELZUSTAND ----------
let nutPosition = 1; // 0,1,2 (Index des Bechers mit Nuss)
let cups = [0, 1, 2]; // aktuelle Anordnung der Becher-Indizes (Position 0..2)
let gameActive = true; // ob geraten werden kann (nach Wahl gesperrt)
let correctGuesses = 0;
let wrongGuesses = 0;

// DOM Elemente
const cupsContainer = document.getElementById('cupsContainer');
const messageBox = document.getElementById('messageBox');
const correctSpan = document.getElementById('correctCount');
const wrongSpan = document.getElementById('wrongCount');
const shuffleBtn = document.getElementById('shuffleBtn');
const resetScoreBtn = document.getElementById('resetScoreBtn');

// Emojis für Becher & Nuss
const CUP_EMOJI = '🥤';
const NUT_EMOJI = '🥜';
const HIDDEN_EMOJI = '❓';

// ---------- HILFSFUNKTIONEN ----------
function updateScoreDisplay() {
correctSpan.textContent = correctGuesses;
wrongSpan.textContent = wrongGuesses;
}

// Nachricht setzen
function setMessage(text, isGood = true) {
messageBox.innerHTML = text;
// Kleiner Farbakzent (bleibt aber lesbar)
}

// Becher mischen (Fisher–Yates auf cups Array)
function shuffleArray(arr) {
for (let i = arr.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[arr[i], arr[j]] = [arr[j], arr[i]];
}
return arr;
}

// Neue Runde vorbereiten: Nuss zufällig platzieren, Becher mischen, aktivieren
function newRound() {
// Nuss unter einem zufälligen Becher (0..2)
nutPosition = Math.floor(Math.random() * 3);

// Becher-Indizes neu mischen (repräsentiert die Positionen)
cups = shuffleArray([0, 1, 2]);

gameActive = true;

// Nachricht aktualisieren
setMessage('🐒 Der Affe hat die Becher verschoben!<br>🔍 Unter welchem ist die Nuss?');

// Becheransicht neu zeichnen (alle verdeckt)
renderCups(false);
}

// Becher rendern
// revealMode: true = nach einer Wahl die Nuss anzeigen (unter richtigem Becher)
function renderCups(revealMode = false) {
let html = '';
for (let i = 0; i < 3; i++) {
const cupIndex = cups[i]; // welcher originale Becher (0,1,2) an Position i steht
const hasNut = (cupIndex === nutPosition);

// Für Darstellung: Becher immer mit Label 1,2,3 (aber die Nuss wandert mit cupIndex)
const displayNumber = i + 1;

let content = '';
if (revealMode) {
// Aufdecken: Zeige unter dem Becher die Nuss, wenn sie dort ist
if (hasNut) {
content = `<div class="nut-reveal">${NUT_EMOJI}</div>`;
} else {
content = `<div class="nut-reveal" style="opacity:0.4;">❌</div>`;
}
} else {
// Normaler Modus: verdeckt
content = `<div class="nut-reveal" style="visibility:hidden;">${NUT_EMOJI}</div>`;
}

// Becher HTML
html += `
<div class="cup ${!gameActive && !revealMode ? 'disabled' : ''}" data-position="${i}">
<div class="cup-label">${displayNumber}</div>
${content}
<div style="font-size:2.8rem; line-height:1;">${CUP_EMOJI}</div>
</div>
`;
}
cupsContainer.innerHTML = html;

// Event-Listener an die Becher hängen (nur wenn Spiel aktiv)
if (gameActive && !revealMode) {
document.querySelectorAll('.cup').forEach(cupEl => {
cupEl.addEventListener('click', handleCupClick);
});
}
}

// Klick auf einen Becher
function handleCupClick(e) {
if (!gameActive) return;

// Position des geklickten Bechers (0,1,2)
const cupDiv = e.currentTarget;
const pos = parseInt(cupDiv.dataset.position, 10);

// Welcher Becher-Index steht an dieser Position?
const chosenCupIndex = cups[pos];
const isCorrect = (chosenCupIndex === nutPosition);

// Spiel deaktivieren
gameActive = false;

// Punktestand aktualisieren
if (isCorrect) {
correctGuesses++;
setMessage(`🎉 RICHTIG! Die Nuss war unter Becher ${pos+1}! 🥜<br>🐵 Der Affe ist beeindruckt.`, true);
} else {
wrongGuesses++;
// Finde die echte Position der Nuss für die Meldung
const realPos = cups.indexOf(nutPosition);
setMessage(`😵 Leider falsch! Die Nuss war unter Becher ${realPos+1}.<br>🐒 Der Affe kichert ...`, false);
}

updateScoreDisplay();

// Aufdecken: Zeige alle Becher mit Nuss-Position
renderCups(true);

// Event-Listener von Bechern entfernen (da disabled)
}

// Spiel zurücksetzen (neue Runde, Punkte bleiben)
function resetRound() {
newRound();
}

// Punkte zurücksetzen
function resetScore() {
correctGuesses = 0;
wrongGuesses = 0;
updateScoreDisplay();
setMessage('📊 Punkte zurückgesetzt. Viel Glück!');
// Wenn Spiel inaktiv, trotzdem neue Runde?
if (!gameActive) {
newRound();
} else {
// Wenn aktiv, einfach Nachricht anpassen, Spiel läuft weiter
renderCups(false);
}
}

// Initialisierung und Event-Listener für Buttons
function initGame() {
// Zufällige Startposition
nutPosition = Math.floor(Math.random() * 3);
cups = shuffleArray([0, 1, 2]);
gameActive = true;
correctGuesses = 0;
wrongGuesses = 0;
updateScoreDisplay();
setMessage('🐵 Der Affe begrüßt dich!<br>🥜 Unter einem Becher ist die Nuss. Klicke!');
renderCups(false);

// Button: Neu mischen
shuffleBtn.addEventListener('click', () => {
newRound();
});

// Button: Punkte zurücksetzen
resetScoreBtn.addEventListener('click', resetScore);
}

// Alles starten
initGame();

// Kleine Zusatzanimation: Wenn man auf "Neu mischen" klickt, wird kurz Affen-Text gezeigt
// Bereits in newRound() enthalten.
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Home Dashboard · Tablet</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: system-ui, -apple-system, 'Helvetica Neue', 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
}

body {
min-height: 100vh;
background: radial-gradient(circle at 20% 30%, #2a3a4a, #0f1620);
display: flex;
align-items: center;
justify-content: center;
padding: 18px 22px;
}

.dashboard {
width: 100%;
max-width: 1366px;
height: 100%;
min-height: 860px;
background: rgba(18, 28, 40, 0.45);
backdrop-filter: blur(28px) saturate(180%);
-webkit-backdrop-filter: blur(28px) saturate(180%);
border-radius: 48px;
border: 1px solid rgba(220, 240, 255, 0.12);
box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
padding: 24px 28px 30px 28px;
display: flex;
flex-direction: column;
}

.toolbar {
display: flex;
align-items: center;
justify-content: space-between;
padding: 6px 8px 20px 8px;
flex-wrap: wrap;
gap: 12px;
border-bottom: 1px solid rgba(255, 255, 255, 0.06);
margin-bottom: 24px;
}

.toolbar-left {
display: flex;
align-items: center;
gap: 18px;
}

.dashboard-title {
font-size: 2rem;
font-weight: 600;
letter-spacing: -0.02em;
color: rgba(255, 255, 255, 0.95);
text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
}

.toolbar-actions {
display: flex;
gap: 10px;
flex-wrap: wrap;
}

.btn {
background: rgba(35, 45, 65, 0.65);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border: 1px solid rgba(255, 255, 255, 0.15);
color: #f5f9ff;
padding: 10px 20px;
border-radius: 40px;
font-size: 1rem;
font-weight: 500;
box-shadow: 0 10px 18px -6px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.08);
cursor: pointer;
transition: all 0.2s;
display: inline-flex;
align-items: center;
gap: 6px;
white-space: nowrap;
}

.btn:hover {
background: rgba(70, 90, 130, 0.7);
border-color: rgba(255, 255, 255, 0.3);
transform: translateY(-1px);
box-shadow: 0 14px 22px -8px rgba(0, 0, 0, 0.5);
}

.btn-warning {
background: rgba(120, 50, 50, 0.5);
}

.grid-container {
display: grid;
grid-template-columns: repeat(4, 1fr);
grid-auto-rows: 190px;
gap: 20px;
flex: 1;
}

.tile {
backdrop-filter: blur(18px);
-webkit-backdrop-filter: blur(18px);
border: 1px solid rgba(220, 240, 255, 0.14);
border-radius: 32px;
padding: 18px 20px;
box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.5),
inset 0 0 0 1px rgba(255, 255, 255, 0.03),
inset 0 -2px 0 rgba(0,0,0,0.2);
color: #f0f6ff;
display: flex;
flex-direction: column;
overflow: hidden;
position: relative;
transition: all 0.2s ease;
transform: perspective(1200px) rotateX(0.8deg);
}

.tile::after {
content: "";
position: absolute;
top: 0; left: 0; right: 0; height: 40%;
background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);
border-radius: 32px 32px 0 0;
pointer-events: none;
}

.tile.edit-mode {
border: 2px dashed rgba(160, 200, 255, 0.6);
cursor: grab;
}

.tile-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 12px;
font-weight: 600;
color: #cddef5;
text-shadow: 0 2px 3px rgba(0,0,0,0.2);
position: relative;
z-index: 2;
}

.tile-controls {
display: flex;
gap: 8px;
}

.icon-btn {
background: rgba(0, 0, 0, 0.25);
backdrop-filter: blur(4px);
border: 0.5px solid rgba(255,255,255,0.15);
color: #eef3ff;
font-size: 1.4rem;
cursor: pointer;
width: 36px;
height: 36px;
border-radius: 36px;
display: flex;
align-items: center;
justify-content: center;
box-shadow: inset 0 1px 2px rgba(255,255,255,0.1), 0 4px 6px rgba(0,0,0,0.2);
transition: 0.15s;
}

.icon-btn:hover {
background: rgba(80, 110, 160, 0.5);
color: white;
}

.tile-content {
flex: 1;
display: flex;
flex-direction: column;
overflow: auto;
scrollbar-width: thin;
position: relative;
z-index: 2;
}

.flip-clock {
display: flex;
gap: 6px;
font-size: 3.8rem;
font-weight: 300;
line-height: 1.1;
}

.flip-digit {
background: rgba(10, 20, 30, 0.5);
backdrop-filter: blur(4px);
padding: 8px 12px;
border-radius: 18px;
box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 8px 12px rgba(0,0,0,0.2);
border-bottom: 2px solid rgba(255,255,240,0.2);
}

.weather-icon-large {
font-size: 3.5rem;
filter: drop-shadow(0 6px 8px rgba(0,0,0,0.3));
}

.forecast-icons {
display: flex;
margin-top: 10px;
gap: 8px;
}

.forecast-item {
background: rgba(255,255,255,0.04);
border-radius: 24px;
padding: 6px 10px;
text-align: center;
backdrop-filter: blur(4px);
box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
}

.calendar-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 5px;
text-align: center;
margin-top: 5px;
}

.cal-day {
padding: 8px 0;
border-radius: 20px;
background: rgba(0,0,0,0.1);
}

.today {
background: rgba(0, 122, 255, 0.6);
font-weight: bold;
box-shadow: 0 0 10px #0077ff55;
}

.has-event::after {
content: "•";
color: #ffbb5e;
font-size: 18px;
line-height: 0;
}

.slideshow-img {
width: 100%;
height: 100%;
object-fit: cover;
border-radius: 22px;
box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1), 0 8px 12px rgba(0,0,0,0.3);
}

iframe {
border-radius: 20px;
background: #0f1a24;
width: 100%;
height: 100%;
border: none;
box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
}

.external-link-btn {
display: flex;
align-items: center;
justify-content: center;
height: 100%;
}

.external-link-btn .btn {
padding: 16px 24px;
font-size: 1.2rem;
}

.settings-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.5);
backdrop-filter: blur(16px);
display: flex;
align-items: center;
justify-content: center;
z-index: 1000;
}

.settings-card {
background: rgba(18, 28, 42, 0.9);
backdrop-filter: blur(30px);
border: 1px solid rgba(255,255,255,0.15);
border-radius: 40px;
padding: 30px 36px;
width: 580px;
max-width: 90vw;
max-height: 80vh;
overflow-y: auto;
color: white;
box-shadow: 0 30px 50px #00000055;
}

.input-group {
margin-bottom: 20px;
}

.input-group label {
display: block;
margin-bottom: 6px;
font-weight: 500;
}

.input-group input, .input-group textarea, .input-group select {
width: 100%;
padding: 14px 18px;
border-radius: 30px;
border: 1px solid rgba(255,255,255,0.2);
background: rgba(0,0,0,0.3);
color: white;
font-size: 1rem;
backdrop-filter: blur(5px);
}

.input-group small {
display: block;
margin-top: 6px;
opacity: 0.7;
font-size: 0.85rem;
}

.hidden { display: none !important; }
.flex-row { display: flex; gap: 12px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="dashboard" id="dashboard">
<div class="toolbar">
<div class="toolbar-left">
<span class="dashboard-title">🏠 Home Dashboard</span>
</div>
<div class="toolbar-actions">
<button class="btn" id="editToggleBtn">✎ Bearbeiten</button>
<button class="btn" id="uploadImagesBtn">🖼️ Bilder</button>
<button class="btn" id="openSettingsBtn">⚙️ Einstellungen</button>
<button class="btn" id="addTileBtn">➕ Kachel</button>
<button class="btn btn-warning" id="resetBtn">↻ Reset</button>
</div>
</div>

<div class="grid-container" id="tileGrid"></div>
</div>

<!-- Einstellungen Modal -->
<div id="settingsModal" class="settings-overlay hidden">
<div class="settings-card">
<h2 style="margin-bottom:28px;">⚙️ Einstellungen</h2>

<div class="input-group">
<label>📍 Stadt</label>
<input type="text" id="settingsCity" placeholder="Düsseldorf" value="Düsseldorf">
</div>

<div class="input-group">
<label>⏱️ Slideshow-Intervall (Sekunden)</label>
<input type="number" id="settingsSlideshowSec" min="3" max="60" value="6">
</div>

<div class="input-group">
<label>🎵 Spotify Embed URL</label>
<input type="text" id="settingsSpotify" placeholder="https://open.spotify.com/embed/track/...">
<small>Nutze die "Einbetten"-Option in Spotify (⋯ → Teilen → Einbetten)</small>
</div>

<div class="input-group">
<label>▶️ YouTube URL</label>
<input type="text" id="settingsYoutube" placeholder="https://www.youtube.com/watch?v=...">
<small>Normale YouTube-URL oder Embed-URL möglich</small>
</div>

<div class="input-group">
<label>🍳 Rezepte-URL</label>
<input type="text" id="settingsRecipeUrl" placeholder="https://www.chefkoch.de/...">
</div>

<div class="input-group">
<label>📋 Termine (pro Zeile: JJJJ-MM-TT HH:MM | Text)</label>
<textarea id="settingsAppointments" rows="4"></textarea>
</div>

<div class="input-group">
<label>🎨 Kachel-Grundfarbe</label>
<input type="color" id="globalAccentColor" value="#1a3a5a">
<small>Diese Farbe wird für alle Kacheln verwendet</small>
</div>

<div class="flex-row">
<button class="btn" id="saveSettingsBtn">💾 Speichern</button>
<button class="btn" id="closeSettingsBtn">Abbrechen</button>
</div>
</div>
</div>

<script>
(function(){
"use strict";

// Hilfsfunktion: YouTube-URL in Embed-URL umwandeln
function convertYoutubeUrl(url) {
if (!url) return '';

if (url.includes('youtube.com/embed/') || url.includes('youtube-nocookie.com/embed/')) {
return url;
}

const patterns = [
/youtube\.com\/watch\?v=([^&]+)/,
/youtu\.be\/([^?]+)/,
/youtube\.com\/shorts\/([^?]+)/
];

for (const pattern of patterns) {
const match = url.match(pattern);
if (match && match[1]) {
return `https://www.youtube-nocookie.com/embed/${match[1]}`;
}
}

return url;
}

function validateSpotifyUrl(url) {
if (!url) return '';
if (url.includes('open.spotify.com/embed/')) return url;
const match = url.match(/open\.spotify\.com\/(track|album|playlist|episode)\/([^?]+)/);
if (match) {
return `https://open.spotify.com/embed/${match[1]}/${match[2]}`;
}
return url;
}

// ----- State -----
let tiles = [];
let editMode = false;
let nextTileId = 1000;

const DEFAULT_TILES = [
{ id: 1, type: 'clock', title: 'Uhr', colSpan: 1, rowSpan: 1 },
{ id: 2, type: 'weather', title: 'Wetter', colSpan: 1, rowSpan: 1 },
{ id: 3, type: 'calendar', title: 'Kalender', colSpan: 1, rowSpan: 1 },
{ id: 4, type: 'slideshow', title: 'Slideshow', colSpan: 1, rowSpan: 1 },
{ id: 5, type: 'appointments', title: 'Termine', colSpan: 1, rowSpan: 1 },
{ id: 6, type: 'spotify', title: 'Spotify', colSpan: 1, rowSpan: 1 },
{ id: 7, type: 'youtube', title: 'YouTube', colSpan: 1, rowSpan: 1 },
{ id: 8, type: 'recipe', title: 'Rezepte', colSpan: 1, rowSpan: 1 }
];

let userConfig = {
city: 'Düsseldorf',
slideshowInterval: 6,
spotifyUrl: '',
youtubeUrl: '',
recipeUrl: 'https://www.chefkoch.de/',
appointmentsText: '2026-04-10 09:00 | Arzttermin\n2026-04-12 14:30 | Team Meeting',
globalAccent: '#1a3a5a'
};

let uploadedImages = [];
let weatherCache = null;
let lastWeatherFetch = 0;

// ----- Storage -----
function loadFromStorage() {
try {
const savedTiles = localStorage.getItem('dash_tiles_v3');
const savedConfig = localStorage.getItem('dash_config_v3');
const savedImages = localStorage.getItem('dash_images_v3');

if (savedTiles) {
const parsed = JSON.parse(savedTiles);
tiles = Array.isArray(parsed) && parsed.length ? parsed : [...DEFAULT_TILES];
} else {
tiles = [...DEFAULT_TILES];
}

if (savedConfig) {
userConfig = { ...userConfig, ...JSON.parse(savedConfig) };
}

if (savedImages) {
uploadedImages = JSON.parse(savedImages);
} else {
uploadedImages = [];
}

if (!tiles.length) tiles = [...DEFAULT_TILES];
} catch (e) {
console.warn('Storage fehlerhaft, nutze Defaults');
tiles = [...DEFAULT_TILES];
uploadedImages = [];
}
ensureUniqueIds();
}

function saveToStorage() {
try {
localStorage.setItem('dash_tiles_v3', JSON.stringify(tiles));
localStorage.setItem('dash_config_v3', JSON.stringify(userConfig));
localStorage.setItem('dash_images_v3', JSON.stringify(uploadedImages));
} catch(e) {}
}

function ensureUniqueIds() {
const ids = new Set();
tiles.forEach(t => { if (t.id) ids.add(t.id); });
tiles.forEach(t => {
if (!t.id || (t.id && tiles.filter(x => x.id === t.id).length > 1)) {
t.id = ++nextTileId;
}
});
}

function resetToDefault() {
tiles = DEFAULT_TILES.map(t => ({...t}));
userConfig = {
city: 'Düsseldorf',
slideshowInterval: 6,
spotifyUrl: '',
youtubeUrl: '',
recipeUrl: 'https://www.chefkoch.de/',
appointmentsText: '2026-04-10 09:00 | Arzttermin\n2026-04-12 14:30 | Team Meeting',
globalAccent: '#1a3a5a'
};
uploadedImages = [];
saveToStorage();
renderAll();
}

const gridEl = document.getElementById('tileGrid');

// Hilfsfunktion: Helligkeit einer Farbe berechnen
function getColorBrightness(hex) {
const r = parseInt(hex.slice(1,3), 16);
const g = parseInt(hex.slice(3,5), 16);
const b = parseInt(hex.slice(5,7), 16);
return (r * 299 + g * 587 + b * 114) / 1000;
}

// Kachel-Hintergrund mit Transparenz erstellen
function getTileBackground(baseColor) {
const r = parseInt(baseColor.slice(1,3), 16);
const g = parseInt(baseColor.slice(3,5), 16);
const b = parseInt(baseColor.slice(5,7), 16);
return `rgba(${r}, ${g}, ${b}, 0.65)`;
}

function renderAll() {
if (!gridEl) return;
gridEl.innerHTML = '';

tiles.forEach(tile => {
const tileDiv = createTileElement(tile);
gridEl.appendChild(tileDiv);
});

updateGridStyles();
refreshDynamicContents();
}

function createTileElement(tile) {
const div = document.createElement('div');
div.className = `tile ${editMode ? 'edit-mode' : ''}`;
div.dataset.id = tile.id;
div.style.gridColumn = `span ${tile.colSpan || 1}`;
div.style.gridRow = `span ${tile.rowSpan || 1}`;
div.setAttribute('draggable', editMode);

// WICHTIG: Farbe aus userConfig anwenden
const bgColor = getTileBackground(userConfig.globalAccent);
div.style.backgroundColor = bgColor;

// Textfarbe basierend auf Helligkeit anpassen
const brightness = getColorBrightness(userConfig.globalAccent);
if (brightness < 128) {
div.style.color = '#f0f6ff';
} else {
div.style.color = '#1a1a2e';
}

const header = document.createElement('div');
header.className = 'tile-header';
header.innerHTML = `<span>${tile.title || tile.type}</span>`;

const controls = document.createElement('div');
controls.className = 'tile-controls';
if (editMode) {
controls.innerHTML = `
<button class="icon-btn tile-size-btn" data-id="${tile.id}">🔲</button>
<button class="icon-btn tile-delete-btn" data-id="${tile.id}">✕</button>
`;
}
header.appendChild(controls);
div.appendChild(header);

const content = document.createElement('div');
content.className = 'tile-content';
content.id = `content-${tile.id}`;
div.appendChild(content);

fillTileContent(tile, content);

div.addEventListener('dragstart', handleDragStart);
div.addEventListener('dragover', handleDragOver);
div.addEventListener('drop', handleDrop);
div.addEventListener('dragend', handleDragEnd);

return div;
}

function fillTileContent(tile, container) {
const type = tile.type;
if (type === 'clock') renderFlipClock(container);
else if (type === 'weather') renderWeather(container);
else if (type === 'calendar') renderCalendar(container);
else if (type === 'slideshow') renderSlideshow(container);
else if (type === 'appointments') renderAppointments(container);
else if (type === 'spotify') renderSpotify(container);
else if (type === 'youtube') renderYoutube(container);
else if (type === 'recipe') renderRecipe(container);
}

function renderFlipClock(container) {
const now = new Date();
container.innerHTML = `
<div class="flip-clock">
<span class="flip-digit">${String(now.getHours()).padStart(2,'0')}</span><span>:</span>
<span class="flip-digit">${String(now.getMinutes()).padStart(2,'0')}</span>
</div>
<div style="font-size:1.3rem; margin-top:8px;">${now.toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'long'})}</div>
`;
}

async function renderWeather(container) {
const city = userConfig.city || 'Düsseldorf';
container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;">🌤️ Wetter lädt…</div>`;

try {
const useCache = (Date.now() - lastWeatherFetch < 600000) && weatherCache;
let data;

if (useCache) {
data = weatherCache;
} else {
const res = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
if (!res.ok) throw new Error('API nicht erreichbar');
data = await res.json();
weatherCache = data;
lastWeatherFetch = Date.now();
}

const curr = data.current_condition[0];
const forecast = data.weather;
const icon = getWeatherIcon(curr.weatherCode);

container.innerHTML = `
<div style="display:flex; align-items:center; gap:8px;">
<span class="weather-icon-large">${icon}</span>
<div>
<span style="font-size:2.5rem;">${curr.temp_C}°</span>
<span>${curr.weatherDesc[0].value}</span>
</div>
</div>
<div class="forecast-icons">
${forecast.slice(0,5).map(d => `
<div class="forecast-item">
${getWeatherIcon(d.weatherCode)}<br>
${d.maxtempC}°
</div>
`).join('')}
</div>
`;
} catch(e) {
container.innerHTML = `
<div style="display:flex; align-items:center; gap:8px;">
<span class="weather-icon-large">🌥️</span>
<div>
<span style="font-size:2.5rem;">15°C</span>
<span>leicht bewölkt</span>
</div>
</div>
<div style="margin-top:10px; opacity:0.7;">📍 ${city} (Demo-Modus)</div>
`;
}
}

function getWeatherIcon(code) {
if (code < 200) return '☀️';
if (code < 300) return '🌦️';
if (code < 600) return '🌧️';
if (code < 700) return '❄️';
return '☁️';
}

function renderCalendar(container) {
const today = new Date();
const year = today.getFullYear();
const month = today.getMonth();
const firstDay = new Date(year, month, 1).getDay();
const daysInMonth = new Date(year, month + 1, 0).getDate();

let html = `
<div style="font-weight:500; margin-bottom:8px;">
${today.toLocaleString('de', {month:'long'})} ${year}
</div>
<div class="calendar-grid">
`;

['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d => {
html += `<div style="opacity:0.7; font-size:0.8rem;">${d}</div>`;
});

let startOffset = (firstDay === 0) ? 6 : firstDay - 1;
for (let i = 0; i < startOffset; i++) {
html += `<div></div>`;
}

for (let d = 1; d <= daysInMonth; d++) {
const dateStr = `${year}-${String(month + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const isToday = (d === today.getDate() && month === today.getMonth());
const hasApp = userConfig.appointmentsText.split('\n').some(l => l.startsWith(dateStr));

html += `<div class="cal-day ${isToday ? 'today' : ''} ${hasApp ? 'has-event' : ''}">${d}</div>`;
}

html += `</div>`;
container.innerHTML = html;
}

function renderSlideshow(container) {
if (!uploadedImages.length) {
container.innerHTML = `
<div style="display:flex;align-items:center;justify-content:center;height:100%;background:rgba(0,0,0,0.2);border-radius:22px;flex-direction:column;gap:10px;">
<span style="font-size:2.5rem;">📸</span>
<span>Bilder hochladen</span>
</div>
`;
return;
}

let idx = (parseInt(container.dataset.slideIndex) || 0) % uploadedImages.length;
container.innerHTML = `<img class="slideshow-img" src="${uploadedImages[idx]}" alt="slide">`;
container.dataset.slideIndex = idx;
}

function renderAppointments(container) {
const lines = userConfig.appointmentsText.split('\n').filter(l => l.trim());

if (!lines.length) {
container.innerHTML = `
<div style="display:flex;align-items:center;justify-content:center;height:100%;opacity:0.7;">
📋 Keine Termine
</div>
`;
return;
}

container.innerHTML = lines.map(l => `
<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.1);">
📌 ${l}
</div>
`).join('');
}

function renderSpotify(container) {
const url = validateSpotifyUrl(userConfig.spotifyUrl);

if (!url) {
container.innerHTML = `
<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:8px;">
<span style="font-size:2rem;">🎧</span>
<span style="opacity:0.7;">Spotify URL in Einstellungen</span>
</div>
`;
return;
}

container.innerHTML = `<iframe src="${url}" allow="encrypted-media" loading="lazy"></iframe>`;
}

function renderYoutube(container) {
const embedUrl = convertYoutubeUrl(userConfig.youtubeUrl);

if (!embedUrl) {
container.innerHTML = `
<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:8px;">
<span style="font-size:2rem;">▶️</span>
<span style="opacity:0.7;">YouTube URL in Einstellungen</span>
</div>
`;
return;
}

container.innerHTML = `<iframe src="${embedUrl}" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" loading="lazy"></iframe>`;
}

function renderRecipe(container) {
const url = userConfig.recipeUrl;

if (!url) {
container.innerHTML = `
<div style="display:flex;align-items:center;justify-content:center;height:100%;">
🍳 Keine URL konfiguriert
</div>
`;
return;
}

container.innerHTML = `
<div style="position:relative; width:100%; height:100%;">
<iframe src="${url}" sandbox="allow-scripts allow-same-origin allow-popups allow-forms" loading="lazy"
onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
style="width:100%; height:100%; border:none; border-radius:20px;">
</iframe>
<div class="external-link-btn" style="display:none; position:absolute; top:0; left:0; right:0; bottom:0; align-items:center; justify-content:center; background:rgba(0,0,0,0.3); border-radius:20px;">
<button class="btn" onclick="window.open('${url}', '_blank')">
🍳 Rezepte öffnen
</button>
</div>
</div>
`;

setTimeout(() => {
const iframe = container.querySelector('iframe');
const fallback = container.querySelector('.external-link-btn');
if (iframe && fallback && !iframe.contentWindow?.length) {
iframe.style.display = 'none';
fallback.style.display = 'flex';
}
}, 2000);
}

function refreshDynamicContents() {
document.querySelectorAll('.tile').forEach(el => {
const id = Number(el.dataset.id);
const tile = tiles.find(t => t.id === id);
if (tile) {
fillTileContent(tile, el.querySelector('.tile-content'));
}
});
}

function updateGridStyles() {
tiles.forEach(t => {
const el = document.querySelector(`.tile[data-id="${t.id}"]`);
if (el) {
el.style.gridColumn = `span ${t.colSpan || 1}`;
el.style.gridRow = `span ${t.rowSpan || 1}`;
}
});
}

// Drag & Drop
let dragSrc = null;
function handleDragStart(e) {
if (editMode) {
dragSrc = this;
this.classList.add('dragging');
} else {
e.preventDefault();
}
}

function handleDragOver(e) {
if (editMode) e.preventDefault();
}

function handleDrop(e) {
e.preventDefault();
if (!editMode || !dragSrc) return;

const target = this.closest('.tile');
if (!target || dragSrc === target) return;

const srcId = Number(dragSrc.dataset.id);
const targetId = Number(target.dataset.id);
const srcIdx = tiles.findIndex(t => t.id === srcId);
const tgtIdx = tiles.findIndex(t => t.id === targetId);

if (srcIdx > -1 && tgtIdx > -1) {
[tiles[srcIdx], tiles[tgtIdx]] = [tiles[tgtIdx], tiles[srcIdx]];
saveToStorage();
renderAll();
}
}

function handleDragEnd(e) {
this.classList.remove('dragging');
}

// Initialisierung
function init() {
loadFromStorage();
renderAll();

document.getElementById('editToggleBtn').onclick = () => {
editMode = !editMode;
document.querySelectorAll('.tile').forEach(el => {
el.classList.toggle('edit-mode', editMode);
el.setAttribute('draggable', editMode);
});
renderAll();
};

document.getElementById('uploadImagesBtn').onclick = () => {
const inp = document.createElement('input');
inp.type = 'file';
inp.accept = 'image/*';
inp.multiple = true;
inp.onchange = e => {
Array.from(e.target.files).forEach(f => {
const r = new FileReader();
r.onload = ev => {
uploadedImages.push(ev.target.result);
saveToStorage();
renderAll();
};
r.readAsDataURL(f);
});
};
inp.click();
};

document.getElementById('openSettingsBtn').onclick = () => {
document.getElementById('settingsCity').value = userConfig.city;
document.getElementById('settingsSlideshowSec').value = userConfig.slideshowInterval;
document.getElementById('settingsSpotify').value = userConfig.spotifyUrl;
document.getElementById('settingsYoutube').value = userConfig.youtubeUrl;
document.getElementById('settingsRecipeUrl').value = userConfig.recipeUrl;
document.getElementById('settingsAppointments').value = userConfig.appointmentsText;
document.getElementById('globalAccentColor').value = userConfig.globalAccent;
document.getElementById('settingsModal').classList.remove('hidden');
};

document.getElementById('closeSettingsBtn').onclick = () => {
document.getElementById('settingsModal').classList.add('hidden');
};

document.getElementById('saveSettingsBtn').onclick = () => {
userConfig.city = document.getElementById('settingsCity').value;
userConfig.slideshowInterval = parseInt(document.getElementById('settingsSlideshowSec').value) || 6;
userConfig.spotifyUrl = document.getElementById('settingsSpotify').value;
userConfig.youtubeUrl = document.getElementById('settingsYoutube').value;
userConfig.recipeUrl = document.getElementById('settingsRecipeUrl').value;
userConfig.appointmentsText = document.getElementById('settingsAppointments').value;
userConfig.globalAccent = document.getElementById('globalAccentColor').value;

saveToStorage();
renderAll(); // NEU RENDERN MIT NEUER FARBE
document.getElementById('settingsModal').classList.add('hidden');
};

document.getElementById('addTileBtn').onclick = () => {
tiles.push({
id: ++nextTileId,
type: 'clock',
title: 'Neue Uhr',
colSpan: 1,
rowSpan: 1
});
saveToStorage();
renderAll();
};

document.getElementById('resetBtn').onclick = resetToDefault;

gridEl.addEventListener('click', e => {
const btn = e.target.closest('button');
if (!btn) return;
const id = btn.dataset.id;

if (btn.classList.contains('tile-delete-btn')) {
tiles = tiles.filter(t => t.id != id);
saveToStorage();
renderAll();
} else if (btn.classList.contains('tile-size-btn')) {
const tile = tiles.find(t => t.id == id);
if (tile) {
tile.colSpan = tile.colSpan === 2 ? 1 : 2;
tile.rowSpan = tile.rowSpan === 2 ? 1 : 2;
saveToStorage();
renderAll();
}
}
});

// Periodische Updates
setInterval(() => {
document.querySelectorAll('.tile').forEach(el => {
const t = tiles.find(tt => tt.id == el.dataset.id);
if (t && t.type === 'clock') {
renderFlipClock(el.querySelector('.tile-content'));
}
});
}, 1000);

function updateSlideshowInterval() {
const interval = (userConfig.slideshowInterval || 6) * 1000;
return setInterval(() => {
document.querySelectorAll('.tile').forEach(el => {
const t = tiles.find(tt => tt.id == el.dataset.id);
if (t && t.type === 'slideshow' && uploadedImages.length) {
const cont = el.querySelector('.tile-content');
let idx = (parseInt(cont.dataset.slideIndex || 0) + 1) % uploadedImages.length;
cont.dataset.slideIndex = idx;
cont.innerHTML = `<img class="slideshow-img" src="${uploadedImages[idx]}" alt="slide">`;
}
});
}, interval);
}

let slideshowTimer = updateSlideshowInterval();

// Timer neu starten wenn Intervall geändert wird
const originalSaveSettings = document.getElementById('saveSettingsBtn').onclick;
document.getElementById('saveSettingsBtn').onclick = () => {
if (originalSaveSettings) originalSaveSettings();
clearInterval(slideshowTimer);
slideshowTimer = updateSlideshowInterval();
};
}

window.onload = init;
})();
</script>
</body>
</html>

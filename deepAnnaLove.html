<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fire TV Glass Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
<style>
:root {
  --bg-image: none;
  --bg-gradient: linear-gradient(135deg, #e0e7ff, #c7d2fe);
  --tile-bg: rgba(255,255,255,0.3);
  --tile-opacity: 1;
  --tile-border-width: 1px;
  --tile-border-radius: 24px;
  --tile-shadow: 0 8px 32px rgba(0,0,0,0.1);
  --text-color: #1e293b;
  --accent: #3b82f6;
  --font-family: 'Segoe UI', system-ui, sans-serif;
  --backdrop: blur(6px);
  --text-shadow: none;
  --icon-transform: none;
  --slide-anim: fade;
  --slide-duration: 1s;
  --slide-fit: contain;
  --effect-strength: 2;
  --focus-glow: 0 0 0 3px rgba(59,130,246,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font-family);
  background: var(--bg-gradient);
  background-image: var(--bg-image);
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: var(--text-color);
  height: 100vh;
  overflow: hidden;
  transition: background-image 0.4s ease-out;
}

#dashboard { width: 100%; height: 100vh; position: relative; overflow: auto; }

/* Tile & UI - Fire TV optimiert */
.tile {
  position: absolute;
  touch-action: none;
  will-change: transform;
  background: var(--tile-bg);
  opacity: var(--tile-opacity);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  border: var(--tile-border-width) solid rgba(255,255,255,0.35);
  border-radius: var(--tile-border-radius);
  box-shadow: var(--tile-shadow);
  display: flex;
  flex-direction: column;
  transition: box-shadow 0.2s ease-out, transform 0.1s;
  min-width: 80px;
  min-height: 80px;
  z-index: 1;
  overflow: hidden;
}

.tile:focus-visible {
  outline: none;
  box-shadow: var(--focus-glow);
  transform: scale(1.01);
}

.tile.dragging, .tile.resizing {
  box-shadow: 0 20px 50px rgba(0,0,0,0.4) !important;
  z-index: 100;
}

.tile-header {
  padding: 12px 16px;
  cursor: grab;
  user-select: none;
  font-weight: 600;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  background: rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1rem;
  text-shadow: var(--text-shadow);
}
.tile-header:active { cursor: grabbing; }

.tile-content {
  flex: 1;
  padding: 14px;
  overflow-y: auto;
  overflow-x: hidden;
  container-type: inline-size;
}

/* Tastatur-Fokus sichtbar */
button:focus-visible, .cal-nav-btn:focus-visible, .upload-btn:focus-visible, .layout-btn:focus-visible {
  outline: none;
  box-shadow: 0 0 0 3px #ffffff, 0 0 0 6px #3b82f6;
  transform: scale(1.02);
  transition: all 0.1s;
}

.resize-handle-edge, .resize-handle-corner {
  position: absolute;
  touch-action: none;
  z-index: 5;
}
.resize-handle-edge.top { top:0; left:20px; right:20px; height:12px; cursor:ns-resize; }
.resize-handle-edge.bottom { bottom:0; left:20px; right:20px; height:12px; cursor:ns-resize; }
.resize-handle-edge.left { left:0; top:20px; bottom:20px; width:12px; cursor:ew-resize; }
.resize-handle-edge.right { right:0; top:20px; bottom:20px; width:12px; cursor:ew-resize; }
.resize-handle-corner { width:28px; height:28px; }
.resize-handle-corner.tl { top:0; left:0; cursor:nwse-resize; }
.resize-handle-corner.tr { top:0; right:0; cursor:nesw-resize; }
.resize-handle-corner.bl { bottom:0; left:0; cursor:nesw-resize; }
.resize-handle-corner.br { bottom:0; right:0; cursor:nwse-resize; background:linear-gradient(135deg, transparent 60%, rgba(0,0,0,0.15) 60%); border-radius:0 0 var(--tile-border-radius) 0; }

.icon-tile-content {
  display: flex; align-items: center; justify-content: center;
  height: 100%; font-size: 2.6rem; cursor: pointer;
  color: var(--text-color);
  transform: var(--icon-transform);
  text-shadow: var(--text-shadow);
  transition: transform 0.2s;
}
.icon-tile-content:focus-visible { outline: none; box-shadow: var(--focus-glow); border-radius: 16px; }

.weather-now .temp { font-size: clamp(2rem, 8cqw, 3.2rem); font-weight: 700; }
.forecast-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.forecast-day {
  flex: 1 1 80px;
  min-width: 70px;
  background: rgba(255,255,255,0.25);
  border-radius: 20px;
  padding: 10px 6px;
  text-align: center;
  font-size: 0.9rem;
  transition: transform 0.1s, background 0.2s;
}
.forecast-day.active { background: var(--accent); color: white; }
.forecast-day:focus-visible { outline: none; transform: scale(1.05); background: var(--accent); }

.calendar-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.cal-nav-btn {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  color: var(--text-color);
  border-radius: 40px;
  width: 44px;
  height: 44px;
  cursor: pointer;
  font-size: 1.2rem;
  transition: background 0.15s, transform 0.1s;
}
.cal-today-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 40px;
  padding: 0 16px;
  height: 44px;
  font-weight: bold;
  font-size: 0.9rem;
}
.cal-nav-btn:hover, .cal-today-btn:hover { opacity: 0.9; transform: scale(1.02); }
#cal-title { flex:1; text-align:center; font-weight:700; font-size:1.1rem; }

.calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; text-align: center; font-size: 0.9rem; }
.day-header { font-weight:700; opacity:0.8; padding:8px 0; }
.day { position: relative; padding: 10px 0; border-radius: 12px; cursor: pointer; background: rgba(255,255,255,0.1); transition: all 0.1s; }
.day:focus-visible { outline: none; box-shadow: var(--focus-glow); background: rgba(59,130,246,0.4); }
.day.today { background: var(--accent); color:white; font-weight:bold; }
.event-line { position:absolute; bottom:4px; left:15%; width:70%; height:4px; border-radius:4px; }

.event-details {
  background:rgba(0,0,0,0.85); color:white; padding:12px;
  border-radius:16px; font-size:0.9rem; margin-top:12px;
  max-height: 180px; overflow-y: auto;
}

/* Slideshow */
.slideshow-container {
  position:relative; width:100%; aspect-ratio:16/9;
  background:rgba(0,0,0,0.2); border-radius:20px;
  overflow:hidden; margin-bottom:12px;
}
.slide-img {
  position: absolute; top:0; left:0;
  width:100%; height:100%;
  object-fit: var(--slide-fit);
  opacity: 0;
  transition: opacity var(--slide-duration) ease-out, transform var(--slide-duration) ease-out;
}
.slide-img.active { opacity: 1; }
.slide-anim-fade .slide-img { transform: none; }
.slide-anim-slide-left .slide-img { transform: translateX(100%); }
.slide-anim-slide-left .slide-img.active { transform: translateX(0); }
.slide-anim-zoom .slide-img { transform: scale(0.7); opacity: 0; }
.slide-anim-zoom .slide-img.active { transform: scale(1); opacity:1; }
.slide-anim-ken-burns .slide-img.active { animation: kenBurns 8s ease-in-out infinite alternate; }
@keyframes kenBurns { from { transform: scale(1); } to { transform: scale(1.08); } }

.slideshow-controls {
  position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
  display:flex; gap:16px; background:rgba(0,0,0,0.7); padding:8px 20px;
  border-radius: 60px; backdrop-filter: blur(8px); z-index:10;
}
.slideshow-controls button {
  background:rgba(255,255,255,0.2); border:none; color:white;
  font-size:1.4rem; width:48px; height:48px; border-radius:40px;
  cursor:pointer; transition: all 0.15s;
}
.slideshow-controls button:focus-visible { background:#3b82f6; transform:scale(1.05); }

.upload-area {
  display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:8px;
}
.upload-btn {
  background: var(--accent); color:white; border:none;
  border-radius: 40px; padding: 10px 18px; font-size:0.9rem;
  font-weight:600; cursor:pointer; transition: 0.1s linear;
  display: inline-flex; align-items: center; gap: 6px;
}
.upload-btn:active { transform: scale(0.98); }
input[type="file"] { display:none; }

/* Hintergrund-Slideshow */
.bg-slideshow-layer {
  position: fixed; inset:0; z-index:-1; pointer-events:none;
  background-size: cover; background-position: center;
  opacity: 0; transition: opacity 0.8s ease-out;
}
.bg-slideshow-layer.active { opacity: 1; }

/* Settings Panel - firetv freundlich */
.settings-panel {
  position: fixed; top:0; right:-420px; width:400px; height:100vh;
  background: rgba(20,20,30,0.96); backdrop-filter: blur(24px);
  color:white; padding:24px; transition: right 0.3s ease; z-index: 10000;
  overflow-y:auto; border-left:1px solid rgba(255,255,255,0.2);
}
.settings-panel.open { right:0; }
.settings-panel label { display:block; margin:16px 0 6px; font-weight:600; }
.settings-panel select, .settings-panel input {
  width:100%; padding:12px; border-radius:40px; border:none;
  background:rgba(255,255,255,0.15); color:white; margin-bottom:6px;
  font-size:0.9rem;
}
.layout-buttons { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.layout-btn {
  padding:12px 8px; border-radius:36px; background:rgba(255,255,255,0.1);
  color:white; font-size:0.8rem; cursor:pointer; text-align:center;
  border:1px solid transparent; transition: all 0.1s;
}
.layout-btn.active, .layout-btn:focus-visible { background:#3b82f6; border-color:white; }
.close-settings {
  position:absolute; top:12px; right:16px; background:none;
  border:none; color:white; font-size:2rem; cursor:pointer;
  width:48px; border-radius:40px;
}
.range-row { display:flex; align-items:center; gap:12px; }
.location-result-item {
  padding:12px; background:rgba(255,255,255,0.1); border-radius:36px;
  margin-bottom:8px; cursor:pointer;
}
</style>
</head>
<body>

<div class="bg-slideshow-layer" id="bg-layer-1"></div>
<div class="bg-slideshow-layer" id="bg-layer-2"></div>
<div id="dashboard"></div>

<div class="settings-panel" id="settings-panel">
  <button class="close-settings" id="close-settings">&times;</button>
  <h2>⚙️ Einstellungen</h2>
  <h3>📐 Layout-Presets</h3>
  <div class="layout-buttons">
    <button class="layout-btn" data-layout="h1">📅 Kalender groß</button>
    <button class="layout-btn" data-layout="h2">🌤️ Wetter groß</button>
    <button class="layout-btn" data-layout="h3">🖼️ Slideshow groß</button>
    <button class="layout-btn" data-layout="h4">⚖️ 3er Raster</button>
    <button class="layout-btn" data-layout="v1">📱 Hochformat</button>
  </div>
  <label>Thema</label>
  <select id="theme-select">...</select>
  <label>Hintergrund-Typ</label>
  <select id="bg-mode">...</select>
  <div id="bg-color-container" style="display:none;"><label>Farbe</label><input type="color" id="bg-color"></div>
  <div id="bg-url-container" style="display:none;"><label>URL</label><input type="text" id="bg-url"></div>
  <div id="bg-upload-container" style="display:none;"><button id="bg-upload-trigger" class="upload-btn">Bild hochladen</button><input type="file" id="bg-upload"></div>
  <label>Kachel-Transparenz</label><input type="range" id="tile-opacity" min="0" max="1" step="0.05" value="1"><span id="tile-opacity-value">100%</span>
  <label>Schriftfarbe</label><input type="color" id="font-color">
  <label>Schriftart</label><select id="font-family-select">...</select>
  <label>3D-Effekt</label><select id="3d-mode">...</select>
  <label>Stärke</label><input type="range" id="3d-strength" min="0" max="10" value="2">
  <label>Kachel Hintergrund</label><input type="color" id="tile-bg-color">
  <label>Rahmen (px)</label><input type="number" id="border-width" value="1">
  <label>Abrundung (px)</label><input type="number" id="border-radius" value="24">
  <h3>📷 Slideshow</h3>
  <label>Animation</label><select id="slide-animation">...</select>
  <label>Wechselzeit (s)</label><input type="number" id="interval-input" value="10">
  <label>Animationsdauer (s)</label><input type="number" id="anim-duration" value="1">
  <h3>📍 Standort (Wetter)</h3>
  <input type="text" id="location-search" placeholder="Stadt suchen"><button id="location-search-btn">🔍 Suchen</button>
  <div id="location-results"></div>
  <button id="use-gps" class="upload-btn">📍 GPS Standort</button>
  <h3>📅 Kalender (iCal)</h3>
  <input type="text" id="ical-url" placeholder="https://...ics"><button id="load-ical-settings" class="upload-btn">Kalender laden</button>
  <div id="ical-error" class="error-msg" style="display:none;"></div>
</div>

<script>
(function(){
let zCounter = 10;
function bringToFront(tile) { zCounter+=1; tile.style.zIndex = zCounter; }

const themes = { default: { '--bg-gradient':'linear-gradient(135deg,#e0e7ff,#c7d2fe)','--tile-bg':'rgba(255,255,255,0.3)','--text-color':'#1e293b','--accent':'#3b82f6' }, dark: { '--bg-gradient':'#1e293b','--tile-bg':'rgba(30,41,59,0.6)','--text-color':'#e2e8f0','--accent':'#6366f1' }, neon:{'--bg-gradient':'black','--tile-bg':'rgba(88,28,135,0.4)','--text-color':'#a78bfa','--accent':'#ec4899'} };
function applyTheme(name){ if(themes[name]) Object.entries(themes[name]).forEach(([p,v])=>document.documentElement.style.setProperty(p,v)); localStorage.setItem('theme',name); }

function apply3DEffect(mode,str){
  let s=parseFloat(str)||0;
  const root=document.documentElement;
  if(mode==='perspective'){ root.style.setProperty('--tile-transform',`perspective(800px) rotateX(${s*1.5}deg) rotateY(${s}deg)`); root.style.setProperty('--text-shadow',`${s*0.5}px ${s*0.5}px 2px rgba(0,0,0,0.2)`); }
  else if(mode==='shadow3d'){ root.style.setProperty('--tile-shadow',`${s*2}px ${s*2}px ${s*4}px rgba(0,0,0,0.3)`); }
  else if(mode==='floating'){ root.style.setProperty('--tile-transform',`translateY(${-s*1.5}px) scale(${1+s*0.01})`); }
  else { root.style.setProperty('--tile-transform','none'); root.style.setProperty('--tile-shadow','0 8px 32px rgba(0,0,0,0.1)'); root.style.setProperty('--text-shadow','none'); }
}

// --- Layout ohne stündliches Wetter (hourly komplett entfernt) ---
let defaultLayout = [
  { id: 'spotify', x: 10, y: 10, w: 80, h: 80 },
  { id: 'amazon', x: 100, y: 10, w: 80, h: 80 },
  { id: 'youtube', x: 190, y: 10, w: 80, h: 80 },
  { id: 'settings', x: 280, y: 10, w: 80, h: 80 },
  { id: 'weather', x: 10, y: 100, w: 280, h: 180 },
  { id: 'forecast', x: 300, y: 100, w: 320, h: 180 },
  { id: 'calendar', x: 10, y: 290, w: 380, h: 340 },
  { id: 'slideshow', x: 400, y: 290, w: 380, h: 340 }
];
let layout = JSON.parse(localStorage.getItem('dashboardLayout')) || defaultLayout;
// hourly rausfiltern (falls alter Layout)
layout = layout.filter(t => t.id !== 'hourly');
function saveLayout() {
  const tiles = document.querySelectorAll('.tile');
  layout = Array.from(tiles).map(tile => ({ id:tile.id, x:parseFloat(tile.style.left), y:parseFloat(tile.style.top), w:parseFloat(tile.style.width), h:parseFloat(tile.style.height) }));
  localStorage.setItem('dashboardLayout', JSON.stringify(layout));
}

// PRESETS (alle OHNE hourly)
const LAYOUT_PRESETS = {
  h1: { name:'Kalender groß', items:[
    { id:'spotify',x:0.78,y:0.01,w:0.05,h:0.07},{ id:'amazon',x:0.84,y:0.01,w:0.05,h:0.07},{ id:'youtube',x:0.90,y:0.01,w:0.05,h:0.07},{ id:'settings',x:0.96,y:0.01,w:0.04,h:0.07},
    { id:'calendar',x:0.01,y:0.01,w:0.60,h:0.98},{ id:'weather',x:0.62,y:0.13,w:0.18,h:0.32},{ id:'forecast',x:0.81,y:0.13,w:0.18,h:0.32},{ id:'slideshow',x:0.62,y:0.47,w:0.37,h:0.52}
  ]},
  h2: { name:'Wetter groß', items:[
    { id:'spotify',x:0.78,y:0.01,w:0.05,h:0.07},{ id:'amazon',x:0.84,y:0.01,w:0.05,h:0.07},{ id:'youtube',x:0.90,y:0.01,w:0.05,h:0.07},{ id:'settings',x:0.96,y:0.01,w:0.04,h:0.07},
    { id:'weather',x:0.01,y:0.01,w:0.30,h:0.48},{ id:'forecast',x:0.32,y:0.01,w:0.45,h:0.48},{ id:'calendar',x:0.01,y:0.50,w:0.49,h:0.49},{ id:'slideshow',x:0.51,y:0.50,w:0.48,h:0.49}
  ]},
  h3: { name:'Slideshow groß', items:[
    { id:'spotify',x:0.78,y:0.01,w:0.05,h:0.07},{ id:'amazon',x:0.84,y:0.01,w:0.05,h:0.07},{ id:'youtube',x:0.90,y:0.01,w:0.05,h:0.07},{ id:'settings',x:0.96,y:0.01,w:0.04,h:0.07},
    { id:'slideshow',x:0.01,y:0.01,w:0.65,h:0.85},{ id:'calendar',x:0.67,y:0.10,w:0.32,h:0.50},{ id:'weather',x:0.01,y:0.87,w:0.32,h:0.12},{ id:'forecast',x:0.34,y:0.87,w:0.32,h:0.12}
  ]},
  h4: { name:'3er Raster', items:[
    { id:'spotify',x:0.78,y:0.01,w:0.05,h:0.07},{ id:'amazon',x:0.84,y:0.01,w:0.05,h:0.07},{ id:'youtube',x:0.90,y:0.01,w:0.05,h:0.07},{ id:'settings',x:0.96,y:0.01,w:0.04,h:0.07},
    { id:'weather',x:0.01,y:0.10,w:0.32,h:0.43},{ id:'forecast',x:0.34,y:0.10,w:0.32,h:0.43},{ id:'calendar',x:0.67,y:0.10,w:0.32,h:0.43},{ id:'slideshow',x:0.01,y:0.55,w:0.98,h:0.44}
  ]},
  v1: { name:'Hochformat', items:[
    { id:'spotify',x:0.01,y:0.01,w:0.22,h:0.06},{ id:'amazon',x:0.26,y:0.01,w:0.22,h:0.06},{ id:'youtube',x:0.51,y:0.01,w:0.22,h:0.06},{ id:'settings',x:0.76,y:0.01,w:0.23,h:0.06},
    { id:'calendar',x:0.01,y:0.08,w:0.98,h:0.42},{ id:'weather',x:0.01,y:0.51,w:0.49,h:0.18},{ id:'forecast',x:0.51,y:0.51,w:0.48,h:0.18},{ id:'slideshow',x:0.01,y:0.70,w:0.98,h:0.29}
  ]}
};

function applyLayoutPreset(key){
  const preset = LAYOUT_PRESETS[key];
  if(!preset) return;
  const W = window.innerWidth, H = window.innerHeight;
  const newLayout = preset.items.map(item => ({ id:item.id, x:Math.round(item.x*W), y:Math.round(item.y*H), w:Math.round(item.w*W), h:Math.round(item.h*H) }));
  layout = newLayout;
  localStorage.setItem('dashboardLayout', JSON.stringify(layout));
  localStorage.setItem('activeLayoutPreset', key);
  createTiles();
  loadSlides();
  updateWeather();
  renderCalendar();
  document.querySelectorAll('.layout-btn').forEach(btn=>btn.classList.toggle('active', btn.dataset.layout===key));
}

function getResizeHandlesHTML(){ return `<div class="resize-handle-edge top"></div><div class="resize-handle-edge bottom"></div><div class="resize-handle-edge left"></div><div class="resize-handle-edge right"></div><div class="resize-handle-corner tl"></div><div class="resize-handle-corner tr"></div><div class="resize-handle-corner bl"></div><div class="resize-handle-corner br"></div>`; }

function createTiles(){
  const container = document.getElementById('dashboard');
  container.innerHTML = '';
  layout.forEach(item => {
    if(item.id === 'hourly') return; // Sicherheitshalber
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.id = item.id;
    tile.style.left = item.x + 'px'; tile.style.top = item.y + 'px';
    tile.style.width = item.w + 'px'; tile.style.height = item.h + 'px';
    if (['spotify','amazon','youtube','settings'].includes(item.id)) {
      tile.innerHTML = `<div class="tile-content icon-tile-content"></div>` + getResizeHandlesHTML();
    } else {
      tile.innerHTML = `<div class="tile-header"></div><div class="tile-content"></div>` + getResizeHandlesHTML();
    }
    container.appendChild(tile);
    fillTileContent(item.id, tile);
    tile.setAttribute('tabindex', '0');
    tile.addEventListener('keydown', (e) => { if(e.key === 'Enter' || e.key === ' ') bringToFront(tile); });
  });
  initInteract();
}

function fillTileContent(id, tile){
  const content = tile.querySelector('.tile-content');
  const header = tile.querySelector('.tile-header');
  if(id === 'spotify'){ content.innerHTML='<i class="fab fa-spotify" style="color:#1DB954"></i>'; tile.setAttribute('data-app','spotify'); }
  else if(id === 'amazon'){ content.innerHTML='<i class="fab fa-amazon" style="color:#FF9900"></i>'; tile.setAttribute('data-app','amazon'); }
  else if(id === 'youtube'){ content.innerHTML='<i class="fab fa-youtube" style="color:#FF0000"></i>'; tile.setAttribute('data-app','youtube'); }
  else if(id === 'settings'){ content.innerHTML='<i class="fas fa-cog"></i>'; }
  else if(id === 'weather'){
    header.innerHTML='<i class="fas fa-cloud-sun"></i> Aktuell';
    content.innerHTML=`<div class="weather-now"><div class="temp" id="current-temp">--°</div><div class="details" id="current-details"></div></div><div id="current-icon" style="font-size:2.5rem;"></div>`;
  }
  else if(id === 'forecast'){
    header.innerHTML='<i class="fas fa-calendar-alt"></i> 5 Tage';
    content.innerHTML='<div class="forecast-row" id="forecast-container"></div>';
  }
  else if(id === 'calendar'){
    header.innerHTML='<i class="fas fa-calendar"></i> Termine';
    content.innerHTML=`<div class="calendar-nav"><button id="cal-prev" class="cal-nav-btn"><i class="fas fa-chevron-left"></i></button><span id="cal-title">Monat</span><button id="cal-today" class="cal-today-btn">Heute</button><button id="cal-next" class="cal-nav-btn"><i class="fas fa-chevron-right"></i></button></div><div class="calendar-grid" id="calendar-grid"></div><div class="event-details" id="event-details"></div>`;
  }
  else if(id === 'slideshow'){
    header.innerHTML='<i class="fas fa-images"></i> Slideshow · Ordner & Bilder';
    content.innerHTML=`<div class="slideshow-container slide-anim-fade" id="slideshow-container"><div class="slideshow-controls"><button id="prev-slide"><i class="fas fa-chevron-left"></i></button><button id="play-pause"><i class="fas fa-pause"></i></button><button id="next-slide"><i class="fas fa-chevron-right"></i></button><button id="delete-slide"><i class="fas fa-trash"></i></button></div></div><div class="upload-area"><label for="folder-upload" class="upload-btn"><i class="fas fa-folder-open"></i> 📁 Ordner hochladen</label><input type="file" id="folder-upload" webkitdirectory directory multiple><label for="file-upload" class="upload-btn"><i class="fas fa-image"></i> Bilder (einzeln)</label><input type="file" id="file-upload" multiple accept="image/*"><span id="image-count">0 Bilder</span></div>`;
  }
}

function initInteract(){
  interact('.tile').draggable({ allowFrom:'.tile-header, .icon-tile-content', ignoreFrom:'.resize-handle', modifiers:[interact.modifiers.restrict({restriction:'parent', endOnly:true})], listeners:{ start(e){e.target.classList.add('dragging');}, move(e){ let t=e.target; let x=(parseFloat(t.getAttribute('data-x'))||0)+e.dx; let y=(parseFloat(t.getAttribute('data-y'))||0)+e.dy; t.style.transform=`translate(${x}px,${y}px)`; t.setAttribute('data-x',x); t.setAttribute('data-y',y);}, end(e){ let t=e.target; t.classList.remove('dragging'); let x=parseFloat(t.getAttribute('data-x'))||0; let y=parseFloat(t.getAttribute('data-y'))||0; t.style.transform=''; t.style.left=(parseFloat(t.style.left)+x)+'px'; t.style.top=(parseFloat(t.style.top)+y)+'px'; t.setAttribute('data-x',0); t.setAttribute('data-y',0); saveLayout();} }}).resizable({ edges:{ top:true,bottom:true,left:true,right:true }, modifiers:[interact.modifiers.restrictSize({min:{width:80,height:80}})], listeners:{ start(e){e.target.classList.add('resizing');}, move(e){ let t=e.target; let x=parseFloat(t.getAttribute('data-x'))||0; let y=parseFloat(t.getAttribute('data-y'))||0; t.style.width=e.rect.width+'px'; t.style.height=e.rect.height+'px'; x+=e.deltaRect.left; y+=e.deltaRect.top; t.style.transform=`translate(${x}px,${y}px)`; t.setAttribute('data-x',x); t.setAttribute('data-y',y);}, end(e){ let t=e.target; t.classList.remove('resizing'); let x=parseFloat(t.getAttribute('data-x'))||0; let y=parseFloat(t.getAttribute('data-y'))||0; t.style.transform=''; t.style.left=(parseFloat(t.style.left)+x)+'px'; t.style.top=(parseFloat(t.style.top)+y)+'px'; saveLayout();} } });
}

// Wetter API
let weatherCache = null;
async function fetchWeather(lat,lon){
  const savedLoc = localStorage.getItem('weatherLocation');
  if(lat===undefined){ try{ let l=JSON.parse(savedLoc); lat=l.lat; lon=l.lon; }catch(e){ lat=51.2277; lon=6.7735; } }
  const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=weather_code,temperature_2m,relative_humidity_2m,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`);
  return res.json();
}
function weatherEmoji(code){ if(code===0) return '☀️'; if(code===1||code===2) return '⛅'; if(code===3) return '☁️'; if(code>=61) return '🌧️'; if(code>=71) return '❄️'; return '🌥️'; }
function weatherDesc(code){ if(code===0) return 'Sonnig'; if(code===1) return 'Leicht bewölkt'; if(code===2) return 'Teilweise bewölkt'; if(code===3) return 'Bedeckt'; return 'Regen'; }
async function updateWeather(){
  const data = weatherCache || await fetchWeather();
  if(!data) return;
  weatherCache = data;
  const tempEl = document.getElementById('current-temp');
  if(tempEl) tempEl.textContent = Math.round(data.current.temperature_2m)+'°';
  const detailsEl = document.getElementById('current-details');
  if(detailsEl) detailsEl.innerHTML = `${weatherDesc(data.current.weather_code)}<br>💧 ${data.current.relative_humidity_2m}% · 💨 ${Math.round(data.current.wind_speed_10m)} km/h`;
  const iconEl = document.getElementById('current-icon');
  if(iconEl) iconEl.textContent = weatherEmoji(data.current.weather_code);
  const fc = document.getElementById('forecast-container');
  if(fc){
    fc.innerHTML = '';
    data.daily.time.forEach((day,i)=>{
      let d=new Date(day);
      let div=document.createElement('div'); div.className='forecast-day'+(i===0?' active':'');
      div.innerHTML=`<div>${d.toLocaleDateString('de-DE',{weekday:'short'})}</div><div>${weatherEmoji(data.daily.weather_code[i])}</div><div>${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°</div>`;
      fc.appendChild(div);
    });
  }
}

// Kalender
let calendarEvents=[], calendarViewDate=new Date();
function renderCalendar(){
  const grid=document.getElementById('calendar-grid'); if(!grid) return;
  grid.innerHTML=''; ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d=>{let div=document.createElement('div'); div.className='day-header'; div.textContent=d; grid.appendChild(div);});
  const today=new Date(), year=calendarViewDate.getFullYear(), month=calendarViewDate.getMonth();
  const monthNames=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  document.getElementById('cal-title').innerHTML=`${monthNames[month]} ${year}`;
  let firstDay=new Date(year,month,1).getDay(), daysInMonth=new Date(year,month+1,0).getDate(), offset=(firstDay+6)%7;
  for(let i=0;i<offset;i++) grid.appendChild(document.createElement('div'));
  for(let d=1;d<=daysInMonth;d++){
    let dayDiv=document.createElement('div'); dayDiv.className='day'; dayDiv.textContent=d;
    let dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let eventsOnDay=calendarEvents.filter(e=>e.start===dateStr);
    eventsOnDay.forEach((ev,idx)=>{ let line=document.createElement('div'); line.className='event-line'; line.style.backgroundColor=ev.color; line.style.bottom=(2+idx*5)+'px'; dayDiv.appendChild(line); });
    dayDiv.addEventListener('click',()=>{ let det=document.getElementById('event-details'); if(det) det.innerHTML=eventsOnDay.map(e=>`<strong>${e.summary}</strong><br><small>${e.start}</small>`).join('<hr>'); det.style.display='block'; });
    if(d===today.getDate() && month===today.getMonth() && year===today.getFullYear()) dayDiv.classList.add('today');
    grid.appendChild(dayDiv);
  }
}
// iCal laden mit CORS-Proxy
const CORS_PROXIES=['https://corsproxy.io/?','https://api.allorigins.win/raw?url='];
async function loadCalendar(url){
  if(!url) return; url=url.replace(/^webcal:\/\//i,'https://');
  try{
    let text='';
    for(let proxy of CORS_PROXIES){
      let res=await fetch(proxy+encodeURIComponent(url));
      if(res.ok){ text=await res.text(); if(text.includes('BEGIN:VCALENDAR')) break; }
    }
    if(!text) throw new Error('Kein Kalender geladen');
    let jcal=ICAL.parse(text); let comp=new ICAL.Component(jcal);
    let vevents=comp.getAllSubcomponents('vevent');
    calendarEvents=vevents.map((ev,i)=>{ let e=new ICAL.Event(ev); let start=e.startDate.toJSDate(); return{ summary:e.summary||'Termin', start:start.toISOString().slice(0,10), color:`hsl(${i*37 % 360},70%,55%)` }; });
    renderCalendar();
  }catch(e){ document.getElementById('ical-error').style.display='block'; document.getElementById('ical-error').innerText='Fehler: '+e.message; }
}

// Slideshow mit ORDNER-UPLOAD
let slides=[], currentSlide=0, slideIntervalSec=10, slideAnimDuration=1, slideAnimType='fade', slideshowTimer, slideshowPaused=false;
function saveSlides(){ localStorage.setItem('slideshowImages',JSON.stringify(slides)); localStorage.setItem('slideshowIndex',currentSlide); }
function loadSlides(){ let saved=localStorage.getItem('slideshowImages'); if(saved){ slides=JSON.parse(saved); currentSlide=parseInt(localStorage.getItem('slideshowIndex'))||0; if(currentSlide>=slides.length) currentSlide=0; updateSlideDisplay(); document.getElementById('image-count').innerText=slides.length+' Bilder'; } }
function updateSlideDisplay(){
  let container=document.getElementById('slideshow-container'); if(!container) return;
  container.className='slideshow-container slide-anim-'+slideAnimType;
  document.documentElement.style.setProperty('--slide-duration',slideAnimDuration+'s');
  let existing=container.querySelectorAll('.slide-img');
  existing.forEach(img=>{ if(!img.classList.contains('exit')){ img.classList.add('exit'); img.classList.remove('active'); setTimeout(()=>img.remove(),slideAnimDuration*1000+100); } });
  if(slides.length && slides[currentSlide]){
    let newImg=document.createElement('img'); newImg.className='slide-img'; newImg.src=slides[currentSlide];
    container.insertBefore(newImg,container.firstChild); void newImg.offsetWidth; newImg.classList.add('active');
  }
  if(localStorage.getItem('bgMode')==='slideshow') syncBgSlideshow();
}
function syncBgSlideshow(){ if(!slides.length) return; let l1=document.getElementById('bg-layer-1'), l2=document.getElementById('bg-layer-2'); let active=l1.classList.contains('active')?l1:l2; let inactive=active===l1?l2:l1; inactive.style.backgroundImage=`url(${slides[currentSlide]})`; setTimeout(()=>{ inactive.classList.add('active'); active.classList.remove('active'); },50); }
function startSlideshow(){ clearInterval(slideshowTimer); if(slides.length && !slideshowPaused) slideshowTimer=setInterval(()=>{ currentSlide=(currentSlide+1)%slides.length; updateSlideDisplay(); saveSlides(); },slideIntervalSec*1000); }
function nextSlide(){ if(slides.length){ currentSlide=(currentSlide+1)%slides.length; updateSlideDisplay(); saveSlides(); startSlideshow(); } }
function prevSlide(){ if(slides.length){ currentSlide=(currentSlide-1+slides.length)%slides.length; updateSlideDisplay(); saveSlides(); startSlideshow(); } }

// Ordner-Upload (webkitdirectory)
document.addEventListener('change',async function(e){
  if(e.target.id==='folder-upload'){
    let files=Array.from(e.target.files).filter(f=>f.type.startsWith('image/'));
    for(let file of files){
      let reader=new FileReader();
      let data=await new Promise(resolve=>{ reader.onload=ev=>resolve(ev.target.result); reader.readAsDataURL(file); });
      slides.push(data);
    }
    if(slides.length && !slideshowPaused) startSlideshow();
    updateSlideDisplay(); saveSlides();
    document.getElementById('image-count').innerText=slides.length+' Bilder';
    e.target.value='';
  } else if(e.target.id==='file-upload'){
    Array.from(e.target.files).forEach(file=>{ let reader=new FileReader(); reader.onload=ev=>{ slides.push(ev.target.result); if(slides.length===1) currentSlide=0; updateSlideDisplay(); saveSlides(); startSlideshow(); document.getElementById('image-count').innerText=slides.length+' Bilder'; }; reader.readAsDataURL(file); });
    e.target.value='';
  }
});
document.addEventListener('click',(e)=>{
  if(e.target.closest('#next-slide')) nextSlide();
  else if(e.target.closest('#prev-slide')) prevSlide();
  else if(e.target.closest('#play-pause')){ slideshowPaused=!slideshowPaused; let btn=e.target.closest('#play-pause'); btn.innerHTML=slideshowPaused?'<i class="fas fa-play"></i>':'<i class="fas fa-pause"></i>'; if(slideshowPaused) clearInterval(slideshowTimer); else startSlideshow(); }
  else if(e.target.closest('#delete-slide')){ if(slides.length){ slides.splice(currentSlide,1); if(currentSlide>=slides.length) currentSlide=Math.max(0,slides.length-1); updateSlideDisplay(); saveSlides(); startSlideshow(); document.getElementById('image-count').innerText=slides.length+' Bilder'; } }
  if(e.target.closest('.layout-btn')) applyLayoutPreset(e.target.dataset.layout);
  if(e.target.closest('#load-ical-settings')) loadCalendar(document.getElementById('ical-url').value);
  if(e.target.closest('#location-search-btn')) searchLocation();
  if(e.target.closest('#use-gps')) navigator.geolocation.getCurrentPosition(pos=>setLocation(pos.coords.latitude,pos.coords.longitude,'GPS',''));
});
async function searchLocation(){ let q=document.getElementById('location-search').value; if(!q) return; let res=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=de`); let data=await res.json(); let resultsDiv=document.getElementById('location-results'); if(data.results) resultsDiv.innerHTML=data.results.map(l=>`<div class="location-result-item" data-lat="${l.latitude}" data-lon="${l.longitude}" data-name="${l.name}">${l.name}, ${l.country}</div>`).join(''); else resultsDiv.innerHTML='<span>Kein Ergebnis</span>'; }
function setLocation(lat,lon,name,country){ localStorage.setItem('weatherLocation',JSON.stringify({lat,lon,name,country})); updateWeather(); }
document.getElementById('dashboard').addEventListener('click',(e)=>{ let tile=e.target.closest('.tile'); if(tile){ bringToFront(tile); if(tile.id==='settings') document.getElementById('settings-panel').classList.add('open'); else if(tile.getAttribute('data-app')) window.open({ spotify:'https://open.spotify.com', amazon:'https://music.amazon.de', youtube:'https://youtube.com' }[tile.getAttribute('data-app')],'_blank'); } });

// Settings & Background
function loadSettings(){
  applyTheme(localStorage.getItem('theme')||'default');
  document.getElementById('tile-opacity').addEventListener('input',e=>{ let v=parseFloat(e.target.value); document.documentElement.style.setProperty('--tile-opacity',v); localStorage.setItem('tileOpacity',v); });
  document.getElementById('3d-mode').addEventListener('change',e=>{ localStorage.setItem('3dMode',e.target.value); apply3DEffect(e.target.value,document.getElementById('3d-strength').value); });
  document.getElementById('3d-strength').addEventListener('input',e=>{ localStorage.setItem('3dStrength',e.target.value); apply3DEffect(document.getElementById('3d-mode').value,e.target.value); });
  document.getElementById('interval-input').addEventListener('change',e=>{ slideIntervalSec=parseInt(e.target.value)||10; localStorage.setItem('slideInterval',slideIntervalSec); startSlideshow(); });
  document.getElementById('slide-animation').addEventListener('change',e=>{ slideAnimType=e.target.value; localStorage.setItem('slideAnimation',slideAnimType); updateSlideDisplay(); });
  document.getElementById('anim-duration').addEventListener('change',e=>{ slideAnimDuration=parseFloat(e.target.value); localStorage.setItem('slideAnimDuration',slideAnimDuration); updateSlideDisplay(); });
}
createTiles(); loadSlides(); loadSettings(); updateWeather(); renderCalendar(); setInterval(updateWeather,15*60*1000);
document.getElementById('close-settings').addEventListener('click',()=>document.getElementById('settings-panel').classList.remove('open'));
})();
</script>

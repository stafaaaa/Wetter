<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>AnnaLove Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

  #bg1, #bg2 { position: fixed; inset: 0; background-size: cover; background-position: center; transition: opacity 1.2s ease; opacity: 0; z-index: 0; }
  #bg1.active, #bg2.active { opacity: 1; }

  #bg-overlay { position: fixed; inset: 0; background: linear-gradient(180deg, rgba(0,30,60,0.30) 0%, rgba(0,0,0,0.05) 30%, rgba(0,0,0,0.15) 60%, rgba(0,0,0,0.55) 100%); pointer-events: none; z-index: 1; }

  #app { position: relative; z-index: 2; width: 100vw; height: 100vh; display: flex; }

  body.layout-portrait #app { flex-direction: column; }
  body.layout-portrait .top-area { flex: 0 0 58%; position: relative; }
  body.layout-portrait .bottom-area { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  body.layout-portrait .photos-btn { display: none; }

  body.layout-landscape #app { flex-direction: row; }
  body.layout-landscape .top-area { flex: 0 0 42%; position: relative; display: flex; flex-direction: column; }
  body.layout-landscape .bottom-area { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 1.5vh 1.5vw; }

  .header { position: relative; padding: 2.2vh 3vw; display: flex; justify-content: space-between; align-items: flex-start; }
  .photos-btn { border: 1px solid rgba(255,255,255,0.7); border-radius: 100px; padding: 0.5vh 1.4vw; font-size: clamp(11px, 1.5vh, 14px); color: #fff; background: rgba(0,0,0,0.15); cursor: pointer; }

  .clock-row { display: flex; align-items: flex-start; gap: 10px; }
  .spotify-btn { display: inline-flex; align-items: center; justify-content: center; width: clamp(28px, 4vh, 40px); height: clamp(28px, 4vh, 40px); border-radius: 50%; background: #1DB954; margin-top: 0.6vh; flex-shrink: 0; cursor: pointer; text-decoration: none; }
  .spotify-btn svg { width: 60%; height: 60%; }
  .clock { text-align: right; }
  .clock-time { font-size: clamp(36px, 5.8vh, 60px); font-weight: 300; line-height: 1; letter-spacing: -1.5px; white-space: nowrap; }
  .clock-time sup { font-size: 0.4em; font-weight: 300; vertical-align: super; margin-left: 2px; }
  .clock-date { font-size: clamp(11px, 1.6vh, 16px); opacity: 0.95; margin-top: 0.6vh; }

  /* WETTER – Icons jetzt exakt wie im Screenshot (sehr groß) */
  .weather-overlay { position: absolute; bottom: 2vh; left: 3vw; right: 3vw; display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; }
  body.layout-landscape .weather-overlay { position: relative; bottom: auto; margin-top: auto; padding: 0 2vw 1.5vh; flex-direction: column; align-items: stretch; gap: 8px; }
  .weather-now { display: flex; flex-direction: column; }
  .weather-now-row { display: flex; align-items: center; gap: 8px; }
  .weather-now-temp { font-size: clamp(38px, 7vh, 64px); font-weight: 400; line-height: 1; }
  .weather-now-icon { width: clamp(52px, 8.5vh, 80px); height: clamp(52px, 8.5vh, 80px); }
  .weather-now-meta { font-size: clamp(12px, 1.6vh, 16px); opacity: 0.9; margin-top: 2px; }

  .forecast-5 { display: grid; grid-template-columns: repeat(5, auto); gap: clamp(12px, 2vw, 24px); font-size: clamp(12px, 1.5vh, 14px); text-align: center; }
  body.layout-landscape .forecast-5 { grid-template-columns: repeat(5, 1fr); gap: 4px; font-size: clamp(10px, 1.3vh, 12px); }
  .forecast-5 .col { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .forecast-5 svg { width: clamp(38px, 5vh, 52px); height: clamp(38px, 5vh, 52px); }
  .forecast-5 .pop { opacity: 0.7; font-size: 0.85em; }
  .forecast-5 .pop-dot { color: #4285f4; }
  .forecast-5 .hi { font-weight: 500; }
  .forecast-5 .lo { opacity: 0.7; }

  .hourly { padding: 1.4vh 2vw 1vh; display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; font-size: clamp(9px, 1.2vh, 11px); text-align: center; background: rgba(0,0,0,0.35); }
  .hourly .col { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .hourly svg { width: clamp(26px, 3.8vh, 34px); height: clamp(26px, 3.8vh, 34px); }
  .hourly .h-temp { font-weight: 500; }
  .hourly .h-time { opacity: 0.85; }

  body.layout-landscape .hourly { display: none; }
  .hourly-landscape { display: none; padding: 0 2vw; grid-template-columns: repeat(11, 1fr); gap: 2px; font-size: clamp(8px, 1.1vh, 10px); text-align: center; }
  .hourly-landscape .col { display: flex; flex-direction: column; align-items: center; }
  .hourly-landscape svg { width: clamp(24px, 3.6vh, 32px); height: clamp(24px, 3.6vh, 32px); }
  body.layout-landscape .hourly-landscape { display: grid; }

  /* Kalender */
  .cal-container { flex: 1; position: relative; overflow: hidden; min-height: 0; display: flex; flex-direction: column; background: rgba(0,0,0, var(--cal-bg-opacity, 0.45)); transition: background 0.2s ease; }
  .cal-controls { display: flex; align-items: center; gap: 8px; padding: 4px 10px; background: rgba(0,0,0,0.2); flex-shrink: 0; }
  .cal-controls button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); color: #fff; border-radius: 6px; padding: 4px 8px; font-size: 14px; cursor: pointer; }
  .cal-controls button:active { background: rgba(255,255,255,0.25); }
  #cal-month-year { font-weight: 500; font-size: clamp(12px, 1.5vh, 16px); flex: 1; text-align: center; }
  .cal-slider { display: flex; align-items: center; gap: 4px; font-size: 11px; opacity: 0.8; }
  .cal-slider input[type=range] { width: 60px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; }

  .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: clamp(10px, 1.3vh, 12px); opacity: 0.7; padding: 4px 6px 2px; flex-shrink: 0; }
  .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; padding: 4px 6px; flex: 1; overflow: hidden; }
  .cal-day { position: relative; text-align: center; font-size: clamp(11px, 1.4vh, 14px); border-radius: 6px; padding: 4px 2px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; background: rgba(255,255,255,0.03); overflow: hidden; cursor: pointer; }
  .cal-day.today { background: rgba(255,255,255,0.18); font-weight: 600; }
  .cal-day.today .day-num { background: rgba(255,255,255,0.25); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .day-num { margin-bottom: 2px; }
  .cal-day .event-dot { width: 6px; height: 6px; border-radius: 50%; background: #1DB954; margin: 1px 0; box-shadow: 0 0 6px rgba(29,185,84,0.8); }
  .event-detail-panel { background: rgba(0,0,0,0.7); padding: 8px 12px; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.1); min-height: 40px; display: flex; align-items: center; justify-content: center; text-align: center; flex-shrink: 0; }

  /* Foto-Picker */
  #photo-picker { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; display: none; flex-direction: column; padding: 24px; overflow: auto; }
  #photo-picker.show { display: flex; }
  .pp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .pp-header h2 { font-weight: 400; font-size: 22px; }
  .pp-close { background: rgba(255,255,255,0.15); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 20px; cursor: pointer; }
  .pp-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .pp-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; }
  .pp-btn.active { background: #1d9e75; border-color: #1d9e75; }
  .pp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .pp-thumb { position: relative; aspect-ratio: 16/10; background-size: cover; background-position: center; border-radius: 8px; cursor: pointer; border: 2px solid transparent; overflow: hidden; }
  .pp-thumb.current { border-color: #4285f4; }
  .pp-thumb-check { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; }
  .pp-thumb.in-rotation .pp-thumb-check { background: #1d9e75; color: #fff; }
  .pp-upload { display: flex; flex-direction: column; align-items: center; justify-content: center; aspect-ratio: 16/10; background: rgba(255,255,255,0.08); border: 2px dashed rgba(255,255,255,0.3); border-radius: 8px; cursor: pointer; font-size: 13px; gap: 4px; color: #fff; }
  select { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.25); padding: 6px 10px; border-radius: 8px; font-family: inherit; }

  #mode-toggle { position: fixed; top: 8px; left: 8px; display: flex; gap: 4px; z-index: 50; opacity: 0.3; }
  #mode-toggle:hover { opacity: 1; }
  #mode-toggle button { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; }
  #mode-toggle button.active { background: rgba(255,255,255,0.25); }
</style>
</head>
<body class="layout-portrait">

<div id="bg1"></div>
<div id="bg2"></div>
<div id="bg-overlay"></div>

<div id="mode-toggle">
  <button data-mode="auto" class="active">Auto</button>
  <button data-mode="portrait">Hoch</button>
  <button data-mode="landscape">Quer</button>
</div>

<div id="app">
  <div class="top-area">
    <div class="header">
      <button class="photos-btn" onclick="openPhotoPicker()">Photos</button>
      <div class="clock-row">
        <a href="https://open.spotify.com" target="_blank" class="spotify-btn" title="Spotify">
          <svg viewBox="0 0 24 24" fill="#000"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.586 14.424a.622.622 0 0 1-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.622.622 0 1 1-.277-1.215c3.809-.871 7.077-.496 9.713 1.115a.623.623 0 0 1 .206.857zm1.223-2.722a.78.78 0 0 1-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 1 1-.452-1.494c3.632-1.102 8.147-.568 11.232 1.328a.78.78 0 0 1 .257 1.075zm.105-2.835c-3.223-1.914-8.54-2.09-11.618-1.156a.935.935 0 1 1-.542-1.79c3.532-1.072 9.404-.865 13.115 1.338a.936.936 0 1 1-.955 1.608z"/></svg>
        </a>
        <div class="clock">
          <div class="clock-time"><span id="hh">--</span>:<span id="mm">--</span><sup id="ss">--</sup></div>
          <div class="clock-date" id="datestr">…</div>
        </div>
      </div>
    </div>

    <div class="weather-overlay">
      <div class="weather-now">
        <div class="weather-now-row">
          <div class="weather-now-temp" id="now-temp">--°</div>
          <svg class="weather-now-icon" id="now-icon"></svg>
        </div>
        <div class="weather-now-meta" id="now-feels">Gefühlt --°</div>
        <div class="weather-now-meta" id="now-desc">Lade Wetter…</div>
      </div>
      <div class="forecast-5" id="forecast-5"></div>
    </div>

    <div class="hourly-landscape" id="hourly-landscape"></div>
  </div>

  <div class="bottom-area">
    <div class="hourly" id="hourly"></div>
    <div class="cal-container" id="cal-container">
      <div class="cal-controls">
        <button id="cal-prev" onclick="changeMonth(-1)">←</button>
        <span id="cal-month-year">Januar 2026</span>
        <button id="cal-next" onclick="changeMonth(1)">→</button>
        <div class="cal-slider">
          <span>🔅</span>
          <input type="range" id="cal-bg-slider" min="0" max="1" step="0.05" value="0.45" oninput="updateCalOpacity(this.value)">
        </div>
      </div>
      <div class="cal-weekdays">
        <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
      <div class="event-detail-panel" id="event-detail-panel"></div>
    </div>
  </div>
</div>

<!-- Foto-Picker -->
<div id="photo-picker">
  <div class="pp-header">
    <h2>Hintergrund auswählen</h2>
    <button class="pp-close" onclick="closePhotoPicker()">×</button>
  </div>
  <div class="pp-controls">
    <button class="pp-btn" id="slide-btn" onclick="toggleSlideshow()">▶ Slideshow starten</button>
    <span style="opacity: 0.6;">Intervall:</span>
    <select id="interval-select" onchange="updateInterval()">
      <option value="10000">10 s</option>
      <option value="30000" selected>30 s</option>
      <option value="60000">1 min</option>
      <option value="300000">5 min</option>
      <option value="900000">15 min</option>
    </select>
    <span id="rotation-info" style="opacity: 0.7; font-size: 12px;"></span>
  </div>
  <div class="pp-grid" id="pp-grid"></div>
</div>

const svg2url = svg => `data:image/svg+xml;utf8,${encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500' preserveAspectRatio='xMidYMid slice'>${svg}</svg>`)}`;

function loadPhotos() {
  const stored = JSON.parse(localStorage.getItem('annalove_photos') || '[]');
  return [
    ...stored.map(p => ({ name: p.name, url: p.url, user: true })),
    { name: 'Rhein Coffee-Bike', url: DEFAULT_PHOTO, user: false },
    ...PLACEHOLDERS.map(p => ({ name: p.name, url: svg2url(p.svg), user: false }))
  ];
}
let photos = loadPhotos();
let inRotation = new Set(JSON.parse(localStorage.getItem('annalove_rotation') || '[0,1,2,3,4]'));
let currentIdx = 0, slideshowTimer = null;
let intervalMs = parseInt(localStorage.getItem('annalove_interval') || CONFIG.slideshowInterval);
document.getElementById('interval-select').value = intervalMs;

let activeBg = 1;
function applyBg(idx) {
  if (!photos[idx]) return;
  currentIdx = idx;
  const next = activeBg === 1 ? 2 : 1;
  const nextEl = document.getElementById('bg' + next);
  const curEl = document.getElementById('bg' + activeBg);
  nextEl.style.backgroundImage = `url("${photos[idx].url}")`;
  setTimeout(() => { nextEl.classList.add('active'); curEl.classList.remove('active'); activeBg = next; }, 50);
  renderThumbs();
}

function renderThumbs() {
  const grid = document.getElementById('pp-grid');
  let html = `<label class="pp-upload" for="upload-input"><span style="font-size:24px;">+</span><span>Foto hochladen</span></label><input type="file" id="upload-input" accept="image/*" style="display:none;" onchange="handleUpload(event)">`;
  html += photos.map((p, i) => `<div class="pp-thumb ${i === currentIdx ? 'current' : ''} ${inRotation.has(i) ? 'in-rotation' : ''}" style="background-image:url('${p.url}');" onclick="pickPhoto(${i})"><div class="pp-thumb-check" onclick="event.stopPropagation();toggleRotation(${i})">✓</div>${p.user ? `<button onclick="event.stopPropagation();deletePhoto(${i})" style="position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;border:none;cursor:pointer;">×</button>` : ''}</div>`).join('');
  grid.innerHTML = html;
  document.getElementById('rotation-info').textContent = `${inRotation.size} Bild${inRotation.size === 1 ? '' : 'er'} aktiv`;
}

function openPhotoPicker() { document.getElementById('photo-picker').classList.add('show'); renderThumbs(); }
function closePhotoPicker() { document.getElementById('photo-picker').classList.remove('show'); }
function pickPhoto(i) { applyBg(i); if (slideshowTimer) { stopSlideshow(); startSlideshow(); } }
function toggleRotation(i) {
  if (inRotation.has(i)) { if (inRotation.size > 1) inRotation.delete(i); } else inRotation.add(i);
  localStorage.setItem('annalove_rotation', JSON.stringify([...inRotation]));
  renderThumbs();
}
function startSlideshow() {
  document.getElementById('slide-btn').textContent = '⏸ Stoppen';
  document.getElementById('slide-btn').classList.add('active');
  slideshowTimer = setInterval(() => {
    const arr = [...inRotation].sort((a,b) => a-b);
    if (!arr.length) return;
    const pos = arr.indexOf(currentIdx);
    applyBg(arr[(pos + 1) % arr.length] ?? arr[0]);
  }, intervalMs);
  localStorage.setItem('annalove_slideshow', '1');
}
function stopSlideshow() {
  clearInterval(slideshowTimer); slideshowTimer = null;
  document.getElementById('slide-btn').textContent = '▶ Slideshow starten';
  document.getElementById('slide-btn').classList.remove('active');
  localStorage.setItem('annalove_slideshow', '0');
}
function toggleSlideshow() { slideshowTimer ? stopSlideshow() : startSlideshow(); }
function updateInterval() {
  intervalMs = parseInt(document.getElementById('interval-select').value);
  localStorage.setItem('annalove_interval', intervalMs);
  if (slideshowTimer) { stopSlideshow(); startSlideshow(); }
}
function handleUpload(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    const stored = JSON.parse(localStorage.getItem('annalove_photos') || '[]');
    stored.unshift({ name: f.name, url: ev.target.result });
    try { localStorage.setItem('annalove_photos', JSON.stringify(stored)); }
    catch (err) { alert('Speicher voll – ältere Fotos löschen.'); return; }
    photos = loadPhotos();
    inRotation = new Set([...inRotation].map(i => i + 1));
    inRotation.add(0);
    localStorage.setItem('annalove_rotation', JSON.stringify([...inRotation]));
    applyBg(0); renderThumbs();
  };
  r.readAsDataURL(f);
}
function deletePhoto(i) {
  if (!confirm('Foto löschen?')) return;
  const s = JSON.parse(localStorage.getItem('annalove_photos') || '[]');
  s.splice(i, 1);
  localStorage.setItem('annalove_photos', JSON.stringify(s));
  photos = loadPhotos();
  if (currentIdx >= photos.length) currentIdx = 0;
  applyBg(currentIdx); renderThumbs();
}

// Spotify-Link wurde direkt im HTML als normaler Link eingebaut, benötigt keine JavaScript-Funktion mehr.

const TAGE = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const MONATE = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
function tickClock() {
  const d = new Date();
  document.getElementById('hh').textContent = String(d.getHours()).padStart(2,'0');
  document.getElementById('mm').textContent = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('ss').textContent = String(d.getSeconds()).padStart(2,'0');
  document.getElementById('datestr').textContent = `${TAGE[d.getDay()]}, ${d.getDate()}. ${MONATE[d.getMonth()]}`;
}
tickClock(); setInterval(tickClock, 1000);

function wmoIcon(code, night) {
  if (code === 0) return night ? 'ic-night' : 'ic-sun';
  if (code <= 2) return night ? 'ic-night-cloud' : 'ic-partly';
  if (code === 3) return 'ic-cloud';
  if (code <= 48) return 'ic-fog';
  if (code <= 67 || (code >= 80 && code <= 82)) return 'ic-rain';
  if (code <= 77 || code <= 86) return 'ic-snow';
  if (code >= 95) return 'ic-storm';
  return 'ic-cloud';
}
function wmoDesc(code) {
  if (code === 0) return 'Klar'; if (code === 1) return 'Überwiegend klar';
  if (code === 2) return 'Teils bewölkt'; if (code === 3) return 'Bewölkt';
  if (code <= 48) return 'Nebel'; if (code <= 57) return 'Nieselregen';
  if (code <= 67) return 'Regen'; if (code <= 77) return 'Schnee';
  if (code <= 82) return 'Schauer'; if (code >= 95) return 'Gewitter';
  return '';
}
async function loadWeather() {
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.weatherLat}&longitude=${CONFIG.weatherLon}&current=temperature_2m,apparent_temperature,weather_code,is_day&hourly=temperature_2m,weather_code,is_day&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=6`);
    renderWeather(await r.json());
  } catch (e) { console.error(e); document.getElementById('now-desc').textContent = 'Wetter offline'; }
}
function renderWeather(data) {
  const cur = data.current; const night = cur.is_day === 0;
  document.getElementById('now-temp').textContent = Math.round(cur.temperature_2m) + '°';
  document.getElementById('now-feels').textContent = `Gefühlt ${Math.round(cur.apparent_temperature)}°`;
  document.getElementById('now-desc').textContent = wmoDesc(cur.weather_code);
  document.getElementById('now-icon').innerHTML = `<use href="#${wmoIcon(cur.weather_code, night)}"/>`;
  const labels = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  let fc = '';
  for (let i = 0; i < 5; i++) {
    const dt = new Date(data.daily.time[i]);
    const lbl = i === 0 ? 'Heute' : labels[dt.getDay()];
    fc += `<div class="col"><div>${lbl}</div><svg><use href="#${wmoIcon(data.daily.weather_code[i], false)}"/></svg><div class="pop"><span class="pop-dot">◆</span> ${data.daily.precipitation_probability_max[i] ?? 0}%</div><div class="hi">${Math.round(data.daily.temperature_2m_max[i])}°</div><div class="lo">${Math.round(data.daily.temperature_2m_min[i])}°</div></div>`;
  }
  document.getElementById('forecast-5').innerHTML = fc;
  const now = new Date();
  let s = data.hourly.time.findIndex(t => new Date(t) >= now); if (s === -1) s = 0;
  let h = '', hl = '';
  for (let i = 0; i < 12; i++) {
    const idx = s + i; if (idx >= data.hourly.time.length) break;
    const t = new Date(data.hourly.time[idx]);
    const code = data.hourly.weather_code[idx];
    const isn = data.hourly.is_day[idx] === 0;
    const col = `<div class="col"><div class="h-time">${t.getHours()}</div><svg><use href="#${wmoIcon(code, isn)}"/></svg><div class="h-temp">${Math.round(data.hourly.temperature_2m[idx])}°</div></div>`;
    h += col; if (i < 11) hl += col;
  }
  document.getElementById('hourly').innerHTML = h;
  document.getElementById('hourly-landscape').innerHTML = hl;
}

/* Kalender */
let calDate = new Date();
let calendarEvents = {};

function updateCalOpacity(val) {
  document.getElementById('cal-container').style.setProperty('--cal-bg-opacity', val);
  localStorage.setItem('annalove_cal_opacity', val);
}

function parseICS(text) {
  const events = [];
  const lines = text.split(/\r?\n/);
  let event = null;
  let inAlarm = false;
  for (let line of lines) {
    line = line.trim();
    if (line === 'BEGIN:VEVENT') { event = {}; inAlarm = false; }
    else if (line === 'END:VEVENT') { if (event && event.start) events.push(event); event = null; }
    else if (line === 'BEGIN:VALARM' || line === 'BEGIN:ALARM') inAlarm = true;
    else if (line === 'END:VALARM' || line === 'END:ALARM') inAlarm = false;
    else if (event && !inAlarm) {
      const [key, ...rest] = line.split(':');
      const value = rest.join(':');
      if (key === 'DTSTART') event.start = parseICalDate(value);
      else if (key === 'DTEND') event.end = parseICalDate(value);
      else if (key === 'SUMMARY') event.summary = value;
    }
  }
  return events;
}

function parseICalDate(str) {
  const cleaned = str.replace(/[^0-9T]/g, '');
  const year = parseInt(cleaned.substring(0,4));
  const month = parseInt(cleaned.substring(4,6)) - 1;
  const day = parseInt(cleaned.substring(6,8));
  if (cleaned.length > 8) {
    const hour = parseInt(cleaned.substring(9,11));
    const min = parseInt(cleaned.substring(11,13));
    const sec = parseInt(cleaned.substring(13,15) || '0');
    return new Date(year, month, day, hour, min, sec);
  }
  return new Date(year, month, day);
}

function dateKey(year, month, day) {
  return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

async function fetchCalendar() {
  try {
    const proxyUrl = CONFIG.corsProxy + encodeURIComponent(CONFIG.icalUrl);
    const resp = await fetch(proxyUrl);
    if (!resp.ok) throw new Error('Fehler beim Laden: ' + resp.status);
    const text = await resp.text();
    const events = parseICS(text);
    const map = {};
    for (const ev of events) {
      const start = ev.start;
      const end = ev.end || start;
      const key = dateKey(start.getFullYear(), start.getMonth(), start.getDate());
      if (!map[key]) map[key] = [];
      map[key].push(ev);
      if (end && end.toDateString() !== start.toDateString()) {
        const cur = new Date(start);
        while (cur <= end) {
          const k = dateKey(cur.getFullYear(), cur.getMonth(), cur.getDate());
          if (!map[k]) map[k] = [];
          map[k].push(ev);
          cur.setDate(cur.getDate() + 1);
        }
      }
    }
    calendarEvents = map;
    renderCalendar();
  } catch (err) {
    console.error('Kalender-Fehler:', err);
    document.getElementById('cal-days').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;">⚠️ Kalender konnte nicht geladen werden</div>';
  }
}

function changeMonth(delta) {
  calDate.setMonth(calDate.getMonth() + delta);
  renderCalendar();
}

let selectedDayKey = null;

function showEventDetails(key) {
  const panel = document.getElementById('event-detail-panel');
  const events = calendarEvents[key] || [];
  if (events.length === 0) {
    panel.textContent = '';
    return;
  }
  selectedDayKey = key;
  const titles = events.map(e => e.summary || '(ohne Titel)');
  panel.innerHTML = titles.join(', ');
}

function renderCalendar() {
  const year = calDate.getFullYear();
  const month = calDate.getMonth();
  const today = new Date();
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  document.getElementById('cal-month-year').textContent = `${MONATE[month]} ${year}`;

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  let startDay = firstDay.getDay() - 1;
  if (startDay < 0) startDay = 6;

  let html = '';
  for (let i = 0; i < startDay; i++) {
    html += '<div class="cal-day"></div>';
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const key = dateKey(year, month, d);
    const isToday = key === todayKey;
    const events = calendarEvents[key] || [];
    let dotsHtml = '';
    const maxDots = 3;
    for (let i = 0; i < Math.min(events.length, maxDots); i++) {
      dotsHtml += '<div class="event-dot"></div>';
    }
    if (events.length > maxDots) {
      dotsHtml += `<div style="font-size:9px;opacity:0.8;">+${events.length - maxDots}</div>`;
    }
    html += `<div class="cal-day${isToday ? ' today' : ''}" data-key="${key}" onclick="showEventDetails('${key}')">
      <div class="day-num">${d}</div>
      ${dotsHtml}
    </div>`;
  }
  document.getElementById('cal-days').innerHTML = html;

  if (selectedDayKey && calendarEvents[selectedDayKey]) {
    showEventDetails(selectedDayKey);
  } else {
    document.getElementById('event-detail-panel').textContent = '';
  }
}

function setLayout(mode) {
  document.body.classList.remove('layout-portrait', 'layout-landscape');
  if (mode === 'auto') {
    document.body.classList.add(window.innerWidth > window.innerHeight ? 'layout-landscape' : 'layout-portrait');
  } else document.body.classList.add('layout-' + mode);
  document.querySelectorAll('#mode-toggle button').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  localStorage.setItem('annalove_layout', mode);
}
document.querySelectorAll('#mode-toggle button').forEach(b => b.addEventListener('click', () => setLayout(b.dataset.mode)));
window.addEventListener('resize', () => {
  const m = localStorage.getItem('annalove_layout') || 'auto';
  if (m === 'auto') setLayout('auto');
});

setLayout(localStorage.getItem('annalove_layout') || 'auto');
applyBg(0);
loadWeather();
setInterval(loadWeather, CONFIG.weatherRefresh);
if (localStorage.getItem('annalove_slideshow') === '1') startSlideshow();

const savedOpacity = localStorage.getItem('annalove_cal_opacity');
if (savedOpacity !== null) {
  document.getElementById('cal-bg-slider').value = savedOpacity;
  updateCalOpacity(savedOpacity);
} else {
  updateCalOpacity(0.45);
}
fetchCalendar();
setInterval(fetchCalendar, 60 * 60 * 1000);
</script>

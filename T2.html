<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>SmartHub - Optimiertes Kühlschrank-Display</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
/* THEMEN DEFINITIONEN */
:root { --bg: #000; --surface: #111; --text: #fff; --accent: #ef4444; --glass: rgba(255,255,255,0.1); }
[data-theme="oled"] { --bg: #000; --surface: #000; --accent: #3b82f6; }
[data-theme="glass"] { --bg: #1a1c2c; --surface: rgba(255,255,255,0.1); --glass: rgba(255,255,255,0.15); --accent: #00d2ff; }
[data-theme="nordic"] { --bg: #2e3440; --surface: #3b4252; --accent: #88c0d0; }
[data-theme="cyber"] { --bg: #050505; --surface: #000; --accent: #f0f; --text: #0ff; }
[data-theme="minimal"] { --bg: #f4f4f5; --surface: #fff; --text: #09090b; --accent: #ef4444; --glass: rgba(0,0,0,0.05); }

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; transition: background 0.5s ease; }

.app { display: grid; grid-template-columns: 42fr 58fr; height: 100dvh; gap: 20px; padding: 20px; }

.panel { border-radius: 32px; overflow: hidden; position: relative; background: var(--surface); border: 1px solid var(--glass); }

/* SLIDESHOW */
.slideshow { position: absolute; inset: 0; z-index: 0; }
.slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease; }
.slide.active { opacity: 1; }
.vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8)); z-index: 1; }

/* OVERLAYS */
.overlay-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; pointer-events: none; }
.time { font-family: "JetBrains Mono", monospace; font-size: clamp(80px, 10vw, 150px); font-weight: 700; letter-spacing: -5px; pointer-events: auto; }

/* WETTER */
.weather-card { display: flex; align-items: center; gap: 20px; pointer-events: auto; background: var(--glass); padding: 15px 25px; border-radius: 20px; width: fit-content; backdrop-filter: blur(10px); }
.weather-icon { width: 60px; height: 60px; fill: var(--accent); }

/* KALENDER */
.cal-container { display: flex; flex-direction: column; height: 100%; padding: 25px; }
.cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.view-btn { padding: 12px 20px; border-radius: 12px; border: none; background: var(--glass); color: var(--text); cursor: pointer; font-weight: 700; pointer-events: auto; }
.view-btn.active { background: var(--accent); color: white; }

.grid-body { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; gap: 4px; background: var(--glass); border-radius: 15px; overflow: hidden; }
.day-cell { background: var(--surface); padding: 10px; cursor: pointer; display: flex; flex-direction: column; }
.day-num { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
.day-cell.today { border: 2px solid var(--accent); }
.ev-item { font-size: 11px; padding: 3px 6px; border-radius: 5px; background: var(--accent); color: white; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; }

/* SETTINGS SIDEBAR */
.settings-panel { position: fixed; top: 0; right: 0; width: 400px; height: 100%; background: #000; z-index: 100; transform: translateX(100%); transition: 0.3s ease; padding: 30px; border-left: 1px solid var(--glass); overflow-y: auto; }
.settings-panel.active { transform: translateX(0); }
.input-field { width: 100%; background: #111; border: 1px solid var(--glass); color: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; }
</style>
</head>
<body data-theme="oled">

<div class="app">
    <div class="panel left">
        <button class="view-btn" style="position:absolute; top:20px; left:20px; z-index:10;" id="openSettings">⚙️ Menü</button>
        <div class="slideshow" id="slideshow"></div>
        <div class="vignette"></div>
        <div class="overlay-content">
            <div class="time-box">
                <div id="clock" class="time">00:00</div>
                <div id="dateFull" style="font-size: 24px; font-weight: 700; color: var(--accent);">Datum</div>
            </div>
            <div class="weather-card" id="weatherDisplay">
                <div id="weatherIcon"></div>
                <div>
                    <div id="mainTemp" style="font-size: 40px; font-weight: 700;">--°</div>
                    <div id="weatherLoc" style="opacity: 0.8;">Standort...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="panel right">
        <div class="cal-container">
            <div class="cal-nav">
                <h2 id="monthTitle">Monat</h2>
                <div style="display:flex; gap:10px;">
                    <button class="view-btn active" id="btnMonth">Monat</button>
                    <button class="view-btn" id="btnWeek">Woche</button>
                </div>
            </div>
            <div class="grid-body" id="calendarGrid"></div>
        </div>
    </div>
</div>

<!-- SETTINGS -->
<div class="settings-panel" id="settingsPanel">
    <h2>Einstellungen</h2><br>
    
    <label>Thema</label>
    <select class="input-field" id="themeSelect">
        <option value="oled">OLED Black</option>
        <option value="glass">Glassmorphism</option>
        <option value="nordic">Nordic</option>
        <option value="minimal">Minimal White</option>
    </select>

    <label>Bilder vom Tablet hochladen (Mehrfachauswahl)</label>
    <input type="file" id="filePicker" class="input-field" multiple accept="image/*">

    <label>Cloud Bilder-URLs (pro Zeile)</label>
    <textarea class="input-field" id="imgList" rows="3" placeholder="https://..."></textarea>

    <label>Wetter-Stadt</label>
    <input type="text" class="input-field" id="cityInput" placeholder="z.B. Bonn">

    <button class="view-btn active" style="width:100%" id="saveBtn">Speichern</button><br><br>
    <button class="view-btn" style="width:100%" id="closeSettings">Schließen</button>
</div>

<script>
let state = {
    theme: 'oled', city: 'Düsseldorf',
    images: ['https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1500'],
    localImages: [], events: []
};

function updateUI() {
    document.body.dataset.theme = state.theme;
    document.getElementById('weatherLoc').textContent = state.city;
    renderCalendar();
    fetchWeather(); // Hole Wetter für die neue Stadt
}

async function fetchWeather() {
    try {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${state.city}&appid=769c5861cd255a3982bafb1680abf194&units=metric&lang=de`);
        const data = await res.json();
        if(data.main) {
            document.getElementById('mainTemp').textContent = Math.round(data.main.temp) + '°';
            document.getElementById('weatherLoc').textContent = data.name;
        }
    } catch (e) { console.error("Wetter konnte nicht geladen werden."); }
}

function renderCalendar() {
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    const now = new Date();
    document.getElementById('monthTitle').textContent = now.toLocaleDateString('de-DE', {month:'long', year:'numeric'});
    
    for(let d=1; d<=28; d++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        cell.innerHTML = `<div class="day-num">${d}</div>`;
        grid.appendChild(cell);
    }
}

function startSlideshow() {
    const ss = document.getElementById('slideshow');
    const allImages = [...state.images, ...state.localImages];
    let idx = 0;
    
    const nextSlide = () => {
        if(allImages.length === 0) return;
        const img = allImages[idx];
        const slide = document.createElement('div');
        slide.className = 'slide';
        slide.style.backgroundImage = `url('${img}')`;
        ss.appendChild(slide);
        
        setTimeout(() => {
            slide.classList.add('active');
            if(ss.children.length > 2) ss.removeChild(ss.children[0]);
        }, 100);
        idx = (idx + 1) % allImages.length;
    };
    
    nextSlide();
    setInterval(nextSlide, 10000);
}

// Event-Handling
document.getElementById('openSettings').onclick = () => {
    document.getElementById('cityInput').value = state.city;
    document.getElementById('imgList').value = state.images.join('\n');
    document.getElementById('settingsPanel').classList.add('active');
};

document.getElementById('closeSettings').onclick = () => {
    document.getElementById('settingsPanel').classList.remove('active');
};

document.getElementById('saveBtn').onclick = () => {
    state.city = document.getElementById('cityInput').value;
    state.theme = document.getElementById('themeSelect').value;
    state.images = document.getElementById('imgList').value.split('\n').filter(i => i.trim());
    
    localStorage.setItem('hub_v_safe', JSON.stringify(state));
    updateUI();
    document.getElementById('settingsPanel').classList.remove('active');
};

// Lokal Bilder vom Tablet verarbeiten
document.getElementById('filePicker').onchange = (e) => {
    const files = Array.from(e.target.files);
    state.localImages = files.map(file => URL.createObjectURL(file));
    alert(files.length + " Bilder wurden zur Slideshow hinzugefügt.");
};

function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('dateFull').textContent = now.toLocaleDateString('de-DE', {weekday:'long', day:'numeric', month:'long'});
}

// Initialisierung
const saved = localStorage.getItem('hub_v_safe');
if(saved) state = {...state, ...JSON.parse(saved)};

updateClock();
setInterval(updateClock, 1000);
updateUI();
startSlideshow();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>SmartHub Ultimate Fridge OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
/* 10 MODERN THEMES */
:root { --bg: #000; --surface: #111; --text: #fff; --accent: #ef4444; --glass: rgba(255,255,255,0.1); }
[data-theme="oled"] { --bg: #000; --surface: #000; --accent: #3b82f6; }
[data-theme="glass"] { --bg: #1a1c2c; --surface: rgba(255,255,255,0.1); --glass: rgba(255,255,255,0.15); --accent: #00d2ff; }
[data-theme="nordic"] { --bg: #2e3440; --surface: #3b4252; --accent: #88c0d0; }
[data-theme="cyber"] { --bg: #050505; --surface: #000; --accent: #f0f; --text: #0ff; }
[data-theme="forest"] { --bg: #0f1a14; --surface: #1a2e23; --accent: #4ade80; }
[data-theme="sunset"] { --bg: #2d1b2d; --surface: #432a43; --accent: #fb923c; }
[data-theme="ocean"] { --bg: #0f172a; --surface: #1e293b; --accent: #38bdf8; }
[data-theme="minimal"] { --bg: #f4f4f5; --surface: #fff; --text: #09090b; --accent: #ef4444; --glass: rgba(0,0,0,0.05); }
[data-theme="crimson"] { --bg: #1a0505; --surface: #2d0a0a; --accent: #f87171; }
[data-theme="royal"] { --bg: #1e1b4b; --surface: #312e81; --accent: #a5b4fc; }

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; transition: all 0.5s ease; }

.app { display: grid; grid-template-columns: 42fr 58fr; height: 100dvh; gap: 20px; padding: 20px; }
@media (max-width: 1100px) { .app { grid-template-columns: 1fr; grid-template-rows: 45vh 1fr; } }

.panel { border-radius: 32px; overflow: hidden; position: relative; background: var(--surface); border: 1px solid var(--glass); }

/* SLIDESHOW ENGINE & 10 ANIMATIONS */
.slideshow { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
.slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
.slide.active { opacity: 1; }

.anim-fade.active { opacity: 1; }
.anim-zoom-in { transform: scale(1.5); }
.anim-zoom-in.active { transform: scale(1); }
.anim-zoom-out { transform: scale(0.5); }
.anim-zoom-out.active { transform: scale(1); }
.anim-slide-left { transform: translateX(100%); }
.anim-slide-left.active { transform: translateX(0); }
.anim-slide-right { transform: translateX(-100%); }
.anim-slide-right.active { transform: translateX(0); }
.anim-blur-in { filter: blur(30px); }
.anim-blur-in.active { filter: blur(0); }
.anim-rotate { transform: rotate(15deg) scale(1.2); }
.anim-rotate.active { transform: rotate(0) scale(1); }
.anim-flip { transform: rotateY(90deg); }
.anim-flip.active { transform: rotateY(0); }
.anim-ken-burns { transform: scale(1) translate(0,0); }
.anim-ken-burns.active { transform: scale(1.2) translate(-2%, -2%); }
.anim-bounce { transform: translateY(-100%); }
.anim-bounce.active { transform: translateY(0); }

.vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.85)); z-index: 1; }
.overlay-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; pointer-events: none; }

/* TIME & DATE */
.time { font-family: "JetBrains Mono", monospace; font-size: clamp(80px, 11vw, 170px); font-weight: 700; letter-spacing: -6px; pointer-events: auto; line-height: 0.85; }
.date-label { font-size: 30px; font-weight: 700; color: var(--accent); margin-top: 15px; }

/* WEATHER UPGRADE */
.weather-container { pointer-events: auto; background: var(--glass); padding: 25px; border-radius: 30px; width: fit-content; backdrop-filter: blur(15px); border: 1px solid var(--glass); }
.weather-main { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
.weather-icon svg { width: 80px; height: 80px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.3)); }
.temp-large { font-family: "JetBrains Mono", monospace; font-size: 65px; font-weight: 700; line-height: 1; }

.forecast-grid { display: flex; gap: 15px; border-top: 1px solid var(--glass); padding-top: 15px; }
.fc-item { text-align: center; }
.fc-day { font-size: 12px; font-weight: 700; opacity: 0.6; text-transform: uppercase; margin-bottom: 5px; }
.fc-icon svg { width: 30px; height: 30px; }
.fc-temp { font-size: 16px; font-weight: 700; margin-top: 2px; }

/* CALENDAR */
.cal-container { display: flex; flex-direction: column; height: 100%; padding: 25px; }
.cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.view-btn { padding: 15px 25px; border-radius: 15px; border: none; background: var(--glass); color: var(--text); cursor: pointer; font-weight: 700; font-size: 16px; pointer-events: auto; }
.view-btn.active { background: var(--accent); color: white; }

.grid-body { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; gap: 5px; background: var(--glass); border-radius: 20px; overflow: hidden; }
.day-cell { background: var(--surface); padding: 12px; cursor: pointer; display: flex; flex-direction: column; position: relative; }
.day-num { font-size: 26px; font-weight: 700; margin-bottom: 5px; }
.day-cell.today { border: 3px solid var(--accent); background: rgba(239,68,68,0.05); }

/* SETTINGS SIDEBAR */
.settings-panel { position: fixed; top: 0; right: 0; width: 450px; height: 100%; background: #000; z-index: 100; transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 35px; border-left: 1px solid var(--glass); overflow-y: auto; }
.settings-panel.active { transform: translateX(0); }
.input-field { width: 100%; background: #111; border: 1px solid var(--glass); color: white; padding: 14px; border-radius: 12px; margin-bottom: 15px; font-size: 15px; }
label { display: block; margin-bottom: 5px; font-weight: 700; opacity: 0.6; font-size: 13px; }
</style>
</head>
<body data-theme="oled">

<div class="app">
  <div class="panel left">
    <button class="view-btn" style="position:absolute; top:30px; left:30px; z-index:10; border-radius: 50%; width: 60px; height: 60px; display: grid; place-items: center;" id="openSettings">⚙️</button>
    <div class="slideshow" id="slideshow"></div>
    <div class="vignette"></div>
    <div class="overlay-content">
      <div class="time-box">
        <div id="clock" class="time">00:00</div>
        <div id="dateFull" class="date-label">Lade...</div>
      </div>
      
      <div class="weather-container">
        <div class="weather-main">
          <div id="weatherIcon" class="weather-icon"></div>
          <div>
            <div id="mainTemp" class="temp-large">--°</div>
            <div id="weatherLoc" style="font-weight: 700; opacity: 0.8; font-size: 22px;">Standort...</div>
          </div>
        </div>
        <div class="forecast-grid" id="forecastGrid"></div>
      </div>
    </div>
  </div>

  <div class="panel right">
    <div class="cal-container">
      <div class="cal-nav">
        <h2 id="monthTitle" style="font-size: 32px; font-weight: 700;">Kalender</h2>
        <div style="display:flex; gap:10px;">
          <button class="view-btn active" id="btnMonth">Monat</button>
          <button class="view-btn" id="btnWeek">Woche</button>
        </div>
      </div>
      <div class="grid-body" id="calendarGrid"></div>
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<div class="settings-panel" id="settingsPanel">
  <h2>SmartHub Einstellungen</h2><br>
  
  <label>Design Thema</label>
  <select class="input-field" id="themeSelect">
    <option value="oled">OLED Deep Black</option>
    <option value="glass">Frosted Glass</option>
    <option value="nordic">Nordic Dark</option>
    <option value="cyber">Cyberpunk Neon</option>
    <option value="forest">Emerald Forest</option>
    <option value="sunset">Sunset Purple</option>
    <option value="ocean">Midnight Ocean</option>
    <option value="minimal">Minimal White</option>
    <option value="crimson">Crimson Red</option>
    <option value="royal">Royal Indigo</option>
  </select>

  <label>Slideshow Animation</label>
  <select class="input-field" id="animSelect">
    <option value="fade">Klassisch Fade</option>
    <option value="zoom-in">Zoom In</option>
    <option value="zoom-out">Zoom Out</option>
    <option value="slide-left">Slide Links</option>
    <option value="slide-right">Slide Rechts</option>
    <option value="blur-in">Blur Effekt</option>
    <option value="rotate">Rotation</option>
    <option value="flip">3D Flip</option>
    <option value="ken-burns">Ken Burns</option>
    <option value="bounce">Bounce</option>
  </select>

  <label>Bilder vom Tablet hochladen</label>
  <input type="file" id="filePicker" class="input-field" multiple accept="image/*">

  <label>Cloud Bilder-Links (ein Link pro Zeile)</label>
  <textarea class="input-field" id="imgList" rows="4" placeholder="URL eingeben..."></textarea>

  <label>Wetter-Stadt</label>
  <input type="text" class="input-field" id="cityInput" placeholder="z.B. Bonn">

  <button class="view-btn active" style="width:100%; margin-top: 20px;" id="saveBtn">Speichern</button><br><br>
  <button class="view-btn" style="width:100%" id="closeSettings">Schließen</button>
</div>

<script>
let state = {
  theme: 'oled', anim: 'fade', city: 'Düsseldorf',
  images: ['https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=2000'],
  localImages: [], events: []
};

const weatherIcons = {
  Clear: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#fb923c"/><path d="M12 1v2m0 18v2M4.2 4.2l1.4 1.4m12.8 12.8l1.4 1.4M1 12h2m18 0h2M4.2 19.8l1.4-1.4m12.8-12.8l1.4-1.4" stroke="#fb923c" stroke-width="2"/></svg>',
  Clouds: '<svg viewBox="0 0 24 24"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-4-4.5-.8-3.7-4-6.5-7.5-6.5C7.2 3.5 4.5 6 4.1 9.1 1.8 9.6 0 11.6 0 14c0 2.8 2.2 5 5 5h12.5z" fill="#94a3b8"/></svg>',
  Rain: '<svg viewBox="0 0 24 24"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-4-4.5-.8-3.7-4-6.5-7.5-6.5C7.2 3.5 4.5 6 4.1 9.1 1.8 9.6 0 11.6 0 14c0 2.8 2.2 5 5 5h12.5z" fill="#38bdf8"/><path d="M8 20l-1 2M12 21l-1 2M16 20l-1 2" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/></svg>',
  Snow: '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2v20M2 12h20M5 5l14 14M19 5L5 14"/></svg>'
};

function applyLiveChanges() {
  document.body.dataset.theme = state.theme;
  fetchWeather();
  renderCalendar();
}

async function fetchWeather() {
  try {
    const api = '769c5861cd255a3982bafb1680abf194';
    const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${state.city}&appid=${api}&units=metric&lang=de`);
    const data = await res.json();
    
    // Aktuelles Wetter
    const current = data.list[0];
    document.getElementById('mainTemp').textContent = Math.round(current.main.temp) + '°';
    document.getElementById('weatherLoc').textContent = data.city.name;
    document.getElementById('weatherIcon').innerHTML = weatherIcons[current.weather[0].main] || weatherIcons.Clouds;
    
    // 5 Tage Vorhersage
    const forecastGrid = document.getElementById('forecastGrid');
    forecastGrid.innerHTML = '';
    const daily = data.list.filter(item => item.dt_txt.includes("12:00:00"));
    
    daily.forEach(day => {
      const date = new Date(day.dt * 1000);
      const div = document.createElement('div');
      div.className = 'fc-item';
      div.innerHTML = `
        <div class="fc-day">${date.toLocaleDateString('de-DE', {weekday:'short'})}</div>
        <div class="fc-icon">${weatherIcons[day.weather[0].main] || weatherIcons.Clouds}</div>
        <div class="fc-temp">${Math.round(day.main.temp)}°</div>
      `;
      forecastGrid.appendChild(div);
    });
  } catch (e) { console.error("Wetterfehler"); }
}

function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  const now = new Date(state.date);
  document.getElementById('monthTitle').textContent = now.toLocaleDateString('de-DE', {month:'long', year:'numeric'});
  
  const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  
  for(let i=0; i<firstDay; i++) grid.appendChild(Object.assign(document.createElement('div'), {className:'day-cell', style:'opacity:0'}));
  for(let d=1; d<=daysInMonth; d++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if(new Date().getDate() === d && new Date().getMonth() === now.getMonth()) cell.classList.add('today');
    cell.innerHTML = `<div class="day-num">${d}</div>`;
    grid.appendChild(cell);
  }
}

let slideIdx = 0;
function nextSlide() {
  const ss = document.getElementById('slideshow');
  const allImgs = [...state.images, ...state.localImages];
  if(allImgs.length === 0) return;
  
  const slide = document.createElement('div');
  slide.className = `slide anim-${state.anim}`;
  slide.style.backgroundImage = `url('${allImgs[slideIdx]}')`;
  ss.appendChild(slide);
  
  setTimeout(() => {
    slide.classList.add('active');
    if(ss.children.length > 2) ss.removeChild(ss.children[0]);
  }, 100);
  
  slideIdx = (slideIdx + 1) % allImgs.length;
}

document.getElementById('filePicker').onchange = (e) => {
  const files = Array.from(e.target.files);
  state.localImages = files.map(file => URL.createObjectURL(file));
  alert(files.length + " Bilder geladen.");
};

document.getElementById('saveBtn').onclick = () => {
  state.city = document.getElementById('cityInput').value || 'Bonn';
  state.theme = document.getElementById('themeSelect').value;
  state.anim = document.getElementById('animSelect').value;
  state.images = document.getElementById('imgList').value.split('\n').filter(i => i.trim());
  
  localStorage.setItem('hub_v_safe', JSON.stringify(state));
  applyLiveChanges();
  document.getElementById('settingsPanel').classList.remove('active');
};

document.getElementById('openSettings').onclick = () => document.getElementById('settingsPanel').classList.add('active');
document.getElementById('closeSettings').onclick = () => document.getElementById('settingsPanel').classList.remove('active');

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
  document.getElementById('dateFull').textContent = now.toLocaleDateString('de-DE', {weekday:'long', day:'numeric', month:'long'});
}

// Initial Load
const saved = localStorage.getItem('hub_v_safe');
if(saved) {
  const parsed = JSON.parse(saved);
  state = {...state, ...parsed};
  document.getElementById('themeSelect').value = state.theme;
  document.getElementById('animSelect').value = state.anim;
  document.getElementById('cityInput').value = state.city;
}

setInterval(updateClock, 1000);
updateClock();
applyLiveChanges();
setInterval(nextSlide, 15000);
nextSlide();
</script>
</body>
</html>

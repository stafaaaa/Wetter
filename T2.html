<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>SmartHub - Kühlschrank OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
/* 10 THEMEN DEFINITIONEN */
:root { --bg: #000; --surface: #111; --text: #fff; --accent: #ef4444; --glass: rgba(255,255,255,0.1); }
[data-theme="oled"] { --bg: #000; --surface: #000; --accent: #3b82f6; }
[data-theme="glass"] { --bg: #1a1c2c; --surface: rgba(255,255,255,0.1); --glass: rgba(255,255,255,0.15); --accent: #00d2ff; }
[data-theme="nordic"] { --bg: #2e3440; --surface: #3b4252; --accent: #88c0d0; }
[data-theme="cyber"] { --bg: #050505; --surface: #000; --accent: #f0f; --text: #0ff; }
[data-theme="forest"] { --bg: #0f1a14; --surface: #1a2e23; --accent: #4ade80; }
[data-theme="sunset"] { --bg: #2d1b2d; --surface: #432a43; --accent: #fb923c; }
[data-theme="ocean"] { --bg: #0f172a; --surface: #1e293b; --accent: #38bdf8; }
[data-theme="minimal"] { --bg: #f4f4f5; --surface: #fff; --text: #09090b; --accent: #ef4444; --glass: rgba(0,0,0,0.05); }
[data-theme="crimson"] { --bg: #1a0505; --surface: #2d0a0a; --accent: #f87171; }
[data-theme="royal"] { --bg: #1e1b4b; --surface: #312e81; --accent: #a5b4fc; }

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; transition: all 0.5s ease; }

.app { display: grid; grid-template-columns: 42fr 58fr; height: 100dvh; gap: 20px; padding: 20px; }
@media (max-width: 1100px) { .app { grid-template-columns: 1fr; grid-template-rows: 40vh 1fr; } }

.panel { border-radius: 32px; overflow: hidden; position: relative; background: var(--surface); border: 1px solid var(--glass); }

/* SLIDESHOW */
.slideshow { position: absolute; inset: 0; z-index: 0; }
.slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease; }
.slide.active { opacity: 1; }
.vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.85)); z-index: 1; }

.overlay-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; pointer-events: none; }
.time { font-family: "JetBrains Mono", monospace; font-size: clamp(80px, 10vw, 160px); font-weight: 700; letter-spacing: -6px; pointer-events: auto; line-height: 0.9; }

/* WETTER BOX */
.weather-card { display: flex; align-items: center; gap: 25px; pointer-events: auto; background: var(--glass); padding: 20px 30px; border-radius: 25px; width: fit-content; backdrop-filter: blur(15px); }
.weather-icon svg { width: 70px; height: 70px; }

/* KALENDER */
.cal-container { display: flex; flex-direction: column; height: 100%; padding: 25px; }
.cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.view-btn { padding: 15px 25px; border-radius: 15px; border: none; background: var(--glass); color: var(--text); cursor: pointer; font-weight: 700; pointer-events: auto; font-size: 16px; }
.view-btn.active { background: var(--accent); color: white; }

.grid-body { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; gap: 5px; background: var(--glass); border-radius: 20px; overflow: hidden; }
.day-cell { background: var(--surface); padding: 15px; cursor: pointer; display: flex; flex-direction: column; position: relative; }
.day-num { font-size: 28px; font-weight: 700; }
.day-cell.today { border: 3px solid var(--accent); background: rgba(239, 68, 68, 0.05); }

/* SETTINGS SIDEBAR */
.settings-panel { position: fixed; top: 0; right: 0; width: 450px; height: 100%; background: #000; z-index: 100; transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px; border-left: 1px solid var(--glass); overflow-y: auto; }
.settings-panel.active { transform: translateX(0); }
.input-field { width: 100%; background: #111; border: 1px solid var(--glass); color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 16px; }
label { display: block; margin-bottom: 8px; font-weight: 700; opacity: 0.7; font-size: 14px; }
</style>
</head>
<body data-theme="oled">

<div class="app">
  <div class="panel left">
    <button class="view-btn" style="position:absolute; top:30px; left:30px; z-index:10; border-radius: 50%; width: 60px; height: 60px; display: grid; place-items: center;" id="openSettings">⚙️</button>
    <div class="slideshow" id="slideshow"></div>
    <div class="vignette"></div>
    <div class="overlay-content">
      <div class="time-box">
        <div id="clock" class="time">00:00</div>
        <div id="dateFull" style="font-size: 32px; font-weight: 700; color: var(--accent); margin-top: 10px;">Datum</div>
      </div>
      <div class="weather-card" id="weatherDisplay">
        <div id="weatherIcon" class="weather-icon"></div>
        <div>
          <div id="mainTemp" style="font-size: 55px; font-weight: 700; line-height: 1;">--°</div>
          <div id="weatherLoc" style="font-size: 20px; font-weight: 700; opacity: 0.8;">Lade Wetter...</div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel right">
    <div class="cal-container">
      <div class="cal-nav">
        <h2 id="monthTitle" style="font-size: 32px;">Monat</h2>
        <div style="display:flex; gap:10px;">
          <button class="view-btn active" id="btnMonth">Monat</button>
          <button class="view-btn" id="btnWeek">Woche</button>
        </div>
      </div>
      <div class="grid-body" id="calendarGrid"></div>
    </div>
  </div>
</div>

<div class="settings-panel" id="settingsPanel">
  <h2 style="font-size: 28px;">SmartHub Setup</h2><br>
  
  <label>Design-Thema</label>
  <select class="input-field" id="themeSelect">
    <option value="oled">OLED Deep Black</option>
    <option value="glass">Frosted Glass</option>
    <option value="nordic">Nordic Dark</option>
    <option value="cyber">Cyberpunk Neon</option>
    <option value="forest">Emerald Forest</option>
    <option value="sunset">Sunset Purple</option>
    <option value="ocean">Midnight Ocean</option>
    <option value="minimal">Minimal White</option>
    <option value="crimson">Crimson Red</option>
    <option value="royal">Royal Indigo</option>
  </select>

  <label>Bilder vom Tablet hinzufügen</label>
  <input type="file" id="filePicker" class="input-field" multiple accept="image/*">

  <label>Cloud Bilder-Links (ein Link pro Zeile)</label>
  <textarea class="input-field" id="imgList" rows="4" placeholder="Beispiel: https://images.com/foto1.jpg"></textarea>

  <label>Wetter-Stadt</label>
  <input type="text" class="input-field" id="cityInput" placeholder="z.B. Bonn">

  <button class="view-btn active" style="width:100%; margin-top: 20px;" id="saveBtn">Änderungen Speichern</button><br><br>
  <button class="view-btn" style="width:100%" id="closeSettings">Abbrechen</button>
</div>

<script>
/** SMART CORE SYSTEM **/
let state = {
  theme: 'oled', city: 'Bonn',
  images: ['https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=2000'],
  localImages: [], events: []
};

const weatherIcons = {
  Clear: '<svg viewBox="0 0 24 24" fill="#fb923c"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.2 4.2l1.4 1.4m12.8 12.8l1.4 1.4M1 12h2m18 0h2M4.2 19.8l1.4-1.4m12.8-12.8l1.4-1.4"/></svg>',
  Clouds: '<svg viewBox="0 0 24 24" fill="#94a3b8"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-4-4.5-.8-3.7-4-6.5-7.5-6.5C7.2 3.5 4.5 6 4.1 9.1 1.8 9.6 0 11.6 0 14c0 2.8 2.2 5 5 5h12.5z"/></svg>',
  Rain: '<svg viewBox="0 0 24 24" fill="#38bdf8"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-4-4.5-.8-3.7-4-6.5-7.5-6.5C7.2 3.5 4.5 6 4.1 9.1 1.8 9.6 0 11.6 0 14c0 2.8 2.2 5 5 5h12.5z"/><path d="M8 20v3M12 21v3M16 20v3" stroke="#38bdf8" stroke-width="2"/></svg>',
  Snow: '<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2v20M2 12h20M5 5l14 14M19 5L5 14" stroke="#fff" stroke-width="2"/></svg>'
};

// LIVE UPDATE FUNKTION (Kein Reload nötig)
function applyChanges() {
  document.body.dataset.theme = state.theme;
  document.getElementById('weatherLoc').textContent = state.city;
  fetchWeather();
  renderCalendar();
}

async function fetchWeather() {
  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${state.city}&appid=769c5861cd255a3982bafb1680abf194&units=metric&lang=de`);
    const data = await res.json();
    if(data.main) {
      document.getElementById('mainTemp').textContent = Math.round(data.main.temp) + '°';
      document.getElementById('weatherLoc').textContent = data.name;
      document.getElementById('weatherIcon').innerHTML = weatherIcons[data.weather[0].main] || weatherIcons.Clouds;
    }
  } catch (e) { console.error("Wetter konnte nicht geladen werden."); }
}

function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  const now = new Date();
  document.getElementById('monthTitle').textContent = now.toLocaleDateString('de-DE', {month:'long', year:'numeric'});
  
  const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  
  for(let i=0; i<firstDay; i++) grid.appendChild(Object.assign(document.createElement('div'), {className:'day-cell', style:'opacity:0'}));
  for(let d=1; d<=daysInMonth; d++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if(now.getDate() === d) cell.classList.add('today');
    cell.innerHTML = `<div class="day-num">${d}</div>`;
    grid.appendChild(cell);
  }
}

let slideIdx = 0;
function nextSlide() {
  const ss = document.getElementById('slideshow');
  const allImgs = [...state.images, ...state.localImages];
  if(allImgs.length === 0) return;
  
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.style.backgroundImage = `url('${allImgs[slideIdx]}')`;
  ss.appendChild(slide);
  
  setTimeout(() => {
    slide.classList.add('active');
    if(ss.children.length > 2) ss.removeChild(ss.children[0]);
  }, 100);
  
  slideIdx = (slideIdx + 1) % allImgs.length;
}

// BILDER VOM TABLET LADEN
document.getElementById('filePicker').onchange = (e) => {
  const files = Array.from(e.target.files);
  // Speicher-schonend: Wir erzeugen nur Objekt-URLs
  state.localImages = files.map(file => URL.createObjectURL(file));
  alert(files.length + " Bilder vom Tablet geladen.");
};

document.getElementById('saveBtn').onclick = () => {
  state.city = document.getElementById('cityInput').value || 'Bonn';
  state.theme = document.getElementById('themeSelect').value;
  state.images = document.getElementById('imgList').value.split('\n').filter(i => i.trim());
  
  localStorage.setItem('hub_v_safe', JSON.stringify(state));
  applyChanges();
  document.getElementById('settingsPanel').classList.remove('active');
};

document.getElementById('openSettings').onclick = () => {
  document.getElementById('cityInput').value = state.city;
  document.getElementById('imgList').value = state.images.join('\n');
  document.getElementById('settingsPanel').classList.add('active');
};

document.getElementById('closeSettings').onclick = () => document.getElementById('settingsPanel').classList.remove('active');

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
  document.getElementById('dateFull').textContent = now.toLocaleDateString('de-DE', {weekday:'long', day:'numeric', month:'long'});
}

// START
const saved = localStorage.getItem('hub_v_safe');
if(saved) {
    const parsed = JSON.parse(saved);
    state.theme = parsed.theme;
    state.city = parsed.city;
    state.images = parsed.images;
}

setInterval(updateClock, 1000);
updateClock();
applyChanges();
setInterval(nextSlide, 15000);
nextSlide();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>SmartHub Pro - Calendar Sync</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root { --bg: #000; --surface: #111; --text: #fff; --accent: #ef4444; --glass: rgba(255,255,255,0.1); }
[data-theme="oled"] { --bg: #000; --surface: #000; --accent: #3b82f6; }
[data-theme="glass"] { --bg: #1a1c2c; --surface: rgba(255,255,255,0.1); --glass: rgba(255,255,255,0.15); --accent: #00d2ff; }
/* ... weitere Themes aus T2_2.html ... */

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

.app { display: grid; grid-template-columns: 42fr 58fr; height: 100dvh; gap: 20px; padding: 20px; }
@media (max-width: 1100px) { .app { grid-template-columns: 1fr; grid-template-rows: 40vh 1fr; } }

.panel { border-radius: 32px; overflow: hidden; position: relative; background: var(--surface); border: 1px solid var(--glass); }

/* SLIDESHOW */
.slideshow { position: absolute; inset: 0; z-index: 0; }
.slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease; }
.slide.active { opacity: 1; }
.vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.85)); z-index: 1; }

/* KALENDER OPTIMIERUNG */
.cal-container { display: flex; flex-direction: column; height: 100%; padding: 25px; }
.cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.grid-body { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; gap: 4px; background: var(--glass); border-radius: 20px; overflow: hidden; }

.day-cell { background: var(--surface); padding: 10px; cursor: pointer; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.day-num { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
.day-cell.today { border: 2px solid var(--accent); }

/* BUNTE BALKEN */
.ev-bar { 
    font-size: 12px; padding: 4px 8px; border-radius: 6px; margin-bottom: 3px; 
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
    color: white; font-weight: 700; border-left: 4px solid rgba(0,0,0,0.2);
}

/* SETTINGS & MODAL */
.settings-panel { position: fixed; top: 0; right: 0; width: 450px; height: 100%; background: #000; z-index: 100; transform: translateX(100%); transition: 0.4s ease; padding: 40px; border-left: 1px solid var(--glass); overflow-y: auto; }
.settings-panel.active { transform: translateX(0); }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; place-items: center; padding: 20px; }
.modal.active { display: grid; }
.modal-content { background: var(--surface); padding: 40px; border-radius: 30px; width: 100%; max-width: 550px; border: 1px solid var(--glass); }

.input-field { width: 100%; background: #111; border: 1px solid var(--glass); color: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
.view-btn { padding: 12px 20px; border-radius: 12px; border: none; background: var(--glass); color: var(--text); cursor: pointer; font-weight: 700; pointer-events: auto; }
.view-btn.active { background: var(--accent); color: white; }
</style>
</head>
<body>

<div class="app">
    <!-- LINKS: Time & Weather -->
    <div class="panel left">
        <button class="view-btn" style="position:absolute; top:20px; left:20px; z-index:10;" id="openSettings">⚙️</button>
        <div class="slideshow" id="slideshow"></div>
        <div class="vignette"></div>
        <div class="overlay-content">
            <div>
                <div id="clock" style="font-family:'JetBrains Mono'; font-size: 120px; font-weight:700; letter-spacing:-6px; pointer-events:auto;">00:00</div>
                <div id="dateFull" style="font-size: 28px; font-weight:700; color:var(--accent);">Datum</div>
            </div>
            <div id="weatherBox" style="pointer-events:auto; background:var(--glass); padding:20px; border-radius:20px; width:fit-content;">
                <h1 id="mainTemp" style="font-size:50px;">--°</h1>
                <p id="weatherLoc">Lade...</p>
            </div>
        </div>
    </div>

    <!-- RECHTS: Kalender -->
    <div class="panel right">
        <div class="cal-container">
            <div class="cal-nav">
                <h2 id="monthTitle" style="font-size:28px;">Monat</h2>
                <div style="display:flex; gap:10px;">
                    <button class="view-btn active" id="btnMonth">Monat</button>
                    <button class="view-btn" id="btnWeek">Woche</button>
                </div>
            </div>
            <div class="grid-body" id="calendarGrid"></div>
            <div id="weekView" style="display:none; flex-direction:column; gap:10px; overflow-y:auto;"></div>
        </div>
    </div>
</div>

<!-- SETTINGS -->
<div class="settings-panel" id="settingsPanel">
    <h2>Kalender & Display</h2><br>
    <label>Google Kalender ICS-URL</label>
    <input type="text" class="input-field" id="calUrl" placeholder="https://calendar.google.com/.../basic.ics">
    <label>Wetter-Stadt</label>
    <input type="text" class="input-field" id="cityInput">
    <label>Cloud Bilder-URLs</label>
    <textarea class="input-field" id="imgList" rows="4"></textarea>
    <button class="view-btn active" style="width:100%" id="saveBtn">Speichern</button><br><br>
    <button class="view-btn" style="width:100%" id="closeSettings">Schließen</button>
</div>

<!-- DETAIL MODAL -->
<div class="modal" id="eventModal">
    <div class="modal-content">
        <h2 id="mTitle" style="font-size:32px; margin-bottom:15px;">Termin</h2>
        <div id="mDetails" style="font-size:18px; line-height:1.6; opacity:0.8;"></div>
        <button class="view-btn active" style="margin-top:30px; width:100%" onclick="document.getElementById('eventModal').classList.remove('active')">OK</button>
    </div>
</div>

<script>
let state = {
    date: new Date(), view: 'month', city: 'Bonn',
    calUrl: '', images: [], events: []
};

// FARB-LOGIK FÜR BALKEN
function getEventColor(title) {
    const t = title.toLowerCase();
    if(t.includes('müll') || t.includes('abfall')) return '#4ade80'; // Grün
    if(t.includes('arbeit') || t.includes('job')) return '#3b82f6'; // Blau
    if(t.includes('geburtstag')) return '#f472b6'; // Pink
    if(t.includes('termin') || t.includes('arzt')) return '#fb923c'; // Orange
    return '#ef4444'; // Standard Rot
}

// ICS PARSER MIT PROXY
async function fetchCalendar() {
    if(!state.calUrl) return;
    try {
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(state.calUrl);
        const res = await fetch(proxyUrl);
        const icsData = await res.text();
        parseICS(icsData);
    } catch (e) { console.error("Kalender Fehler", e); }
}

function parseICS(data) {
    const evs = [];
    const lines = data.split(/\r?\n/);
    let cur = null;
    lines.forEach(l => {
        if(l.startsWith('BEGIN:VEVENT')) cur = {};
        else if(l.startsWith('SUMMARY:')) cur.title = l.slice(8);
        else if(l.startsWith('DESCRIPTION:')) cur.desc = l.slice(12).replace(/\\n/g, '<br>');
        else if(l.startsWith('LOCATION:')) cur.loc = l.slice(9);
        else if(l.startsWith('DTSTART')) {
            const m = l.match(/\d{8}/);
            if(m) cur.date = `${m[0].slice(0,4)}-${m[0].slice(4,6)}-${m[0].slice(6,8)}`;
        }
        else if(l.startsWith('END:VEVENT')) { if(cur.date) evs.push(cur); cur = null; }
    });
    state.events = evs;
    renderAll();
}

function renderMonth() {
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    const now = state.date;
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
    const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    
    for(let i=0; i<firstDay; i++) grid.appendChild(Object.assign(document.createElement('div'), {className:'day-cell', style:'opacity:0'}));
    
    for(let d=1; d<=days; d++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        const dStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        
        cell.innerHTML = `<div class="day-num">${d}</div>`;
        state.events.filter(e => e.date === dStr).forEach(e => {
            const bar = document.createElement('div');
            bar.className = 'ev-bar';
            bar.style.backgroundColor = getEventColor(e.title);
            bar.textContent = e.title;
            bar.onclick = (event) => { event.stopPropagation(); showDetails(e); };
            cell.appendChild(bar);
        });
        grid.appendChild(cell);
    }
}

function showDetails(e) {
    document.getElementById('mTitle').textContent = e.title;
    document.getElementById('mDetails').innerHTML = `
        <p><b>Datum:</b> ${e.date}</p>
        <p><b>Ort:</b> ${e.loc || '-'}</p>
        <p><b>Info:</b> ${e.desc || '-'}</p>
    `;
    document.getElementById('eventModal').classList.add('active');
}

function applyLive() {
    renderMonth();
    fetchCalendar();
    document.getElementById('monthTitle').textContent = state.date.toLocaleDateString('de-DE', {month:'long', year:'numeric'});
}

document.getElementById('saveBtn').onclick = () => {
    state.calUrl = document.getElementById('calUrl').value;
    state.city = document.getElementById('cityInput').value;
    state.images = document.getElementById('imgList').value.split('\n').filter(i => i.trim());
    localStorage.setItem('hub_cal_safe', JSON.stringify(state));
    applyLive();
    document.getElementById('settingsPanel').classList.remove('active');
};

document.getElementById('openSettings').onclick = () => {
    document.getElementById('calUrl').value = state.calUrl;
    document.getElementById('settingsPanel').classList.add('active');
};

// INIT
const saved = localStorage.getItem('hub_cal_safe');
if(saved) state = {...state, ...JSON.parse(saved)};
applyLive();
setInterval(() => {
    const n = new Date();
    document.getElementById('clock').textContent = n.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('dateFull').textContent = n.toLocaleDateString('de-DE', {weekday:'long', day:'numeric', month:'long'});
}, 1000);
</script>
</body>
</html>

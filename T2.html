<!DOCTYPE html>
<html lang="de" data-theme="oled">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHub Ultimate Dashboard</title>
    <style>
        /* --- 1. THEME-DEFINITIONEN --- */
        :root {
            --bg: #000000; --txt: #ffffff; --acc: #444; --card: rgba(255,255,255,0.05);
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        [data-theme="oled"]         { --bg: #000000; --txt: #ffffff; --acc: #222; }
        [data-theme="nordic"]       { --bg: #2e3440; --txt: #eceff4; --acc: #88c0d0; }
        [data-theme="cyberpunk"]    { --bg: #0d0208; --txt: #00ff41; --acc: #ff003c; }
        [data-theme="frosted"]      { --bg: #e2e8f0; --txt: #1a202c; --acc: #3182ce; --card: rgba(255,255,255,0.7); }
        [data-theme="emerald"]      { --bg: #064e3b; --txt: #ecfdf5; --acc: #10b981; }
        [data-theme="sunset"]       { --bg: #2d1b4e; --txt: #fee2e2; --acc: #f43f5e; }
        [data-theme="ocean"]        { --bg: #0c4a6e; --txt: #f0f9ff; --acc: #0ea5e9; }
        [data-theme="minimal"]      { --bg: #ffffff; --txt: #000000; --acc: #eeeeee; --card: #f9f9f9; }
        [data-theme="crimson"]      { --bg: #450a0a; --txt: #fef2f2; --acc: #ef4444; }
        [data-theme="indigo"]       { --bg: #1e1b4b; --txt: #e0e7ff; --acc: #6366f1; }

        /* --- 2. LAYOUT-STRUKTUR --- */
        * { box-sizing: border-box; }
        body {
            margin: 0; background: var(--bg); color: var(--txt);
            font-family: var(--font-main); transition: background 0.8s ease;
            height: 100vh; overflow: hidden;
            display: grid; grid-template-columns: 42vw 58vw;
        }

        .left-panel { padding: 2.5rem; display: flex; flex-direction: column; justify-content: space-between; }
        .right-panel { 
            background: var(--card); margin: 1rem; border-radius: 2rem; 
            padding: 2rem; overflow-y: auto; backdrop-filter: blur(10px);
        }

        /* --- 3. TYPOGRAFIE (Fernlesbarkeit) --- */
        .clock { font-size: 11rem; font-weight: 900; line-height: 0.9; margin-bottom: 1rem; }
        .date { font-size: 2.5rem; opacity: 0.8; margin-bottom: 2rem; }
        
        .weather-main { display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .temp-big { font-size: 6rem; font-weight: 700; }
        .weather-icon { width: 120px; height: 120px; }
        
        .forecast-bar { display: flex; justify-content: space-between; margin-bottom: 2rem; }
        .forecast-day { text-align: center; font-size: 1.2rem; }

        /* --- 4. MEDIA ENGINE & ANIMATIONEN --- */
        #media-viewport {
            flex-grow: 1; position: relative; border-radius: 1.5rem; overflow: hidden;
            background: #111; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .media-obj {
            position: absolute; width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: opacity 1s ease-in-out;
        }
        .media-active { opacity: 1; }

        /* Animationen */
        .anim-zoom-in { transform: scale(1.2); transition: transform 10s linear, opacity 1s; }
        .anim-slide-links { transform: translateX(-100%); }

        /* --- 5. KALENDER-STYLING --- */
        .event-bar {
            margin-bottom: 0.8rem; padding: 1.2rem; border-radius: 1rem;
            font-size: 1.4rem; font-weight: 600; border-left: 12px solid #ccc;
            background: rgba(255,255,255,0.05); cursor: pointer;
        }
        .cat-arbeit { border-color: #3b82f6; }
        .cat-muell { border-color: #22c55e; }
        .cat-geburtstag { border-color: #ec4899; }
        .cat-termin { border-color: #f59e0b; }

        /* Modal */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg); border: 2px solid var(--acc); padding: 2rem;
            z-index: 100; border-radius: 1rem; width: 50%;
        }
    </style>
</head>
<body>

<div class="left-panel">
    <div>
        <div id="clock" class="clock">00:00</div>
        <div id="date" class="date">Wird geladen...</div>
        
        <div class="weather-main">
            <div id="weather-svg"></div>
            <div id="temp" class="temp-big">--°C</div>
        </div>
        
        <div id="forecast" class="forecast-bar"></div>
    </div>

    <div id="media-viewport">
        <!-- Media (Bilder/Videos) werden hier injiziert -->
    </div>
</div>

<div class="right-panel">
    <h2 style="font-size: 3rem; margin-top: 0;">Kalender</h2>
    <div id="event-list"></div>
</div>

<div id="modal">
    <h2 id="m-title"></h2>
    <p id="m-time"></p>
    <p id="m-loc"></p>
    <button onclick="closeModal()">Schließen</button>
</div>

<script>
    /* --- KONFIGURATION (In LocalStorage änderbar) --- */
    const config = {
        weatherCity: 'Berlin',
        weatherApi: 'YOUR_API_KEY_HERE', // OpenWeatherMap API Key
        icsUrl: '', // Deine Google Kalender ICS URL
        mediaUrls: [
            'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1000&q=80',
            'https://www.w3schools.com/html/mov_bbb.mp4' // Beispiel Video
        ],
        theme: localStorage.getItem('theme') || 'oled'
    };

    /* --- UHRZEIT --- */
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('date').textContent = now.toLocaleDateString('de-DE', {weekday: 'long', day: '2-digit', month: 'long'});
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* --- WETTER STATION --- */
    async function fetchWeather() {
        if(config.weatherApi === 'YOUR_API_KEY_HERE') return;
        const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${config.weatherCity}&units=metric&appid=${config.weatherApi}&lang=de`);
        const data = await res.json();
        
        // Aktuelles Wetter
        document.getElementById('temp').textContent = Math.round(data.list[0].main.temp) + "°C";
        // SVG Icon Logik hier... (vereinfacht)
        document.getElementById('weather-svg').innerHTML = `☀️`; 
    }

    /* --- ICS KALENDER PARSER --- */
    async function loadCalendar() {
        if(!config.icsUrl) return;
        const proxy = "https://corsproxy.io/?" + encodeURIComponent(config.icsUrl);
        try {
            const res = await fetch(proxy);
            const text = await res.text();
            parseICS(text);
        } catch (e) { console.error("Kalender Fehler", e); }
    }

    function parseICS(data) {
        const events = [];
        const vevents = data.split("BEGIN:VEVENT");
        vevents.shift(); // Header entfernen

        vevents.forEach(ev => {
            const title = ev.match(/SUMMARY:(.*)/)?.[1] || "Unbenannt";
            const start = ev.match(/DTSTART[:;](.*)/)?.[1] || "";
            const loc = ev.match(/LOCATION:(.*)/)?.[1] || "";
            
            let cat = 'termin';
            if(title.toLowerCase().includes('müll')) cat = 'muell';
            if(title.toLowerCase().includes('arbeit')) cat = 'arbeit';
            if(title.toLowerCase().includes('geburtstag')) cat = 'geburtstag';

            events.push({title, start, loc, cat});
        });
        renderEvents(events.slice(0, 8)); // Top 8 Termine
    }

    function renderEvents(events) {
        const container = document.getElementById('event-list');
        container.innerHTML = events.map(e => `
            <div class="event-bar cat-${e.cat}" onclick="showModal('${e.title}', '${e.loc}')">
                ${e.title}
            </div>
        `).join('');
    }

    /* --- HYBRIDE MEDIA ENGINE --- */
    let mediaIndex = 0;
    function rotateMedia() {
        const viewport = document.getElementById('media-viewport');
        const url = config.mediaUrls[mediaIndex];
        const isVideo = url.endsWith('.mp4') || url.endsWith('.mov');

        viewport.innerHTML = '';
        const el = document.createElement(isVideo ? 'video' : 'img');
        el.src = url;
        el.className = 'media-obj media-active anim-zoom-in';
        
        if(isVideo) {
            el.muted = true; el.autoplay = true;
            el.onended = () => { mediaIndex = (mediaIndex + 1) % config.mediaUrls.length; rotateMedia(); };
        } else {
            setTimeout(() => {
                mediaIndex = (mediaIndex + 1) % config.mediaUrls.length;
                rotateMedia();
            }, 8000); // 8 Sek pro Bild
        }
        viewport.appendChild(el);
    }

    /* --- MODAL --- */
    function showModal(title, loc) {
        document.getElementById('m-title').textContent = title;
        document.getElementById('m-loc').textContent = loc;
        document.getElementById('modal').style.display = 'block';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    /* --- INIT --- */
    document.documentElement.setAttribute('data-theme', config.theme);
    rotateMedia();
    fetchWeather();
    loadCalendar();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SmartHub Ultimate Pro - Resizable & Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        /* 1. THEMEN-SYSTEM (10 THEMES)[cite: 2] */
        :root { --bg: #000; --panel: #111; --text: #fff; --accent: #ef4444; --glass: rgba(255,255,255,0.1); --anim-speed: 1.5s; --split: 65vw; }
        [data-theme="oled"] { --bg: #000; --panel: #000; --accent: #3b82f6; }
        [data-theme="glass"] { --bg: #1a1c2c; --panel: rgba(255,255,255,0.12); --glass: rgba(255,255,255,0.15); --accent: #00d2ff; }
        [data-theme="nordic"] { --bg: #2e3440; --panel: #3b4252; --accent: #88c0d0; }
        [data-theme="cyber"] { --bg: #050505; --panel: #000; --accent: #f0f; --text: #0ff; }
        [data-theme="minimal"] { --bg: #f4f4f5; --panel: #fff; --text: #09090b; --accent: #ef4444; }
        [data-theme="forest"] { --bg: #0f1a14; --panel: #1a2e23; --accent: #4ade80; }
        [data-theme="sunset"] { --bg: #2d1b2d; --panel: #432a43; --accent: #fb923c; }
        [data-theme="ocean"] { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; }
        [data-theme="crimson"] { --bg: #1a0505; --panel: #2d0a0a; --accent: #f87171; }
        [data-theme="royal"] { --bg: #1e1b4b; --panel: #312e81; --accent: #a5b4fc; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; transition: background 0.5s ease; }

        /* DYNAMISCHES LAYOUT (RESIZABLE)[cite: 2] */
        .app-container { display: grid; grid-template-columns: var(--split) 1fr; height: 100dvh; gap: 15px; padding: 15px; }
        @media (max-width: 1100px) { .app-container { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; } }

        .panel { border-radius: 28px; overflow: hidden; position: relative; background: var(--panel); border: 1px solid var(--glass); }

        /* SLIDESHOW & 10 ANIMATIONEN[cite: 2] */
        .slideshow { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
        .media-item { position: absolute; inset: 0; opacity: 0; transition: all var(--anim-speed) cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; }
        .media-item.active { opacity: 1; }
        .media-content { width: 100%; height: 100%; object-fit: cover; }

        .anim-fade.active { opacity: 1; }
        .anim-zoom-in { transform: scale(1.5); } .anim-zoom-in.active { transform: scale(1); }
        .anim-zoom-out { transform: scale(0.5); } .anim-zoom-out.active { transform: scale(1); }
        .anim-slide-left { transform: translateX(100%); } .anim-slide-left.active { transform: translateX(0); }
        .anim-slide-right { transform: translateX(-100%); } .anim-slide-right.active { transform: translateX(0); }
        .anim-blur-in { filter: blur(30px); } .anim-blur-in.active { filter: blur(0); }
        .anim-rotate { transform: rotate(20deg) scale(1.3); } .anim-rotate.active { transform: rotate(0) scale(1); }
        .anim-flip { transform: rotateY(90deg); } .anim-flip.active { transform: rotateY(0); }
        .anim-bounce { transform: translateY(-100%); } .anim-bounce.active { transform: translateY(0); }
        .anim-ken-burns { transform: scale(1); } .anim-ken-burns.active { animation: kb 20s infinite alternate; }
        @keyframes kb { to { transform: scale(1.2) translate(-1%, -1%); } }

        /* KONTRAST FIX & OVERLAYS[cite: 2] */
        .vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.7) 100%); z-index: 1; pointer-events: none; }
        .overlay-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; pointer-events: none; }
        .time { font-family: "JetBrains Mono", monospace; font-size: clamp(40px, 6vw, 90px); font-weight: 700; text-shadow: 0 4px 15px rgba(0,0,0,0.8); pointer-events: auto; }
        .date { font-size: clamp(16px, 2vw, 24px); font-weight: 700; color: var(--accent); text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        /* WETTER & 5-TAGE[cite: 1, 2] */
        .weather-hub { pointer-events: auto; background: var(--glass); padding: 15px 20px; border-radius: 24px; backdrop-filter: blur(15px); border: 1px solid var(--glass); width: fit-content; }
        .temp-large { font-family: "JetBrains Mono", monospace; font-size: 40px; font-weight: 700; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
        .forecast-strip { display: flex; gap: 8px; margin-top: 10px; border-top: 1px solid var(--glass); padding-top: 10px; }
        .fc-day { text-align: center; font-size: 10px; }

        /* KALENDER MIT NAV & WOCHE[cite: 1, 2] */
        .cal-container { display: flex; flex-direction: column; height: 100%; padding: 15px; }
        .cal-nav { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; pointer-events: auto; }
        .nav-controls { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .nav-btn { background: var(--glass); border: none; color: var(--text); padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 11px; transition: 0.2s; }
        .nav-btn:hover { background: var(--accent); color: white; }
        .grid-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; padding-bottom: 5px; font-weight: 700; font-size: 11px; color: var(--accent); }
        .grid-body { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; gap: 3px; background: var(--glass); border-radius: 15px; overflow: hidden; padding: 3px; }
        .day-cell { background: var(--panel); padding: 5px; cursor: pointer; display: flex; flex-direction: column; min-height: 0; }
        .day-num { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
        .day-cell.today { border: 2px solid var(--accent); background: rgba(239, 68, 68, 0.1); }
        .day-cell.other { opacity: 0.2; }
        .ev-bar { font-size: 9px; padding: 2px 4px; border-radius: 4px; margin-bottom: 2px; color: white; font-weight: 700; overflow: hidden; white-space: nowrap; background: var(--accent); border-left: 2px solid rgba(0,0,0,0.3); }

        /* SETTINGS & MODAL[cite: 2] */
        .settings-pane { position: fixed; right: 0; top: 0; width: 400px; height: 100%; background: #000; z-index: 100; transform: translateX(100%); transition: 0.4s ease; padding: 30px; border-left: 1px solid var(--glass); overflow-y: auto; }
        .settings-pane.active { transform: translateX(0); }
        .input-field { width: 100%; background: #111; border: 1px solid var(--glass); color: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; outline: none; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; place-items: center; padding: 20px; transition: 0.3s; }
        .modal.active { display: grid; }
        .modal-box { background: var(--panel); padding: 35px; border-radius: 32px; border: 1px solid var(--glass); width: 100%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,1); }
    </style>
</head>
<body data-theme="oled">

<div class="app-container">
    <!-- LINKER PANEL (Slideshow Fokus)[cite: 2] -->
    <div class="panel left">
        <button id="btnSet" style="position:absolute; top:20px; left:20px; z-index:10; border:none; background:var(--glass); color:white; width:45px; height:45px; border-radius:50%; cursor:pointer; pointer-events:auto;">⚙️</button>
        <div class="slideshow" id="mediaHub"></div>
        <div class="vignette"></div>
        <div class="overlay-content">
            <div class="time-box">
                <div id="clock" class="time">00:00</div>
                <div id="date" class="date">Datum...</div>
            </div>
            <div class="weather-hub">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div id="wIcon" style="width:45px;"></div>
                    <div>
                        <div id="mainTemp" class="temp-large">--°</div>
                        <div id="wCity" style="font-weight:700; font-size:16px; opacity:0.9;">Ort...</div>
                    </div>
                </div>
                <div class="forecast-strip" id="forecastStrip"></div>
            </div>
        </div>
    </div>

    <!-- RECHTER PANEL (Kompakter Kalender)[cite: 2] -->
    <div class="panel right">
        <div class="cal-container">
            <div class="cal-nav">
                <div class="nav-controls">
                    <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
                    <h2 id="monthTitle" style="font-size:16px; font-weight:700;">Monat</h2>
                    <button class="nav-btn" onclick="changeMonth(1)">❯</button>
                </div>
                <div style="display:flex; gap:5px;">
                    <button class="nav-btn" style="flex:1" id="btnViewMonth" onclick="setView('month')">Monat</button>
                    <button class="nav-btn" style="flex:1" id="btnViewWeek" onclick="setView('week')">Woche</button>
                </div>
            </div>
            <div id="monthView" style="height: 100%; display: flex; flex-direction: column;">
                <div class="grid-header"><div>S</div><div>M</div><div>D</div><div>M</div><div>D</div><div>F</div><div>S</div></div>
                <div class="grid-body" id="calGrid"></div>
            </div>
            <div class="week-view-container" id="weekView" style="display:none; flex-direction:column; gap:8px; overflow-y:auto; flex:1;"></div>
        </div>
    </div>
</div>

<!-- SETTINGS SIDEBAR[cite: 2] -->
<div class="settings-pane" id="sidebar">
    <h3 style="margin-bottom:20px;">System-Einstellungen</h3>
    
    <label>Slideshow-Größe (Fokus %)</label>
    <input type="range" id="inSplit" min="30" max="85" value="65" class="input-field" style="padding: 0;">
    
    <label>Design Thema</label>
    <select class="input-field" id="inTheme">
        <option value="oled">OLED Deep Black</option><option value="glass">Frosted Glass</option><option value="nordic">Nordic Dark</option>
        <option value="cyber">Cyberpunk Neon</option><option value="minimal">Minimal White</option><option value="forest">Emerald Forest</option>
        <option value="sunset">Sunset Purple</option><option value="ocean">Midnight Ocean</option><option value="crimson">Crimson Red</option>
        <option value="royal">Royal Indigo</option>
    </select>
    
    <label>Animation</label>
    <select class="input-field" id="inAnim">
        <option value="fade">Fade</option><option value="zoom-in">Zoom In</option><option value="zoom-out">Zoom Out</option>
        <option value="slide-left">Slide L</option><option value="slide-right">Slide R</option><option value="blur-in">Blur</option>
        <option value="rotate">Rotate</option><option value="flip">Flip</option><option value="ken-burns">Ken Burns</option><option value="bounce">Bounce</option>
    </select>
    
    <label>Wetter Stadt</label><input type="text" class="input-field" id="inCity">
    <label>Kalender ICS</label><input type="text" class="input-field" id="inCal">
    <label>Bild-Links</label><textarea class="input-field" id="inMedia" rows="2"></textarea>
    <label>Ordner/Alben Upload</label><input type="file" id="inLocal" class="input-field" multiple webkitdirectory directory>
    
    <button class="input-field" style="background:var(--accent); font-weight:700; border:none; color:white; cursor:pointer;" id="btnSave">SPEICHERN</button>
    <button class="input-field" id="btnClose" style="cursor:pointer;">Abbrechen</button>
</div>

<!-- TERMIN DETAILS MODAL[cite: 2] -->
<div class="modal" id="eventModal">
    <div class="modal-box">
        <h2 id="mTitle" style="font-size:28px; margin-bottom:15px; border-bottom: 2px solid var(--accent); padding-bottom: 10px;">Termin</h2>
        <p id="mDate" style="color:var(--accent); font-weight:700; margin-bottom:15px; font-size:18px;"></p>
        <div id="mDesc" style="font-size:16px; line-height:1.6; opacity:0.8; max-height: 250px; overflow-y: auto; padding-right: 5px;"></div>
        <button class="input-field" style="margin-top:30px; background:var(--accent); border:none; color:white; cursor:pointer;" onclick="document.getElementById('eventModal').classList.remove('active')">Schließen</button>
    </div>
</div>

<script>
/** STATE MANAGEMENT[cite: 2] **/
let state = {
    theme: 'oled', city: 'Düsseldorf', calUrl: '', anim: 'fade', split: 65,
    media: ['https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1500'],
    localMedia: [], events: [], date: new Date(), view: 'month'
};

const weatherIcons = {
    Clear: '<svg viewBox="0 0 24 24" fill="#fb923c"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.2 4.2l1.4 1.4m12.8 12.8l1.4 1.4M1 12h2m18 0h2M4.2 19.8l1.4-1.4m12.8-12.8l1.4-1.4" stroke="#fb923c" stroke-width="2"/></svg>',
    Clouds: '<svg viewBox="0 0 24 24" fill="#94a3b8"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-4-4.5-.8-3.7-4-6.5-7.5-6.5C7.2 3.5 4.5 6 4.1 9.1 1.8 9.6 0 11.6 0 14c0 2.8 2.2 5 5 5h12.5z"/></svg>',
    Rain: '<svg viewBox="0 0 24 24" fill="#38bdf8"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-4-4.5-.8-3.7-4-6.5-7.5-6.5C7.2 3.5 4.5 6 4.1 9.1 1.8 9.6 0 11.6 0 14c0 2.8 2.2 5 5 5h12.5z"/><path d="M8 20l-1 2M12 21l-1 2" stroke="#38bdf8" stroke-width="2"/></svg>'
};

/** KALENDER LOGIK[cite: 1, 2] **/
function changeMonth(delta) { state.date.setMonth(state.date.getMonth() + delta); renderCal(); }
function setView(view) { 
    state.view = view; 
    document.getElementById('btnViewMonth').classList.toggle('active', view === 'month');
    document.getElementById('btnViewWeek').classList.toggle('active', view === 'week');
    renderCal(); 
}

async function loadCal() {
    if(!state.calUrl) return;
    try {
        const proxy = "https://corsproxy.io/?" + encodeURIComponent(state.calUrl);
        const res = await fetch(proxy);
        const text = await res.text();
        const evs = []; const lines = text.split('\n'); let cur = null;
        lines.forEach(l => {
            if(l.startsWith('BEGIN:VEVENT')) cur = {};
            if(l.startsWith('SUMMARY:')) cur.title = l.slice(8).trim();
            if(l.startsWith('DESCRIPTION:')) cur.desc = l.slice(12).trim().replace(/\\n/g, '<br>');
            if(l.startsWith('DTSTART')) {
                const m = l.match(/\d{8}/);
                if(m) cur.date = `${m[0].slice(0,4)}-${m[0].slice(4,6)}-${m[0].slice(6,8)}`;
            }
            if(l.startsWith('END:VEVENT') && cur?.date) { evs.push(cur); cur = null; }
        });
        state.events = evs; renderCal();
    } catch(e) {}
}

function renderCal() {
    const grid = document.getElementById('calGrid');
    const week = document.getElementById('weekView');
    const monthContainer = document.getElementById('monthView');
    document.getElementById('monthTitle').textContent = state.date.toLocaleDateString('de-DE', {month:'short', year:'numeric'});

    if(state.view === 'month') {
        monthContainer.style.display = 'flex'; week.style.display = 'none'; grid.innerHTML = '';
        const firstDay = new Date(state.date.getFullYear(), state.date.getMonth(), 1).getDay();
        const daysInMonth = new Date(state.date.getFullYear(), state.date.getMonth() + 1, 0).getDate();
        for(let i=0; i<firstDay; i++) grid.appendChild(Object.assign(document.createElement('div'), {className:'day-cell other'}));
        for(let d=1; d<=daysInMonth; d++) {
            const cell = document.createElement('div'); cell.className = 'day-cell';
            const dStr = `${state.date.getFullYear()}-${String(state.date.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            if(new Date().toISOString().split('T')[0] === dStr) cell.classList.add('today');
            cell.innerHTML = `<div class="day-num">${d}</div>`;
            state.events.filter(e => e.date === dStr).slice(0,2).forEach(e => {
                const bar = document.createElement('div'); bar.className = 'ev-bar'; bar.textContent = e.title;
                bar.onclick = (ev) => {
                    ev.stopPropagation();
                    document.getElementById('mTitle').textContent = e.title;
                    document.getElementById('mDate').textContent = new Date(e.date).toLocaleDateString('de-DE', {weekday:'long', day:'numeric', month:'long'});
                    document.getElementById('mDesc').innerHTML = e.desc || "Keine Beschreibung verfügbar.";
                    document.getElementById('eventModal').classList.add('active');
                };
                cell.appendChild(bar);
            });
            grid.appendChild(cell);
        }
    } else {
        monthContainer.style.display = 'none'; week.style.display = 'flex'; week.innerHTML = '';
        let start = new Date(state.date); start.setDate(state.date.getDate() - state.date.getDay());
        for(let i=0; i<7; i++) {
            let d = new Date(start); d.setDate(start.getDate() + i);
            const dStr = d.toISOString().split('T')[0];
            const row = document.createElement('div'); row.style.background='var(--panel)'; row.style.padding='10px'; row.style.borderRadius='12px';
            const evs = state.events.filter(e => e.date === dStr).map(e => `<div class="ev-bar">${e.title}</div>`).join('');
            row.innerHTML = `<div style="font-weight:700; font-size:12px; color:var(--accent)">${d.toLocaleDateString('de-DE',{weekday:'short', day:'numeric'})}</div><div style="margin-top:5px">${evs || '-'}</div>`;
            week.appendChild(row);
        }
    }
}

/** MEDIA & WETTER[cite: 1, 2] **/
let mIdx = 0;
function playMedia() {
    const hub = document.getElementById('mediaHub');
    const pool = [...state.media, ...state.localMedia];
    if(!pool.length) return;
    const wrap = document.createElement('div'); wrap.className = `media-item active anim-${state.anim}`;
    const img = document.createElement('img'); img.src = pool[mIdx % pool.length]; img.className = 'media-content';
    wrap.appendChild(img); hub.appendChild(wrap);
    setTimeout(() => { wrap.classList.add('active'); if(hub.children.length > 2) hub.removeChild(hub.children[0]); }, 100);
    mIdx++;
}

async function updateWeather() {
    try {
        const apiKey = '769c5861cd255a3982bafb1680abf194';
        const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${state.city}&appid=${apiKey}&units=metric&lang=de`);
        const data = await res.json();
        document.getElementById('mainTemp').textContent = Math.round(data.list[0].main.temp) + '°';
        document.getElementById('wCity').textContent = data.city.name;
        document.getElementById('wIcon').innerHTML = weatherIcons[data.list[0].weather[0].main] || weatherIcons.Clouds;
        const strip = document.getElementById('forecastStrip'); strip.innerHTML = '';
        data.list.filter(i => i.dt_txt.includes("12:00:00")).slice(0,5).forEach(day => {
            const d = new Date(day.dt * 1000);
            strip.innerHTML += `<div class="fc-day"><div>${d.toLocaleDateString('de-DE',{weekday:'short'})}</div><div style="width:18px;height:18px;margin:2px auto">${weatherIcons[day.weather[0].main]||weatherIcons.Clouds}</div><div>${Math.round(day.main.temp)}°</div></div>`;
        });
    } catch(e) {}
}

/** INIT & SAVE[cite: 2] **/
function init() {
    const saved = localStorage.getItem('hub_master_v9');
    if(saved) state = {...state, ...JSON.parse(saved), date: new Date()};
    
    document.documentElement.style.setProperty('--split', state.split + 'vw');
    document.getElementById('inSplit').value = state.split;

    document.getElementById('btnSet').onclick = () => document.getElementById('sidebar').classList.add('active');
    document.getElementById('btnClose').onclick = () => document.getElementById('sidebar').classList.remove('active');
    document.getElementById('btnSave').onclick = () => {
        state.split = document.getElementById('inSplit').value;
        state.city = document.getElementById('inCity').value; state.calUrl = document.getElementById('inCal').value;
        state.theme = document.getElementById('inTheme').value; state.anim = document.getElementById('inAnim').value;
        state.media = document.getElementById('inMedia').value.split('\n').filter(u=>u.trim());
        localStorage.setItem('hub_master_v9', JSON.stringify(state));
        document.documentElement.style.setProperty('--split', state.split + 'vw');
        document.body.dataset.theme = state.theme; updateWeather(); loadCal();
        document.getElementById('sidebar').classList.remove('active');
    };
    
    document.getElementById('inLocal').onchange = (e) => {
        state.localMedia = Array.from(e.target.files).filter(f => f.type.startsWith('image/')).map(f => URL.createObjectURL(f));
        mIdx = 0; playMedia();
    };

    document.body.dataset.theme = state.theme; renderCal(); loadCal(); updateWeather();
    setInterval(playMedia, 15000); playMedia();
    setInterval(() => {
        const n = new Date();
        document.getElementById('clock').textContent = n.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
        document.getElementById('date').textContent = n.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    }, 1000);
}
init();
</script>
</body>
</html>

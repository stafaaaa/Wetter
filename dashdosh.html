<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #1DB954;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            grid-template-rows: auto 1fr 200px;
            gap: 15px;
            height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Module-Basis */
        .module {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Uhr (Zentrum) */
        .header {
            grid-column: 1 / 4;
            text-align: center;
            padding: 10px;
        }
        #clock {
            font-size: 5.5rem;
            font-weight: 700;
            margin: 0;
            line-height: 1;
        }
        #date {
            font-size: 1.2rem;
            color: #888;
            margin-top: 5px;
        }

        /* Wetter */
        .weather-content { text-align: center; }
        #temp-now { font-size: 3.5rem; font-weight: bold; margin: 10px 0; }
        .forecast-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }

        /* Kalender & Spotify */
        iframe { width: 100%; height: 100%; border: none; border-radius: 8px; }

        /* Diashow */
        .slideshow {
            grid-column: 1 / 4;
            position: relative;
            padding: 0;
        }
        #slide-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.8s ease-in-out;
        }

        h3 { margin-top: 0; color: var(--accent); font-size: 1rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="header">
        <div id="clock">00:00</div>
        <div id="date">Lädt...</div>
    </header>

    <aside class="module">
        <h3>Wetter Düsseldorf</h3>
        <div class="weather-content">
            <div id="temp-now">--°C</div>
            <div id="forecast">
                </div>
        </div>
    </aside>

    <main class="module">
        <iframe src="https://calendar.google.com/calendar/embed?src=addressbook%23contacts%40group.v.calendar.google.com&ctz=Europe%2FBerlin"></iframe>
    </main>

    <aside class="module">
        <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGvYBM3M" allow="encrypted-media"></iframe>
    </aside>

    <footer class="module slideshow">
        <img id="slide-img" src="https://picsum.photos/id/1015/1200/400" alt="Slideshow">
    </footer>

    <script>
        // 1. UHR & DATUM (Europe/Berlin)
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const dateStr = now.toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
            
            document.getElementById('clock').textContent = timeStr;
            document.getElementById('date').textContent = dateStr;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. WETTER (Kostenlose API, Düsseldorf)
        async function fetchWeather() {
            try {
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=51.22&longitude=6.78&current_weather=true&daily=temperature_2m_max&timezone=Europe%2FBerlin");
                const data = await response = await res.json();
                
                document.getElementById('temp-now').textContent = Math.round(data.current_weather.temperature) + "°C";
                
                let forecastHTML = '';
                for(let i=1; i<=5; i++) {
                    const d = new Date(data.daily.time[i]);
                    const dayName = d.toLocaleDateString('de-DE', {weekday: 'short'});
                    forecastHTML += `
                        <div class="forecast-item">
                            <span>${dayName}</span>
                            <span>${Math.round(data.daily.temperature_2m_max[i])}°C</span>
                        </div>`;
                }
                document.getElementById('forecast').innerHTML = forecastHTML;
            } catch(e) { console.error("Wetter-Fehler", e); }
        }
        fetchWeather();

        // 3. DIASHOW (Automatischer Wechsel)
        const images = [
            "https://picsum.photos/id/1015/1200/400",
            "https://picsum.photos/id/1016/1200/400",
            "https://picsum.photos/id/1018/1200/400",
            "https://picsum.photos/id/1019/1200/400"
        ];
        let idx = 0;
        setInterval(() => {
            idx = (idx + 1) % images.length;
            const img = document.getElementById('slide-img');
            img.style.opacity = 0.2;
            setTimeout(() => {
                img.src = images[idx];
                img.style.opacity = 1;
            }, 800);
        }, 10000);
    </script>
</body>
</html>

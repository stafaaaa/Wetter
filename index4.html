<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
<style>
:root {
  --bg-image: none;
  --bg-gradient: linear-gradient(135deg, #e0e7ff, #c7d2fe);
  --tile-bg: rgba(255,255,255,0.3);
  --tile-opacity: 1;
  --tile-border-width: 1px;
  --tile-border-radius: 24px;
  --tile-shadow: 0 8px 32px rgba(0,0,0,0.1);
  --text-color: #1e293b;
  --accent: #3b82f6;
  --font-family: 'Segoe UI', system-ui, sans-serif;
  --backdrop: blur(12px);
  --tile-transform: none;
  --text-shadow: none;
  --icon-transform: none;
  --slide-anim: fade;
  --slide-duration: 1s;
  --slide-fit: contain;
  --tile-transform: none;
  --text-shadow: none;
  --icon-transform: none;
  --effect-strength: 2;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font-family);
  background: var(--bg-gradient);
  background-image: var(--bg-image);
  background-size: cover;
  background-position: center;
  color: var(--text-color);
  height: 100vh;
  overflow: hidden;
  transition: background-image 0.5s ease-in-out;
}

#dashboard { width: 100%; height: 100vh; position: relative; overflow: auto; }

.tile {
  position: absolute;
  background: var(--tile-bg);
  opacity: var(--tile-opacity);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  border: var(--tile-border-width) solid rgba(255,255,255,0.35);
  border-radius: var(--tile-border-radius);
  box-shadow: var(--tile-shadow);
  display: flex;
  flex-direction: column;
  transition: box-shadow 0.3s, opacity 0.3s, transform 0.3s;
  transform: var(--tile-transform);
  min-width: 80px;
  min-height: 80px;
  z-index: 1;
  overflow: hidden;
}

.tile.dragging, .tile.resizing {
  box-shadow: 0 20px 50px rgba(0,0,0,0.4) !important;
  z-index: 100;
}

.tile-header {
  padding: 8px 14px;
  cursor: grab;
  user-select: none;
  font-weight: 600;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  background: rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  gap: 8px;
  text-shadow: var(--text-shadow);
}

.tile-content {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  overflow-x: hidden;
}

.resize-handle {
  position: absolute;
  bottom: 0; right: 0;
  width: 22px; height: 22px;
  cursor: nwse-resize;
  background: linear-gradient(135deg, transparent 60%, rgba(0,0,0,0.15) 60%);
  border-radius: 0 0 var(--tile-border-radius) 0;
  z-index: 5;
}

.icon-tile-content {
  display: flex; align-items: center; justify-content: center;
  height: 100%; font-size: 2rem; cursor: pointer;
  color: var(--text-color);
  transform: var(--icon-transform);
  text-shadow: var(--text-shadow);
  transition: transform 0.3s;
}

.weather-now .temp { font-size: 3rem; font-weight: 700; }
.forecast-row { display: flex; gap: 6px; }
.forecast-day {
  flex:1; background: rgba(255,255,255,0.25); border-radius:16px;
  padding:6px; text-align:center; font-size:0.85rem;
}
.forecast-day.active { background: var(--accent); color: white; }
.hourly-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.hourly-item {
  min-width:60px; background: rgba(255,255,255,0.25);
  border-radius:12px; padding:4px; text-align:center; font-size:0.8rem;
}

.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; text-align: center; font-size:0.85rem; }
.day-header { font-weight:600; opacity:0.7; }
.day { position:relative; padding:4px 0; border-radius:8px; cursor:pointer; min-height: 32px; }
.day:hover { background: rgba(255,255,255,0.2); }
.day.today { background: var(--accent); color:white; font-weight:bold; }
.event-line { position:absolute; bottom:2px; left:10%; width:80%; height:3px; border-radius:2px; }
.event-details {
  background:rgba(0,0,0,0.85); color:white; padding:8px;
  border-radius:8px; font-size:0.8rem; margin-top:8px; display:none;
  max-height: 150px; overflow-y: auto;
}

/* SLIDESHOW mit Animationen */
.slideshow-container {
  position:relative; width:100%; aspect-ratio:16/9;
  background:rgba(0,0,0,0.05); border-radius:12px;
  overflow:hidden; margin-bottom:8px;
}
.slide-img {
  position: absolute;
  top: 0; left: 0;
  width:100%; height:100%;
  object-fit: var(--slide-fit);
  opacity: 0;
  transition: all var(--slide-duration) ease-in-out;
}
.slide-img.active { opacity: 1; }

/* Animation: fade */
.slide-anim-fade .slide-img { transform: none; }
.slide-anim-fade .slide-img:not(.active) { opacity: 0; }

/* Animation: slide-left */
.slide-anim-slide-left .slide-img { transform: translateX(100%); opacity: 1; }
.slide-anim-slide-left .slide-img.active { transform: translateX(0); }
.slide-anim-slide-left .slide-img.exit { transform: translateX(-100%); }

/* Animation: slide-up */
.slide-anim-slide-up .slide-img { transform: translateY(100%); opacity: 1; }
.slide-anim-slide-up .slide-img.active { transform: translateY(0); }
.slide-anim-slide-up .slide-img.exit { transform: translateY(-100%); }

/* Animation: zoom */
.slide-anim-zoom .slide-img { transform: scale(0.7); opacity: 0; }
.slide-anim-zoom .slide-img.active { transform: scale(1); opacity: 1; }
.slide-anim-zoom .slide-img.exit { transform: scale(1.3); opacity: 0; }

/* Animation: rotate */
.slide-anim-rotate .slide-img { transform: rotate(-15deg) scale(0.8); opacity: 0; }
.slide-anim-rotate .slide-img.active { transform: rotate(0) scale(1); opacity: 1; }
.slide-anim-rotate .slide-img.exit { transform: rotate(15deg) scale(0.8); opacity: 0; }

/* Animation: flip */
.slide-anim-flip .slide-img { transform: perspective(800px) rotateY(90deg); opacity: 0; }
.slide-anim-flip .slide-img.active { transform: perspective(800px) rotateY(0); opacity: 1; }
.slide-anim-flip .slide-img.exit { transform: perspective(800px) rotateY(-90deg); opacity: 0; }

/* Animation: blur */
.slide-anim-blur .slide-img { filter: blur(20px); opacity: 0; }
.slide-anim-blur .slide-img.active { filter: blur(0); opacity: 1; }
.slide-anim-blur .slide-img.exit { filter: blur(20px); opacity: 0; }

/* Animation: ken-burns (langsamer Zoom während angezeigt) */
.slide-anim-ken-burns .slide-img.active {
  animation: kenBurns 8s ease-in-out infinite alternate;
}
@keyframes kenBurns {
  from { transform: scale(1) translate(0, 0); }
  to { transform: scale(1.15) translate(-3%, -3%); }
}

/* Animation: split */
.slide-anim-split .slide-img { clip-path: inset(50% 0 50% 0); opacity: 0; }
.slide-anim-split .slide-img.active { clip-path: inset(0 0 0 0); opacity: 1; }

/* Animation: circle-reveal */
.slide-anim-circle-reveal .slide-img { clip-path: circle(0% at 50% 50%); opacity: 0; }
.slide-anim-circle-reveal .slide-img.active { clip-path: circle(100% at 50% 50%); opacity: 1; }

/* Animation: slide-diagonal */
.slide-anim-slide-diagonal .slide-img { transform: translate(100%, 100%) rotate(10deg); opacity: 0; }
.slide-anim-slide-diagonal .slide-img.active { transform: translate(0, 0) rotate(0); opacity: 1; }
.slide-anim-slide-diagonal .slide-img.exit { transform: translate(-100%, -100%) rotate(-10deg); opacity: 0; }

.slideshow-controls {
  position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
  display:flex; gap:10px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:20px;
  z-index: 10;
}
.slideshow-controls button {
  background:transparent; border:none; color:white; font-size:1.2rem; cursor:pointer;
  padding: 4px 8px;
}
.upload-area { display:flex; gap:8px; align-items:center; margin-top:4px; flex-wrap: wrap; }
.upload-btn {
  background: var(--accent); color:white; border:none;
  border-radius:12px; padding:6px 12px; cursor:pointer; font-size:0.85rem;
}
input[type="file"] { display:none; }

/* HINTERGRUND-SYNC OVERLAY für Slideshow */
.bg-slideshow-layer {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0;
  transition: opacity 1s ease-in-out;
}
.bg-slideshow-layer.active { opacity: 1; }

.settings-panel {
  position: fixed; top:0; right:-420px; width:400px; height:100vh;
  background: rgba(20,20,30,0.95); backdrop-filter: blur(20px); color:white;
  padding:20px; transition: right 0.3s ease; z-index: 10000; overflow-y:auto;
  border-left:1px solid rgba(255,255,255,0.2);
}
.settings-panel.open { right:0; }
.settings-panel label { display:block; margin:14px 0 4px; font-weight:600; font-size: 0.9rem; }
.settings-panel select, .settings-panel input[type="text"], .settings-panel input[type="number"], .settings-panel input[type="color"], .settings-panel input[type="range"] {
  width:100%; padding:8px; border-radius:8px; border:none;
  background:rgba(255,255,255,0.15); color:white; margin-bottom:8px;
}
.settings-panel input[type="range"] { padding: 0; }
.close-settings {
  position:absolute; top:10px; right:10px; background:none;
  border:none; color:white; font-size:1.5rem; cursor:pointer;
}
.range-row {
  display: flex; align-items: center; gap: 10px;
}
.range-row span {
  font-size: 0.85rem; min-width: 40px; text-align: right;
}
.error-msg {
  background: rgba(239,68,68,0.2);
  color: #fecaca;
  padding: 8px; border-radius: 8px;
  font-size: 0.85rem; margin-top: 8px;
}
</style>
</head>
<body>

<!-- Slideshow-Hintergrund mit 2 Layern für sanften Übergang -->
<div class="bg-slideshow-layer" id="bg-layer-1"></div>
<div class="bg-slideshow-layer" id="bg-layer-2"></div>

<div id="dashboard"></div>

<div class="settings-panel" id="settings-panel">
  <button class="close-settings" id="close-settings">&times;</button>
  <h2>Einstellungen</h2>
  
  <label>Thema</label>
  <select id="theme-select">
    <option value="default">Standard Hell</option>
    <option value="dark">Dunkel Elegant</option>
    <option value="neon">Neon Nächte</option>
    <option value="nordic">Nordic Frost</option>
    <option value="sunset">Sunset Vibes</option>
    <option value="forest">Forest Whisper</option>
    <option value="midnight">Midnight Blue</option>
    <option value="rose">Rose Gold</option>
    <option value="ocean">Ocean Breeze</option>
    <option value="minimal">Minimal Weiß</option>
  </select>
  
  <label>Hintergrund-Typ</label>
  <select id="bg-mode">
    <option value="theme">Theme-Farbverlauf</option>
    <option value="color">Eigene Farbe</option>
    <option value="url">Eigenes Bild (URL)</option>
    <option value="upload">Eigenes Bild (Upload)</option>
    <option value="slideshow">Slideshow-Bilder (synchron)</option>
  </select>
  
  <div id="bg-color-container" style="display:none;">
    <label>Hintergrundfarbe</label>
    <input type="color" id="bg-color" value="#e0e7ff">
  </div>
  <div id="bg-url-container" style="display:none;">
    <label>Bild-URL</label>
    <input type="text" id="bg-url" placeholder="https://...">
  </div>
  <div id="bg-upload-container" style="display:none;">
    <label>Hintergrundbild hochladen</label>
    <button id="bg-upload-trigger" class="upload-btn" style="width:100%;">Bild auswählen</button>
    <input type="file" id="bg-upload" accept="image/*">
  </div>
  
  <label>Kachel-Transparenz</label>
  <div class="range-row">
    <input type="range" id="tile-opacity" min="0" max="1" step="0.05" value="1">
    <span id="tile-opacity-value">100%</span>
  </div>
  
  <label>Schriftfarbe</label>
  <input type="color" id="font-color" value="#1e293b">
  
  <label>Schriftart</label>
  <select id="font-family-select">
    <option value="'Segoe UI', system-ui, sans-serif">Segoe UI</option>
    <option value="'Inter', sans-serif">Inter</option>
    <option value="'Roboto', sans-serif">Roboto</option>
    <option value="'Playfair Display', serif">Playfair Display</option>
    <option value="'Courier New', monospace">Courier New</option>
    <option value="'Georgia', serif">Georgia</option>
    <option value="'Verdana', sans-serif">Verdana</option>
    <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
    <option value="'Arial', sans-serif">Arial</option>
    <option value="'Times New Roman', serif">Times New Roman</option>
  </select>
  
  <label>3D-Effekt</label>
  <select id="3d-mode">
    <option value="none">Keiner</option>
    <option value="perspective">Perspektivisch</option>
    <option value="shadow3d">Schatten 3D</option>
    <option value="floating">Schwebend</option>
    <option value="skew">Gekippt</option>
    <option value="glow">Glühend 3D</option>
  </select>
  
  <label>3D-Stärke (0-10)</label>
  <div class="range-row">
    <input type="range" id="3d-strength" min="0" max="10" value="2" step="0.5">
    <span id="3d-strength-value">2</span>
  </div>
  
  <label>Kachel Hintergrundfarbe</label>
  <input type="color" id="tile-bg-color" value="#ffffff">
  
  <label>Kachel Rahmenbreite (px)</label>
  <input type="number" id="border-width" min="0" max="10" value="1">
  
  <label>Kachel Rahmenrundung (px)</label>
  <input type="number" id="border-radius" min="0" max="40" value="24">
  
  <h3 style="margin-top: 20px; font-size: 1rem; color: #a5b4fc;">📷 Slideshow</h3>
  
  <label>Animation</label>
  <select id="slide-animation">
    <option value="fade">Sanftes Überblenden</option>
    <option value="slide-left">Seitlich schieben</option>
    <option value="slide-up">Nach oben schieben</option>
    <option value="zoom">Zoom-Effekt</option>
    <option value="rotate">Drehen</option>
    <option value="flip">Flip 3D</option>
    <option value="blur">Unschärfe</option>
    <option value="ken-burns">Ken Burns (langsamer Zoom)</option>
    <option value="split">Vertikales Teilen</option>
    <option value="circle-reveal">Kreis öffnet sich</option>
    <option value="slide-diagonal">Diagonal schieben</option>
  </select>
  
  <label>Bilder anzeigen</label>
  <select id="slide-fit">
    <option value="contain">Komplett zeigen (mit Rändern)</option>
    <option value="cover">Zugeschnitten (füllt aus)</option>
  </select>
  
  <label>Wechselzeit (Sekunden)</label>
  <input type="number" id="interval-input" min="2" max="60" value="10">
  
  <label>Animations-Dauer (Sekunden)</label>
  <input type="number" id="anim-duration" min="0.3" max="3" step="0.1" value="1">
  
  <h3 style="margin-top: 20px; font-size: 1rem; color: #a5b4fc;">📅 Kalender</h3>
  
  <label>Kalender iCal URL</label>
  <input type="text" id="ical-url" placeholder="https://calendar.google.com/.../basic.ics">
  <button id="load-ical-settings" class="upload-btn" style="width:100%;">Kalender laden</button>
  <div id="ical-error" class="error-msg" style="display:none;"></div>
  
  <p style="font-size: 0.75rem; opacity: 0.7; margin-top: 8px;">
    Tipp: Bei CORS-Fehler wird automatisch ein Public-CORS-Proxy verwendet.
  </p>
</div>

<script>
(function() {
let zCounter = 10;
function bringToFront(tile) { zCounter += 1; tile.style.zIndex = zCounter; }

const themes = {
  default: { '--bg-gradient': 'linear-gradient(135deg, #e0e7ff, #c7d2fe)', '--tile-bg': 'rgba(255,255,255,0.3)', '--text-color': '#1e293b', '--accent': '#3b82f6' },
  dark: { '--bg-gradient': '#1e293b', '--tile-bg': 'rgba(30,41,59,0.6)', '--text-color': '#e2e8f0', '--accent': '#6366f1' },
  neon: { '--bg-gradient': 'black', '--tile-bg': 'rgba(88,28,135,0.4)', '--text-color': '#a78bfa', '--accent': '#ec4899' },
  nordic: { '--bg-gradient': 'linear-gradient(135deg, #bae6fd, #e0f2fe)', '--tile-bg': 'rgba(255,255,255,0.6)', '--text-color': '#0f172a', '--accent': '#0284c7' },
  sunset: { '--bg-gradient': 'linear-gradient(135deg, #fed7aa, #fdba74)', '--tile-bg': 'rgba(255,237,213,0.5)', '--text-color': '#7c2d12', '--accent': '#ea580c' },
  forest: { '--bg-gradient': 'linear-gradient(135deg, #bbf7d0, #86efac)', '--tile-bg': 'rgba(240,253,244,0.5)', '--text-color': '#14532d', '--accent': '#16a34a' },
  midnight: { '--bg-gradient': '#0f172a', '--tile-bg': 'rgba(15,23,42,0.7)', '--text-color': '#93c5fd', '--accent': '#3b82f6' },
  rose: { '--bg-gradient': 'linear-gradient(135deg, #fce7f3, #fbcfe8)', '--tile-bg': 'rgba(255,241,242,0.5)', '--text-color': '#831843', '--accent': '#be123c' },
  ocean: { '--bg-gradient': 'linear-gradient(135deg, #ccfbf1, #99f6e4)', '--tile-bg': 'rgba(240,255,250,0.5)', '--text-color': '#134e4a', '--accent': '#0f766e' },
  minimal: { '--bg-gradient': '#ffffff', '--tile-bg': 'rgba(243,244,246,0.8)', '--text-color': '#374151', '--accent': '#6b7280' }
};

function applyTheme(name) {
  const theme = themes[name];
  if (!theme) return;
  Object.entries(theme).forEach(([prop, val]) => document.documentElement.style.setProperty(prop, val));
  localStorage.setItem('theme', name);
}

function apply3DEffect(mode, strength) {
  const root = document.documentElement;
  const s = parseFloat(strength) || 0;
  switch(mode) {
    case 'perspective':
      root.style.setProperty('--tile-transform', `perspective(800px) rotateX(${s*1.5}deg) rotateY(${s}deg)`);
      root.style.setProperty('--text-shadow', `${s*0.5}px ${s*0.5}px 2px rgba(0,0,0,0.2)`);
      root.style.setProperty('--icon-transform', `rotateY(${s}deg) rotateX(${s*0.5}deg)`);
      break;
    case 'shadow3d':
      root.style.setProperty('--tile-transform', `translateZ(0)`);
      root.style.setProperty('--tile-shadow', `${s*2}px ${s*2}px ${s*4}px rgba(0,0,0,0.3), ${-s}px ${-s}px ${s*2}px rgba(255,255,255,0.2) inset`);
      root.style.setProperty('--text-shadow', `${s}px ${s}px 0 rgba(0,0,0,0.3)`);
      root.style.setProperty('--icon-transform', `scale(1.05)`);
      break;
    case 'floating':
      root.style.setProperty('--tile-transform', `translateY(${-s*1.5}px) scale(${1 + s*0.01})`);
      root.style.setProperty('--tile-shadow', `0 ${s*4}px ${s*6}px rgba(0,0,0,0.2)`);
      root.style.setProperty('--text-shadow', `0 ${s}px ${s}px rgba(0,0,0,0.15)`);
      root.style.setProperty('--icon-transform', `translateY(${-s*0.8}px)`);
      break;
    case 'skew':
      root.style.setProperty('--tile-transform', `skewX(${s*0.8}deg) skewY(${s*0.2}deg)`);
      root.style.setProperty('--text-shadow', `${s*0.3}px ${s*0.3}px 1px rgba(0,0,0,0.2)`);
      root.style.setProperty('--icon-transform', `skewX(${-s*0.8}deg)`);
      break;
    case 'glow':
      root.style.setProperty('--tile-transform', `perspective(600px) rotateY(${s*0.5}deg)`);
      root.style.setProperty('--tile-shadow', `0 0 ${s*5}px rgba(255,255,255,0.4), 0 0 ${s*10}px var(--accent)`);
      root.style.setProperty('--text-shadow', `0 0 ${s*2}px var(--accent)`);
      root.style.setProperty('--icon-transform', `scale(1.1) rotateZ(${s}deg)`);
      break;
    default:
      root.style.setProperty('--tile-transform', 'none');
      root.style.setProperty('--tile-shadow', '0 8px 32px rgba(0,0,0,0.1)');
      root.style.setProperty('--text-shadow', 'none');
      root.style.setProperty('--icon-transform', 'none');
  }
}

const defaultLayout = [
  { id: 'spotify', x: 10, y: 10, w: 80, h: 80 },
  { id: 'amazon', x: 100, y: 10, w: 80, h: 80 },
  { id: 'youtube', x: 190, y: 10, w: 80, h: 80 },
  { id: 'settings', x: 280, y: 10, w: 80, h: 80 },
  { id: 'weather', x: 10, y: 100, w: 280, h: 180 },
  { id: 'forecast', x: 300, y: 100, w: 320, h: 180 },
  { id: 'hourly', x: 10, y: 290, w: 610, h: 150 },
  { id: 'calendar', x: 10, y: 450, w: 380, h: 340 },
  { id: 'slideshow', x: 400, y: 450, w: 380, h: 340 }
];

let layout = JSON.parse(localStorage.getItem('dashboardLayout')) || defaultLayout;

function saveLayout() {
  const tiles = document.querySelectorAll('.tile');
  layout = Array.from(tiles).map(tile => ({
    id: tile.id,
    x: parseFloat(tile.style.left) || 0,
    y: parseFloat(tile.style.top) || 0,
    w: parseFloat(tile.style.width) || 80,
    h: parseFloat(tile.style.height) || 80
  }));
  localStorage.setItem('dashboardLayout', JSON.stringify(layout));
}

function createTiles() {
  const container = document.getElementById('dashboard');
  container.innerHTML = '';
  layout.forEach(item => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.id = item.id;
    tile.style.left = item.x + 'px';
    tile.style.top = item.y + 'px';
    tile.style.width = item.w + 'px';
    tile.style.height = item.h + 'px';

function initInteract() {
  interact('.tile').draggable({
    allowFrom: '.tile-header, .icon-tile-content',
    ignoreFrom: '.resize-handle',
    modifiers: [interact.modifiers.restrict({ restriction: 'parent', endOnly: false })],
    listeners: {
      start(event) { event.target.classList.add('dragging'); },
      move(event) {
        const target = event.target;
        const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
        const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
        target.style.transform = `translate(${x}px, ${y}px)`;
        target.setAttribute('data-x', x);
        target.setAttribute('data-y', y);
      },
      end(event) {
        const target = event.target;
        target.classList.remove('dragging');
        const x = parseFloat(target.getAttribute('data-x')) || 0;
        const y = parseFloat(target.getAttribute('data-y')) || 0;
        target.style.transform = '';
        target.style.left = (parseFloat(target.style.left) + x) + 'px';
        target.style.top = (parseFloat(target.style.top) + y) + 'px';
        target.setAttribute('data-x', 0);
        target.setAttribute('data-y', 0);
        saveLayout();
      }
    }
  }).resizable({
    edges: { bottom: true, right: true },
    modifiers: [interact.modifiers.restrict({ restriction: 'parent', endOnly: false })],
    listeners: {
      start(event) { event.target.classList.add('resizing'); },
      move(event) {
        event.target.style.width = event.rect.width + 'px';
        event.target.style.height = event.rect.height + 'px';
      },
      end(event) { event.target.classList.remove('resizing'); saveLayout(); }
    }
  });
}

// ---------- WEATHER ----------
async function fetchWeather(lat=51.2277, lon=6.7735) {
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=weather_code,temperature_2m,relative_humidity_2m,wind_speed_10m&hourly=weather_code,temperature_2m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`);
    return await res.json();
  } catch(e) { console.error(e); return null; }
}

function weatherEmoji(code) {
  if(code===0) return '☀️';
  if(code<=2) return '🌤️';
  if(code===3) return '☁️';
  if(code>=50 && code<60) return '🌫️';
  if(code>=60 && code<70) return '🌧️';
  if(code>=70 && code<80) return '🌨️';
  if(code>=80) return '⛈️';
  return '🌥️';
}

function weatherDesc(code) {
  if(code===0) return 'Klar';
  if(code===1) return 'Leicht bewölkt';
  if(code===2) return 'Teilweise bewölkt';
  if(code===3) return 'Bedeckt';
  if(code>=50 && code<60) return 'Nebel';
  if(code>=60 && code<70) return 'Regen';
  if(code>=70 && code<80) return 'Schnee';
  if(code>=80) return 'Schauer';
  return 'Bewölkt';
}

async function updateWeather() {
  const data = await fetchWeather();
  if(!data) return;
  
  const tempEl = document.getElementById('current-temp');
  if(tempEl) tempEl.textContent = Math.round(data.current.temperature_2m) + '°';
  
  const detailsEl = document.getElementById('current-details');
  if(detailsEl) detailsEl.innerHTML = `${weatherDesc(data.current.weather_code)}<br>💧 ${data.current.relative_humidity_2m}% · 💨 ${Math.round(data.current.wind_speed_10m)} km/h`;
  
  const iconEl = document.getElementById('current-icon');
  if(iconEl) iconEl.textContent = weatherEmoji(data.current.weather_code);
  
  const fc = document.getElementById('forecast-container');
  if(fc) {
    fc.innerHTML = '';
    data.daily.time.forEach((day,i) => {
      const d = new Date(day);
      const div = document.createElement('div');
      div.className = 'forecast-day' + (i===0?' active':'');
      div.innerHTML = `<div>${d.toLocaleDateString('de-DE',{weekday:'short'})}</div><div>${weatherEmoji(data.daily.weather_code[i])}</div><div>${Math.round(data.daily.temperature_2m_max[i])}°/${Math.round(data.daily.temperature_2m_min[i])}°</div>`;
      fc.appendChild(div);
    });
  }
  
  const hc = document.getElementById('hourly-container');
  if(hc) {
    hc.innerHTML = '';
    data.hourly.time.slice(0,24).forEach((t,i) => {
      const time = new Date(t);
      const div = document.createElement('div');
      div.className = 'hourly-item';
      div.innerHTML = `<div>${time.getHours()}:00</div><div>${weatherEmoji(data.hourly.weather_code[i])}</div><div>${Math.round(data.hourly.temperature_2m[i])}°</div>`;
      hc.appendChild(div);
    });
  }
}

// ---------- CALENDAR mit CORS-Fallback ----------
let calendarEvents = [];
function assignEventColor(index) {
  const palette = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63','#00bcd4','#ff5722'];
  return palette[index % palette.length];
}

function renderCalendar() {
  const grid = document.getElementById('calendar-grid');
  if(!grid) return;
  grid.innerHTML = '';
  ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d => {
    const div = document.createElement('div');
    div.className = 'day-header';
    div.textContent = d;
    grid.appendChild(div);
  });
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const offset = (firstDay + 6) % 7;
  for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));
  for(let d=1; d<=daysInMonth; d++) {
    const dayDiv = document.createElement('div');
    dayDiv.className = 'day';
    dayDiv.textContent = d;
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const eventsOnDay = calendarEvents.filter(e => e.start.startsWith(dateStr));
    if(eventsOnDay.length > 0) {
      eventsOnDay.slice(0, 3).forEach((ev, idx) => {
        const line = document.createElement('div');
        line.className = 'event-line';
        line.style.backgroundColor = ev.color || assignEventColor(idx);
        line.style.bottom = (2 + idx * 5) + 'px';
        dayDiv.appendChild(line);
      });
      dayDiv.addEventListener('click', () => {
        const details = document.getElementById('event-details');
        if(details) {
          details.style.display = 'block';
          details.innerHTML = eventsOnDay.map(e => `<strong style="color:${e.color}">${e.summary}</strong><br><small>${e.start}</small>`).join('<hr style="margin:4px 0;opacity:0.3;">');
        }
      });
    }
    if(d === now.getDate() && month === now.getMonth() && year === now.getFullYear()) {
      dayDiv.classList.add('today');
    }
    grid.appendChild(dayDiv);
  }
}

// CORS-Proxies (mehrere als Fallback)
const CORS_PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
  'https://api.codetabs.com/v1/proxy?quest='
];

async function fetchICSWithFallback(url) {
  // 1. Direkt versuchen
  try {
    const res = await fetch(url);
    if (res.ok) return await res.text();
  } catch(e) {
    console.log('Direct fetch failed (CORS), trying proxies...');
  }
  
  // 2. Proxies probieren
  for (const proxy of CORS_PROXIES) {
    try {
      const proxyUrl = proxy + encodeURIComponent(url);
      const res = await fetch(proxyUrl);
      if (res.ok) {
        const text = await res.text();
        if (text.includes('BEGIN:VCALENDAR')) return text;
      }
    } catch(e) {
      console.log('Proxy failed:', proxy);
    }
  }
  
  throw new Error('Alle Lade-Versuche fehlgeschlagen. Prüfe URL und Internetverbindung.');
}

async function loadCalendar(url) {
  if(!url) return;
  const errorBox = document.getElementById('ical-error');
  if (errorBox) { errorBox.style.display = 'none'; errorBox.textContent = ''; }
  
  // webcal:// → https://
  url = url.replace(/^webcal:\/\//i, 'https://');
  
  try {
    const data = await fetchICSWithFallback(url);
    const jcal = ICAL.parse(data);
    const comp = new ICAL.Component(jcal);
    const vevents = comp.getAllSubcomponents('vevent');
    calendarEvents = vevents.map((vevent, i) => {
      const ev = new ICAL.Event(vevent);
      const start = ev.startDate.toJSDate();
      const end = ev.endDate.toJSDate();
      return {
        summary: ev.summary || '(Ohne Titel)',
        start: start.toISOString().substring(0,10),
        end: end.toISOString().substring(0,10),
        color: assignEventColor(i)
      };
    });
    renderCalendar();
    console.log('✅ Kalender geladen:', calendarEvents.length, 'Termine');
  } catch(err) {
    console.error('❌ Kalender Ladefehler:', err);
    if (errorBox) {
      errorBox.style.display = 'block';
      errorBox.textContent = '❌ ' + err.message;
    }
  }
}

// ---------- SLIDESHOW ----------
let slides = [];
let currentSlide = 0;
let slideInterval = 10;
let slideAnimDuration = 1;
let slideAnimType = 'fade';
let slideshowTimer;
let slideshowPaused = false;

function saveSlides() {
  try {
    localStorage.setItem('slideshowImages', JSON.stringify(slides));
    localStorage.setItem('slideshowIndex', currentSlide);
  } catch(e) { console.warn('localStorage voll, kann Slides nicht speichern'); }
}

function loadSlides() {
  try {
    const saved = localStorage.getItem('slideshowImages');
    if (saved) {
      slides = JSON.parse(saved);
      currentSlide = parseInt(localStorage.getItem('slideshowIndex')) || 0;
      if (currentSlide >= slides.length) currentSlide = 0;
      updateSlideDisplay();
      const cnt = document.getElementById('image-count');
      if (cnt) cnt.textContent = slides.length + ' Bilder';
    }
  } catch(e) {}
}

function updateSlideDisplay() {
  const container = document.getElementById('slideshow-container');
  if(!container) return;
  
  // Animation-Klasse setzen
  container.className = 'slideshow-container slide-anim-' + slideAnimType;
  
  // Dauer setzen
  document.documentElement.style.setProperty('--slide-duration', slideAnimDuration + 's');
  
  // Alle existing img entfernen außer controls
  const existingImgs = container.querySelectorAll('.slide-img');
  existingImgs.forEach(img => {
    if (!img.classList.contains('exit')) {
      img.classList.add('exit');
      img.classList.remove('active');
      setTimeout(() => img.remove(), slideAnimDuration * 1000 + 100);
    }
  });
  
  // Neues Bild einfügen
  if (slides.length > 0 && slides[currentSlide]) {
    const newImg = document.createElement('img');
    newImg.className = 'slide-img';
    newImg.src = slides[currentSlide];
    container.insertBefore(newImg, container.firstChild);
    // Force reflow für CSS-Animation
    void newImg.offsetWidth;
    newImg.classList.add('active');
  }
  
  // Hintergrund syncen wenn slideshow als bg
  if (localStorage.getItem('bgMode') === 'slideshow') {
    syncSlideshowBackground();
  }
}

function syncSlideshowBackground() {
  if (slides.length === 0 || !slides[currentSlide]) return;
  
  const layer1 = document.getElementById('bg-layer-1');
  const layer2 = document.getElementById('bg-layer-2');
  
  // Welcher Layer ist gerade aktiv? Den anderen nutzen
  const activeLayer = layer1.classList.contains('active') ? layer1 : (layer2.classList.contains('active') ? layer2 : layer1);
  const inactiveLayer = activeLayer === layer1 ? layer2 : layer1;
  
  // Inaktiven Layer mit neuem Bild laden
  inactiveLayer.style.backgroundImage = `url(${slides[currentSlide]})`;
  
  // Sanft überblenden
  setTimeout(() => {
    inactiveLayer.classList.add('active');
    activeLayer.classList.remove('active');
  }, 50);
}

function nextSlide() {
  if(slides.length === 0) return;
  currentSlide = (currentSlide + 1) % slides.length;
  updateSlideDisplay();
  saveSlides();
}

function prevSlide() {
  if(slides.length === 0) return;
  currentSlide = (currentSlide - 1 + slides.length) % slides.length;
  updateSlideDisplay();
  saveSlides();
}

function startSlideshow() {
  clearInterval(slideshowTimer);
  if(slides.length === 0 || slideshowPaused) return;
  slideshowTimer = setInterval(() => {
    nextSlide();
  }, slideInterval * 1000);
}

document.addEventListener('change', function(e) {
  if(e.target.id === 'file-upload') {
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        slides.push(ev.target.result);
        if(slides.length === 1) currentSlide = 0;
        updateSlideDisplay();
        const cnt = document.getElementById('image-count');
        if (cnt) cnt.textContent = slides.length + ' Bilder';
        saveSlides();
        startSlideshow();
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  }
});

document.addEventListener('click', function(e) {
  if(e.target.closest('#next-slide')) {
    nextSlide();
    startSlideshow();
  } else if(e.target.closest('#prev-slide')) {
    prevSlide();
    startSlideshow();
  } else if(e.target.closest('#play-pause')) {
    slideshowPaused = !slideshowPaused;
    const btn = e.target.closest('#play-pause');
    btn.innerHTML = slideshowPaused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
    if (slideshowPaused) clearInterval(slideshowTimer);
    else startSlideshow();
  } else if(e.target.closest('#delete-slide')) {
    if(!slides.length) return;
    slides.splice(currentSlide, 1);
    if(currentSlide >= slides.length) currentSlide = Math.max(0, slides.length-1);
    updateSlideDisplay();
    const cnt = document.getElementById('image-count');
    if (cnt) cnt.textContent = slides.length + ' Bilder';
    saveSlides();
    startSlideshow();
  }
});

// ---------- SETTINGS ----------
function applyBackground() {
  const mode = localStorage.getItem('bgMode') || 'theme';
  const root = document.documentElement;
  const layer1 = document.getElementById('bg-layer-1');
  const layer2 = document.getElementById('bg-layer-2');
  
  // Beide Layer ausblenden bei Nicht-Slideshow-Mode
  if (mode !== 'slideshow') {
    layer1.classList.remove('active');
    layer2.classList.remove('active');
  }
  
  document.body.style.background = '';
  
  switch(mode) {
    case 'theme':
      root.style.setProperty('--bg-image', 'none');
      break;
    case 'color':
      root.style.setProperty('--bg-image', 'none');
      document.body.style.background = localStorage.getItem('bgColor') || '#e0e7ff';
      break;
    case 'url':
      root.style.setProperty('--bg-image', `url(${localStorage.getItem('bgUrl') || ''})`);
      break;
    case 'upload':
      root.style.setProperty('--bg-image', `url(${localStorage.getItem('bgUpload') || ''})`);
      break;
    case 'slideshow':
      root.style.setProperty('--bg-image', 'none');
      syncSlideshowBackground();
      break;
  }
}

function updateBgModeUI(mode) {
  document.getElementById('bg-color-container').style.display = mode === 'color' ? 'block' : 'none';
  document.getElementById('bg-url-container').style.display = mode === 'url' ? 'block' : 'none';
  document.getElementById('bg-upload-container').style.display = mode === 'upload' ? 'block' : 'none';
}

  const bgUrl = localStorage.getItem('bgUrl') || '';

  document.getElementById('border-width').value = localStorage.getItem('borderWidth') || 1;
  document.documentElement.style.setProperty('--tile-border-width', (localStorage.getItem('borderWidth') || 1) + 'px');
  
  document.getElementById('border-radius').value = localStorage.getItem('borderRadius') || 24;
  document.documentElement.style.setProperty('--tile-border-radius', (localStorage.getItem('borderRadius') || 24) + 'px');
  
  // 3D-Effekt
  const d3dMode = localStorage.getItem('3dMode') || 'none';
  document.getElementById('3d-mode').value = d3dMode;
  const d3dStrength = parseFloat(localStorage.getItem('3dStrength') || 2);
  document.getElementById('3d-strength').value = d3dStrength;
  document.getElementById('3d-strength-value').textContent = d3dStrength;
  apply3DEffect(d3dMode, d3dStrength);
  
  // Slideshow
  slideAnimType = localStorage.getItem('slideAnimation') || 'fade';
  document.getElementById('slide-animation').value = slideAnimType;
  
  const slideFit = localStorage.getItem('slideFit') || 'contain';
  document.getElementById('slide-fit').value = slideFit;
  document.documentElement.style.setProperty('--slide-fit', slideFit);
  
  slideInterval = parseInt(localStorage.getItem('slideInterval') || 10);
  document.getElementById('interval-input').value = slideInterval;
  
  slideAnimDuration = parseFloat(localStorage.getItem('slideAnimDuration') || 1);
  document.getElementById('anim-duration').value = slideAnimDuration;
  document.documentElement.style.setProperty('--slide-duration', slideAnimDuration + 's');
  
  startSlideshow();
  
  // Kalender-URL
  const savedIcalUrl = localStorage.getItem('icalUrl');
  if (savedIcalUrl) {
    document.getElementById('ical-url').value = savedIcalUrl;
    loadCalendar(savedIcalUrl);
  }
}

  localStorage.setItem('fontColor', e.target.value);
});

document.getElementById('font-family-select').addEventListener('change', e => {
  document.documentElement.style.setProperty('--font-family', e.target.value);
  localStorage.setItem('fontFamily', e.target.value);
});

document.getElementById('tile-bg-color').addEventListener('input', e => {
  document.documentElement.style.setProperty('--tile-bg', e.target.value + '80');
  localStorage.setItem('tileBg', e.target.value);
});

document.getElementById('border-width').addEventListener('input', e => {
  document.documentElement.style.setProperty('--tile-border-width', e.target.value + 'px');
  localStorage.setItem('borderWidth', e.target.value);
});

document.getElementById('border-radius').addEventListener('input', e => {
  document.documentElement.style.setProperty('--tile-border-radius', e.target.value + 'px');
  localStorage.setItem('borderRadius', e.target.value);
});

document.getElementById('3d-mode').addEventListener('change', function(e) {
  localStorage.setItem('3dMode', e.target.value);
  apply3DEffect(e.target.value, document.getElementById('3d-strength').value);
});

document.getElementById('3d-strength').addEventListener('input', function(e) {
  localStorage.setItem('3dStrength', e.target.value);
  document.getElementById('3d-strength-value').textContent = e.target.value;
  apply3DEffect(document.getElementById('3d-mode').value, e.target.value);
});

document.getElementById('slide-fit').addEventListener('change', e => {
  document.documentElement.style.setProperty('--slide-fit', e.target.value);
  localStorage.setItem('slideFit', e.target.value);
});

document.getElementById('slide-animation').addEventListener('change', e => {
  slideAnimType = e.target.value;
  localStorage.setItem('slideAnimation', slideAnimType);
  updateSlideDisplay();
});

document.getElementById('interval-input').addEventListener('change', e => {
  slideInterval = parseInt(e.target.value) || 10;
  localStorage.setItem('slideInterval', slideInterval);
  startSlideshow();
});

document.getElementById('anim-duration').addEventListener('change', e => {
  slideAnimDuration = parseFloat(e.target.value) || 1;
  localStorage.setItem('slideAnimDuration', slideAnimDuration);
  document.documentElement.style.setProperty('--slide-duration', slideAnimDuration + 's');
});

document.getElementById('load-ical-settings').addEventListener('click', function() {
  const url = document.getElementById('ical-url').value.trim();
  if (url) {
    localStorage.setItem('icalUrl', url);
    loadCalendar(url);
  }
});

// ---------- INIT ----------
createTiles();
loadSlides();
loadSettings();
updateWeather();
renderCalendar();

// Wetter alle 15 Minuten aktualisieren
setInterval(updateWeather, 15 * 60 * 1000);

// Geo-Lokalisierung optional
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    fetchWeather(pos.coords.latitude, pos.coords.longitude).then(data => { if(data) updateWeather(); });
  }, () => {}, { timeout: 5000 });
}

})();
</script>
</body>
</html>

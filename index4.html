<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Glass Dashboard · Icons & 5 3D-Effekte</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js">
</script>
<script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js">
</script>
<style>
:root {
--bg-image: none;
--bg-gradient: linear-gradient(135deg, #e0e7ff, #c7d2fe);
--tile-bg: rgba(255,255,255,0.3);
--tile-border-width: 1px;
--tile-border-radius: 24px;
--tile-shadow: 0 8px 32px rgba(0,0,0,0.1);
--text-color: #1e293b;
--accent: #3b82f6;
--font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
--backdrop: blur(12px);
--tile-transform: none;
--text-shadow: none;
--icon-transform: none;
--effect-strength: 2;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: var(--font-family);
background: var(--bg-gradient);
background-image: var(--bg-image);
background-size: cover;
background-position: center;
background-repeat: no-repeat;
color: var(--text-color);
height: 100vh;
overflow: hidden;
transition: background 0.5s, color 0.5s;
}
body.transparent-tiles .tile {
background: transparent !important;
backdrop-filter: none !important;
-webkit-backdrop-filter: none !important;
border-color: transparent !important;
box-shadow: none !important;
}

#dashboard {
width: 100%;
height: 100vh;
position: relative;
overflow: auto;
}

.tile {
position: absolute;
background: var(--tile-bg);
backdrop-filter: var(--backdrop);
-webkit-backdrop-filter: var(--backdrop);
border: var(--tile-border-width) solid rgba(255,255,255,0.35);
border-radius: var(--tile-border-radius);
box-shadow: var(--tile-shadow);
display: flex;
flex-direction: column;
transition: box-shadow 0.3s, border-radius 0.3s, border-width 0.3s, transform 0.2s;
transform: var(--tile-transform);
will-change: transform, left, top, width, height;
min-width: 60px;
min-height: 60px;
z-index: 1;
}
.tile.interact-dragging,
.tile.interact-resizing {
box-shadow: 0 20px 50px rgba(0,0,0,0.4) !important;
z-index: 100;
}

.tile-header {
padding: 8px 14px;
cursor: grab;
user-select: none;
font-weight: 600;
border-bottom: 1px solid rgba(0,0,0,0.05);
background: rgba(255,255,255,0.2);
display: flex;
align-items: center;
gap: 8px;
text-shadow: var(--text-shadow);
}
.tile-content {
flex: 1;
padding: 12px;
overflow-y: auto;
overflow-x: hidden;
scrollbar-width: thin;
scrollbar-color: rgba(0,0,0,0.2) transparent;
}

.tile h2, .tile .temp, .tile .forecast-day, .tile .hourly-item, .tile .day, .tile .day-header {
text-shadow: var(--text-shadow);
}

.resize-handle {
position: absolute;
bottom: 0; right: 0;
width: 22px; height: 22px;
cursor: nwse-resize;
background: linear-gradient(135deg, transparent 60%, rgba(0,0,0,0.15) 60%);
border-radius: 0 0 var(--tile-border-radius) 0;
z-index: 5;
}

.icon-tile-content {
display: flex; align-items: center; justify-content: center;
height: 100%; font-size: 2rem; cursor: pointer;
color: var(--text-color);
transform: var(--icon-transform);
text-shadow: var(--text-shadow);
padding: 0 !important; overflow: hidden !important;
}

.weather-now .temp { font-size: 3rem; font-weight: 700; }
.forecast-row { display: flex; gap: 6px; }
.forecast-day {
flex:1; background: rgba(255,255,255,0.25); border-radius:16px;
padding:6px; text-align:center; font-size:0.85rem;
}
.forecast-day.active { background: var(--accent); color: white; }
.hourly-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.hourly-item {
min-width:60px; background: rgba(255,255,255,0.25);
border-radius:12px; padding:4px; text-align:center; font-size:0.8rem;
}
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; text-align: center; font-size:0.85rem; }
.day-header { font-weight:600; opacity:0.7; }
.day { position:relative; padding:4px 0; border-radius:8px; cursor:pointer; }
.day:hover { background: rgba(255,255,255,0.2); }
.day.today { background: var(--accent); color:white; font-weight:bold; }
.event-line { position:absolute; bottom:2px; left:10%; width:80%; height:4px; border-radius:2px; }
.event-details {
background:rgba(0,0,0,0.75); color:white; padding:8px;
border-radius:8px; font-size:0.8rem; margin-top:8px; display:none;
}
.slideshow-container {
position:relative; width:100%; aspect-ratio:16/9;
background:rgba(0,0,0,0.05); border-radius:12px; overflow:hidden; margin-bottom:8px;
}
.slideshow-container img {
width:100%; height:100%; object-fit:contain; transition:opacity 0.3s;
}
.slideshow-controls {
position:absolute; bottom:4px; left:50%; transform:translateX(-50%);
display:flex; gap:10px; background:rgba(0,0,0,0.5); padding:4px 10px; border-radius:20px;
}
.slideshow-controls button {
background:transparent; border:none; color:white; font-size:1.2rem; cursor:pointer;
}
.upload-area { display:flex; gap:8px; align-items:center; margin-top:4px; }
.upload-btn {
background: var(--accent); color:white; border:none;
border-radius:12px; padding:6px 12px; cursor:pointer; font-size:0.85rem;
}
input[type="file"] { display:none; }

.settings-panel {
position: fixed; top:0; right:-400px; width:380px; height:100vh;
background: rgba(20,20,30,0.95); backdrop-filter: blur(20px); color:white;
padding:20px; transition: right 0.3s ease; z-index: 10000; overflow-y:auto;
border-left:1px solid rgba(255,255,255,0.2);
}
.settings-panel.open { right:0; }
.settings-panel label { display:block; margin:14px 0 4px; font-weight:600; }
.settings-panel select, .settings-panel input {
width:100%; padding:8px; border-radius:8px; border:none;
background:rgba(255,255,255,0.15); color:white; margin-bottom:8px;
}
.close-settings {
position:absolute; top:10px; right:10px; background:none;
border:none; color:white; font-size:1.5rem; cursor:pointer;
}
</style>
</head>
<body data-theme="default">

<div id="dashboard"></div>

<div class="settings-panel" id="settings-panel">
<button class="close-settings" id="close-settings">&times;</button>
<h2>Einstellungen</h2>
<label>Thema</label>
<select id="theme-select">
<option value="default">Standard Hell</option><option value="dark">Dunkel Elegant</option>
<option value="neon">Neon Nächte</option><option value="nordic">Nordic Frost</option>
<option value="sunset">Sunset Vibes</option><option value="forest">Forest Whisper</option>
<option value="midnight">Midnight Blue</option><option value="rose">Rose Gold</option>
<option value="ocean">Ocean Breeze</option><option value="minimal">Minimal Weiß</option>
</select>
<label>Hintergrund-Typ</label>
<select id="bg-mode">
<option value="theme">Theme-Farbverlauf</option>
<option value="color">Eigene Farbe</option>
<option value="url">Eigenes Bild (URL)</option>
<option value="upload">Eigenes Bild (Upload)</option>
<option value="slideshow">Slideshow-Bild</option>
</select>
<div id="bg-color-container" style="display:none;"><label>Hintergrundfarbe</label><input type="color" id="bg-color" value="#e0e7ff"></div>
<div id="bg-url-container" style="display:none;"><label>Bild-URL</label><input type="text" id="bg-url" placeholder="https://..."></div>
<div id="bg-upload-container" style="display:none;"><label>Hintergrundbild hochladen</label><input type="file" id="bg-upload" accept="image/*"></div>
<label>Transparente Kacheln</label>
<select id="transparency-toggle"><option value="off">Aus (glasig)</option><option value="on">An (durchsichtig)</option></select>
<label>Schriftfarbe</label><input type="color" id="font-color" value="#1e293b">
<label>Schriftart</label>
<select id="font-family-select">
<option value="'Segoe UI', system-ui, -apple-system, sans-serif">Segoe UI</option>
<option value="'Inter', sans-serif">Inter</option><option value="'Roboto', sans-serif">Roboto</option>
<option value="'Playfair Display', serif">Playfair Display</option><option value="'Courier New', monospace">Courier New</option>
<option value="'Georgia', serif">Georgia</option><option value="'Verdana', sans-serif">Verdana</option>
<option value="'Trebuchet MS', sans-serif">Trebuchet MS</option><option value="'Arial', sans-serif">Arial</option>
<option value="'Times New Roman', serif">Times New Roman</option>
</select>
<label>3D-Effekt</label>
<select id="3d-mode">
<option value="none">Keiner</option><option value="perspective">Perspektivisch</option>
<option value="shadow3d">Schatten 3D</option><option value="floating">Schwebend</option>
<option value="skew">Gekippt</option><option value="glow">Glühend 3D</option>
</select>
<label>3D-Stärke (0-10)</label><input type="range" id="3d-strength" min="0" max="10" value="2" step="0.5">
<label>Kachel Hintergrundfarbe</label><input type="color" id="tile-bg-color" value="#ffffff">
<label>Kachel Rahmenbreite (px)</label><input type="number" id="border-width" min="0" max="10" value="1">
<label>Kachel Rahmenrundung (px)</label><input type="number" id="border-radius" min="0" max="40" value="24">
<label>Slideshow Intervall (Sekunden)</label>
<select id="interval-select"><option value="5">5</option><option value="10" selected>10</option><option value="15">15</option></select>
</div>

<script>
(function() {
let zCounter = 10;
function bringToFront(tile) { zCounter += 1; tile.style.zIndex = zCounter; }

const themes = {
default: { '--bg-gradient': 'linear-gradient(135deg, #e0e7ff, #c7d2fe)', '--tile-bg': 'rgba(255,255,255,0.3)', '--text-color': '#1e293b', '--accent': '#3b82f6' },
dark: { '--bg-gradient': '#1e293b', '--tile-bg': 'rgba(30,41,59,0.6)', '--text-color': '#e2e8f0', '--accent': '#6366f1' },
neon: { '--bg-gradient': 'black', '--tile-bg': 'rgba(88,28,135,0.4)', '--text-color': '#a78bfa', '--accent': '#ec4899' },
nordic: { '--bg-gradient': 'linear-gradient(135deg, #bae6fd, #e0f2fe)', '--tile-bg': 'rgba(255,255,255,0.6)', '--text-color': '#0f172a', '--accent': '#0284c7' },
sunset: { '--bg-gradient': 'linear-gradient(135deg, #fed7aa, #fdba74)', '--tile-bg': 'rgba(255,237,213,0.5)', '--text-color': '#7c2d12', '--accent': '#ea580c' },
forest: { '--bg-gradient': 'linear-gradient(135deg, #bbf7d0, #86efac)', '--tile-bg': 'rgba(240,253,244,0.5)', '--text-color': '#14532d', '--accent': '#16a34a' },
midnight: { '--bg-gradient': '#0f172a', '--tile-bg': 'rgba(15,23,42,0.7)', '--text-color': '#93c5fd', '--accent': '#3b82f6' },
rose: { '--bg-gradient': 'linear-gradient(135deg, #fce7f3, #fbcfe8)', '--tile-bg': 'rgba(255,241,242,0.5)', '--text-color': '#831843', '--accent': '#be123c' },
ocean: { '--bg-gradient': 'linear-gradient(135deg, #ccfbf1, #99f6e4)', '--tile-bg': 'rgba(240,255,250,0.5)', '--text-color': '#134e4a', '--accent': '#0f766e' },
minimal: { '--bg-gradient': '#ffffff', '--tile-bg': 'rgba(243,244,246,0.8)', '--text-color': '#374151', '--accent': '#6b7280' }
};
function applyTheme(name) {
const theme = themes[name];
Object.entries(theme).forEach(([prop, val]) => document.documentElement.style.setProperty(prop, val));
localStorage.setItem('theme', name);
}

function apply3DEffect(mode, strength) {
const root = document.documentElement;
const s = parseFloat(strength) || 0;
switch(mode) {
case 'perspective':
root.style.setProperty('--tile-transform', `perspective(800px) rotateX(${s*1.5}deg) rotateY(${s}deg)`);
root.style.setProperty('--text-shadow', `${s*0.5}px ${s*0.5}px 2px rgba(0,0,0,0.2)`);
root.style.setProperty('--icon-transform', `rotateY(${s}deg) rotateX(${s*0.5}deg)`);
break;
case 'shadow3d':
root.style.setProperty('--tile-transform', `translateZ(0)`);
root.style.setProperty('--tile-shadow', `${s*2}px ${s*2}px ${s*4}px rgba(0,0,0,0.3), ${-s}px ${-s}px ${s*2}px rgba(255,255,255,0.2) inset`);
root.style.setProperty('--text-shadow', `${s}px ${s}px 0 rgba(0,0,0,0.3)`);
root.style.setProperty('--icon-transform', `scale(1.05)`);
break;
case 'floating':
root.style.setProperty('--tile-transform', `translateY(${-s*1.5}px) scale(${1 + s*0.01})`);
root.style.setProperty('--tile-shadow', `0 ${s*4}px ${s*6}px rgba(0,0,0,0.2)`);
root.style.setProperty('--text-shadow', `0 ${s}px ${s}px rgba(0,0,0,0.15)`);
root.style.setProperty('--icon-transform', `translateY(${-s*0.8}px)`);
break;
case 'skew':
root.style.setProperty('--tile-transform', `skewX(${s*0.8}deg) skewY(${s*0.2}deg)`);
root.style.setProperty('--text-shadow', `${s*0.3}px ${s*0.3}px 1px rgba(0,0,0,0.2)`);
root.style.setProperty('--icon-transform', `skewX(${-s*0.8}deg)`);
break;
case 'glow':
root.style.setProperty('--tile-transform', `perspective(600px) rotateY(${s*0.5}deg)`);
root.style.setProperty('--tile-shadow', `0 0 ${s*5}px rgba(255,255,255,0.4), 0 0 ${s*10}px var(--accent)`);
root.style.setProperty('--text-shadow', `0 0 ${s*2}px var(--accent)`);
root.style.setProperty('--icon-transform', `scale(1.1) rotateZ(${s}deg)`);
break;
case 'none':
default:
root.style.setProperty('--tile-transform', 'none');
root.style.setProperty('--tile-shadow', '0 8px 32px rgba(0,0,0,0.1)');
root.style.setProperty('--text-shadow', 'none');
root.style.setProperty('--icon-transform', 'none');
break;
}
root.style.setProperty('--effect-strength', s);
}

const defaultLayout = [
{ id: 'spotify', x: 10, y: 10, w: 64, h: 64 },
{ id: 'amazon', x: 84, y: 10, w: 64, h: 64 },
{ id: 'youtube', x: 158, y: 10, w: 64, h: 64 },
{ id: 'settings', x: 232, y: 10, w: 64, h: 64 },
{ id: 'weather', x: 10, y: 90, w: 280, h: 180 },
{ id: 'forecast', x: 300, y: 90, w: 280, h: 180 },
{ id: 'hourly', x: 10, y: 290, w: 570, h: 180 },
{ id: 'calendar', x: 10, y: 490, w: 380, h: 340 },
{ id: 'slideshow', x: 400, y: 490, w: 380, h: 340 }
];

let layout = JSON.parse(localStorage.getItem('dashboardLayout')) || defaultLayout;

function saveLayout() {
const tiles = document.querySelectorAll('.tile');
layout = Array.from(tiles).map(tile => ({
id: tile.id,
x: parseFloat(tile.style.left) || 0,
y: parseFloat(tile.style.top) || 0,
w: parseFloat(tile.style.width) || 64,
h: parseFloat(tile.style.height) || 64
}));
localStorage.setItem('dashboardLayout', JSON.stringify(layout));
}

function createTiles() {
const container = document.getElementById('dashboard');
container.innerHTML = '';
layout.forEach(item => {
const tile = document.createElement('div');
tile.className = 'tile';
tile.id = item.id;
tile.style.left = item.x + 'px';
tile.style.top = item.y + 'px';
tile.style.width = item.w + 'px';
tile.style.height = item.h + 'px';
if (['spotify','amazon','youtube','settings'].includes(item.id)) {
tile.innerHTML = `<div class="tile-content icon-tile-content"></div><div class="resize-handle"></div>`;
} else {
tile.innerHTML = `<div class="tile-header"></div><div class="tile-content"></div><div class="resize-handle"></div>`;
}
container.appendChild(tile);
fillTileContent(item.id, tile);
});
initInteract();
}

function fillTileContent(id, tile) {
const content = tile.querySelector('.tile-content');
const header = tile.querySelector('.tile-header');
switch(id) {
case 'spotify':
content.innerHTML = '<i class="fab fa-spotify"></i>';
tile.setAttribute('data-app', 'spotify');
break;
case 'amazon':
content.innerHTML = '<i class="fab fa-amazon"></i>';
tile.setAttribute('data-app', 'amazon');
break;
case 'youtube':
content.innerHTML = '<i class="fab fa-youtube"></i>';
tile.setAttribute('data-app', 'youtube');
break;
case 'settings':
content.innerHTML = '<i class="fas fa-cog"></i>';
break;
case 'weather':
header.innerHTML = '<i class="fas fa-cloud-sun"></i> Aktuell';
content.innerHTML = `<div class="weather-now"><div class="temp" id="current-temp">--°</div><div class="details" id="current-details"></div></div><div id="current-icon" style="font-size:2rem;"></div>`;
break;
case 'forecast':
header.innerHTML = '<i class="fas fa-calendar-alt"></i> 5 Tage';
content.innerHTML = '<div class="forecast-row" id="forecast-container"></div>';
break;
case 'hourly':
header.innerHTML = '<i class="fas fa-clock"></i> Stündlich';
content.innerHTML = '<div class="hourly-scroll" id="hourly-container"></div>';
break;
case 'calendar':
header.innerHTML = '<i class="fas fa-calendar"></i> Termine';
content.innerHTML = `
<input type="text" id="ical-url" placeholder="iCal URL einfügen..." style="width:100%; padding:6px; border-radius:8px; border:1px solid #ccc; margin-bottom:6px;">
<button id="load-ical" class="upload-btn" style="margin-bottom:6px;">Laden</button>
<div class="calendar-grid" id="calendar-grid"></div>
<div class="event-details" id="event-details"></div>
`;
break;
case 'slideshow':
header.innerHTML = '<i class="fas fa-images"></i> Slideshow';
content.innerHTML = `
<div class="slideshow-container" id="slideshow-container">
<img id="slide-img" src="" alt="Kein Bild" style="display:none;">
<div class="slideshow-controls">
<button id="prev-slide"><i class="fas fa-chevron-left"></i></button>
<button id="next-slide"><i class="fas fa-chevron-right"></i></button>
<button id="delete-slide"><i class="fas fa-trash"></i></button>
</div>
</div>
<div class="upload-area">
<label for="file-upload" class="upload-btn"><i class="fas fa-upload"></i> Hochladen</label>
<input type="file" id="file-upload" multiple accept="image/*">
<span id="image-count">0 Bilder</span>
</div>
`;
break;
}
}

function initInteract() {
interact('.tile')
.draggable({
allowFrom: '.tile-header, .icon-tile-content',
ignoreFrom: '.resize-handle',
modifiers: [ interact.modifiers.restrict({ restriction: 'parent', endOnly: false }) ],
listeners: {
move(event) {
const target = event.target;
const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
target.style.transform = `translate(${x}px, ${y}px)`;
target.setAttribute('data-x', x);
target.setAttribute('data-y', y);
},
end(event) {
const target = event.target;
const x = parseFloat(target.getAttribute('data-x')) || 0;
const y = parseFloat(target.getAttribute('data-y')) || 0;
target.style.transform = '';
target.style.left = (parseFloat(target.style.left) + x) + 'px';
target.style.top = (parseFloat(target.style.top) + y) + 'px';
target.setAttribute('data-x', 0);
target.setAttribute('data-y', 0);
saveLayout();
}
}
})
.resizable({
edges: { bottom: true, right: true },
modifiers: [ interact.modifiers.restrict({ restriction: 'parent', endOnly: false }) ],
listeners: {
move(event) {
event.target.style.width = event.rect.width + 'px';
event.target.style.height = event.rect.height + 'px';
},
end() { saveLayout(); }
}
});
}

document.getElementById('dashboard').addEventListener('click', function(e) {
const tile = e.target.closest('.tile');
if (!tile) return;
bringToFront(tile);
if (tile.id === 'settings') {
document.getElementById('settings-panel').classList.add('open');
return;
}
const app = tile.getAttribute('data-app');
if (app) {
const schemes = {
spotify: 'spotify://',
amazon: 'amznmp3://',
youtube: 'vnd.youtube://'
};
const fallbacks = {
spotify: 'https://open.spotify.com',
amazon: 'https://music.amazon.com',
youtube: 'https://youtube.com'
};
const start = Date.now();
window.location.href = schemes[app];
setTimeout(() => {
if (Date.now() - start < 1500) window.open(fallbacks[app], '_blank');
}, 1000);
}
});

// ---------- WEATHER ----------
async function fetchWeather(lat=52.52, lon=13.41) {
try {
const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=weather_code,temperature_2m,relative_humidity_2m,wind_speed_10m&hourly=weather_code,temperature_2m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`);
return await res.json();
} catch(e) { console.error(e); }
}
function weatherDesc(code) {
const m = {0:'Klar',1:'Leicht bewölkt',2:'Teilweise bewölkt',3:'Bedeckt',45:'Nebel',51:'Niesel',61:'Regen',80:'Schauer'};
return m[code] || 'Bewölkt';
}
function weatherEmoji(code) {
if(code===0) return '☀️'; if(code<=2) return '🌤️'; if(code===3) return '☁️'; if(code>=50) return '🌧️'; return '🌥️';
}
async function updateWeather() {
const data = await fetchWeather();
if(!data) return;
const tempEl = document.getElementById('current-temp');
if(tempEl) tempEl.textContent = Math.round(data.current.temperature_2m) + '°C';
const detEl = document.getElementById('current-details');
if(detEl) detEl.innerHTML = `${weatherDesc(data.current.weather_code)}<br>💧 ${data.current.relative_humidity_2m}% · 💨 ${data.current.wind_speed_10m} km/h`;
const iconEl = document.getElementById('current-icon');
if(iconEl) iconEl.textContent = weatherEmoji(data.current.weather_code);
const fc = document.getElementById('forecast-container');
if(fc) {
fc.innerHTML = '';
data.daily.time.forEach((day,i) => {
const d = new Date(day);
const div = document.createElement('div');
div.className = 'forecast-day' + (i===0?' active':'');
div.innerHTML = `<div>${d.toLocaleDateString('de-DE',{weekday:'short',day:'numeric'})}</div><div>${weatherEmoji(data.daily.weather_code[i])}</div><div>${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°</div>`;
fc.appendChild(div);
});
}
const hc = document.getElementById('hourly-container');
if(hc) {
hc.innerHTML = '';
data.hourly.time.slice(0,24).forEach((t,i) => {
const time = new Date(t);
const div = document.createElement('div');
div.className = 'hourly-item';
div.innerHTML = `<div>${time.getHours()}:00</div><div>${weatherEmoji(data.hourly.weather_code[i])}</div><div>${Math.round(data.hourly.temperature_2m[i])}°</div>`;
hc.appendChild(div);
});
}
}

// ---------- CALENDAR ----------
let calendarEvents = [];
function assignEventColor(index) {
const palette = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63','#00bcd4','#ff5722'];
return palette[index % palette.length];
}
function renderCalendar() {
const grid = document.getElementById('calendar-grid');
if(!grid) return;
grid.innerHTML = '';
['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d => {
const div = document.createElement('div');
div.className = 'day-header';
div.textContent = d;
grid.appendChild(div);
});
const now = new Date();
const year = now.getFullYear();
const month = now.getMonth();
const firstDay = new Date(year, month, 1).getDay();
const daysInMonth = new Date(year, month+1, 0).getDate();
const offset = (firstDay + 6) % 7;
for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));
for(let d=1; d<=daysInMonth; d++) {
const dayDiv = document.createElement('div');
dayDiv.className = 'day';
dayDiv.textContent = d;
const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const eventsOnDay = calendarEvents.filter(e => e.start.startsWith(dateStr));
if(eventsOnDay.length > 0) {
eventsOnDay.forEach((ev, idx) => {
const line = document.createElement('div');
line.className = 'event-line';
line.style.backgroundColor = ev.color || assignEventColor(idx);
line.style.bottom = (2 + idx * 6) + 'px';
dayDiv.appendChild(line);
});
dayDiv.addEventListener('click', () => {
const details = document.getElementById('event-details');
if(details) {
details.style.display = 'block';
details.innerHTML = eventsOnDay.map(e => `<strong style="color:${e.color}">${e.summary}</strong><br>${e.start} - ${e.end}`).join('<hr>');
}
});
}
if(d === now.getDate() && month === now.getMonth() && year === now.getFullYear()) {
dayDiv.classList.add('today');
}
grid.appendChild(dayDiv);
}
}

function loadCalendar(url) {
if(!url) return;
fetch(url)
.then(response => {
if (!response.ok) throw new Error('Netzwerkantwort war nicht ok');
return response.text();
})
.then(data => {
try {
const jcal = ICAL.parse(data);
const comp = new ICAL.Component(jcal);
const vevents = comp.getAllSubcomponents('vevent');
calendarEvents = vevents.map((vevent, i) => {
const ev = new ICAL.Event(vevent);
const start = ev.startDate.toJSDate();
const end = ev.endDate.toJSDate();
return {
summary: ev.summary,
start: start.toISOString().substring(0,10),
end: end.toISOString().substring(0,10),
color: assignEventColor(i)
};
});
renderCalendar();
console.log('Kalender erfolgreich geladen:', calendarEvents.length, 'Ereignisse');
} catch(parseError) {
console.error('ICAL Parse Fehler:', parseError);
alert('Fehler beim Verarbeiten der Kalenderdaten. Bitte prüfe die URL.');
}
})
.catch(err => {
console.error('Kalender Ladefehler:', err);
alert('Fehler beim Laden des Kalenders. Möglicherweise ist die URL falsch oder der Kalender nicht öffentlich zugänglich.');
});
}

document.addEventListener('click', function(e) {
if(e.target.id === 'load-ical' || e.target.closest('#load-ical')) {
const url = document.getElementById('ical-url').value.trim();
if(!url) return;
loadCalendar(url);
}
});

// ---------- SLIDESHOW ----------
let slides = [];
let currentSlide = 0;
let slideInterval = 10;
let slideshowTimer;

function saveSlidesToStorage() {
try {
localStorage.setItem('slideshowImages', JSON.stringify(slides));
localStorage.setItem('slideshowIndex', currentSlide);
} catch(e) {
console.warn('Slideshow konnte nicht vollständig gespeichert werden (zu viele/große Bilder).');
}
}

function loadSlidesFromStorage() {
try {
const saved = localStorage.getItem('slideshowImages');
if (saved) {
slides = JSON.parse(saved);
currentSlide = parseInt(localStorage.getItem('slideshowIndex')) || 0;
if (currentSlide >= slides.length) currentSlide = 0;
updateSlideDisplay();
const countEl = document.getElementById('image-count');
if(countEl) countEl.textContent = slides.length + ' Bilder';
}
} catch(e) {
console.warn('Slideshow-Daten konnten nicht geladen werden.');
}
}

function applyBackground() {
const mode = localStorage.getItem('bgMode') || 'theme';
const root = document.documentElement;
switch(mode) {
case 'theme':
root.style.setProperty('--bg-image', 'none');
document.body.style.background = '';
break;
case 'color':
root.style.setProperty('--bg-image', 'none');
document.body.style.background = localStorage.getItem('bgColor') || '#e0e7ff';
break;
case 'url':
const url = localStorage.getItem('bgUrl') || '';
root.style.setProperty('--bg-image', url ? `url(${url})` : 'none');
document.body.style.background = '';
break;
case 'upload':
const upload = localStorage.getItem('bgUpload') || '';
root.style.setProperty('--bg-image', upload ? `url(${upload})` : 'none');
document.body.style.background = '';
break;
case 'slideshow':
document.body.style.background = '';
if (slides.length > 0 && slides[currentSlide]) {
root.style.setProperty('--bg-image', `url(${slides[currentSlide]})`);
} else {
root.style.setProperty('--bg-image', 'none');
}
break;
}
}

function updateSlideDisplay() {
const img = document.getElementById('slide-img');
if(!img) return;
if (slides.length > 0 && slides[currentSlide]) {
img.src = slides[currentSlide];
img.style.display = 'block';
} else {
img.src = '';
img.style.display = 'none';
}
if (localStorage.getItem('bgMode') === 'slideshow') {
applyBackground();
}
}

function startSlideshow() {
clearInterval(slideshowTimer);
if(slides.length === 0) return;
slideshowTimer = setInterval(() => {
currentSlide = (currentSlide + 1) % slides.length;
updateSlideDisplay();
saveSlidesToStorage();
}, slideInterval * 1000);
}

document.addEventListener('change', function(e) {
if(e.target.id === 'file-upload') {
const files = Array.from(e.target.files);
if (files.length === 0) return;
files.forEach(file => {
const reader = new FileReader();
reader.onload = ev => {
slides.push(ev.target.result);
if(slides.length === 1) currentSlide = 0;
updateSlideDisplay();
const countEl = document.getElementById('image-count');
if(countEl) countEl.textContent = slides.length + ' Bilder';
saveSlidesToStorage();
startSlideshow();
if (localStorage.getItem('bgMode') === 'slideshow') applyBackground();
};
reader.readAsDataURL(file);
});
e.target.value = '';
}
});

document.addEventListener('click', function(e) {
if(e.target.closest('#next-slide')) {
if(!slides.length) return;
currentSlide = (currentSlide + 1) % slides.length;
updateSlideDisplay();
saveSlidesToStorage();
startSlideshow();
} else if(e.target.closest('#prev-slide')) {
if(!slides.length) return;
currentSlide = (currentSlide - 1 + slides.length) % slides.length;
updateSlideDisplay();
saveSlidesToStorage();
startSlideshow();
} else if(e.target.closest('#delete-slide')) {
if(!slides.length) return;
slides.splice(currentSlide, 1);
if(currentSlide >= slides.length) currentSlide = Math.max(0, slides.length-1);
updateSlideDisplay();
const countEl = document.getElementById('image-count');
if(countEl) countEl.textContent = slides.length + ' Bilder';
saveSlidesToStorage();
startSlideshow();
if (localStorage.getItem('bgMode') === 'slideshow') applyBackground();
}
});

// ---------- SETTINGS ----------
function loadSettings() {
const savedTheme = localStorage.getItem('theme') || 'default';
applyTheme(savedTheme);
document.getElementById('theme-select').value = savedTheme;

const bgMode = localStorage.getItem('bgMode') || 'theme';
document.getElementById('bg-mode').value = bgMode;
updateBgModeUI(bgMode);
applyBackground();

const transp = localStorage.getItem('transparent') || 'off';
document.getElementById('transparency-toggle').value = transp;
document.body.classList.toggle('transparent-tiles', transp === 'on');

document.getElementById('font-color').value = localStorage.getItem('fontColor') || '#1e293b';
document.documentElement.style.setProperty('--text-color', localStorage.getItem('fontColor') || '#1e293b');

document.getElementById('font-family-select').value = localStorage.getItem('fontFamily') || "'Segoe UI', system-ui, -apple-system, sans-serif";
document.documentElement.style.setProperty('--font-family', localStorage.getItem('fontFamily') || "'Segoe UI', system-ui, -apple-system, sans-serif");

const d3dMode = localStorage.getItem('3dMode') || 'none';
document.getElementById('3d-mode').value = d3dMode;
const d3dStrength = localStorage.getItem('3dStrength') || 2;
document.getElementById('3d-strength').value = d3dStrength;
apply3DEffect(d3dMode, d3dStrength);

document.getElementById('tile-bg-color').value = localStorage.getItem('tileBg') || '#ffffff';
document.documentElement.style.setProperty('--tile-bg', (localStorage.getItem('tileBg') || '#ffffff') + '80');

document.getElementById('border-width').value = localStorage.getItem('borderWidth') || 1;
document.documentElement.style.setProperty('--tile-border-width', (localStorage.getItem('borderWidth') || 1) + 'px');

document.getElementById('border-radius').value = localStorage.getItem('borderRadius') || 24;
document.documentElement.style.setProperty('--tile-border-radius', (localStorage.getItem('borderRadius') || 24) + 'px');

slideInterval = parseInt(localStorage.getItem('slideInterval') || 10);
document.getElementById('interval-select').value = slideInterval;
startSlideshow();
}

function updateBgModeUI(mode) {
document.getElementById('bg-color-container').style.display = mode === 'color' ? 'block' : 'none';
document.getElementById('bg-url-container').style.display = mode === 'url' ? 'block' : 'none';
document.getElementById('bg-upload-container').style.display = mode === 'upload' ? 'block' : 'none';
if (mode === 'color') document.getElementById('bg-color').value = localStorage.getItem('bgColor') || '#e0e7ff';
if (mode === 'url') document.getElementById('bg-url').value = localStorage.getItem('bgUrl') || '';
}

document.getElementById('close-settings').addEventListener('click', () => document.getElementById('settings-panel').classList.remove('open'));
document.getElementById('theme-select').addEventListener('change', e => applyTheme(e.target.value));
document.getElementById('bg-mode').addEventListener('change', function(e) {
const mode = e.target.value;
localStorage.setItem('bgMode', mode);
updateBgModeUI(mode);
applyBackground();
});
document.getElementById('bg-color').addEventListener('input', function(e) {
localStorage.setItem('bgColor', e.target.value);
if (localStorage.getItem('bgMode') === 'color') applyBackground();
});
document.getElementById('bg-url').addEventListener('input', function(e) {
localStorage.setItem('bgUrl', e.target.value);
if (localStorage.getItem('bgMode') === 'url') applyBackground();
});
document.getElementById('bg-upload').addEventListener('change', function(e) {
const file = e.target.files[0];
if (!file) return;
const reader = new FileReader();
reader.onload = function(ev) {
localStorage.setItem('bgUpload', ev.target.result);
if (localStorage.getItem('bgMode') === 'upload') applyBackground();
};
reader.readAsDataURL(file);
});
document.getElementById('transparency-toggle').addEventListener('change', e => {
document.body.classList.toggle('transparent-tiles', e.target.value === 'on');
localStorage.setItem('transparent', e.target.value);
});
document.getElementById('font-color').addEventListener('input', e => {
document.documentElement.style.setProperty('--text-color', e.target.value);
localStorage.setItem('fontColor', e.target.value);
});
document.getElementById('font-family-select').addEventListener('change', e => {
document.documentElement.style.setProperty('--font-family', e.target.value);
localStorage.setItem('fontFamily', e.target.value);
});
document.getElementById('3d-mode').addEventListener('change', function(e) {
const mode = e.target.value;
localStorage.setItem('3dMode', mode);
apply3DEffect(mode, document.getElementById('3d-strength').value);
});
document.getElementById('3d-strength').addEventListener('input', function(e) {
localStorage.setItem('3dStrength', e.target.value);
apply3DEffect(document.getElementById('3d-mode').value, e.target.value);
});
document.getElementById('tile-bg-color').addEventListener('input', e => {
document.documentElement.style.setProperty('--tile-bg', e.target.value + '80');
localStorage.setItem('tileBg', e.target.value);
});
document.getElementById('border-width').addEventListener('input', e => {
document.documentElement.style.setProperty('--tile-border-width', e.target.value + 'px');
localStorage.setItem('borderWidth', e.target.value);
});
document.getElementById('border-radius').addEventListener('input', e => {
document.documentElement.style.setProperty('--tile-border-radius', e.target.value + 'px');
localStorage.setItem('borderRadius', e.target.value);
});
document.getElementById('interval-select').addEventListener('change', e => {
slideInterval = parseInt(e.target.value);
localStorage.setItem('slideInterval', slideInterval);
startSlideshow();
});

});
}
})();
</script>

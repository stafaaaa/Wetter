<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Smart Dashboard · 3D Kacheln</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
}
:focus { outline: none !important; }
button, input, select, textarea, .nav-item, .icon-btn {
outline: none !important;
-webkit-tap-highlight-color: transparent;
}
body {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
background: #f5f5f7;
color: #1d1d1f;
transition: background 0.2s;
}
:root {
--bg-primary: #f5f5f7;
--card-bg: rgba(255, 255, 255, 0.75);
--card-border: rgba(0, 0, 0, 0.04);
--text-primary: #1d1d1f;
--text-secondary: #86868b;
--accent-blue: #0071e3;
--shadow-md: 0 20px 40px -10px rgba(0,0,0,0.1);
--glass-bg: rgba(255,255,255,0.6);
--tile-radius: 28px;
}
body.theme-dark {
--bg-primary: #1d1d1f;
--card-bg: rgba(40,40,42,0.8);
--card-border: rgba(255,255,255,0.08);
--text-primary: #f5f5f7;
--glass-bg: rgba(30,30,32,0.6);
}
.dashboard {
width: 100vw;
height: 100dvh;
display: flex;
flex-direction: column;
overflow: hidden;
}
.main-content {
flex: 1;
padding: 8px 12px 56px 12px;
overflow: hidden;
display: flex;
flex-direction: column;
min-height: 0;
}
.view { display: none; flex: 1; }
.view.active { display: flex; flex-direction: column; }
.bottom-nav {
position: fixed;
bottom: 8px;
left: 0;
right: 0;
display: flex;
justify-content: space-around;
padding: 0 8px;
z-index: 500;
pointer-events: none;
}
.nav-item {
pointer-events: all;
display: flex;
flex-direction: column;
align-items: center;
gap: 2px;
background: rgba(0,0,0,0.05);
backdrop-filter: blur(20px);
border: 0.5px solid rgba(255,255,255,0.5);
color: #1d1d1f;
font-size: 1.4rem;
cursor: pointer;
padding: 6px 12px;
border-radius: 60px;
min-width: 56px;
font-weight: 500;
}
.nav-label { font-size: 0.6rem; font-weight: 600; }
.nav-item.active {
background: var(--accent-blue);
color: white;
box-shadow: 0 4px 12px rgba(0,113,227,0.3);
}
.nav-burger { position: relative; }
.menu-dropdown {
position: absolute;
bottom: 68px;
left: 50%;
transform: translateX(-50%);
background: var(--glass-bg);
backdrop-filter: blur(40px);
border: 1px solid var(--card-border);
border-radius: 28px;
padding: 8px;
min-width: 200px;
box-shadow: 0 20px 40px rgba(0,0,0,0.2);
display: none;
z-index: 600;
}
.menu-dropdown.show { display: block; }
.menu-item {
padding: 12px 20px;
color: var(--text-primary);
font-size: 0.95rem;
font-weight: 500;
cursor: pointer;
border-radius: 20px;
display: flex;
align-items: center;
gap: 12px;
}
.menu-item:hover { background: rgba(0,113,227,0.1); color: var(--accent-blue); }
.menu-divider { height: 1px; background: var(--card-border); margin: 6px 0; }
.grid-container {
display: grid;
grid-template-columns: repeat(6, 1fr);
gap: 10px;
flex: 1;
min-height: 0;
padding: 8px 0;
align-content: start;
}
.tile {
background: var(--card-bg);
backdrop-filter: blur(20px);
border: 1px solid var(--card-border);
border-radius: var(--tile-radius);
padding: 14px 16px;
display: flex;
flex-direction: column;
position: relative;
color: var(--text-primary);
overflow: hidden;
transition: transform 0.3s, box-shadow 0.3s;
box-shadow: 0 4px 16px rgba(0,0,0,0.05);
cursor: pointer;
}
.tile[data-fx="float-medium"] { transform: translateY(-12px); box-shadow: 0 20px 36px rgba(0,0,0,0.15); }
.tile[data-fx="tilt-medium"] { transform: perspective(600px) rotateX(8deg) rotateY(-4deg); }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
.tile[data-fx="pulse"] { animation: pulse 2.2s infinite; }
@keyframes swing { 0%,100% { transform: translateY(-6px) rotate(-2deg); } 50% { transform: translateY(-16px) rotate(2deg); } }
.tile[data-fx="swing"] { animation: swing 2.5s infinite; }
@keyframes wobble { 0% { transform: translateY(-4px) rotate(-1deg); } 50% { transform: translateY(-18px) rotate(2deg); } 100% { transform: translateY(-4px) rotate(-1deg); } }
.tile[data-fx="wobble"] { animation: wobble 3s infinite; }
.tile.edit-mode { border: 2px dashed var(--accent-blue) !important; transform: none !important; animation: none !important; cursor: grab; }
.tile.pinching { outline: 3px solid var(--accent-blue); outline-offset: 2px; }
.tile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: 600; font-size: 1rem; z-index: 3; position: relative; }
.tile-big-icon {
position: absolute;
bottom: 12px;
right: 14px;
font-size: clamp(2rem, 5vw, 4rem);
pointer-events: none;
opacity: 0.5;
animation: gentleFloat 3s infinite;
z-index: 1;
}
@keyframes gentleFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
.icon-btn {
background: rgba(255,255,255,0.85);
backdrop-filter: blur(8px);
border: 0.5px solid rgba(0,0,0,0.1);
width: 44px;
height: 44px;
border-radius: 50%;
display: inline-flex;
align-items: center;
justify-content: center;
font-size: 1.2rem;
cursor: pointer;
}
.icon-btn:active { transform: scale(0.92); }
.tile-delete-btn { background: rgba(255,59,48,0.15); color: #ff3b30; }
.tile-content { flex: 1; position: relative; z-index: 2; min-height: 0; overflow-y: auto; }
.size-badge { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); padding: 2px 8px; border-radius: 30px; font-size: 0.7rem; color: white; z-index: 2; }
.flip-clock { display: flex; gap: 6px; font-size: 3rem; font-weight: 300; align-items: center; }
.flip-digit { background: rgba(0,0,0,0.2); backdrop-filter: blur(8px); padding: 4px 12px; border-radius: 20px; }
.forecast-icons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.forecast-item { background: var(--glass-bg); backdrop-filter: blur(8px); border-radius: 28px; padding: 6px 12px; text-align: center; font-size: 0.8rem; }
.slideshow-full { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border-radius: inherit; z-index: 0; }
.tile-slideshow { padding: 0 !important; }
.tile-slideshow .tile-header { position: absolute; top: 16px; left: 16px; right: 16px; z-index: 10; background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); border-radius: 60px; padding: 8px 20px; margin: 0; color: white; }
.calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-top: 8px; }
.cal-day { padding: 8px 0; text-align: center; border-radius: 20px; background: var(--glass-bg); font-weight: 500; }
.today { background: var(--accent-blue); color: white; }
.app-btn { background: var(--glass-bg); backdrop-filter: blur(20px); border: 0.5px solid var(--card-border); padding: 12px 24px; border-radius: 60px; font-weight: 600; cursor: pointer; }
.settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.settings-card { background: var(--glass-bg); backdrop-filter: blur(40px); border-radius: 48px; padding: 28px 32px; max-width: 90vw; width: 680px; max-height: 85vh; overflow-y: auto; }
.input-group { margin-bottom: 20px; }
.input-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); }
input, textarea, select { width: 100%; padding: 12px 16px; border-radius: 30px; border: 1px solid var(--card-border); background: rgba(255,255,255,0.5); color: var(--text-primary); }
.flex-row { display: flex; gap: 12px; flex-wrap: wrap; }
.color-row { display: flex; gap: 12px; align-items: center; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="dashboard">
<div class="main-content">
<div id="view-home" class="view active"><div class="grid-container" id="grid-home"></div></div>
<div id="view-media" class="view"><div class="grid-container" id="grid-media"></div></div>
<div id="view-tools" class="view"><div class="grid-container" id="grid-tools"></div></div>
<div id="view-slideshow" class="view"><div class="grid-container" id="grid-slideshow"></div></div>
</div>
<div class="bottom-nav">
<button class="nav-item active" data-view="home"><span>🏠</span><span class="nav-label">Start</span></button>
<button class="nav-item" data-view="media"><span>🎬</span><span class="nav-label">Medien</span></button>
<button class="nav-item" data-view="tools"><span>📋</span><span class="nav-label">Tools</span></button>
<button class="nav-item" data-view="slideshow"><span>🖼️</span><span class="nav-label">Slides</span></button>
<div class="nav-item nav-burger" id="bottomBurgerBtn"><span>☰</span><span class="nav-label">Menü</span>
<div class="menu-dropdown" id="bottomMenuDropdown">
<div class="menu-item" id="bottomMenuEditToggle">✎ Bearbeiten</div>
<div class="menu-item" id="bottomMenuUploadImages">🖼️ Bilder hochladen</div>
<div class="menu-item" id="bottomMenuOpenSettings">⚙️ Einstellungen</div>
<div class="menu-item" id="bottomMenuAddTile">➕ Neue Kachel</div>
<div class="menu-divider"></div>
<div class="menu-item" id="bottomMenuReset">↻ Reset</div>
</div>
</div>
</div>
</div>

<!-- Settings Modal (ohne Online-Bild-Felder) -->
<div id="settingsModal" class="settings-overlay hidden">
<div class="settings-card"><h2 style="margin-bottom:24px;">Einstellungen</h2>
<div class="input-group"><label>📍 Stadt</label><input type="text" id="settingsCity" value="Düsseldorf"></div>
<div class="input-group"><label>⏱️ Slideshow (Sek)</label><input type="number" id="settingsSlideshowSec" value="6"></div>
<div class="input-group"><label>🎵 Spotify Link</label><input type="text" id="settingsSpotify" value="spotify:"></div>
<div class="input-group"><label>▶️ YouTube Link</label><input type="text" id="settingsYoutube" value="vnd.youtube://"></div>
<div class="input-group"><label>🎶 Amazon Music</label><input type="text" id="settingsAmazonMusic" value="amazonmusic://"></div>
<div class="input-group"><label>🍳 Rezepte-URL</label><input type="text" id="settingsRecipeUrl" value="https://www.chefkoch.de/"></div>
<div class="input-group"><label>📋 Termine (Datum | Titel)</label><textarea id="settingsAppointments" rows="3">2026-04-10 09:00 | Arzttermin\n2026-04-12 14:30 | Team Meeting</textarea></div>
<div class="input-group"><label>🎨 Layout-Theme</label><div class="flex-row"><button class="app-btn theme-btn" data-theme="apple-light">🍎 Hell</button><button class="app-btn theme-btn" data-theme="apple-dark">🌙 Dunkel</button></div></div>
<div class="input-group"><label>🧊 3D-Effekt</label><div class="flex-row"><button class="app-btn effect-btn" data-fx="float-medium">Schweben</button><button class="app-btn effect-btn" data-fx="tilt-medium">Kippen</button><button class="app-btn effect-btn" data-fx="pulse">Pulsieren</button><button class="app-btn effect-btn" data-fx="swing">Pendeln</button><button class="app-btn effect-btn" data-fx="wobble">Taumeln</button><button class="app-btn effect-btn" data-fx="none">Kein</button></div></div>
<div class="input-group"><label>🎨 Akzentfarbe</label><div class="color-row"><input type="color" id="globalAccentColor" value="#0071e3"><input type="text" id="globalAccentColorText"></div></div>
<div class="input-group"><label>📝 Schriftfarbe</label><div class="color-row"><input type="color" id="globalTextColor" value="#1d1d1f"><input type="text" id="globalTextColorText"></div></div>
<div class="input-group"><label>🖼️ Dashboard Hintergrund</label><div class="flex-row"><button class="app-btn" id="uploadDashboardBgBtn">📸 Bild wählen</button><button class="app-btn" id="removeDashboardBgBtn">🗑️ Entfernen</button></div></div>
<div class="input-group"><label>🔮 Globale Kachel-Transparenz</label><input type="range" id="tileOpacitySlider" min="0.3" max="1" step="0.05" value="0.75"><span id="tileOpacityValue">0.75</span></div>
<div class="flex-row"><button class="app-btn" id="saveSettingsBtn">Speichern</button><button class="app-btn" id="closeSettingsBtn">Abbrechen</button></div>
</div>
</div>

<!-- Tile Settings Modal -->
<div id="tileSettingsModal" class="settings-overlay hidden">
<div class="settings-card"><h2>Kachel anpassen</h2><input type="hidden" id="currentTileId">
<div class="input-group"><label>Titel</label><input type="text" id="tileTitle"></div>
<div class="input-group"><label>🎨 Eigenes Icon (Emoji)</label><input type="text" id="tileCustomIcon" placeholder="z.B. 🚀"></div>
<div class="input-group"><label>Hintergrundfarbe</label><div class="color-row"><input type="color" id="tileColor"><input type="text" id="tileColorText"></div></div>
<div class="input-group"><label>Transparenz</label><input type="range" id="tileOpacity" min="0.2" max="1" step="0.05" value="0.75"><span id="tileOpacityVal">0.75</span></div>
<div class="input-group"><label>Größe</label><select id="tileSizeSelect"><option value="2,2">Mittel (2x2)</option><option value="3,2">Breit (3x2)</option><option value="4,2">XL (4x2)</option><option value="6,2">Vollbreit (6x2)</option><option value="3,3">Groß (3x3)</option></select></div>
<div id="appFields" class="hidden"><label>App-Link</label><input type="text" id="tileAppLink"></div>
<div class="flex-row"><button class="app-btn" id="saveTileSettingsBtn">Speichern</button><button class="app-btn" id="closeTileSettingsBtn">Abbrechen</button></div>
</div>
</div>

<!-- Add Tile Modal -->
<div id="addTileModal" class="settings-overlay hidden"><div class="settings-card"><h2>Neue Kachel</h2>
<div class="input-group"><label>Typ</label><select id="newTileType"><option value="clockweather">Uhr+Wetter</option><option value="clock">Uhr</option><option value="weather">Wetter</option><option value="calendar">Kalender</option><option value="slideshow">Slideshow</option><option value="appointments">Termine</option><option value="spotify">Spotify</option><option value="youtube">YouTube</option><option value="recipe">Rezepte</option><option value="app">Eigene App</option></select></div>
<div class="input-group"><label>Titel</label><input type="text" id="newTileTitle"></div>
<div id="newAppLinkGroup" class="hidden"><label>App-Link</label><input type="text" id="newTileAppLink"></div>
<div class="flex-row"><button class="app-btn" id="confirmAddTileBtn">Hinzufügen</button><button class="app-btn" id="cancelAddTileBtn">Abbrechen</button></div>
</div></div>

<script>
(function(){
let tiles = [], editMode = false, nextTileId = 100, currentView = 'home', slideshowTimer = null;
let uploadedImages = []; // speichert DataURLs der lokal hochgeladenen Bilder
const DEFAULT_TILES = [
{ id:1, type:'clockweather', title:'Start', colSpan:3, rowSpan:3, color:'#ffffff', bgImage:'', opacity:0.75, view:'home' },
{ id:4, type:'slideshow', title:'Slideshow', colSpan:6, rowSpan:4, color:'#ffffff', view:'slideshow', opacity:0.75 },
{ id:5, type:'calendar', title:'Kalender', colSpan:2, rowSpan:2, view:'tools', opacity:0.75 },
{ id:6, type:'appointments', title:'Termine', colSpan:2, rowSpan:2, view:'tools', opacity:0.75 },
{ id:7, type:'youtube', title:'YouTube', colSpan:2, rowSpan:2, view:'media', opacity:0.75 },
{ id:8, type:'amazonmusic', title:'Amazon Music', colSpan:2, rowSpan:2, view:'media', opacity:0.75 },
{ id:9, type:'recipe', title:'Rezepte', colSpan:2, rowSpan:2, view:'tools', opacity:0.75 }
];
let userConfig = {
city:'Düsseldorf', slideshowInterval:6,
spotifyUrl:'spotify:', youtubeUrl:'vnd.youtube://', amazonMusicUrl:'amazonmusic://',
recipeUrl:'https://www.chefkoch.de/',
appointmentsText:'2026-04-10 09:00 | Arzttermin\n2026-04-12 14:30 | Team Meeting',
globalAccent:'#0071e3', globalTextColor:'#1d1d1f', theme:'light', fontSize:'medium',
tileOpacity:0.75, dashboardBgImage:'', dashboardBgColor:'#f5f5f7', effect3D:'float-medium', layoutTheme:'apple-light'
};
const tileIcons = { clock:'🕐', weather:'🌤️', clockweather:'🕐🌤️', calendar:'📅', slideshow:'🖼️', appointments:'📋', spotify:'🎵', youtube:'▶️', amazonmusic:'🎶', recipe:'🍳', app:'📱' };

function save() {
localStorage.setItem('dash_tiles', JSON.stringify(tiles));
localStorage.setItem('dash_config', JSON.stringify(userConfig));
localStorage.setItem('dash_images', JSON.stringify(uploadedImages));
}
function load() {
try {
let t = localStorage.getItem('dash_tiles');
if(t) tiles = JSON.parse(t);
else tiles = JSON.parse(JSON.stringify(DEFAULT_TILES));
let c = localStorage.getItem('dash_config');
if(c) userConfig = { ...userConfig, ...JSON.parse(c) };
let i = localStorage.getItem('dash_images');
if(i) uploadedImages = JSON.parse(i);
if(!tiles.length) tiles = JSON.parse(JSON.stringify(DEFAULT_TILES));
} catch(e) { tiles = JSON.parse(JSON.stringify(DEFAULT_TILES)); }
ensureIds();
}
function ensureIds(){ tiles.forEach(t=>{ if(!t.id) t.id=++nextTileId; }); let max=Math.max(...tiles.map(t=>t.id),nextTileId); nextTileId=max+1; }
function reset() {
tiles = JSON.parse(JSON.stringify(DEFAULT_TILES));
userConfig = {
city:'Düsseldorf', slideshowInterval:6, spotifyUrl:'spotify:', youtubeUrl:'vnd.youtube://', amazonMusicUrl:'amazonmusic://',
recipeUrl:'https://www.chefkoch.de/', appointmentsText:'2026-04-10 09:00 | Arzttermin\n2026-04-12 14:30 | Team Meeting',
globalAccent:'#0071e3', globalTextColor:'#1d1d1f', theme:'light', fontSize:'medium',
tileOpacity:0.75, dashboardBgImage:'', dashboardBgColor:'#f5f5f7', effect3D:'float-medium', layoutTheme:'apple-light'
};
uploadedImages = [];
applyAll();
save();
renderAll();
restartSlideshow();
}
function applyAll(){
document.body.className = `theme-${userConfig.theme}`;
document.documentElement.style.setProperty('--accent-blue', userConfig.globalAccent);
if(userConfig.dashboardBgImage) document.body.style.backgroundImage = `url('${userConfig.dashboardBgImage}')`;
else { document.body.style.backgroundImage = 'none'; document.body.style.backgroundColor = userConfig.dashboardBgColor; }
document.querySelectorAll('.tile').forEach(el=>el.setAttribute('data-fx', userConfig.effect3D));
}
function hexToRgba(h,a){ let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function renderAll(){
['home','media','tools','slideshow'].forEach(v=>{
let grid=document.getElementById(`grid-${v}`);
if(grid){
grid.innerHTML='';
let viewTiles=tiles.filter(t=>t.view===v);
viewTiles.forEach(t=>grid.appendChild(createTile(t)));
fitGrid(grid,viewTiles);
}
});
}
function fitGrid(grid,tiles){
if(!tiles.length) return;
let maxRow=0, occupied={};
tiles.forEach(t=>{
let cs=Math.min(t.colSpan||2,6), rs=t.rowSpan||2;
for(let row=1;row<=50;row++){
for(let col=1;col<=6-cs+1;col++){
let fit=true;
for(let r=row;r<row+rs;r++) for(let c=col;c<col+cs;c++) if(occupied[`${c},${r}`]) fit=false;
if(fit){
for(let r=row;r<row+rs;r++) for(let c=col;c<col+cs;c++) occupied[`${c},${r}`]=true;
maxRow=Math.max(maxRow,row+rs-1);
return;
}
}
}
});
let avail=grid.parentElement.clientHeight-20;
let rowH=Math.max(80,Math.floor((avail-10*(maxRow-1))/maxRow));
grid.style.gridTemplateRows=`repeat(${maxRow}, ${rowH}px)`;
}
function createTile(tile){
let div=document.createElement('div');
div.className=`tile ${editMode?'edit-mode':''} ${tile.type==='slideshow'?'tile-slideshow':''}`;
div.dataset.id=tile.id;
div.setAttribute('data-fx',userConfig.effect3D);
div.style.gridColumn=`span ${tile.colSpan||2}`;
div.style.gridRow=`span ${tile.rowSpan||2}`;
let bgColor=tile.color||'#ffffff', op=tile.opacity??userConfig.tileOpacity;
if(tile.bgImage) div.style.backgroundImage=`url('${tile.bgImage}')`;
else { div.style.backgroundImage='none'; div.style.backgroundColor=hexToRgba(bgColor,op); }
div.style.color=userConfig.globalTextColor;
let header=document.createElement('div'); header.className='tile-header';
let left=document.createElement('span');
let icon=tile.customIcon||tileIcons[tile.type]||'📦';
left.innerHTML=`<span class="tile-icon">${icon}</span> ${tile.title||tile.type}`;
header.appendChild(left);
let controls=document.createElement('div'); controls.className='tile-controls';
if(editMode){
let setBtn=document.createElement('button'); setBtn.className='icon-btn'; setBtn.textContent='⚙️';
setBtn.onclick=(e)=>{ e.stopPropagation(); openTileSettings(tile.id); };
let delBtn=document.createElement('button'); delBtn.className='icon-btn tile-delete-btn'; delBtn.textContent='✕';
delBtn.onclick=(e)=>{ e.stopPropagation(); if(confirm('Kachel entfernen?')){ tiles=tiles.filter(t=>t.id!=tile.id); save(); renderAll(); } };
controls.append(setBtn,delBtn);
}
header.appendChild(controls);
div.appendChild(header);
let content=document.createElement('div'); content.className='tile-content';
div.appendChild(content);
fillContent(tile,content);
if(tile.type!=='slideshow'){
let big=document.createElement('div'); big.className='tile-big-icon'; big.textContent=tile.customIcon||tileIcons[tile.type]||'📦'; div.appendChild(big);
let badge=document.createElement('div'); badge.className='size-badge'; badge.textContent=`${tile.colSpan}x${tile.rowSpan}`; div.appendChild(badge);
}
attachPinch(div,tile);
div.draggable=editMode;
div.ondragstart=(e)=>{ if(editMode) e.dataTransfer.setData('text/plain',tile.id); else e.preventDefault(); };
div.ondragover=e=>e.preventDefault();
div.ondrop=e=>{
e.preventDefault(); if(!editMode)return;
let targetId=Number(e.target.closest('.tile')?.dataset.id);
let srcId=Number(e.dataTransfer.getData('text/plain'));
let srcIdx=tiles.findIndex(t=>t.id===srcId), tgtIdx=tiles.findIndex(t=>t.id===targetId);
if(srcIdx>-1 && tgtIdx>-1 && srcIdx!==tgtIdx){ [tiles[srcIdx],tiles[tgtIdx]]=[tiles[tgtIdx],tiles[srcIdx]]; save(); renderAll(); }
};
return div;
}
function attachPinch(el,tile){
let startDist=0, startCol=tile.colSpan, startRow=tile.rowSpan, active=false;
el.addEventListener('touchstart',e=>{
if(e.touches.length===2){
e.preventDefault();
startDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
startCol=tile.colSpan; startRow=tile.rowSpan; active=true; el.classList.add('pinching');
}
},{passive:false});
el.addEventListener('touchmove',e=>{
if(!active||e.touches.length!==2)return;
e.preventDefault();
let dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
let ratio=dist/startDist;
let newCol=Math.min(6,Math.max(1,Math.round(startCol*ratio)));
let newRow=Math.min(5,Math.max(1,Math.round(startRow*ratio)));
tile.colSpan=newCol; tile.rowSpan=newRow;
el.style.gridColumn=`span ${newCol}`; el.style.gridRow=`span ${newRow}`;
let badge=el.querySelector('.size-badge'); if(badge) badge.textContent=`${newCol}x${newRow}`;
},{passive:false});
el.addEventListener('touchend',()=>{ if(active){ active=false; el.classList.remove('pinching'); save(); renderAll(); } });
}

update(); setInterval(update,1000);
} else if(tile.type==='clockweather'){
let updateClock=()=>{ let d=new Date(); let fc=container.querySelector('.flip-clock'); if(fc){ let digs=fc.querySelectorAll('.flip-digit'); if(digs[0])digs[0].textContent=String(d.getHours()).padStart(2,'0'); if(digs[1])digs[1].textContent=String(d.getMinutes()).padStart(2,'0'); } };
let now=new Date();
container.innerHTML=`<div class="flip-clock"><span class="flip-digit">${String(now.getHours()).padStart(2,'0')}</span><span>:</span><span class="flip-digit">${String(now.getMinutes()).padStart(2,'0')}</span></div><div>${now.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long'})}</div><div class="weather-part"></div>`;

} else if(tile.type==='weather') renderWeather(container);
else if(tile.type==='calendar'){
let today=new Date(), y=today.getFullYear(), m=today.getMonth();
let first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
let html=`<div style="font-weight:bold;">${today.toLocaleString('de',{month:'long'})} ${y}</div><div class="calendar-grid">${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d=>`<div style="opacity:0.6;">${d}</div>`).join('')}`;
let start=first===0?6:first-1;
for(let i=0;i<start;i++) html+='<div></div>';
for(let d=1;d<=days;d++){ let isToday=d===today.getDate()&&m===today.getMonth(); html+=`<div class="cal-day ${isToday?'today':''}">${d}</div>`; }
container.innerHTML=html+'</div>';
} else if(tile.type==='slideshow'){
if(slideshowTimer) clearInterval(slideshowTimer);

if(!allImages.length){ container.innerHTML='<div style="display:flex;height:100%;align-items:center;justify-content:center;">Keine Bilder – bitte über Menü hochladen</div>'; return; }
let idx=0;
container.innerHTML=`<img class="slideshow-full" src="${allImages[0]}" data-idx="0">`;
slideshowTimer = setInterval(()=>{
let img=container.querySelector('img');

else if(tile.type==='youtube') container.innerHTML=`<button class="app-btn" onclick="window.location.href='${userConfig.youtubeUrl}'">▶️ YouTube</button>`;

async function renderWeather(container){
try{
let city=userConfig.city;
let geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
let geoData=await geo.json();
if(!geoData.results) throw 0;
let {latitude,longitude,name}=geoData.results[0];
let w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=4`);
let data=await w.json();
let code=data.current.weather_code;
let icon=code===0?'☀️':code<=2?'⛅':code===3?'☁️':'🌧️';
let temp=Math.round(data.current.temperature_2m);
let forecast='';
for(let i=1;i<=3;i++){
let day=new Date(data.daily.time[i]).toLocaleDateString('de',{weekday:'short'});
let max=Math.round(data.daily.temperature_2m_max[i]);
let min=Math.round(data.daily.temperature_2m_min[i]);
forecast+=`<div class="forecast-item">${icon}<br>${day}<br>${max}°/${min}°</div>`;
}
container.innerHTML=`<div style="display:flex;gap:16px;"><div style="font-size:3rem;">${icon}</div><div><div style="font-size:2.5rem;">${temp}°</div><div>${name}</div></div></div><div class="forecast-icons">${forecast}</div>`;
}catch(e){ container.innerHTML=`<div>🌥️ Wetter nicht verfügbar</div>`; }
}

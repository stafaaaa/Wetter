<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AnnaLove</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --accent:#4a9eff; --bg:#0b1623; --glass:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.09); }

body {
  font-family:'Outfit',sans-serif;
  background: var(--bg);
  min-height:100vh;
  padding:12px 12px 20px;
  display:flex; flex-direction:column; gap:10px;
  color:#fff;
}

/* Cards */
.card {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:20px;
  padding:14px 16px;
  backdrop-filter:blur(12px);
}
.label {
  font-size:9px; font-weight:600;
  letter-spacing:0.16em; color:rgba(255,255,255,0.28);
  text-transform:uppercase; margin-bottom:8px;
}

/* Clock */
.clock-row { display:flex; align-items:center; justify-content:space-between; }
.clock-time {
  font-family:'DM Mono',monospace; font-size:60px;
  font-weight:200; color:#fff; letter-spacing:-3px; line-height:1;
  display:flex; align-items:flex-start;
}
.clock-sec { font-size:22px; color:var(--accent); margin-top:8px; }
.clock-date { font-size:11px; letter-spacing:0.08em; color:rgba(255,255,255,0.38); text-transform:uppercase; text-align:right; line-height:1.6; }

/* Weather */
.weather-row { display:flex; align-items:center; justify-content:space-between; }
.weather-left { display:flex; align-items:center; gap:10px; }
.weather-icon { font-size:40px; line-height:1; }
.weather-temp { font-family:'DM Mono',monospace; font-size:42px; font-weight:200; color:#fff; letter-spacing:-2px; line-height:1; }
.weather-desc { font-size:10px; letter-spacing:0.1em; color:rgba(255,255,255,0.38); text-transform:uppercase; margin-top:2px; }
.weather-loc { font-size:10px; font-weight:600; color:var(--accent); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:4px; }
.weather-stats { text-align:right; font-size:11px; color:rgba(255,255,255,0.42); line-height:2; }
.weather-stats span { color:#fff; font-weight:500; }

/* Calendar */
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.cal-month { font-size:13px; font-weight:600; color:#fff; text-transform:uppercase; letter-spacing:0.05em; }
.cal-nav {
  background:rgba(255,255,255,0.08); border:1px solid var(--border);
  border-radius:7px; color:#fff; width:26px; height:26px;
  display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px;
}
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; text-align:center; }
.cal-dow { font-size:8px; font-weight:600; letter-spacing:0.08em; color:rgba(255,255,255,0.26); text-transform:uppercase; padding:2px 0 6px; }
.cal-day {
  font-size:11px; color:rgba(255,255,255,0.65); padding:3px 1px;
  border-radius:50%; cursor:pointer; aspect-ratio:1;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto; width:26px; position:relative;
}
.cal-day:hover { background:rgba(255,255,255,0.08); }
.cal-day.other-month { color:rgba(255,255,255,0.14); }
.cal-day.today { background:var(--accent); color:#fff; font-weight:600; }
.cal-day.has-event::after {
  content:''; position:absolute; bottom:1px; left:50%; transform:translateX(-50%);
  width:3px; height:3px; border-radius:50%; background:var(--accent);
}
.cal-day.today.has-event::after { background:#fff; }

/* Events */
.events-list { margin-top:8px; }
.event-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:7px 10px;
  background:rgba(74,158,255,0.08); border:1px solid rgba(74,158,255,0.15);
  border-radius:10px; margin-top:5px;
}
.ev-info .ev-title { font-size:12px; color:#fff; font-weight:500; }
.ev-info .ev-date { font-size:10px; color:rgba(255,255,255,0.38); }
.ev-actions { display:flex; gap:6px; }
.ev-edit, .ev-del {
  background:none; border:none; cursor:pointer; font-size:14px; padding:2px 4px; border-radius:6px;
}
.ev-edit { color:rgba(255,255,255,0.35); }
.ev-edit:hover { background:rgba(255,255,255,0.08); color:#fff; }
.ev-del { color:rgba(255,100,100,0.4); }
.ev-del:hover { background:rgba(255,80,80,0.1); color:#ff6464; }

.add-btn {
  margin-top:8px; width:100%; padding:10px;
  background:rgba(74,158,255,0.12); border:1px solid rgba(74,158,255,0.22);
  border-radius:11px; color:var(--accent);
  font-family:'Outfit',sans-serif; font-size:12px; font-weight:600; cursor:pointer;
}
.add-btn:hover { background:rgba(74,158,255,0.20); }

/* Photo Widget */
.photo-widget {
  flex:1; min-height:240px;
  border-radius:20px; overflow:hidden;
  position:relative; border:1px solid var(--border);
}
.photo-slide {
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  opacity:0; transition:opacity 1.2s ease;
}
.photo-slide.active { opacity:1; }

.photo-controls {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
  padding:10px 12px 10px;
  display:flex; align-items:center; justify-content:space-between;
  z-index:2;
}
.photo-dots-row { display:flex; gap:5px; }
.dot {
  width:5px; height:5px; border-radius:50%;
  background:rgba(255,255,255,0.35); cursor:pointer;
  transition:all 0.3s; border:1px solid rgba(255,255,255,0.2);
}
.dot.active { background:#fff; transform:scale(1.3); }
.photo-btn {
  background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.2);
  border-radius:8px; color:#fff; font-size:11px; font-weight:600;
  padding:5px 10px; cursor:pointer; font-family:'Outfit',sans-serif;
}
.photo-btn:hover { background:rgba(255,255,255,0.25); }
.photo-count {
  font-size:10px; color:rgba(255,255,255,0.5);
  font-family:'DM Mono',monospace;
}

/* Photo Manager Overlay */
.photo-manager {
  display:none; position:fixed; inset:0; z-index:50;
  background:rgba(0,0,0,0.85); backdrop-filter:blur(6px);
  flex-direction:column; padding:20px;
}
.photo-manager.open { display:flex; }
.pm-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.pm-title { font-size:16px; font-weight:600; color:#fff; }
.pm-close { background:rgba(255,255,255,0.1); border:none; color:#fff; width:32px; height:32px; border-radius:50%; font-size:18px; cursor:pointer; }
.pm-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; overflow-y:auto; flex:1; }
.pm-photo {
  aspect-ratio:1; border-radius:12px; overflow:hidden;
  position:relative; border:2px solid transparent;
}
.pm-photo.active-photo { border-color:var(--accent); }
.pm-photo img { width:100%; height:100%; object-fit:cover; }
.pm-photo-del {
  position:absolute; top:4px; right:4px;
  background:rgba(0,0,0,0.6); border:none; color:#ff6464;
  width:22px; height:22px; border-radius:50%; font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.pm-add {
  aspect-ratio:1; border-radius:12px;
  border:2px dashed rgba(255,255,255,0.2);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer; color:rgba(255,255,255,0.4);
  font-size:11px; gap:4px;
}
.pm-add:hover { border-color:var(--accent); color:var(--accent); }
.pm-add-icon { font-size:28px; }
#file-input { display:none; }

/* Modal */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,0.7); backdrop-filter:blur(5px);
  align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:rgba(10,18,32,0.97); border:1px solid rgba(255,255,255,0.12);
  border-radius:22px; padding:22px; width:90%; max-width:340px;
}
.modal h3 { font-size:15px; font-weight:600; color:#fff; margin-bottom:16px; text-align:center; }
.modal label {
  display:block; font-size:9px; font-weight:600;
  letter-spacing:0.12em; color:rgba(255,255,255,0.36);
  text-transform:uppercase; margin-bottom:5px; margin-top:12px;
}
.modal input {
  width:100%; background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12); border-radius:9px;
  padding:10px 12px; color:#fff; font-family:'Outfit',sans-serif;
  font-size:14px; outline:none; color-scheme:dark;
}
.modal input:focus { border-color:rgba(74,158,255,0.5); }
.modal-btns { display:flex; gap:8px; margin-top:18px; }
.modal-btns button {
  flex:1; padding:12px; border-radius:11px;
  font-family:'Outfit',sans-serif; font-size:13px;
  font-weight:600; cursor:pointer; border:none;
}
.btn-cancel { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.55); }
.btn-save { background:var(--accent); color:#fff; }

/* ── Settings Button ── */
.settings-btn {
  position: fixed;
  top: 14px; right: 14px;
  z-index: 20;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
  backdrop-filter: blur(10px);
}

/* ── Settings Panel ── */
.settings-panel {
  display: none; position: fixed; inset: 0; z-index: 90;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
  align-items: flex-end; justify-content: center;
}
.settings-panel.open { display: flex; }
.settings-sheet {
  background: #0e1c2f;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px 40px;
  width: 100%; max-width: 420px;
  max-height: 80vh; overflow-y: auto;
}
.settings-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.settings-title { font-size: 15px; font-weight: 600; color: #fff; }
.settings-close {
  background: rgba(255,255,255,0.08); border: none; color: #fff;
  width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer;
}
.s-section { margin-bottom: 20px; }
.s-label {
  font-size: 9px; font-weight: 600; letter-spacing: 0.14em;
  color: rgba(255,255,255,0.30); text-transform: uppercase; margin-bottom: 10px;
}

/* Color presets */
.color-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.color-preset {
  width: 34px; height: 34px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent; transition: all 0.2s;
}
.color-preset.selected { border-color: #fff; transform: scale(1.15); }

/* Custom color row */
.custom-row {
  display: flex; align-items: center; gap: 10px; margin-top: 6px;
}
.custom-row label { font-size: 12px; color: rgba(255,255,255,0.45); flex: 1; }
.custom-row input[type=color] {
  width: 42px; height: 34px; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; background: none; cursor: pointer; padding: 2px;
}

/* Slider rows */
.slider-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.slider-row label { font-size: 12px; color: rgba(255,255,255,0.45); width: 90px; }
.slider-row input[type=range] { flex: 1; accent-color: var(--accent); }
.slider-val { font-size: 12px; color: #fff; width: 36px; text-align: right; font-family: 'DM Mono', monospace; }

/* Reset button */
.reset-btn {
  width: 100%; padding: 11px; margin-top: 10px;
  background: rgba(255,80,80,0.10); border: 1px solid rgba(255,80,80,0.20);
  border-radius: 11px; color: #ff8080; font-family: 'Outfit',sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer;
}

</style>
</head>
<body>

<!-- Clock -->
<div class="card">
  <div class="label">Clock</div>
  <div class="clock-row">
    <div class="clock-time"><span id="hhmm">--:--</span><span class="clock-sec" id="secs">00</span></div>
    <div class="clock-date" id="datestr">--</div>
  </div>
</div>

<!-- Weather -->
<div class="card">
  <div class="label">Weather</div>
  <div class="weather-loc">📍 Düsseldorf</div>
  <div class="weather-row">
    <div class="weather-left">
      <div class="weather-icon">⛅</div>
      <div>
        <div class="weather-temp">12°</div>
        <div class="weather-desc">Drizzle</div>
      </div>
    </div>
    <div class="weather-stats">
      Humidity <span>73%</span><br>
      Wind <span>18 km/h</span><br>
      Feels <span>9°</span>
    </div>
  </div>
</div>

<!-- Calendar -->
<div class="card">
  <div class="label">Calendar</div>
  <div class="cal-header">
    <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
    <div class="cal-month" id="cal-month-label"></div>
    <button class="cal-nav" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="events-list" id="events-list"></div>
  <button class="add-btn" onclick="openEventModal()">+ Termin hinzufügen</button>
</div>

<!-- Photo Widget -->
<div class="photo-widget" id="photo-widget">
  <div id="photo-slides"></div>
  <div class="photo-controls">
    <div class="photo-dots-row" id="dots"></div>
    <span class="photo-count" id="photo-count">1 / 7</span>
    <button class="photo-btn" onclick="openPhotoManager()">⚙ Fotos</button>
  </div>
</div>

<!-- Photo Manager -->
<div class="photo-manager" id="photo-manager">
  <div class="pm-header">
    <div class="pm-title">📸 Fotos verwalten</div>
    <button class="pm-close" onclick="closePhotoManager()">×</button>
  </div>
  <div class="pm-grid" id="pm-grid"></div>
  <input type="file" id="file-input" accept="image/*" multiple onchange="addPhotos(this)">
</div>

<!-- Event Modal -->
<div class="modal-overlay" id="event-modal">
  <div class="modal">
    <h3 id="modal-title">➕ Termin hinzufügen</h3>
    <label>Titel</label>
    <input type="text" id="ev-title" placeholder="z.B. Arzttermin" />
    <label>Datum</label>
    <input type="date" id="ev-date" />
    <label>Uhrzeit (optional)</label>
    <input type="time" id="ev-time" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeEventModal()">Abbrechen</button>
      <button class="btn-save" id="modal-save-btn" onclick="saveEvent()">Speichern</button>
    </div>
  </div>
</div>

// ── Storage helpers ──
function load(key, def) {
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

// ── Clock ──
function updateClock() {
  var now = new Date();
  document.getElementById('hhmm').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('secs').textContent = String(now.getSeconds()).padStart(2,'0');
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('datestr').innerHTML = days[now.getDay()].toUpperCase() + '<br>' + months[now.getMonth()].toUpperCase() + ' ' + now.getDate() + ', ' + now.getFullYear();
}
setInterval(updateClock, 1000);
updateClock();

// ── Events ──
var events = load('anna_events', []);
var editingEventId = null;

function openEventModal(id) {
  editingEventId = id || null;
  var today = new Date();
  if (id) {
    var ev = events.find(function(e) { return e.id === id; });
    document.getElementById('modal-title').textContent = '✏️ Termin bearbeiten';
    document.getElementById('modal-save-btn').textContent = 'Speichern';
    document.getElementById('ev-title').value = ev.title;
    document.getElementById('ev-date').value = ev.date;
    document.getElementById('ev-time').value = ev.time || '';
  } else {
    document.getElementById('modal-title').textContent = '➕ Termin hinzufügen';
    document.getElementById('modal-save-btn').textContent = 'Hinzufügen';
    document.getElementById('ev-title').value = '';
    document.getElementById('ev-date').value = today.toISOString().split('T')[0];
    document.getElementById('ev-time').value = '';
  }
  document.getElementById('event-modal').classList.add('open');
}
function closeEventModal() { document.getElementById('event-modal').classList.remove('open'); }

function saveEvent() {
  var title = document.getElementById('ev-title').value.trim();
  var date = document.getElementById('ev-date').value;
  var time = document.getElementById('ev-time').value;
  if (!title || !date) return;
  if (editingEventId) {
    events = events.map(function(e) {
      return e.id === editingEventId ? { id: e.id, title: title, date: date, time: time } : e;
    });
  } else {
    events.push({ id: Date.now(), title: title, date: date, time: time });
  }
  save('anna_events', events);
  closeEventModal();
  renderEvents();
  renderCal();
}

function deleteEvent(id) {
  events = events.filter(function(e) { return e.id !== id; });
  save('anna_events', events);
  renderEvents();
  renderCal();
}

function renderEvents() {
  var list = document.getElementById('events-list');
  var now = new Date().toISOString().split('T')[0];
  var upcoming = events.filter(function(e) { return e.date >= now; })
    .sort(function(a,b) { return a.date.localeCompare(b.date); }).slice(0,5);
  if (!upcoming.length) { list.innerHTML = ''; return; }
  list.innerHTML = upcoming.map(function(e) {
    var d = new Date(e.date + 'T12:00:00');
    var ds = d.toLocaleDateString('de-DE', { day:'2-digit', month:'short', year:'2-digit' });
    return '<div class="event-item"><div class="ev-info"><div class="ev-title">' + e.title + '</div><div class="ev-date">' + ds + (e.time ? ' · ' + e.time + ' Uhr' : '') + '</div></div>'
      + '<div class="ev-actions"><button class="ev-edit" onclick="openEventModal(' + e.id + ')">✏️</button><button class="ev-del" onclick="deleteEvent(' + e.id + ')">🗑</button></div></div>';
  }).join('');
}

// ── Calendar ──
var calDate = new Date();

function renderCal() {
  var year = calDate.getFullYear(), month = calDate.getMonth();
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = months[month].toUpperCase() + ' ' + year;
  var grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['MON','TUE','WED','THU','FRI','SAT','SUN'].forEach(function(d) {
    var el = document.createElement('div'); el.className = 'cal-dow'; el.textContent = d; grid.appendChild(el);
  });
  var firstDay = new Date(year, month, 1).getDay();
  var offset = firstDay === 0 ? 6 : firstDay - 1;
  var dim = new Date(year, month+1, 0).getDate();
  var prev = new Date(year, month, 0).getDate();
  var today = new Date();
  for (var i = offset-1; i >= 0; i--) {
    var el = document.createElement('div'); el.className = 'cal-day other-month'; el.textContent = prev-i; grid.appendChild(el);
  }
  for (var d = 1; d <= dim; d++) {
    var el = document.createElement('div'); el.className = 'cal-day';
    if (d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) el.classList.add('today');
    var ds = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    if (events.some(function(e) { return e.date === ds; })) el.classList.add('has-event');
    el.textContent = d;
    var dateForModal = ds;
    el.onclick = function(date) { return function() { openEventModal(); document.getElementById('ev-date').value = date; }; }(dateForModal);
    grid.appendChild(el);
  }
  var rem = (7 - ((offset + dim) % 7)) % 7;
  for (var d = 1; d <= rem; d++) {
    var el = document.createElement('div'); el.className = 'cal-day other-month'; el.textContent = d; grid.appendChild(el);
  }
}
function changeMonth(dir) { calDate.setMonth(calDate.getMonth() + dir); renderCal(); }
renderCal();
renderEvents();

// ── Photos ──
var photos = load('anna_photos', null);
if (!photos) { photos = defaultPhotos; save('anna_photos', photos); }
var currentSlide = 0;
var slideInterval;

function buildSlides() {
  var container = document.getElementById('photo-slides');
  var dotsEl = document.getElementById('dots');
  container.innerHTML = '';
  dotsEl.innerHTML = '';
  photos.forEach(function(src, i) {
    var slide = document.createElement('div');
    slide.className = 'photo-slide' + (i === currentSlide ? ' active' : '');
    slide.style.backgroundImage = 'url(' + src + ')';
    container.appendChild(slide);
    var dot = document.createElement('div');
    dot.className = 'dot' + (i === currentSlide ? ' active' : '');
    (function(n) { dot.onclick = function() { goToSlide(n); }; })(i);
    dotsEl.appendChild(dot);
  });
  document.getElementById('photo-count').textContent = (currentSlide+1) + ' / ' + photos.length;
  clearInterval(slideInterval);
  slideInterval = setInterval(function() { goToSlide((currentSlide+1) % photos.length); }, 8000);
}

function goToSlide(n) {
  var slides = document.querySelectorAll('.photo-slide');
  var dots = document.querySelectorAll('.dot');
  if (slides[currentSlide]) slides[currentSlide].classList.remove('active');
  if (dots[currentSlide]) dots[currentSlide].classList.remove('active');
  currentSlide = n;
  if (slides[currentSlide]) slides[currentSlide].classList.add('active');
  if (dots[currentSlide]) dots[currentSlide].classList.add('active');
  document.getElementById('photo-count').textContent = (currentSlide+1) + ' / ' + photos.length;
}

buildSlides();

// Photo Manager
function openPhotoManager() {
  renderPhotoGrid();
  document.getElementById('photo-manager').classList.add('open');
}
function closePhotoManager() { document.getElementById('photo-manager').classList.remove('open'); }

function renderPhotoGrid() {
  var grid = document.getElementById('pm-grid');
  grid.innerHTML = '';
  photos.forEach(function(src, i) {
    var div = document.createElement('div');
    div.className = 'pm-photo' + (i === currentSlide ? ' active-photo' : '');
    var img = document.createElement('img');
    img.src = src;
    var del = document.createElement('button');
    del.className = 'pm-photo-del';
    del.textContent = '×';
    (function(idx) { del.onclick = function(e) { e.stopPropagation(); deletePhoto(idx); }; })(i);
    (function(idx) { div.onclick = function() { goToSlide(idx); renderPhotoGrid(); }; })(i);
    div.appendChild(img); div.appendChild(del);
    grid.appendChild(div);
  });
  // Add button
  var add = document.createElement('div');
  add.className = 'pm-add';
  add.innerHTML = '<div class="pm-add-icon">＋</div><div>Foto hinzufügen</div>';
  add.onclick = function() { document.getElementById('file-input').click(); };
  grid.appendChild(add);
}

function addPhotos(input) {
  var files = Array.from(input.files);
  var loaded = 0;
  files.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      photos.push(e.target.result);
      loaded++;
      if (loaded === files.length) {
        save('anna_photos', photos);
        buildSlides();
        renderPhotoGrid();
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function deletePhoto(idx) {
  if (photos.length <= 1) { alert('Mindestens ein Foto muss bleiben!'); return; }
  photos.splice(idx, 1);
  if (currentSlide >= photos.length) currentSlide = photos.length - 1;
  save('anna_photos', photos);
  buildSlides();
  renderPhotoGrid();
}

// ── Settings ──
var bgColors = ['#0b1623','#1a0a2e','#0a1f0a','#1f0a0a','#1a1200','#0a1a1f','#1f1f1f','#2a1f10'];
var accentColors = ['#4a9eff','#ff4aad','#4aff8c','#ffb84a','#ff4a4a','#b84aff','#4afff0','#ffffff'];

function openSettings() { document.getElementById('settings-panel').classList.add('open'); }
function closeSettings() { document.getElementById('settings-panel').classList.remove('open'); }

// Build color presets
function buildPresets() {
  var bgEl = document.getElementById('bg-presets');
  var s = load('anna_settings', {});
  bgColors.forEach(function(c) {
    var el = document.createElement('div');
    el.className = 'color-preset' + (c === (s.bg || '#0b1623') ? ' selected' : '');
    el.style.background = c;
    el.onclick = function() { applyBg(c); buildPresets(); };
    bgEl.appendChild(el);
  });
  var acEl = document.getElementById('accent-presets');
  accentColors.forEach(function(c) {
    var el = document.createElement('div');
    el.className = 'color-preset' + (c === (s.accent || '#4a9eff') ? ' selected' : '');
    el.style.background = c;
    el.onclick = function() { applyAccent(c); buildPresets(); };
    acEl.appendChild(el);
  });
}

function applyBg(color) {
  document.body.style.background = color;
  document.getElementById('bg-custom').value = color;
  var s = load('anna_settings', {}); s.bg = color; save('anna_settings', s);
  rebuildPresets();
}
function applyAccent(color) {
  document.documentElement.style.setProperty('--accent', color);
  document.getElementById('accent-custom').value = color;
  var s = load('anna_settings', {}); s.accent = color; save('anna_settings', s);
  rebuildPresets();
}
function applyOpacity(val) {
  document.getElementById('opacity-val').textContent = val + '%';
  document.documentElement.style.setProperty('--glass', 'rgba(255,255,255,' + (val/100) + ')');
  var s = load('anna_settings', {}); s.opacity = val; save('anna_settings', s);
}
function applyClockSize(val) {
  document.getElementById('clock-size-val').textContent = val + 'px';
  document.querySelector('.clock-time').style.fontSize = val + 'px';
  var s = load('anna_settings', {}); s.clockSize = val; save('anna_settings', s);
}
function applyFontScale(val) {
  document.getElementById('font-scale-val').textContent = val + '%';
  document.body.style.fontSize = (val/100) + 'rem';
  var s = load('anna_settings', {}); s.fontScale = val; save('anna_settings', s);
}
function applyPadding(val) {
  document.getElementById('padding-val').textContent = val + 'px';
  document.querySelectorAll('.card').forEach(function(c) { c.style.padding = val + 'px ' + (val+2) + 'px'; });
  var s = load('anna_settings', {}); s.padding = val; save('anna_settings', s);
}
function applyPhotoHeight(val) {
  document.getElementById('photo-height-val').textContent = val + 'px';
  document.getElementById('photo-widget').style.minHeight = val + 'px';
  var s = load('anna_settings', {}); s.photoHeight = val; save('anna_settings', s);
}

function rebuildPresets() {
  document.getElementById('bg-presets').innerHTML = '';
  document.getElementById('accent-presets').innerHTML = '';
  buildPresets();
}

function resetSettings() {
  save('anna_settings', {});
  location.reload();
}

// Load saved settings on start
function loadSettings() {
  var s = load('anna_settings', {});
  if (s.bg) { document.body.style.background = s.bg; document.getElementById('bg-custom').value = s.bg; }
  if (s.accent) { document.documentElement.style.setProperty('--accent', s.accent); document.getElementById('accent-custom').value = s.accent; }
  if (s.opacity !== undefined) {
    document.getElementById('opacity-slider').value = s.opacity;
    applyOpacity(s.opacity);
  }
  if (s.clockSize) {
    document.getElementById('clock-size-slider').value = s.clockSize;
    applyClockSize(s.clockSize);
  }
  if (s.fontScale) {
    document.getElementById('font-scale-slider').value = s.fontScale;
    applyFontScale(s.fontScale);
  }
  if (s.padding) {
    document.getElementById('padding-slider').value = s.padding;
    applyPadding(s.padding);
  }
  if (s.photoHeight) {
    document.getElementById('photo-height-slider').value = s.photoHeight;
    applyPhotoHeight(s.photoHeight);
  }
}

buildPresets();
loadSettings();

</script>

<!-- Settings Button -->
<button class="settings-btn" onclick="openSettings()">⚙️</button>

<!-- Settings Panel -->
<div class="settings-panel" id="settings-panel">
  <div class="settings-sheet">
    <div class="settings-header">
      <div class="settings-title">⚙️ Einstellungen</div>
      <button class="settings-close" onclick="closeSettings()">×</button>
    </div>

    <!-- Background Color -->
    <div class="s-section">
      <div class="s-label">Hintergrundfarbe</div>
      <div class="color-presets" id="bg-presets"></div>
      <div class="custom-row">
        <label>Eigene Farbe</label>
        <input type="color" id="bg-custom" onchange="applyBg(this.value)">
      </div>
    </div>

    <!-- Accent Color -->
    <div class="s-section">
      <div class="s-label">Akzentfarbe</div>
      <div class="color-presets" id="accent-presets"></div>
      <div class="custom-row">
        <label>Eigene Farbe</label>
        <input type="color" id="accent-custom" onchange="applyAccent(this.value)">
      </div>
    </div>

    <!-- Card Opacity -->
    <div class="s-section">
      <div class="s-label">Karten-Transparenz</div>
      <div class="slider-row">
        <label>Transparenz</label>
        <input type="range" min="0" max="100" value="6" id="opacity-slider" oninput="applyOpacity(this.value)">
        <span class="slider-val" id="opacity-val">6%</span>
      </div>
    </div>

    <!-- Font Size -->
    <div class="s-section">
      <div class="s-label">Schriftgröße</div>
      <div class="slider-row">
        <label>Uhrzeit</label>
        <input type="range" min="30" max="90" value="60" id="clock-size-slider" oninput="applyClockSize(this.value)">
        <span class="slider-val" id="clock-size-val">60px</span>
      </div>
      <div class="slider-row">
        <label>Allgemein</label>
        <input type="range" min="80" max="130" value="100" id="font-scale-slider" oninput="applyFontScale(this.value)">
        <span class="slider-val" id="font-scale-val">100%</span>
      </div>
    </div>

    <!-- Card Padding -->
    <div class="s-section">
      <div class="s-label">Widget-Größe</div>
      <div class="slider-row">
        <label>Innenabstand</label>
        <input type="range" min="6" max="28" value="14" id="padding-slider" oninput="applyPadding(this.value)">
        <span class="slider-val" id="padding-val">14px</span>
      </div>
      <div class="slider-row">
        <label>Foto-Höhe</label>
        <input type="range" min="150" max="450" value="240" id="photo-height-slider" oninput="applyPhotoHeight(this.value)">
        <span class="slider-val" id="photo-height-val">240px</span>
      </div>
    </div>

    <button class="reset-btn" onclick="resetSettings()">↺ Alles zurücksetzen</button>
  </div>
</div>

</body>
</html>

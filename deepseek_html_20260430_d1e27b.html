<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Kitchen Wall</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
    <style>
        :root {
            --bg-gradient: #000000;
            --tile-bg: rgba(0,0,0,0.85);
            --text-color: #ffffff;
            --accent: #E94545;
            --font-family: 'Segoe UI', system-ui, sans-serif;
            --slide-duration: 1s;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #dashboard { width: 100%; height: 100vh; position: relative; overflow: hidden; }

        /* Farbverlauf zwischen Foto und Kalender */
        #gradient-overlay {
            position: absolute;
            top: 0;
            left: 35%;
            width: 5%;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,1) 100%);
            z-index: 5;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            touch-action: none;
            will-change: transform;
            background: var(--tile-bg);
            border: none;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            min-width: 80px;
            min-height: 80px;
            overflow: hidden;
        }

        .tile-header { display: none; } /* Alle Header ausblenden */

        .tile-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            container-type: inline-size;
        }

        /* Wetter */
        #weather {
            background: transparent !important;
            z-index: 10 !important;
        }
        #weather .tile-content {
            padding: 12px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            text-align: right;
        }
        .weather-now .temp {
            font-size: clamp(2rem, 5cqw, 4rem);
            font-weight: 300;
            line-height: 1;
        }
        .weather-now .details {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        .forecast-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .forecast-day {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 4px 6px;
            text-align: center;
            font-size: 0.7rem;
            min-width: 48px;
        }
        .forecast-day.active { background: var(--accent); color: white; }

        /* Kalender */
        #calendar {
            background: #000 !important;
        }
        #calendar .tile-content {
            padding: 12px 16px;
            position: relative;
        }
        .calendar-nav { display: none; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            text-align: center;
            font-size: clamp(0.8rem, 1.6cqw, 1.1rem);
        }
        .day-header {
            font-size: clamp(0.85rem, 1.5cqw, 1.2rem);
            font-weight: 400;
            color: #fff;
            padding: 4px 0;
            letter-spacing: 0.05em;
        }
        .day {
            padding: clamp(6px, 1.5cqw, 12px) 4px;
            min-height: clamp(50px, 7cqw, 90px);
            text-align: center;
            font-size: clamp(1.2rem, 2.2cqw, 2rem);
            font-weight: 300;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 2px;
            cursor: default;
        }
        .day .day-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.4em;
            height: 1.4em;
            border-radius: 50%;
            font-weight: 300;
        }
        .day.today .day-number {
            background: #E94545;
            color: #fff;
            font-weight: 400;
        }
        .day-events {
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100%;
            margin-top: 2px;
        }
        .day-event {
            font-size: clamp(0.55rem, 0.8cqw, 0.75rem);
            font-weight: 400;
            padding: 1px 4px;
            border-radius: 2px;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
            line-height: 1.3;
        }
        .day-event.bullet {
            background: transparent;
            padding-left: 8px;
            position: relative;
        }
        .day-event.bullet::before {
            content: '●';
            position: absolute;
            left: 0;
            font-size: 0.7em;
        }

        /* Slideshow */
        #slideshow {
            background: #000 !important;
        }
        #slideshow .tile-content { padding: 0; }
        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        .slide-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity var(--slide-duration) ease-out;
        }
        .slide-img.active { opacity: 1; }

        .slideshow-controls {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 10;
        }
        .slideshow-controls button {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
        }
        .upload-area {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 6px;
            z-index: 5;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .upload-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        input[type="file"] { display: none; }

        /* Einstellungs-Panel für Kalender */
        .cal-settings-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 20;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
            font-size: 1rem;
        }
        .cal-settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20,20,30,0.95);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 16px;
            z-index: 1000;
            display: none;
            width: 90%;
            max-width: 400px;
            color: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .cal-settings-panel.open { display: block; }
        .cal-settings-panel h3 { margin: 0 0 12px; font-size: 1.1rem; }
        .cal-settings-panel input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            margin-bottom: 12px;
        }
        .cal-settings-panel button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
        }
        .cal-settings-panel .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .error-msg {
            background: rgba(239,68,68,0.2);
            color: #fecaca;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>

<div id="dashboard">
    <!-- Farbverlauf-Overlay für harmonischen Übergang -->
    <div id="gradient-overlay"></div>
</div>

<!-- Kleines Kalender‑Einstellungs‑Panel (Overlay) -->
<div class="cal-settings-icon" id="cal-settings-icon">
    <i class="fas fa-cog"></i>
</div>
<div class="cal-settings-panel" id="cal-settings-panel">
    <button class="close-btn" id="close-cal-settings">&times;</button>
    <h3>📅 Kalender‑URL</h3>
    <input type="text" id="ical-url" placeholder="https://calendar.google.com/.../basic.ics">
    <button id="load-ical-btn">Kalender laden</button>
    <div class="error-msg" id="ical-error"></div>
    <p style="font-size: 0.7rem; opacity: 0.6; margin-top: 8px;">
        Google Kalender: Einstellungen → Kalender → Geheime Adresse im iCal‑Format kopieren.
    </p>
</div>

<script>
    (function() {
        // Layout: slideshow (links 38%), calendar (rechts 62%), Wetter (unten links, jetzt höher für Vorhersage)
        const W = window.innerWidth;
        const H = window.innerHeight;
        const layout = [
            { id: 'slideshow', x: 0, y: 0, w: W * 0.38, h: H },
            { id: 'calendar',  x: W * 0.38, y: 0, w: W * 0.62, h: H },
            { id: 'weather',   x: 0, y: H * 0.58, w: W * 0.38, h: H * 0.42 } // erhöht für Vorhersage
        ];

        function createTiles() {
            const container = document.getElementById('dashboard');
            container.innerHTML = '<div id="gradient-overlay"></div>'; // Overlay bleibt
            layout.forEach(item => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = item.id;
                tile.style.left = item.x + 'px';
                tile.style.top = item.y + 'px';
                tile.style.width = item.w + 'px';
                tile.style.height = item.h + 'px';
                tile.innerHTML = `<div class="tile-content"></div>`;
                container.appendChild(tile);
                fillTileContent(item.id, tile);
            });
            initInteract();
        }

        function fillTileContent(id, tile) {
            const content = tile.querySelector('.tile-content');
            switch(id) {
                case 'weather':
                    content.innerHTML = `
                        <div class="weather-now">
                            <div class="temp" id="current-temp">--°</div>
                            <div class="details" id="current-details"></div>
                            <div id="current-icon" style="font-size:2rem;"></div>
                        </div>
                        <div class="forecast-row" id="forecast-container"></div>`;
                    break;
                case 'calendar':
                    content.innerHTML = `
                        <div class="calendar-grid" id="calendar-grid"></div>
                        <div class="event-details" id="event-details" style="display:none;"></div>`;
                    break;
                case 'slideshow':
                    content.innerHTML = `
                        <div class="slideshow-container slide-anim-fade" id="slideshow-container">
                            <div class="slideshow-controls">
                                <button id="prev-slide"><i class="fas fa-chevron-left"></i></button>
                                <button id="play-pause"><i class="fas fa-pause"></i></button>
                                <button id="next-slide"><i class="fas fa-chevron-right"></i></button>
                                <button id="delete-slide"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="upload-area">
                            <label for="file-upload" class="upload-btn"><i class="fas fa-upload"></i> Hochladen</label>
                            <input type="file" id="file-upload" multiple accept="image/*">
                            <span id="image-count" style="color:white;">0 Bilder</span>
                        </div>`;
                    break;
            }
        }

        function initInteract() {
            interact('.tile').draggable({
                allowFrom: '.tile-content',
                modifiers: [interact.modifiers.restrict({ restriction: 'parent', endOnly: true })],
                listeners: {
                    move(event) {
                        const target = event.target;
                        const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                        const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);
                    },
                    end(event) {
                        const target = event.target;
                        const x = parseFloat(target.getAttribute('data-x')) || 0;
                        const y = parseFloat(target.getAttribute('data-y')) || 0;
                        target.style.transform = '';
                        target.style.left = (parseFloat(target.style.left) + x) + 'px';
                        target.style.top = (parseFloat(target.style.top) + y) + 'px';
                        target.setAttribute('data-x', 0);
                        target.setAttribute('data-y', 0);
                    }
                }
            }).resizable({
                edges: { top: true, bottom: true, left: true, right: true },
                modifiers: [
                    interact.modifiers.restrict({ restriction: 'parent', endOnly: true }),
                    interact.modifiers.restrictSize({ min: { width: 80, height: 80 } })
                ],
                listeners: {
                    move(event) {
                        const target = event.target;
                        let x = (parseFloat(target.getAttribute('data-x')) || 0);
                        let y = (parseFloat(target.getAttribute('data-y')) || 0);
                        target.style.width = event.rect.width + 'px';
                        target.style.height = event.rect.height + 'px';
                        x += event.deltaRect.left;
                        y += event.deltaRect.top;
                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);
                    },
                    end(event) {
                        const target = event.target;
                        const x = parseFloat(target.getAttribute('data-x')) || 0;
                        const y = parseFloat(target.getAttribute('data-y')) || 0;
                        target.style.transform = '';
                        target.style.left = (parseFloat(target.style.left) + x) + 'px';
                        target.style.top = (parseFloat(target.style.top) + y) + 'px';
                        target.setAttribute('data-x', 0);
                        target.setAttribute('data-y', 0);
                    }
                }
            });
        }

        // ─── WETTER ─────────────────────────────────
        async function fetchWeather(lat = 51.2277, lon = 6.7735) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=weather_code,temperature_2m,relative_humidity_2m,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`);
                return await res.json();
            } catch(e) { return null; }
        }

        function weatherEmoji(code) {
            if(code === 0) return '☀️'; if(code === 1) return '🌤️'; if(code === 2) return '⛅';
            if(code === 3) return '☁️'; if(code === 45 || code === 48) return '🌫️';
            if(code >= 51 && code <= 57) return '🌦️'; if(code >= 61 && code <= 67) return '🌧️';
            if(code >= 71 && code <= 77) return '🌨️'; if(code >= 80 && code <= 82) return '🌧️';
            if(code >= 85 && code <= 86) return '🌨️'; if(code >= 95) return '⛈️';
            return '🌥️';
        }

        function weatherDesc(code) {
            if(code === 0) return 'Sonnig'; if(code === 1) return 'Überwiegend sonnig';
            if(code === 2) return 'Teilweise bewölkt'; if(code === 3) return 'Bedeckt';
            if(code === 45 || code === 48) return 'Nebel'; if(code >= 51 && code <= 57) return 'Nieselregen';
            if(code >= 61 && code <= 67) return 'Regen'; if(code >= 71 && code <= 77) return 'Schnee';
            if(code >= 80 && code <= 82) return 'Regenschauer'; if(code >= 85 && code <= 86) return 'Schneeschauer';
            if(code >= 95) return 'Gewitter'; return 'Bewölkt';
        }

        async function updateWeather() {
            const data = await fetchWeather();
            if(!data) return;
            document.getElementById('current-temp').textContent = Math.round(data.current.temperature_2m) + '°';
            document.getElementById('current-details').innerHTML = `${weatherDesc(data.current.weather_code)}<br>💧 ${data.current.relative_humidity_2m}% · 💨 ${Math.round(data.current.wind_speed_10m)} km/h`;
            document.getElementById('current-icon').textContent = weatherEmoji(data.current.weather_code);

            // 5‑Tage‑Vorhersage
            const fc = document.getElementById('forecast-container');
            if(fc) {
                fc.innerHTML = '';
                data.daily.time.forEach((day, i) => {
                    const d = new Date(day);
                    const div = document.createElement('div');
                    div.className = 'forecast-day' + (i===0?' active':'');
                    div.innerHTML = `<div>${d.toLocaleDateString('de-DE',{weekday:'short'})}</div><div>${weatherEmoji(data.daily.weather_code[i])}</div><div>${Math.round(data.daily.temperature_2m_max[i])}°/${Math.round(data.daily.temperature_2m_min[i])}°</div>`;
                    fc.appendChild(div);
                });
            }
        }

        // ─── KALENDER ────────────────────────────────
        let calendarEvents = [];
        function assignEventColor(index) {
            const palette = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63','#00bcd4','#ff5722'];
            return palette[index % palette.length];
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            if(!grid) return;
            grid.innerHTML = '';
            ['So','Mo','Di','Mi','Do','Fr','Sa'].forEach(d => {
                const div = document.createElement('div');
                div.className = 'day-header';
                div.textContent = d;
                grid.appendChild(div);
            });
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month+1, 0).getDate();
            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=daysInMonth; d++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const eventsOnDay = calendarEvents.filter(e => e.start.startsWith(dateStr));
                dayDiv.innerHTML = '';
                const numSpan = document.createElement('span');
                numSpan.className = 'day-number';
                numSpan.textContent = d;
                dayDiv.appendChild(numSpan);
                if(eventsOnDay.length > 0) {
                    const eventsContainer = document.createElement('div');
                    eventsContainer.className = 'day-events';
                    eventsOnDay.slice(0, 4).forEach((ev, idx) => {
                        const evDiv = document.createElement('div');
                        evDiv.className = 'day-event bullet';
                        evDiv.style.color = ev.color || assignEventColor(idx);
                        evDiv.textContent = ev.summary;
                        evDiv.title = ev.summary;
                        eventsContainer.appendChild(evDiv);
                    });
                    dayDiv.appendChild(eventsContainer);
                }
                if(d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                    dayDiv.classList.add('today');
                }
                grid.appendChild(dayDiv);
            }
        }

        // iCal‑Proxy‑Fallback (aus dem Original)
        const CORS_PROXIES = [
            'https://corsproxy.io/?',
            'https://api.allorigins.win/raw?url=',
            'https://api.codetabs.com/v1/proxy?quest='
        ];

        async function fetchICSWithFallback(url) {
            try {
                const res = await fetch(url);
                if (res.ok) return await res.text();
            } catch(e) {}
            for (const proxy of CORS_PROXIES) {
                try {
                    const proxyUrl = proxy + encodeURIComponent(url);
                    const res = await fetch(proxyUrl);
                    if (res.ok) {
                        const text = await res.text();
                        if (text.includes('BEGIN:VCALENDAR')) return text;
                    }
                } catch(e) {}
            }
            throw new Error('Kalender konnte nicht geladen werden. Bitte URL prüfen.');
        }

        async function loadCalendar(url) {
            if(!url) return;
            const errorBox = document.getElementById('ical-error');
            errorBox.style.display = 'none';
            errorBox.textContent = '';
            url = url.replace(/^webcal:\/\//i, 'https://');
            try {
                const data = await fetchICSWithFallback(url);
                const jcal = ICAL.parse(data);
                const comp = new ICAL.Component(jcal);
                const vevents = comp.getAllSubcomponents('vevent');
                calendarEvents = vevents.map((vevent, i) => {
                    const ev = new ICAL.Event(vevent);
                    const start = ev.startDate.toJSDate();
                    const end = ev.endDate.toJSDate();
                    return {
                        summary: ev.summary || '(Ohne Titel)',
                        start: start.toISOString().substring(0,10),
                        end: end.toISOString().substring(0,10),
                        color: assignEventColor(i)
                    };
                });
                renderCalendar();
                localStorage.setItem('icalUrl', url);
                console.log('✅ Kalender geladen:', calendarEvents.length, 'Termine');
            } catch(err) {
                errorBox.style.display = 'block';
                errorBox.textContent = '❌ ' + err.message;
            }
        }

        // ─── SLIDESHOW ──────────────────────────────
        let slides = [];
        let currentSlide = 0;
        let slideInterval = 10;
        let slideshowPaused = false;
        let slideshowTimer;

        function loadSlides() {
            try {
                const saved = localStorage.getItem('slideshowImages');
                if (saved) {
                    slides = JSON.parse(saved);
                    currentSlide = parseInt(localStorage.getItem('slideshowIndex')) || 0;
                    if (currentSlide >= slides.length) currentSlide = 0;
                    updateSlideDisplay();
                    document.getElementById('image-count').textContent = slides.length + ' Bilder';
                }
            } catch(e) {}
        }

        function updateSlideDisplay() {
            const container = document.getElementById('slideshow-container');
            if(!container) return;
            container.querySelectorAll('.slide-img').forEach(img => img.remove());
            if (slides.length > 0 && slides[currentSlide]) {
                const newImg = document.createElement('img');
                newImg.className = 'slide-img active';
                newImg.src = slides[currentSlide];
                container.insertBefore(newImg, container.firstChild);
            }
        }

        function nextSlide() {
            if(slides.length === 0) return;
            currentSlide = (currentSlide + 1) % slides.length;
            updateSlideDisplay();
            localStorage.setItem('slideshowIndex', currentSlide);
        }

        function prevSlide() {
            if(slides.length === 0) return;
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            updateSlideDisplay();
            localStorage.setItem('slideshowIndex', currentSlide);
        }

        function startSlideshow() {
            clearInterval(slideshowTimer);
            if(slides.length === 0 || slideshowPaused) return;
            slideshowTimer = setInterval(nextSlide, slideInterval * 1000);
        }

        document.addEventListener('change', function(e) {
            if(e.target.id === 'file-upload') {
                Array.from(e.target.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = ev => {
                        slides.push(ev.target.result);
                        if(slides.length === 1) currentSlide = 0;
                        updateSlideDisplay();
                        document.getElementById('image-count').textContent = slides.length + ' Bilder';
                        localStorage.setItem('slideshowImages', JSON.stringify(slides));
                        startSlideshow();
                    };
                    reader.readAsDataURL(file);
                });
                e.target.value = '';
            }
        });

        document.addEventListener('click', function(e) {
            if(e.target.closest('#next-slide')) { nextSlide(); startSlideshow(); }
            else if(e.target.closest('#prev-slide')) { prevSlide(); startSlideshow(); }
            else if(e.target.closest('#play-pause')) {
                slideshowPaused = !slideshowPaused;
                const btn = e.target.closest('#play-pause');
                btn.innerHTML = slideshowPaused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
                slideshowPaused ? clearInterval(slideshowTimer) : startSlideshow();
            }
            else if(e.target.closest('#delete-slide')) {
                if(!slides.length) return;
                slides.splice(currentSlide, 1);
                if(currentSlide >= slides.length) currentSlide = Math.max(0, slides.length-1);
                updateSlideDisplay();
                document.getElementById('image-count').textContent = slides.length + ' Bilder';
                localStorage.setItem('slideshowImages', JSON.stringify(slides));
                startSlideshow();
            }
            // Kalender‑Einstellungen öffnen / schließen
            else if(e.target.closest('#cal-settings-icon')) {
                document.getElementById('cal-settings-panel').classList.add('open');
            }
            else if(e.target.closest('#close-cal-settings')) {
                document.getElementById('cal-settings-panel').classList.remove('open');
            }
            else if(e.target.closest('#load-ical-btn')) {
                const url = document.getElementById('ical-url').value.trim();
                loadCalendar(url);
            }
        });

        // Vorhandene URL aus localStorage laden
        function initCalendar() {
            const savedUrl = localStorage.getItem('icalUrl');
            if(savedUrl) {
                document.getElementById('ical-url').value = savedUrl;
                loadCalendar(savedUrl);
            }
        }

        // Start
        createTiles();
        loadSlides();
        updateWeather();
        renderCalendar();
        initCalendar();
        setInterval(updateWeather, 15 * 60 * 1000);
    })();
</script>
</body>
</html>
